body:
  text: 儀禮注疏卷七漢鄭氏注唐陸徳明音義賈公彦疏大射儀第七大射之儀音義射食夜反君有命戒射注將有祭祀之事當射宰告於君君乃命之言君有命政教宜由尊者疏釋曰自此盡西紘論射前預戒諸官及張矦設樂縣之事不言禮言儀者以射禮盛威儀多故以儀言之是以射義云孔子曰射者何以射何以聽循聲而發發而不失正鵠者其唯賢者乎若大不肖之人則彼將安能以中是其射容難故稱儀也注釋曰云將有祭祀之事當射者按射義云天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭不中者不得與於祭是其將祭必射也云宰告於君君乃命之者鄭意下云宰戒百官者宰先告君君使之戒乃戒即云戒百官是也云言君有命政教宜由尊者其經云戒射此戒亦政教之類故以政教言之也宰戒百官有事於射者注宰於天子冡宰治官卿也作大事則掌以君命戒於百官疏注釋曰按周禮大宰職云掌百官之誓戒此言宰戒百官其事同故鄭以天子冡宰言之也其實諸矦兼官無冡宰立地官司徒以兼之故聘禮云宰命司馬注云宰上卿貳君事者也諸矦謂司徒爲宰是諸矦立司徒兼冡宰之事也言大事則掌以君命戒於百官者周禮大宰職云作大事則戒于百官贊王命是鄭之所引以證宰戒之事也射人戒諸公卿大夫射司士戒士射與贊者注射人掌以射法治射儀司士掌國中之士治凡其戒令皆司馬之屬也殊戒公卿大夫與士辨貴賤也贊佐也謂士佐執事不射者疏釋曰上文宰官尊總戒此射人司士色别重戒之謂若天官冢宰戒百官宗伯大司冦之等重戒也注釋曰云射人掌以射法治射儀者夏官射人文云司士掌國中之士治凡其戒令者此司士職文云國中之士彼士總公卿大夫士而言此射人已戒公卿大夫則司士戒士贊者唯有士不兼大夫已上不同者斷章取義故與本職不同也云皆司馬之屬也者射人司士皆屬司馬故云司馬屬也此上下文所云戒者皆謂祭前旬有一日知者祭統云先期旬有一日宮宰宿夫人夫人亦散齊七日致齋三日若然卜及戒皆在旬有一日是大宰云前期十日帥執事而卜日遂戒注云前期前所諏之日也十日容散齋七日致齋三日其天子又有天地及山川社稷宗廟諸矦直有境内山川社稷宗廟卜日及戒皆同也按郊特牲云卜郊受命於祖廟作龜於禰宮卜之日王立于澤親聽誓命又云獻命庫門之内戒百官也太廟之命戒百姓也注云王自澤宮而還以誓命重相申勅也王自此還齋路寢之室若然卜日在澤宮又至射宮皆同在旬有一日空十日故後口乃齋也前射三日宰夫戒宰及司馬射人宿視滌注宰夫冢宰之屬掌百官之徵令者司馬於天子政官之卿凡大射則合其六耦滌謂漑器掃除射宮音義滌大歴反漑古代反疏釋曰此宰夫戒是再戒之㝛不云㝛者辟下㝛視滌何者宰夫戒是申戒下㝛是夕㝛是以宗伯云凡祀大神享大鬼祭大示帥執事而卜日㝛視滌濯注云㝛申戒也皆前有射人戒是七日前期此宰夫戒是申戒又知㝛是夕㝛者以戒㝛同文明不同日以其上云前射三日戒明此非三日是前一日矣注釋曰云宰夫冢宰之屬者按大宰云小宰中大夫二人宰夫下大夫四人屬冢宰故云冢宰之屬云掌百官之徴令者宰夫職文云司馬於天子政官之卿者小宰職云四曰司馬其屬六十掌邦政是也云凡大射則合其六耦者大司馬職云若大射合諸矦之六耦是將祭而射故使諸矦爲耦若其餘射則卿大夫以下爲耦也云滌謂漑器掃除者以其諸矦射先行燕禮㝛視滌器明滌器是射器及掃除射宮也司馬命量人量矦道與所設乏以貍歩大矦九十參七十干五十設乏各去其矦西十北十注量人司馬之屬掌量道巷塗數者矦謂所射布也尊者射之以威不寧矦卑者射之以求爲矦量矦道謂去堂遠近也容謂之乏所以爲獲者之禦矢貍之伺物每舉足者止視遠近爲發必中也是以量矦道取象焉鄉射記曰矦道五十弓考工記曰弓之下制六尺則此貍歩六尺明矣大矦熊矦謂之大者與天子熊矦同參讀爲糝糝雜也雜矦者豹鵠而麋飾下天子大夫也干讀為豻豻矦者豻鵠豻飾也大夫將祭於已射麋矦士無臣祭不射音義參依注音槮素感反干依注音豻五旦反鵠古毒反疏注釋曰云量人司馬之屬掌量道巷塗數者量人職文量人屬司馬故云司馬之屬也云矦謂所射布也者以其三矦皆以布爲之而以皮爲鵠旁又飾以皮也云尊者射之以威不寜矦者即梓人云毋或若汝不寧矦不屬於王所故抗而射汝是也云卑者射之以求爲矦者射義云故天子之大射謂之射矦射矦者射爲諸矦也射中則得爲諸矦射不中則不得為諸侯是也云容謂之乏所以為獲者之禦矢者此云乏周禮射人云容所以為獲者之禦矢觧容乏之義以其容身故得禦矢言乏矢於此乏匱不去也云則此貍歩六尺明矣鄭云此者隂破先鄭案先鄭注射人貍歩謂一舉足爲歩於今為半歩故鄭彼注亦引弓之下制六尺以非之也云大矦熊矦謂之大者與天子熊矦同者司裘職云王大射則共虎矦熊矦豹矦設其鵠諸矦則共熊矦豹矦彼畿内諸矦二矦以熊矦爲首此畿外諸矦亦得用三矦其數上同于天子而非畿内諸矦所可比故於熊矦加大以别之然不嫌於逼上者天子三矦則虎矦熊矦豹矦諸矦不得用虎矦而以熊矦糝矦豻矦為三矦若畿内則但有熊矦豹矦此其所以别也云參讀為糝糝雜也雜矦者豹鵠而麋飾下天子大夫也者司裘云卿大夫則共麋矦此則以豹皮為鵠以麋飾其側不用純麋是下天子大夫也必知以豹為鵠以麋為飾者天子卿大夫用麋矦諸矦卿大夫亦用麋矦竝據已家用之若助祭亦射君之第二矦明君之第二矦用麋飾其側矦以飾得名又畿内諸矦第二矦用豹為鵠故知畿外諸矦亦以豹皮為鵠可知云干讀為豻豻矦者豻鵠豻飾也者亦取㨗黠意大夫將祭於已射麋矦者司裘云卿大夫共麋矦是天子卿大夫以孝經云大夫有爭臣三人以有臣故將祭得大射擇士鄭言此者以已射用麋矦又見助君祭亦射君之麋矦云士無臣祭不射者孝經云士有爭友不言臣以㒒隸為友司裘卿大夫下不言士故祭不言士大射若然士有賔射燕射不得大射雖不得大射得與君賔射故射人注不言士者此與諸矦之賔射士不與也若然諸矦之士亦然也遂命量人巾車張三矦大矦之崇見鵠於參參見鵠於干干不及地武不繫左下綱設乏西十北十凡乏用革注巾車於天子宗伯之屬掌裝衣車者亦使張矦矦巾類崇高也髙必見鵠鵠所射之主射義曰為人君者以為君鵠為人臣者以為臣鵠為人父者以為父鵠為人子者以為子鵠言射中此乃能任己位也鵠之言較較直也射者所以直己志或曰鵠鳥名射之難中中之為俊是以所射於矦取名也淮南子曰鳱鵠知來然則所云正者正也亦鳥名齊魯之間名題肩為正正鵠皆鳥之捷黠者考工記曰梓人為矦廣與崇方參分其廣而鵠居一焉則大侯之鵠方六尺糝矦之鵠方四尺六寸大半寸豻矦之鵠方三尺三寸少半寸及至也武迹也中人之足長尺二寸以豻矦計之糝矦去地一丈五寸少半寸大矦去地二丈二尺五寸少半寸凡矦北面西方謂之左前射三日張矦設乏欲使有事者豫志焉音義見賢遍反裝音荘所射之射食亦反下射之所射侯同中丁仲反下難中中之皆同任音壬較音角鳱音干劉音岸又音鴈正音征題大西反黠户八反參七南反又音三大音泰下大蔟同疏釋曰上文直命量人量矦道及乏遠近之處此經論張矦髙下之法也云設乏西十北十者鄉射云乏參矦道居矦黨之一西五歩注云北乏去矦北十丈西三丈此經云西十北十則西與北皆六丈不得為三分居矦黨之一者以其三矦入堂深故也若然此三矦之下總云西十北十則三矦之乏皆西十北十矣西亦六丈者以三矦恐矢揚傷人與一矦亦異也矦之廣狹取度於矦道注釋曰云巾車於天子宗伯之屬者周禮巾車屬宗伯故云宗伯之屬也云掌装衣車者天子五路木路無革鞔革路有革無異飾玉路金路象路有革鞔又有玉金象為飾孤乘夏篆卿乘夏縵皆以物為飾故云装衣車者也云矦巾類者矦亦有飾故鄉射記云凡畫者丹質及正鵠之飾故云巾類也引射義者欲證射以鵠為主也云鵠之言較較直也射者所以直己志并下注云然則所云正者正也此取射義解之故射義云射者内志正外體直然後持弓矢審固注云内正外直正鵠之名出自此是也云或曰鵠鳥名射之難中中之為俊是以所射於矦取名也并下云亦鳥名齊魯之閒名題肩為正正鵠皆鳥之捷黠者鄭以正鵠之名有此二義故兩觧之也云考工記梓人為矦廣與崇方參分其廣而鵠居一焉者三等皆髙廣等引之者将欲觧經見鵠之義故先知矦鵠廣狹尺寸也云則大矦之鵠方六尺者以矦道九十弓弓取二寸二九十八矦中丈八尺三分其矦而鵠居一故知鵠方六尺也云糝矦之鵠方四尺六寸大半寸者以矦道七十弓弓取二寸則矦中丈四尺三分其矦鵠居其一丈四取丈二三分得四尺又於二尺之内取尺八寸又得六寸又二寸一寸為三分總六分取二分二分於三分為三分寸之二三分寸之二即是大半寸故云糝矦之鵠方四尺六寸大半寸也云豻矦之鵠方三尺三寸少半寸者豻矦矦道五十弓弓取二寸則矦中方一丈三分其矦鵠居一焉一丈且取九尺得三尺一尺取九寸得三寸一寸分為三分得一分為三分寸之一則是少半寸故云豻矦之鵠方三尺三寸少半寸也云中人之足長尺二寸者無正文以目騐而知云以豻矦計之者以大矦糝矦髙下無文豻矦云下綱不及地武則豻矦下綱去地尺二寸以是從豻矦計之也豻矦矦中一丈上下躳及上下舌各二尺合八尺是丈八尺矣又下不及地尺二寸則豻矦上綱去地丈九尺二寸也糝矦矦中丈四尺中上中下各四尺得八尺并之二丈二尺也鵠居矦中三分之一則鵠下亦有四尺六寸大半寸通躳與舌四尺為八尺六寸三分寸之二矣張法糝矦鵠下畔與豻矦之上綱齊所謂見鵠於豻自餘糝矦鵠下畔八尺六寸大半寸在掩豻矦亦如之豻矦上綱本去地丈九尺二寸直掩八尺上有一丈一尺二寸在復掩六寸上有一丈六寸在復掩三分寸二唯有一丈五寸三分寸一在少半寸者即三分寸一也言大半寸者即三分寸二也故知糝矦下綱去地一丈五寸少半寸也大矦中丈八尺中之上下各四尺即八尺矣中方丈八尺更加八尺二丈六尺也糝矦去地丈五寸少半寸本上綱下綱相去二丈二尺其舉也上綱去地三丈二尺五寸少半寸也大矦鵠下畔與糝矦上綱齊所謂見鵠於糝也矦中丈八尺三分之則鵠下亦有六尺下躳身四尺一丈矣則大矦自鵠以下掩糝矦一丈也自一丈以下猶有二丈二尺五寸少半寸在是大矦下綱去地亦然故注依此數也云前射三日張矦設乏知三日者前文云前射三日下云樂人宿縣下云厥明自前射三日以後論事不著異日故知張矦與設乏同是射前三日矣樂人㝛縣於阼階東笙磬西面其南笙鍾其南鑮皆南陳注笙猶生也東為陽中萬物以生春秋傳曰太蔟所以金奏贊陽出滯沽洗所以脩絜百物考神納賔是以東方鍾磬謂之笙皆編而縣之周禮曰凡縣鍾磬半為堵全為肆有鍾有磬為全鑮如鍾而大奏樂以鼓鑮為節音義縣音懸注同鑮本又作鎛音博蔟七豆反沽音姑洗西典反編必連反又甫千反下同堵丁古反疏注釋曰云東為陽中萬物以生者陽氣起於子盛於午故東方為陽中也萬物以生以其正月三陽生太蔟用事故萬物生焉云春秋傳者是外傳泠州鳩對周景王辭引之者證鍾磬為笙之事太蔟者寅上候氣之管據度律均鍾金即鍾也故奏之所以贊陽出滯云沽洗所以脩絜百物考神納賔者亦據度律均鍾沽洗在辰三月百物脩絜而出考神納賔謂祭祀而有助祭之賔客但東方陽管唯有此二律故據此二律言之是以名東方鍾磬為笙也云皆編而縣之者言皆者欲觧磬非應律之物與鍾同言之者以其鑮與鼓雖同西面與鍾同不編之而磬與鍾同十六枚而在一虡與鍾同編又同宮故兼言磬是以磬師職云掌敎擊磬擊編鍾注云磬亦編於鍾言之者鍾有不編不編者鍾師擊之是其磬與鍾編之此東方云笙而西方言頌者以其夷則無射主西方成功収蔵故稱頌頌者美盛徳之形容故云頌也但天有十二次地有十二辰按書傳云天子出撞黄鍾之鍾右五鍾皆應入則撞蕤賔之鍾左五鍾皆應左右云五則除黄鍾蕤賔竝為陽而應鍾林鍾已西為右五也大呂中呂已東為左五也云周禮曰凡縣鍾磬半為堵全為肆者周禮小胥職文鼓鑮亦縣而直言鍾磬者據編縣者為文鼓鑮筍虡之上各縣一而已不編之鄭彼注云半之者謂諸矦之卿大夫半天子之卿大夫天子之卿大夫判縣東西各有鍾磬是全之為肆諸矦卿大夫雖同判縣半天子卿大夫取一相鍾磬分為兩相西縣鍾東縣磬而天子之士特縣直東有鍾磬亦是全之為肆諸矦之士直持縣半天子之士縣磬而已或於階間或於東方又天子宮縣四面皆有諸矦軒縣闕南面面皆有鍾磬鑮及鼓具有也卿大夫士皆無鑮者若有鑮則諸矦臣半天子臣不得具是以闕之云鑮如鍾而大者特牲注亦云鑮如鍾而大竝據國語而注之以言鑮形如鍾而復大以大故特一縣不編之也云奏樂以鼓鑮為節者按周禮鑮師云掌金奏之鼓注云謂主擊晋鼔以奏其鍾鑮也以此言之則先擊鼓後擊鍾鑮皆是與樂為節故鄭注以鼔鑮為節不言鍾磬已注觧故不言也建鼓在阼階西南鼓應鼙在其東南鼓注建猶樹也以木貫而載之樹之跗也南鼔謂所伐面也應鼙應朔鼙也先擊朔鼙應鼙應之鼙小鼓也在東便其先擊小後擊大也鼓不在東縣南為君也音義應應對之應注同鼙歩迷反跗方于反便婢面反後皆同疏釋曰下西面北面建鼓皆言一此建鼓不言一者彼在本方故須言一見無他鼓此鼓本東方以為君故移來在北方故異其文不言一也注釋曰云建猶樹也以木貫而載之樹之跗也者按明堂位云殷楹鼓周縣鼓注云楹為之柱貫中上出也縣縣之於簨虡也此云以木貫而載之則為之柱貫中上出一也周人縣鼓今言建鼓則殷法也若醮用酒之類主於射畧於樂故用先伐鼓云鼓不在東縣南為君者決下一建鼓在其南東鼓者為賔復不在東縣北者取順君面故也西階之西頌磬東面其南鍾其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北注言成功曰頌西為陰中萬物之所成春秋傳曰夷則所以詠歌九則平民無忒無射所以宣布哲人之令徳示民軌義是以西方鍾磬謂之頌朔始也奏樂先擊西鼙樂為賔所由來也鍾不言頌鼙不言東鼔義同省文也古文頌為庸音義頌如字一音容射音亦為于偽反下同省所景反疏注釋曰言春秋傳者亦是外傳文云詠歌九則者謂六府三事九功之徳是也以此九則平民使無差慝云無射所以宣布哲人之令徳者哲人謂后稷后稷以稼穡之功成於季秋先王之業以農為本故云示民軌義謂軌法義理也云先擊西鼙樂為賔所由來也者觧先擊朔鼙之義賔向外來位在西其樂主為樂賔故先擊朔鼙應之也云鍾不言頌擊不言東鼔義同省文也者決上東方言笙鍾應鼙言南鼓此當言頌鍾東鼔義與上文同亦合有而不言者省文也云古文頌為庸者此雖叠古文不從義亦通也尚書云笙庸以間笙東方鍾磬西方是庸亦功也亦有成功之義也一建鼓在西階之東南面注言面者國君於其羣臣備三面爾無鍾磬有鼓而已其為諸矦則軒縣疏注釋曰云言面者國君於其羣臣備三面爾者言國君合有三面為辟射位又與羣臣射闕北面無鍾磬鑮直有一建鼔而已故不言南鼓而言南面也云其為諸矦則軒縣者若與諸矦饗燕之類則依諸矦軒縣三面皆有鼔與鍾磬鑮簜在建鼔之閒注簜竹也謂笙簫之屬倚於堂音義簜大黨反疏注釋曰按禹貢云篠簜旣敷注云簜竹故知此簜亦竹也其器則管也是以下云乃管新宮注云管謂吹簜故知竹管也按小師職注云管如篴而小併兩而吹之今大予樂官有焉爾雅云大笙謂之巢小者謂之和簫大者二十三管長尺四寸小者十六管長尺二寸大笙十九簧小者十三簧若然笙簫與管器異以其皆用竹故云笙簫之屬也云倚於堂者管擬吹之不倚在兩建鼓聞者以不得倚於鼓故知倚於堂也鼗倚於頌磬西紘注鼗如鼓而小有柄賔至摇之以奏樂也紘編磬繩也設鼗於磬西倚於紘也王制曰天子賜諸矦樂則以柷將之賜伯子男樂則以鼗將之音義鼗大刀反倚於綺反紘音宏柄彼命反劉本作秉音同柷尺六反疏注釋曰知鼗如鼓而小者按那詩云猗與那與置我鼗鼔𫝊云猗歎辭那多也鄭讀置為植植鼗鼔者為楹貫而樹之美湯受命伐桀定天下而作濩樂故歎之多其改夏之制乃始植我殷家之樂鼗與鼓也鼗雖不植貫而摇之亦植之類以其殷人植鼔以木貫之而下有跗鼗亦以木為柄而貫之但手執而不植為異故云亦植之類鼗與鼔同文是鼗如鼓而小也知有柄賔至摇之以奏樂者按眂瞭職云掌凡樂事播鼗擊頌磬笙磬磬言擊鼗言播播為摇之可知鼗所以節樂賔至乃樂作故於賔至摇之以奏樂也云紘編磬繩也者紘若天子諸矦冕而朱紘用組之類磬在編縣之用紘故知紘編磬繩也知設鼗於磬西倚於紘者以其鍾磬皆面向東人居其前西面故知鼗在磬西倚之於紘也引王制者證鼗為節樂之器杋狀如漆筩中有椎所以節樂鼗亦節樂柷大於鼗故賜公矦樂則以柷將命賜伯子男樂則鼗鼓將命自餘樂器陳於外也厥明司宮尊於東楹之西兩方壺膳尊兩甒在南有豐冪用錫若絺綴諸箭蓋冪加勺又反之皆𤣥尊酒在北注膳尊君尊也後陳之尊之也豐以承尊也説者以為若井鹿盧其為字從豆􅞱聲近似豆大而卑矣冪覆尊巾也錫細布也絺細葛也箭篠也為冪蓋卷辟綴於篠横之也又反之為覆勺也皆𤣥尊二者皆有𤣥酒之尊重本也酒在北尊統於君南為上也唯君靣尊言専惠也今文錫或作緆絺或作綌古文箭作晉音義錫悉歴反絺敕其反綴陟衞反又丁劣反近附近之近卑如字劉音婢篠素了反為冪于偽反下注為諒為有為射同辟必亦反横如字劉古曠反緆悉歷反劉余章反又羊豉反疏釋曰自此盡羹定論豫設尊洗具饌之事按禮記燕義諸侯射先行燕禮自此至東陳皆陳設器物與燕禮同但文有詳略耳注釋曰云説者以為若井鹿盧之形即葬下棺椑閒重鹿盧之輩其形兩頭大而中央小今見井上豎柱夾之以索繞而挽之是也云其為字從豆􅞱聲者此謂上聲下形之字年和穀豆多有故從豆為形也豐者承尊之器象形也是以豐年之字􅞱下著豆今諸經皆以承尊爵之􅞱不用豐字之􅞱而用豐年之豐故鄭還依豐字解之故云其為字從豆為形以􅞱為聲也云近似豆大而卑矣者既用豆為形還近似邊豆之豆舉漢法而知但豆口徑尺柄亦長尺口徑小而又髙此承尊之物口足徑各亦差寛中央亦大其髙比常豆而差短故云近似豆大而卑但斲一大木為之取其安穏此豐若在宗廟或兩君燕亦謂之坫致爵在於上故論語云邦君為兩君之好有反坫鄭注云反坫反爵之坫是也必用豐年之豐為坫者以其時和年豐萬物成熟粢盛豐備以共郊廟神歆其祀祝嘏其福至鄉飲酒鄉射燕禮大射或君與臣下及四方之賓燕家富民足人情優暇㫖酒嘉肴盈尊滿俎於以講道論政既獻酬侑酢至無算爵行禮交樂和上下相歡勸飲為樂故也云錫細布也者喪服記曰錫者十五升抽其半無事其縷有事其布曰錫故知錫是細布也謂之錫者治其布使之滑易也云唯君面尊者玉藻文注云面嚮也彼謂人君燕臣子專其恩惠此大射亦謂人君燕臣下與彼是同專惠之道故皆尊鼻嚮君云言專惠者決鄉飲酒尊于房户之閒賓主夾之不得專惠故也尊士旅食于西鑮之南北面兩圜壺注旅衆也士衆食未得正禄謂庶人在官者圜壺變於方也賤無𤣥酒音義圜音圓疏釋曰前設縣時鑮南更有一建鼓今設尊不應在鼔北而云鑮南者其實在鼔南門西北面與燕禮同而云鑮南者遙繼鑮而言必繼鑮者樂以縣為主故也又尊于大矦之乏東北兩壺獻酒注為隸㒒人巾車糝矦豻矦之獲者獻讀為沙沙酒濁特泲之必摩沙者也兩壺皆沙酒郊特牲曰汁獻涚于醆酒服不之尊俟時而陳於南統於矦皆東面音義獻素何反出注下注獻竝同沙素河反下同泲子禮反涗始銳反醆壯簡反疏注釋曰知為隸㒒人巾車糝矦豻矦之獲者以其此人皆有功又下文以此尊獻之故知也知沙酒濁者以五齊從下向上差之醍沈清於泛醴鬱鬯又在五齊之上故知沙酒濁也云特泲之必摩沙者也者此解名沙酒之意云郊特牲曰汁獻涗于醆酒者此以五齊中取醆酒盎齊泲鬱鬯之事獻沙也泲鬱鬯之時和盎齊以手摩沙出其香汁涗清也泲之使清也此為隸㒒以下卑賤之人而獻鬰鬯者此所得獻皆因祭矦為矦之神故用鬱鬯也云服不之尊俟時而陳於南統於矦皆東面知此不為大矦服不設者按下文云服不之尊東面南上故鄭云俟時而陳於南統於矦皆東面也設洗于阼階東南罍水在東篚在洗西南陳設膳篚在其北西面注或言南陳或言西面異其文也疏注釋曰云異其文也者洗篚言南陳亦西面膳篚言西面亦南陳其實同所從言異尊君故也又設洗于獲者之尊西北水在洗北篚在南東陳注亦統於矦也無爵因服不也有篚為奠虛爵也服不之洗亦俟時而陳於其南疏注釋曰云亦統於矦也者前設尊兩獻酒亦云服不之尊俟時而陳於南統於矦今此設篚在南後設服不之洗在南亦統於矦小臣設公席于阼階上西鄉司宮設賓席于户西南面有加席卿席賓東東上小卿賓西東上大夫繼而東上若有東面者則北上席工于西階之東東上諸公阼階西北面東上注唯賓及公席布之也其餘樹之於位後耳小卿命於其君者也席於賓西射禮辨貴賤也諸公大國有孤卿一人與君論道亦不典職如公矣音義鄉許亮反疏注釋曰知賓及公席布之其餘樹之於位後者下文更有孤卿大夫席文故知也此實未布而言布之者欲辨尊卑故先言也孤尊而後言之者言若是有無不定故後言也云小卿命於其君者也者按王制云大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國亦三卿一卿命於天子二卿命於其君若言小卿據次國已下有之云射禮辨貴賤也者決燕禮大小卿皆在尊東西無小卿位彼主於燕不辨貴賤故也云與君論道亦不典職如公矣者成王周官云立太師太傅太保兹惟三公論道經邦燮理隂陽是三公論道無職此大國立孤一人論道與公同亦無職故云不典職如公也縱鄭不見周官與周禮三公亦無職考工記云或坐而論道亦通及三公矣官饌注百官各饌其所當共之物音義共音恭劉居俸反疏釋曰燕禮宰饌此不言宰而言官者欲見非獨宰故鄭云百官各饌羹定注烹肉熟也射義曰諸矦之射也必先行燕禮燕禮牲用狗音義定多佞反射人告具于公公升即位于席西鄉小臣師納諸公卿大夫諸公卿大夫皆入門右北面東上士西方東面北上大夫在干矦之東北北面東上士旅食者在士南北面東上小臣師從者在東堂下南面西上注大夫在干矦東北士旅食者在士南為有矦故入庭深也小臣師正之佐也正相君出入君之大命音義干音岸從才用反相息亮反疏釋曰自此盡少進論羣臣立位之事注釋曰云大夫在干矦東北士旅食者在士南為冇矦入庭深也者決燕禮士旅食者立于門西東上此不繼門而在士南繼士者為有矦故入庭深也云小臣師正之佐也者下有小臣正正長也故以師為佐云正相君出入君之大命者小臣正小臣中尊如天子大㒒故引大㒒職解之也公降立于阼階之東南南鄉小臣師詔揖諸公卿大夫諸公卿大夫西面北上揖大夫大夫皆少進注詔告也變爾言揖亦以其入庭深也上言大夫誤衍耳疏注釋曰燕禮言爾以其近門去君逺而言爾爾近也移也揖之使移近此入庭深故不言爾而言揖揖之而已不須移近之也云上言大夫誤衍者以其大夫與公卿面有異故下别言大夫少進明上有大夫誤衍大夫大夫四字也大射正擯注大射正射人之長音義長丁大反疏釋曰自此盡門外北面論請立賓之事大射正對射人為長若小臣正對小臣師亦為長擯者請賓公曰命某為賓注某大夫名擯者命賓賓少進禮辭注命賓者東面南顧辭辭以不敏反命注以賓之辭告於君又命之賓再拜稽首受命注又復音義復扶又反擯者反命賓出立于門外北面公揖卿大夫升就席小臣自阼階下北面請執冪者與羞膳者注請士可使執君兩甒之冪及羞脯醢庶羞於君者方圜壺獻無冪疏釋曰自此盡公卿者論卿大夫庭位及請執冪之事注釋曰云請士可使者鄭知請士者據燕禮而知云方圜壺獻無冪者方圜壺臣尊獻獲者尊皆無冪乃命執冪者執冪者升自西階立于尊南北面東上注命者於西階前以公命命之東上執𤣥尊之冪為上羞膳者從而東由堂東升自北階立于房中西面南上不言命者不升堂略之疏注釋曰知命之在西階前者以其小臣位在東堂下於阼階請公命乃就西階命執冪者以其執冪者士位在西故也云羞膳者從而東者已於燕禮釋訖云不升堂者但不由南方升略之升自北堂是亦升堂矣膳宰請羞于諸公卿者注膳宰請者異於君也疏釋曰不言命者對君言命於臣略之擯者納賓賓及庭公降一等揖賓賓辟注及至也辟逡遁不敢當盛音義辟婢亦反又音避逡七旬反遁音旬疏釋曰自此盡賓答再拜論主人迎賓拜至及獻賓之事云公降一等揖賓不言請賓至位就席者亦是以賓與主人為禮禮不參故不請也此言賓辟燕禮不言文略也公升即席注以賓將與主人為禮不參之奏肆夏注肆夏樂章名今亡呂叔玉云肆夏時邁也時邁者太平廵守祭山川之樂歌其詩曰明昭有周式序在位又曰我求懿徳肆于時夏奏此以延賓其著宣王徳勸賢與周禮曰賓出入奏肆夏音義夏戸雅反守手又反疏注釋曰云肆夏樂章名今亡者按周禮鍾師云以鍾鼓奏九夏杜子春引呂叔玉以為肆夏時邁也繁遏執競也渠思文也後鄭云以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具鄭彼注破呂叔玉此注亦云肆夏樂章名今亡與彼注亦同今此又引呂叔玉於下者以無正文叔玉或爲一義故鄭於此兩解之也云祭山川之樂歌者以其時邁序云巡守告祭柴望也謂巡守祭當方山川則王制及尚書云望秩於山川是也云明昭有周者美武王有明昭於周云式序在位者式用也位賢用能序之使在官位云我求懿徳者懿美也我求取美徳之人也云肆于時夏者肆遂也夏大也能如此遂於王道之大云奏此以延賓其著宣王徳勸賢與者今國君歌此詩延賓入者其欲著明諸侯宣布王之徳以勸賢人使有徳言與者鄭以義解之無正文故云與以疑之也云周禮四賓出入奏肆夏者按大司樂云王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏下云大饗不入牲其他皆如祭祀鄭注云大饗饗賓客也彼賓客謂諸矦來朝者也不入牲牲不入亦不奏昭夏也其他謂王出入賓客出入亦奏王夏肆夏以此言之王用肆夏以饗諸矦來朝今引之者證燕時納賓亦奏之按燕禮記云若以樂納賓則賓及庭奏肆夏鄭云卿大夫有王事之勞則奏此樂焉此亦同彼注也若臣無王事之勞則如常燕無以樂納賓法也又此納賓樂故諸矦亦得用者升歌則不可若賓醉而出奏陔夏與此異也賓升自西階主人從之賓右北面至再拜賓答再拜注主人宰夫也又掌賓客之獻飲食君於臣雖為賓不親獻以其莫敢亢禮主人降洗洗南西北面注賓將從降鄉之不於洗北辟正主疏釋曰自此至虛爵降論主人獻賓之事也注釋曰云不於洗北辟正主者按鄉飲酒鄉射主人降洗洗北南面是正主此宰夫代君爲主故不於洗北南面也賓降階西東面主人辭降賓對注對答主人北面盥坐取觚洗賓少進辭洗主人坐奠觚于篚興對賓反位注賓少進者所辭異宜違其位也獻不用爵辟正主主人卒洗賓揖乃升注賓每先升尊也主人升賓拜洗主人賓右奠觚答拜降盥賓降主人辭降賓對卒盥賓揖升王人升坐取觚注取觚將就瓦甒酌膳執冪者舉冪主人酌膳執冪者蓋冪酌者加勺又反之注反之覆勺筵前獻賓賓西階上拜受爵于筵前反位主人賓右拜送爵注賓既拜於筵前受爵退復位疏注釋曰云賓既拜於筵前受爵者鄭恐讀者以拜下讀爲句宰胥薦脯醢注宰胥宰官之吏也不使膳宰薦不主於飲酒變於燕疏注釋曰云不使膳宰薦者不主於飲酒變於燕者決燕禮使膳宰薦主於飲酒故也賓升筵庶子設折俎注庶子司馬之屬掌正六牲之體者也鄉射記曰賓俎脊脅肩肺不使膳宰設俎爲射變於燕賓坐左執觚右祭脯醢奠爵于薦右興取肺坐絶祭嚌之興加于俎坐捝手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告㫖執爵興主人答拜注降席席西也㫖美也音義捝始鋭反啐七内反樂闋注闋止也樂止者尊賓之禮盛於上也音義闋苦穴反疏釋曰此上經云奠爵拜告㫖下經云賓卒爵則此經者是賓啐酒節即樂闋燕禮記亦云賓及庭奏肆夏賓拜酒主人答拜而樂闋亦據啐酒時按郊特牲賓入大門而奏肆夏又曰卒爵而樂闋與此啐酒樂闋不同者彼注謂朝聘者故卒爵而樂闋此燕已臣子法故啐酒而樂闋也注釋曰云尊賓之禮盛於上也者賓及庭奏肆夏至升堂飲酒乃樂止是尊賓之禮盛於堂上者也賓西階上北面坐卒爵興坐奠爵拜執爵興主人答拜賓以虛爵降注既卒爵將酢也疏釋曰自此盡西序東面論賓酢主人之事主人降賓洗南西北面坐奠觚少進辭降主人西階西東面少進對賓坐取觚奠于篚下盥洗注篚下篚南主人辭洗賓坐奠觚于篚興對卒洗及階揖升主人升拜洗如賓禮賓降盥主人降賓辭降卒盥揖升酌膳執冪如初以酢主人于西階上主人北面拜受爵賓主人之左拜送爵注賓南面授爵乃於左拜凡授爵鄉所受者疏注釋曰云賓南面授爵乃於左拜凡授爵鄉所受者知者以經云主人北面明凡授爵鄉所受者鄉飲酒鄉射獻酬酢皆然故云凡謂南面授與所受者也主人坐祭不啐酒注辟正主也未薦者臣也不拜酒注主人之義燕禮曰不拜酒不告㫖遂卒爵興坐奠爵拜執爵興賓答拜主人不崇酒以虛爵降奠于篚注不崇酒辟正主也崇充也謂謝酒惡相充實賓降立于西階西東面注既受獻矣不敢安盛疏釋曰以堂上爲盛故降下下文於酬賓降筵西東南面立注云不立於序内位彌尊燕禮注云位彌尊禮彌卑是未酬已前禮盛者也擯者以命升賓賓升立于西序東面注命公命也東西牆謂之序疏注釋曰知公命者命由尊者出故也云東西牆謂之序者爾維釋宫文主人盥洗象觚升酌膳東北面獻于公注象觚觚有象骨飾也取象觚東面不言實之變於燕疏釋曰自此盡于篚論主人獻公之事云取象觚東面者鄉公爲敬故也云不言實之變於燕者燕禮云實之主於飲酒此云酌不云實之主於射略於飲酒故也公拜受爵乃奏肆夏注言乃者其節異於賓疏注釋曰言異者賓及庭奏此君受爵乃奏是其節異故也云乃者緩辭也主人降自西階阼階下北面拜送爵宰胥薦脯醢由左房庶子設折俎升自西階注自由也左房東房也人君左右房鄉射記曰主人俎脊脅臂肺也疏注釋曰以人君左右房故云左房對大夫士東房而已故云東房不言左以無右所對故也公祭如賓禮庶子贊授肺不拜酒立卒爵坐奠爵拜執爵興注凡異者君尊變於賓疏注釋曰言異者使庶子授肺不拜酒立卒爵之等皆異於賓也主人答拜樂闋升受爵降奠于篚更爵洗升酌散以降酢于阼階下北面坐奠爵再拜稽首公答拜注更易也易爵不敢襲至尊古文更爲受疏釋曰自此盡于篚論主人受公酢之事主人坐祭遂卒爵興坐奠爵再拜稽首公答拜主人奠爵于篚主人盥洗升媵觚于賓酌散西階上坐奠爵拜賓西階上北面答拜注媵送也散方壺之酒也古文媵皆作騰疏釋曰自此盡南面立論主人酬賓之事主人坐祭遂飲賓辭卒爵興坐奠爵拜執爵興賓答拜注辭者辭其代君行酒不立飲也比於正主酬也疏注釋曰上文公飲立卒爵此則坐飲故以公決之云比於正主酬也者謂於鄉飲酒鄉射是正主酬賓之節也主人降洗賓降主人辭降賓辭洗卒洗賓揖升不拜洗注不拜洗酬而禮殺也音義殺所界反主人酌膳賓西階上拜受爵于筵前反位主人拜送爵賓升席坐祭酒遂奠于薦東注遂者因坐而奠之不北面也奠之者酬不舉也疏注釋曰云不北面也者此決鄉飲酒鄉射賓北面坐奠觶于薦東注皆云酬酒不舉引曲禮君子不盡人之歡不竭人之忠以全交也主人降復位賓降筵西東南面立注賓不立於序内位彌尊疏注釋曰案鄉飲酒注云位彌尊禮彌卑引雜記一張一弛此對酢時立于西序之時不降于下禮稍卑位稍尊此在席西東面位彌尊禮彌卑也小臣自阼階下請媵爵者公命長注命之使選於長㓜之中也卿則尊士則卑音義長丁丈反注及下皆同疏釋曰自此盡反位論將為賓舉旅使二人媵爵之事注釋曰云命之使選於長㓜之中知不取卿大夫之年長者以其作下大夫不取年長又知不取臣中位長者以其不取卿故鄭云卿則尊士則卑故不取之而取下大夫尊卑處中者小臣作下大夫二人媵爵注作使媵爵者阼階下皆北面再拜稽首公答拜注再拜稽首拜君命媵爵者立于洗南西面北上序進盥洗角觶升自西階序進酌散交于楹北降適阼階下皆奠觶再拜稽首執觶興公答拜注序次第也猶代也先者既酌右還而反與後酌者交於西楹北相左俟於西階上乃降徃來以右爲上古文曰降造阼階下媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公答再拜媵爵者執觶待于洗南注待待君命小臣請致者注請君使一人與二人與不必君命音義與音餘若命皆致則序進奠觶于篚阼階下皆北面再拜稽首公答拜媵爵者洗象觶升實之序進坐奠于薦南北上降適阼階下皆再拜稽首送觶公答拜注既酌而代進徃來由尊北交於東楹北亦相左奠於薦南不敢必君舉疏注釋曰言亦者亦前酬酌自飲時相左於西楹之北時後者南相東向先者北相西向向西階右旋北面待後至降也今此二人先者於尊西東面酌訖於東楹之北東向向公前奠之右旋於東楹之北北畔西過後者亦於尊西東面酌訖於東楹之北南過東向於公前奠之是亦交於楹北相左也云尊於薦南不敢必君舉者凡舉者於右不舉者於左今奠於薦左是不舉之處故云不敢必君舉也媵爵者皆退反位注反門右北面位疏注釋曰但大夫初與卿在門右北面得揖少進中庭北面今當反庭中位而立云門右北面位者大夫雖得揖少進仍是門右北面位少進而已故鄭還以門右北面言之公坐取大夫所媵觶興以酬賓賓降西階下再拜稽首小臣正辭賓升成拜注公起酬賓於西階降尊以就卑也正長也小臣長辭變於燕升成拜復再拜稽首先時君辭之於禮若未成然疏釋曰自此盡復位論爲賓舉旅下及大夫之事注釋曰云小臣長辭變於燕者燕禮直使小臣辭亦是燕主歡此射禮辨尊卑故使小臣長辭異於飲酒禮故云變於燕也公坐奠觶答拜執觶興公卒觶賓下拜小臣正辭賓升再拜稽首注不言成拜者爲拜故下實未拜也下不就拜禮也下亦降也發端言降拜因上事言下拜音義爲于僞反疏釋曰自此已下皆云公答拜不言再拜燕禮皆言公答再拜不同者燕主歡不明尊卑故公拜皆再拜此射禮主辨尊卑故直云答拜答一拜此一拜者正禮也故周禮大祝辨九拜一曰稽首首至地臣拜君法二曰頓首頓首平敵相拜法三曰空首君答臣下拜後不爲再拜即七曰竒拜是也注釋曰云下亦降也者此非訓下爲降故以發端言降拜因上事言下拜直因降有上文即云下也經云公卒觶賓下拜者公尊不拜既爵賓降拜若爲君拜既爵也公坐奠觶答拜執觶興賓進受虛觶降奠于篚易觶興洗注賓進以臣道就君受虛爵君不親酌凡爵不相襲者於尊者言更自敵以下言易更作新易有故之辭也不言公酬賓於西階上及公反位者尊君空其文也公有命則不易不洗反升酌膳下拜小臣正辭賓升再拜稽首公答拜注不易君義也不洗臣禮也賓告于擯者請旅諸臣擯者告于公公許注旅序也賓欲以次序勸諸臣酒賓以旅大夫于西階上擯者作大夫長升受旅注作使也使之以長㓜之次先孤卿後大夫賓大夫之右坐奠觶拜執觶興大夫答拜注賓在右相飲之位音義飲於鴆反疏注釋曰賓位在左而在大夫之右者是相飲之位非賓主之正位也賓坐祭立卒觶不拜注酬而禮殺若膳觶也則降更觶洗升實散大夫拜受賓拜送遂就席注言更觶尊卿尊卿則賓禮殺疏注釋曰上注云不相襲者於尊者言更自敵以下言易此賓於卿是自敵以下當言易今言更者尊卿尊卿則卑賓禮殺也大夫辯受酬如受賓酬之禮不祭酒卒受者以虛觶降奠于篚復位注卒猶已也今文辯作徧音義辯音遍疏釋曰言復位者亦如上復門右北面位即庭中北面位也主人洗觚升實散獻卿于西階上注酬賓而後獻卿飲酒禮成於酬司宮兼卷重席設于賓左東上注言兼卷則每卿異席重席蒲筵緇布純卿席言東上統於君席自房來音義重直容反純之閏反又章允反疏釋曰上文設席之下注謂唯賓及公席布之其餘樹之於位後至獻卿乃布之則此云兼卷者不謂至是始卷之直是鋪設之時兼卷而設之也卿升拜受觚主人拜送觚卿辭重席司宫徹之注徹猶去也重席雖非加猶爲其重累辭之辟君音義去起呂反乃薦脯醢卿升席庶子設折俎注卿折俎未聞蓋用脊脅臑折肺卿有俎者射禮尊音義臑奴到反疏注釋曰云卿折俎未聞者以燕禮卿無俎故云未聞又云蓋用脊脅臑折肺者案鄉射記云賓俎脊脅肩肺主人俎脊脅臂肺又獲者之俎折脊脅肺臑彼注云臑若膞胳觳之折以大夫之餘體以此言之則此賓俎亦用脊脅肩肺君俎亦脊脅臂肺前體有肩臂臑後體冇膞胳觳尊卑以次用之故卿宜用臑若有公公用臑卿宜用膞也云卿有俎者射禮尊者對燕禮不辨尊卑故公卿等皆無俎也卿坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭不嚌肺興加于俎坐捝手取爵遂祭酒執爵興降席西階上北面坐卒爵興坐奠爵拜執爵興注陳酒肴君之惠也不嚌啐亦自貶於君疏釋曰案燕禮君在不嚌不啐者彼爲臣有功君與之燕恩及於卿故卿不敢啐也卿有無俎者自然不嚌也主人答拜受爵卿降復位注復西面位不酢辟君辯獻卿主人以虛爵降奠于篚擯者升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮席于阼階西北面東上無加席注公孤也席之北面爲大尊屈之也亦因阼階上近君近君則親寵苟敬私昵之坐音義先悉薦反大音泰昵女乙反小臣又請媵爵者二大夫媵爵如初請致者若命長致則媵爵者奠觶于篚注命長致者使長者一人致也公或時未能舉自優暇疏釋曰自此盡奠于篚論舉旅之事一人待于洗南注不致者長致者阼階下再拜稽首公答拜注再拜稽首拜君命洗象觶升實之坐奠于薦南降與立于洗南者二人皆再拜稽首送觶公答拜注奠於薦南先媵者上觶之處也二人皆拜如初共勸君飲之公又行一爵若賓若長唯公所賜注一爵先媵者之下觶也若賓若長禮殺也長孤卿之尊者也於是言賜射禮明尊卑疏釋曰燕禮爲卿舉旅言若賓若長唯公所酬燕禮主於飲酒此言所賜是以決之也以旅于西階上如初注賜賓則以酬長賜長則以酬賓大夫長升受旅以辯大夫卒受者以虛觶降奠于篚主人洗觚升獻大夫于西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位注既盡也大夫卒爵不拜賤不僃禮疏釋曰自此盡就席論獻大夫之事注釋曰此注云大夫卒爵不拜賤不備禮燕禮注云禮殺者兩注相兼其義乃足對公卿拜既爵此不拜此獻卿後是禮殺亦是賤不僃禮也胥薦主人于洗北西面脯醢無脀注胥宰官之吏主人下大夫也先大夫薦之尊之也不薦于上辟正主脀俎實音義脀之承反辯獻大夫遂薦之繼賓以西東上若有東面者則北上卒擯者升大夫大夫皆升就席注辯獻乃薦略賤也亦獻後布席也疏注釋曰既言辯獻大夫遂薦之後乃云繼賓以西東上以下云云者上總言辯獻大夫大夫乃一時薦之下文更明布席位次就席之儀故云辯獻乃薦略賤也略賤則是獻訖降階獻辯擯者乃總升之就席就席訖乃薦之乃席工于西階上少東小臣納工工六人四瑟注工謂瞽矇善歌諷誦詩者也六人大師少師各一人上工四人四瑟者禮大樂衆也疏釋曰自此盡西面北上坐論作樂及獻工之事注拜曰云六人者大師少師各一人上工四人皆據文而言也云禮大樂衆也者對燕禮工四人而言也㒒人正徒相大師㒒人師相少師㒒人士相上工注徒空手也㒒人正㒒人之長師其佐也士其吏也天子視瞭相工諸侯兼官是以㒒人掌之大師少師工之長也凡國之瞽矇正焉杜蒯曰曠也大師也於是分别工及相者射禮明貴賤音義相息亮反瞭音了蒯苦怪反疏注釋曰云㒒人正㒒人之長師其佐也者以正爲長師爲衆故云㒒人正爲長㒒人師爲佐也云士其吏也者以其在㒒人之下故知㒒人之吏吏則府史之類也云天子視瞭相工者見於眡瞭職文云大師少師工之長也者周禮春官大師下大夫二人小師上士四人鄭注云凡樂之歌必使瞽矇爲焉命其賢知者以爲大師少師是樂工之長也云杜蒯曰曠也大師也者禮記檀弓文引之者證大師爲樂工之長也云於是分别工及相者射禮明貴賤者對燕禮主歡不明貴賤故不分别工貴及相賤相者皆左何瑟後首内弦挎越右手相注謂相上工者後首主於射略於樂也内弦挎越以右手相工由便也越瑟下孔所以發越其聲者也古文後首爲後手音義挎口胡反又口矦反後者徒相入注謂相大師少師者也上列官之尊卑此言先後之位亦所以明貴賤凡相者以工出入疏注釋曰上列官之尊卑此陳先後之位亦所以明貴賤者上列官之尊卑謂先言㒒人正與大師後言㒒人士與上工是列官尊卑也此陳先後則上工與瑟在前大師少師在後是先後之位既據入時行位亦據升堂與坐先後之位亦依此也云凡相者以工出入者欲見入時如此出時亦然小樂正從之注從大師也後升者變於燕也小樂正於天子樂師也疏注釋曰云從大師也後升者變於燕也者燕禮樂正先升又不使小樂正者彼主於樂此則略於樂故也升自西階北面東上注工六人坐授瑟乃降注相者也降立于西縣之北音義縣音懸下同疏注釋曰鄉飲酒注云降立于西方近其事以取近其事故在西縣之北也小樂正立于西階東注不統於工明工雖衆位猶在此疏注釋曰云不統於工明工雖衆位猶在此者決燕禮工四人樂正升立于工之西在西階東不統于工此雖六人衆於彼猶統于階而在西階東不變若使小樂正統之於工恐工位移近西故猶統于階也乃歌鹿鳴三終注鹿鳴小雅篇也人君與臣下及四方之賓燕講道脩政之樂歌也言已有㫖酒以召嘉賓與之飲者樂嘉賓之來示我以善道又樂嘉賓有孔昭之明徳可則傚也歌鹿鳴三終而不歌四牡皇皇者華主於講道略於勞苦與諮事疏注釋曰云主於講道略於勞苦者據四牡勞使臣此不用之云與諮事者謂皇皇者華有諮謀諮度諮詢之事亦略之也主人洗升實爵獻工工不興左瑟注工歌而獻之以事報之也洗爵獻工辟正主也獻不用觚工賤異之也工不興不能備禮左瑟便其右大師無瑟於是言左瑟者節也疏注釋曰云洗爵獻工辟正主也者案鄉飲酒鄉射云大師則爲之洗謂君賜之樂者其餘工不爲之洗是正主法今此工六人皆爲之洗故云辟正主也必知同洗者以其更無别獻之文故知同洗也云獻不用觚工賤異之也者燕禮大射獻賓獻卿大夫皆用觚而獻工用爵故云異之鄉飲酒鄉射獻同用爵者變於君故也云大師無瑟於是言左瑟者節也者上言獻工下云一人拜受爵則六人皆在工内而云工不興左瑟於是明大師亦入左瑟中故須云大師無瑟於是言左瑟者以其六人總當獻酒之節故總入左瑟文不謂有瑟也一人拜受爵注謂大師也言一人者工賤同之也工拜於席疏注釋曰云謂大師也言一人者工賤同之也者鄉飲酒鄉射云大師則爲之洗則知此一人謂大師不言大師對君工賤不異其文故同之而云一人也主人西階上拜送爵薦脯醢注輒薦之變於大夫疏釋曰案上文云辯獻大夫遂薦之此工得獻不待辯輒薦之故云變於大夫也使人相祭注使人相者相其祭薦祭酒疏注釋曰知祭薦祭酒者此文承一人受爵薦脯醢之下明二者皆祭也若下文衆工直祭酒不祭脯醢也卒爵不拜主人受虛爵衆工不拜受爵坐祭遂卒爵辯有脯醢不祭注相者相其祭酒而已主人受爵降奠于篚復位大師及少師上工皆降立于鼓北羣工陪于後注鼔北西縣之北也言鼓北者與鼓齊面餘長在後也羣工陪于後三人爲列也於是時小樂正亦降立于其南北面工立㒒人立于其側坐則在後考功記曰鼔人爲皋陶長六尺有六寸音義餘長之長丁丈反下之長同陶音遙長六之長直亮反疏注釋曰知鼓北是西縣之北者以其下文大師少師始遷向東明此降者降在西縣之北可知云言鼔北者與鼔齊面餘長在後也者案前列樂縣之時鼓在鑮南今不言在鍾磬之北遙據鼓而言之者欲取形大又面向東工亦面向東故遙取鼔面也言餘長在後者欲見鼓長六尺六寸工面與鼔面齊鼓有餘長在人後矣言此者工與鼔前面齊後面不齊之意也云羣工陪于後三人爲列也者大師少師二人上工四人今若立時三人爲列大師後有工二人少師後亦有工二人故云三人爲列也云於是時小樂正亦降立於其南北面者亦約遷樂於東方工西面樂正北面言亦者亦東方也云工立㒒人立于其側坐則在後者亦約遷樂東方時面位得知也云考功記曰鼔人爲皋陶長六尺有六寸者彼云韗人爲皋陶先鄭云韗書或爲􅕦後鄭謂􅕦者以皋陶名官􅕦即陶字從革今云鼔人者誤當作􅕦人􅕦人掌鼔後人誤言鼓鼔人自在地官掌敎六鼓矣云爲皋陶者鼔木之名其穹隆二十板謂鼔木長六尺六寸賈侍中彼解爲晉鼓引之者證鼔東西長工齊前面於後有餘之義也乃管新宮三終注管謂吹簜以播新宫之樂其篇亡其義未聞笙從工而入既管不獻略下樂也立于東縣之中疏注釋曰云管謂吹簜者此云管上云簜故鄭合爲一事解之云其篇亡其義未聞者以其堂下詩故與由庚由儀之等同亡但上由庚由儀之等有序無詩故云有其義而亡其辭此則辭義皆亡故云其義未聞云笙從工而入者案燕禮云笙入立于縣中有笙入之文此上下不見笙入之文故知笙從工而入也上文簜解爲竹謂笙簫之屬竹即管也今此經云管已解簜爲管復云笙從工而入者燕禮記云下管新宮笙入三成則吹管者亦吹笙故兼言笙欲見笙管相將也云立于東縣之中者燕禮笙入立于縣中則近於北縣而言此辟射位故知立于東縣之中也卒管大師及少師上工皆東坫之東南西面北上坐注不言縣北統於堂也於是時大樂正還北面立于其南疏釋曰工人前不即遷于東者爲管笙所作不以無事亂有事故待卒管大師乃東坫西面北上坐不言去堂逺近當如鄉射遷工阼階下之東南堂前三笴西面北上注釋曰云不言縣北統於堂也者上云鼔北不統於堂者彼權立非正位故也擯者自阼階下請立司正注三爵既備上下樂作君將留羣臣而射宜更立司正以監之察儀法也音義監古銜反疏釋曰自此盡北面立論將射立司正察儀安賓之事公許擯者遂爲司正注君許其請因命用之不易之者俱相禮其事同也司正適洗洗角觶南面坐奠于中庭注奠觶者著其位以顯其事威儀多也疏注釋曰燕禮及此射禮司正不以觶升而奠之於地比鄉飲酒及鄉射爲顯其事威儀多自此已後還與二鄉同也升東楹之東受命于公西階上北面命賓諸公卿大夫公曰以我安賓諸公卿大夫皆對曰諾敢不安注以我安者君意殷勤欲留之以我故安也司正降自西階南面坐取觶升酌散降南面坐奠觶注奠於中庭故也興右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠于其所北面立注皆所以自昭明於衆也將於觶南北面則右還於觶北南面則左還如是得從觶西徃來也必從觶西徃來者爲君在阼不背之也司射適次袒決遂執弓挾乘矢於弓外見鏃於弣右巨指鉤弦注司射射人也次若今時更衣處張幃席爲之耦次在洗東南袒左免衣也決猶闓也以象骨爲之著右巨指所以鉤弦而闓之遂射韝也以朱韋爲之著左臂所以遂弦也方持弦矢曰挾乘矢四矢弣弓杷也見鏃焉順其射也右巨指右手大擘以鉤弦弦在旁挾由便也古文挾皆作接音義挾咅協又子協反乘繩證反見賢遍反鏃子木反又七木反弣芳甫反闓音開韝古矦反把音霸擘彼革反疏釋曰自此至于次論射事將至誓射者及比三耦之事注釋曰云司射射人也者案燕禮射人告具注云射人主此禮以其或射又云射人納賓又云射人請立司正公許射人遂爲司正則射人司正一人也又云乃薦司正與射人一人注天子射人司士皆下大夫二人諸矦則上士其人數亦如之又曰若射則大射正爲司射注大射正射人之長此篇云射人告具又曰大射正擯自此以後皆止云擯擯者自阼階下請立司正公許遂爲司正則此篇司正與大射正爲一人也下云公就物小射正奉決拾以笥大射正執弓注云大射正舍司正親其職乃薦司正注云司正大射正是也云耦次在洗東南者此無正文案鄉射記云設楅横奉之南面坐奠之南北當洗此下云三耦出次西行拾取矢又當北行向楅則次在洗東南矣云方持弦矢曰挾者以矢横爲方鄉射記云凡挾矢於二指閒横之是也自阼階前曰爲政請射注爲政謂司馬也司馬政官主射禮疏注釋曰云爲政謂司馬也者案大宰云四曰夏官其屬六十掌邦政是為政謂司馬也云司馬政官主射禮者其屬有射人主射事故司馬政官主射禮也遂告曰大夫與大夫士御於大夫注因告選三耦於君御猶侍也大夫與大夫爲耦不足則士侍於大夫與爲耦也今文於爲于疏注釋曰云不足則士侍於大夫與爲耦也者以曲禮云君使士射注謂以備耦是也遂適西階前東面右顧命有司納射器注納内也疏釋曰命謂司射命之也言有司則前文司士戒士射與贊者注云謂士佐執事不射者是也鄉射西階前西面命弟子納射器此言東面者君在阼宜向之故東面右顧者以其有司是士士在西階南東面是以右顧向之射器皆入君之弓矢適東堂賓之弓矢與中籌豐皆止于西堂下衆弓矢不挾總衆弓矢楅皆適次而俟注中閭中算器也籌算也豐可奠射爵者衆弓矢三耦及卿大夫以下弓矢也司射矢亦止西堂下衆弓矢不挾則納公與賓弓矢者挾之楅承矢器今文俟作待音義楅音福數音朔疏注釋曰云中閭中算器也者鄉射記云於郊則閭中據此大射故知閭中中所以盛算故云算器也云司射矢亦止西堂下者下文云司射卒誘射遂適堂西改取一个挾之是也若然司射有矢無弓在堂西有弓者誤或則據司射將獻釋獲者適阼階西去扑適堂西釋弓脫決拾是時弓在西堂下也工人士與梓人升自北階兩楹之閒疏數容弓若丹若墨度尺而午射正涖之注工人士梓人皆司空之屬能正方圜者一從一横曰午謂畫物也射正司射之長音義從子容反疏注釋曰知工人士與梓人皆司空之屬能正方圜者冬官雖亡不知官屬之號見今考工記有三十官有梓人之官此工人士又與梓人同事故知冬官未亡時屬司空也云能正方圜者以工巧能知之也繢人職云火以圜土以黄其象方梓人職張五采之矦之類是知方圜也云一從一横曰午謂畫物也者則鄉射記長與距随是也但未知從者横者若爲用丹若爲用墨或科用其一云午十字謂之先以左足履物右足随而竝立也云度尺者即鄉射記從如笴三尺横如武尺二寸是也卒畫自北階下司宮埽所畫物自北階下注埽物重射事也工人士梓人司宮位在北堂下疏注釋曰知工人士梓人司宫位在北堂下雖無正文南方不見有位其人升降自北階明位在北堂下大史俟于所設中之西東面以聼政注中未設也大史俟焉將有事也鄉射禮曰設中南當楅西當西序東面疏注釋曰注引鄉射者欲見大史位之所在此也司射西面誓之曰公射大矦大夫射參士射干射者非其矦中之不獲卑者與尊者爲耦不異矦大史許諾注誓猶告也古文異作辭音義中丁仲反疏釋曰卑者與尊者射不異矦言此者以其誓云君射大矦大夫射參矦士射干矦恐與尊爲耦亦各射已矦故覆言此賓與君為耦同射大矦士與大夫爲耦同射參矦以其既與尊者爲耦不可使之别矦别矦者則非耦類故也遂比三耦注比選次之也不言面者大夫在門右北面士西方東面音義比毗志反疏注釋曰云不言面者以下云面故決之云大夫在門右北面士西方東面者仍依朝位以其設朝之班位以來其位未改明知司射命誓及比次須還依舊位司射面皆向之而比次也若耦及矦數天子大射賓射六耦三矦畿内諸矦則二矦四耦畿外諸矦大射賓射皆三矦三耦但諸矦畿外畿内各有一申一屈故畿外三矦逺尊得申與天子同三耦則屈畿内二矦近尊則屈四耦則申若燕射則天子諸矦例同三耦一矦而已以其燕私屈也若卿大夫士例同一矦三耦略言之數偹禮記射義也三耦俟于次北西面北上注未知其耦今文俟爲立疏注釋曰云未知其耦者下經始命之故云未知其耦若然此經已言面位者爲三耦雖未知與誰爲耦要知爲三耦故立於此司射命上射曰某御於子命下射曰子與某子射卒遂命三耦取弓矢于次注取弓矢不拾者次中隠蔽處音義拾其業反疏注釋曰云取弓矢不拾者次中隠蔽處者對鄉射堂西顯露之處拾取矢也司射入于次搢三挾一个出于次西面揖當階北面揖及階揖升堂揖當物北面揖及物揖由下物少退誘射注搢㨗也挾一个挾於弦也个猶枚也由下物而少退謙也誘猶敎也夫子循循然善誘人音義㨗初洽反本又作扱疏釋曰自此至東面論司射誘射之事此射人誘射與鄉射同但鄉射徃階西取弓矢此則入次取弓矢爲異然此云入次搢三挾一个則已前皆挾乘矢不改鄉射亦然注釋曰引論語者彼夫子敎弟子學問事司射敎人射事雖不同同是敎法故引爲證也射三矦將乘矢始射干又射參大矦再發注將行也行四矢象有事於四方詩云四矢反兮以御亂兮音義射食亦反卒射北面揖注揖於當物之處不南面者爲不背卿疏注釋曰案鄉射誘射卒南面揖者彼尊東或公或卿大夫位同不别故司射不特尊之此大射辨尊卑尊東唯有天子命卿其餘小卿及大夫皆賓西故特尊之不背之也及階揖降如升射之儀遂適堂西改取一个挾之注改更也不射而挾矢示有事也遂取扑搢之以立于所設中之西南東面注扑所以撻犯敎者也於是言立著其位也鄉射記曰司射之弓矢與扑倚于西階之西音義扑普卜反疏注釋曰云於是言立著其位者案鄉射司射先立所設中之西南三耦從之立於西南司射却就之搢三挾一个乃誘射此則誘射卒乃始來就位者由此有次就次取弓矢射訖無事乃於此立故云於是言立著其位也引鄉射記者此不言司射倚弓矢之處引之證此與彼記文同也司馬師命負矦者執旌以負矦注司馬師正之佐也欲令射者見矦與旌深志於矦中也負矦獲者也天子服不氏下士一人徒四人掌以旌居乏待獲析羽爲旌音義令力呈反疏釋曰自此盡而俟論司馬師命服不負矦之事也注釋曰引天子服不氏下士一人徒四人者欲見諸矦亦三矦亦使服不氏與徒爲獲者也云析羽爲旌周禮司常文負矦者皆適矦執旌負矦而俟司射適次作上耦射注作使也司射反位疏釋曰此不言先反位者爲三耦始出次未有次前位無所先故不言先也上耦出次西面揖進上射在左竝行當階北面揖及階揖上射先升三等下射從之中等注上射在左便射位也中猶閒也疏注釋曰云上射在左便射位也者鄉射亦云上射在左不云便射位者彼東面位上射在北故在左不取便射位之義此次北西面位亦上射在北居右故上射須在左以其發位竝行及升北面就物位皆言居左履物南面上射乃在右故云上射在左便射位也上射升堂少左下射升上射揖竝行注竝併也併東行皆當其物北面揖及物揖皆左足履物還視矦中合足而俟注視矦中各視其矦之中大夫耦則視參中參中十四尺士耦則視干中干中十尺司馬正適次袒決遂執弓右挾之出升自西階適下物立于物閒左執弣右執簫南揚弓命去矦注司馬正政官之屬簫弓末揚弓者執下末揚猶舉也適下物由上射後東過也命去矦者將射當獲也鄉射禮曰西南面立於物閒疏注釋曰云司馬正政官之屬者非大司馬大司馬之下屬大司馬故云司馬屬案天子有大司馬卿一人小司馬中大夫二人此雖諸矦禮亦應有小司馬號爲司馬正也知適下物由上射後東過也者案鄉射司馬命去矦時由上射後過至下射西西南面揚弓命去矦故引鄉射證此亦在物閒西南面也負矦皆許諾以宮趨直西及乏南又諾以商至乏聲止注宮爲君商爲臣其聲和相生也鄉射禮曰獲者執旌許諾古文聲爲磬疏注釋曰云宮爲君商爲臣樂記文云聲和相生者宫生徴徴生商而云相生者雖隔徴亦是相生之義也云聲和者宮數八十一商數七十二彈宮則商應故云聲和也引鄉射者彼臣禮直云諾聲不絶不言宮商引之證與此不同之意授獲者退立于西方獲者興共而俟注大矦服不氏負矦徒一人居乏相代而獲參矦干矦徒負矦居乏不相代鄉射禮曰獲者執旌許諾聲不絶以至於乏坐東面偃旌興而俟古文獲皆作䕶非也音義共九勇反疏注釋曰云大矦服不氐負矦徒一人居乏相代而獲者上注引周禮服不氏下士一人徒四人是以鄭分之於三矦之上大矦尊故使服不氏與一徒居乏自餘徒三人分之於二矦徒以少一人不得相代也引鄉射者此文不具宜與彼同司馬正出于下射之南還其後降自西階遂適次釋弓説決拾襲反位注拾遂也鄉射禮曰司馬反位立于司射之南音義還戸串反説吐活反又始鋭反疏注釋曰引鄉射者於此司馬不言位宜與鄉射同故引爲證司射進與司馬正交于階前相左由堂下西階之東北面視上射命曰毋射獲毋獵獲上射揖司射退反位注射獲矢中乏也從旁爲獵音義射獲食亦反乃射上射既發挾矢而后下射射拾發以將乘矢注拾更也將行也音義更音庚獲者坐而獲注坐言獲也舉旌以宮偃旌以商注等言獲也獲而未釋獲注但言獲未釋算古文釋爲舍疏注釋曰云但言獲未釋算者鄭注鄉射云但大言獲此注不言大省文也卒射右挾之北面揖揖如升射注右挾之右手挾弦上射降三等下射少右從之中等竝行上射于左與升射者相左交于階前相揖適次釋弓説決拾襲反位三耦卒射亦如之注上射於左由下射階上少右乃降待之言襲者凡射皆袒疏釋曰云上射降三等者諸矦階有七等言三等者欲明下射中等是降一等之上下下射過向西畔由右故上射至地待之乃得二人竝行上射于左也云與升射者相左交于階前者降射者仍南行故得階前交徃來也注釋曰云上射于左由下射階上少右乃降待之者此鄭解在階下而上射得在左之意由下射階上少右向西畔乃降上射於地待之故竝行時得上射在左也云凡射皆袒者案鄉射命三耦各與其耦讓取弓矢拾三耦取弓遂至卒射云脱決拾襲而俟于堂西南面此則前遂命三耦取弓矢于次不言袒至此亦言襲故須言凡射皆袒決在此不見袒亦袒可知也司射去扑倚于階西適阼階下北面告于公曰三耦卒射反搢扑反位疏釋曰云司射去扑倚于西階西適阼階下北面告于公者案鄉射司射去扑倚于西階之西升堂北面告于賓曰三耦卒射注云去扑乃升不敢佩刑器即尊者之側此不升堂而在阼階下而亦去扑者尊公故也司馬正袒決遂執弓右挾之出與司射交于階前相左注出出于次也袒時亦適次疏釋曰自此至興反位論取矢設楅之事注釋曰云出于次也袒時亦適次者以此而言則袒時入次今更出次知不在位上袒而入次取弓者几袒襲皆於隠處鄉射無次司馬適堂西袒執弓矢不在位此大射有次明入次袒不在位可知升自西階自右物之後立于物閒西南面揖弓命取矢注揖推之負矦許諾如初去矦皆執旌以負其矦而俟注俟小臣取矢以旌指敎之司馬正降自西階北面命設楅注此出于下射之南還其後而降之疏釋曰此出于下射之南還其後而降之者鄉射文此亦然故引爲證也小臣師設楅司馬正東面以弓爲畢注畢所以敎助執事者鄉射記曰乃設楅于中庭南當洗東肆疏注釋曰云畢所以敎助執事者以畢是助載鼎實之物故司馬執弓爲畢以指授若周禮執殳以爲鞭度然引鄉射禮文者證經設楅處亦當洗既設楅司馬正適次釋弓説決拾襲反位小臣坐委矢于楅北括司馬師坐乘之注乘四四數之音義乘繩證反數所主反若矢不備則司馬正又袒執弓升命取矢如初曰取矢不索乃復求矢加于楅卒司馬正進坐左右撫之興反位注左右撫分上下射此坐皆北面司射適西階西倚扑升自西階東面請射于公公許注倚扑者將即君前不敢佩刑器也升堂者欲諸公卿大夫辯聞也疏釋曰自此盡未降請君行第二番射并命耦之事注釋曰云倚扑者將即君前不敢佩刑器也者上以去扑告君不注至此乃注者彼告在阼階下逺君故不注至此升堂乃注義與彼同也上不升者以告三耦卒射事緩故在下此告欲諸公卿大夫徧聞之故升但升者是其正故鄉射亦升堂大射告公故前在堂下此升者欲公卿聞之故也遂適西階上命賓御于公諸公卿則以耦告于上大夫則降即位而後告注告諸公卿於堂上尊之也司射自西階上北面告于大夫曰請降司射先降搢扑反位大夫從之降適次立于三耦之南西面北上注適次由次前而北西面立疏釋曰云告于大夫曰請降者以諸公卿在上故請大夫降鄉射降告主人與賓爲耦遂告于大夫又曰賓主人與大夫皆未降注云言未降者見其志在射大夫未降者彼臣禮主人與賓皆卑故大夫未降與此異也注釋曰云適次由次前而北西面立者上云司射等適次謂入次中此適次者大夫降自西階東行適次所過向堂東西面立因過次爲適次非入次也司射東面于大夫之西北耦大夫與大夫命上射曰某御於子命下射曰子與某子射卒遂比衆耦注衆耦士也衆耦立于大夫之南西面北上若有士與大夫爲耦則以大夫之耦爲上注爲上居羣士之上疏注釋曰云爲上居羣士之上也者若是士與大夫之尊者爲耦故居羣士之上也鄭云羣士之上者既爲上射恐在大夫之上故云羣士之上是以下注云士雖爲上射其辭猶尊大夫也若然國皆有三卿五大夫三耦六人而已而云使士爲耦者卿大夫或有故或出使容其不足使士備耦之法也命大夫之耦曰子與某子射告於大夫曰某御於子注士雖爲上射其辭猶尊大夫命衆耦如命三耦之辭諸公卿皆未降注言未降者見其志在射疏注釋曰言未者後當降故云未也若終不射不得言未是以鄉射記云衆賓不與射者不降注不以無事亂有事是不射不得云未也遂命三耦各與其耦拾取矢皆袒決遂執弓右挾之注此命入次之事也司射既命而反位不言之者上射出當作取矢事未訖疏釋曰自此盡襲反位論命拾取矢之事注釋曰鄭知此是命入次之事者上來未有三耦入次袒決遂之事又下文乃云一耦出明此是命入次之事若然司射命訖當反位不言者以其三耦入次出乃當作取矢待作取矢即是事末訖故不言反位也仍未知令入次之後未出之聞且在西方位且在階下位二者雖無文以事緩急言之三耦入次出則作之宜在階下位於義可也又鄉射云司射反位者司射反位則有三耦位得言反位此司射位在西方去次逺又司射位若階下去次亦逺不得言反故不言也一耦出西面揖當楅北面揖及楅揖注三耦同入次其出也一上射出西面立司射作之乃揖行也當楅楅正南之東西上射東面下射西面上射揖進坐横弓郤手自弓下取一个兼諸弣興順羽且左還毋周反面揖注横弓者南踣弓也卻手自弓下取矢者以左手在弓表右手從裏取之便也兼并也并矢於弣當順羽既又當執弦順羽者手放而下備不整理也左還反其位毋周右還而反東面也君在阼還周則下射將背之古文且爲阻音義還音患一音環踣歩北反疏注釋曰云左還反其位毋周右還而反東面也者毋周者左還行至位即位右還而反東面是還不周也云君在阼還周則下射將背之者上射左還已還背君而據下射而言者上射去君逺故據下射而言以其下射若又還周爲背君若左還向東覆即右還西面是不背君周即背故也下射進坐横弓覆手自弓上取一个兼諸弣興順羽且左還毋周反面揖注横弓亦南踣弓也人東西鄉以南北爲横覆手自弓上取矢以左手在弓裏右手從表取之便也音義覆芳伏反疏注釋曰云横弓亦南踣弓也者謂南踣弓以左手仰執弓裏以覆右手於弓表向下取矢便也上射下射俱南踣弓者取不背君向南爲順也既拾取矢梱之注梱齊等之也古文梱作魁音義梱口本反兼挾乘矢皆内還南面揖注内還者上射左下射右不皆右還亦以君在阼嫌下射故左還而背之也上以陽爲内下以隂爲内因其宜可也疏注釋曰云不皆右還亦以君在阼嫌下射故左還而背之者若上下俱向内是相向爲順若上射左還是不故背君若下射右還背君少亦左還初時面向君轉身南向背君多似故背居故不左還也云上以陽爲内下以隂爲内因其宜可也者上射東面左還時以左手還取東相陽方爲内下射西面右還時以右手還取西相隂方爲内随其隂陽得左右相向是因其宜也適楅南皆左還北面揖搢三挾一个注楅南鄉當楅之位也揖以耦左還上射於左注以猶與也言以者耦之事成於此意相人耦也上射轉居左便其反位也上射少北乃東面疏注釋曰云言以者耦之事成於此意相人耦也者揖不須言以今云以者必有義意故鄭云言以者耦之事成於此謂成於此拾取矢以其取矢後一番了更無事故云成於此人意相存耦也云上射轉居左便其反位也者位在次北西面是以上射居左至次北右還西面便也云上射少北乃東面知不少南者以其次在楅東南北面揖時已在次西故知上射少北乃東面得東當次也退者與進者相左相揖還退釋弓矢于次説決拾襲反位二耦拾取矢亦如之後者遂取誘射之矢兼乘矢而取之以授有司于次中皆襲反位注有司納射器因留主授受之司射作射如初一耦揖升如初司馬命去矦負矦許諾如初司馬降釋弓反位司射猶挾一个去扑與司馬交于階前適阼階下北面請釋獲于公注猶守故之辭於此言之者司射既誘射恒執弓挾矢以掌射事備尚未知當敎之也今三耦卒射衆已知之矣猶挾之者君子不必也公許反搢扑遂命釋獲者設中以弓爲畢北面注北面立于所設中之南當視之也鄉射禮曰設中南當楅西當西序大史釋獲小臣師執中先首坐設之東面退大史實八算于中横委其餘于中西興共而俟注先猶前也命大史而小臣師設之國君官多也小臣師退反東堂下位鄉射禮曰横委其餘于中西南末疏注釋曰此不見執算之人案鄉射命釋獲者釋獲者執鹿中一人執算以從之彼臣禮官少釋獲者自執中設之尚使人執算况國君官多大史不自執中豈得自執算明亦使人執之云小臣師退反東堂下位者其位已見篇首也引鄉射者證算以南末爲順也司射西面命曰中離維綱揚觸梱復公則釋獲衆則不與注離猶過也獵也矦有上下綱其邪制躳舌之角者爲維或曰維當爲縜縜綱耳揚觸者謂矢中他物揚而觸矦也梱復謂矢至矦不著而還復復反也公則釋獲優君也衆當中鵠而著古文梱作魁音義中丁仲反邪似嗟反縜劉矦犬反又于貧反一古縣反又古犬反著直略反疏注釋曰中謂中侯注不言可知云離猶過也獵也者謂矢過獵因著維與綱二者云矦有上下綱其邪制躳舌之角者爲維者案梓人云上綱與下綱出舌尋縜寸焉注綱所以繫矦於直者也上下皆出舌一尋者亦人張手之節也鄭司農云縜籠綱者維持矦者若然則綱與維皆用繩爲之又以布爲縜籠綱然後以上个下个邊綴著縜兩頭以綱繫著植維者於上个下个上下躳兩頭皆有角又以小繩綴角繫若植故矢或離綱或離維也云或曰維當爲縜縜綱耳者鄭更爲一解縜則維也云縜綱耳者以縜爲綱耳離著縜也云衆當中鵠者大射鵠則梓人云張皮矦而棲鵠是也唯公所中中三矦皆獲注值中一矦則釋獲疏注釋曰云中三侯皆釋獲則離維綱及揚觸梱復亦釋之不言者以中爲主也釋獲者命小史小史命獲者注傳告服不使知此司射所命疏注釋曰據在大矦而言告服不則參矦干矦告可知舉逺見近司射遂進由堂下北面視上射命曰不貫不釋上射揖司射退反位注貫猶中也射不中鵠不釋算古文貫作闗疏注釋曰案上文離維綱公則釋獲言之則此云不中不釋算者據除君而言也釋獲者坐取中之八算改實八算興執而俟注執所取算乃射若中則釋獲者每一个釋一算上射於右下射於左若有餘算則反委之注委餘算禮貴異又取中之八算改實八算于中興執而俟三耦卒射賓降取弓矢于堂西注不敢與君竝俟告取之以升俟君事畢疏注釋曰自此盡共而俟論第二番射三耦訖次公卿大夫之事但此賓先降取弓矢即升堂者以其不敢與君竝待告故下云司射告射于公小射正取公之決拾并授弓拂弓是君得告乃取弓矢是不敢與君竝俟告也云取之以升俟君事畢者案下又云公將射則賓降適堂西袒決遂執弓搢三挾一个升自西階是君事畢君事畢賓降袒決遂乃更升若然賓於此不即袒決遂者去射時逺故不可即袒也諸公卿則適次繼三耦以南注言繼三耦明在大夫北疏釋曰言適次者但射位在堂東次在洗東南今諸公卿東南適次前行至其三耦之南以次西面立注釋曰云繼三耦明在大夫北者以其三耦在北大夫在南而言繼三耦明在大夫之北也公將射則司馬師命負矦皆執其旌以負其矦而俟注君尊若始焉疏注釋曰云君尊若始焉者案上始時司馬命負矦三耦將射司馬命去矦今三耦卒射君將射司馬使更命負矦是君尊若始焉司馬師反位隸㒒人埽矦道注新之司射去扑適阼階下告射于公公許適西階東告于賓注告當射也今文曰阼階下無適遂搢扑反位小射正一人取公之決拾於東坫上一小射正授弓拂弓皆以俟于東堂注授弓當授大射正拂弓去塵疏釋曰據此經上下或云大射正或云司射或云小射正不同者今行射禮大射正一人爲上司射次之或云小射正若然大射正與司射各一人據其行事小射正不止一人而已此云小射正一人取弓之決拾於東坫上下云小射正奉決拾以笥與此一人此又云小射正授弓與取決拾别則小射正二人也注釋曰云授弓當授大射正者下云大射正執弓以袂以授公明此小射正授弓者當授大射正也公將射則賓降適堂西袒決遂執弓搢三挾一个升自西階先待于物北北一笴東面立注不敢與君併笴矢幹東面立鄉君也音義笴工但反劉古老反疏釋曰云公將射則賓降者案前文賓降適堂西取弓矢無賓升堂之文但文不具其實即升矣是以此文云賓降注釋曰云笴矢幹者案周禮矢人矢幹長三尺則此賓立於物北三尺矣司馬升命去矦如初還右乃降釋弓反位注還右還君之右也猶出下射之南還其後也今文曰右還疏注釋曰云還右還君之右也者君爲下射賓爲上射司馬在君之西南掦弓命去矦訖還君之右東而南西向降自西階猶出下射之南還其後也者猶如上文初將射時司馬立於物閒南揚弓命去矦訖出於下射之南還其後降自西階前後是同故取彼解此云今文曰右還不從右還者若右還則右還於上射不得還君故不從也公就物小射正奉決拾以笥大射正執弓皆以從於物注笥萑葦器大射正舍司正親其職音義笥息嗣反字林先字反劉音司萑音丸葦于鬼反疏注釋曰前解大射正與司射别人案此注大射正舍司正親其職則大射正與司正爲一人又案上文司射請立司正遂立司射爲司正則司射又與大射正爲一人與上解似相違者以大射正與射人俱掌射事相當則大射正與司射别若通而言之射人不對大射正射人亦名大射正故此以射人爲大射正也小射正坐奠笥于物南遂拂以巾取決興贊設決朱極三注極猶放也所以韜指利放弦也以朱韋爲之三者食指將指無名指無極放弦契於此指多則痛小指短不用音義韜土刀反將子匠反契苦計反小臣正贊袒公袒朱襦卒袒小臣正退俟于東堂小射正又坐取拾興贊設拾以笥退奠于坫上復位注既袒乃設拾拾當以韝襦上疏注釋曰案上文設決訖乃云公袒朱襦始云小臣正贊設拾拾當拾斂膚體宜在朱襦之上故鄭云既袒乃設拾拾當以韝襦上鄉射云袒決遂以其無襦故遂與決得俱時設若大夫對士射袒纁襦設遂亦當在袒後大射正執弓以袂順左右隈上再下壹左執弣右執簫以授公公親揉之注順放之也隈弓淵也揉宛之觀其安危也今文順爲循古文揉爲紐音義隈烏回反揉而九反疏注釋曰云順放之也者以袂向下於弓隈順放之云觀其安危也者案考工記弓人云其弓安其弓危者以弓弱者爲危其弓强者爲安則此云觀安危者謂試弓之强弱小臣師以巾内拂矢而授矢于公稍屬注内拂恐塵及君也稍屬不搢矢音義屬之玉反大射正立于公後以矢行告于公注若不中使君當知而改其度下曰留上曰揚左右曰方注留不至也揚過去也方出旁也公既發大射正受弓而俟拾發以將乘矢注公下射也而先發不留尊也疏注釋曰案上三耦射者上射射訖乃次下射此公爲下射當後射今君射前於賓故鄭云先發不留尊也公卒射小臣師以巾退反位大射正受弓注受弓以授有司於東堂小射正以笥受決拾退奠于坫上復位大射正退反司正之位小臣正贊襲公還而后賓降釋弓于堂西反位于階西東面注階西東面賓降位疏注釋曰案上文賓受獻訖降立於階西東面此云反位於階西東面故云賓降位也公即席司正以命升賓賓升復筵而后卿大夫繼射諸公卿取弓矢于次中袒決遂執弓搢三挾一个出西面揖揖如三耦升射卒射降如三耦適次釋弓説決拾襲反位衆皆繼射釋獲皆如初注諸公卿言取弓矢衆言釋獲互言也疏釋曰此公與賓復升即位者公卿以下當繼射公與賓當觀之故升就位也卒射釋獲者遂以所執餘獲適阼階下北面告于公曰左右卒射注司射不言告者釋獲者於是有事宜終之也餘獲餘算也無餘算則無所執古文曰餘算反位坐委餘獲于中西興共而俟司馬袒執弓升命取矢如初負矦許諾以旌負矦如初司馬降釋弓如初小臣委矢于楅如初注司馬司馬正於是司馬師亦坐乘矢疏釋曰自此盡就席論射訖取矢委于楅之事注釋曰知司馬是司馬正司馬師亦坐乘矢者此經皆言如初案上番射司馬正與司馬師乘矢故知也賓諸公卿大夫之矢皆異束之以茅卒正坐左右撫之進束反位注異束大夫矢尊殊之也正司馬正也進前也又言束整結之示親也疏注釋曰公卿皆異束但言大夫者公卿自相對其矢俱束之及其脱之亦拾取但三耦之内大夫以士耦之士矢不束大夫束之故曰尊殊之下注云不言君矢小臣以授矢人於東堂下可知知者以其小臣取矢明取之以授矢人賓之矢則以授矢人于西堂下注是言矢人則納射器之有司各以其器名官職不言君矢小臣以授矢人于東堂下可知司馬釋弓反位而后卿大夫升就席注此言其升前小臣委矢於楅疏注釋曰云此言其升前小臣委矢於楅者案上文司馬降釋弓如初在小臣委矢之上其司馬降釋弓之時卿大夫即升就席委矢當在司馬命取矢之下不失其次故不即見卿大夫升事是以於此特言司馬降釋弓與卿大夫升爲大節耳故鄭亦言其次第也司射適階西釋弓去扑襲進由中東立于中南北面眂算注釋弓去扑射事已也音義眂音視本亦作視疏釋曰自此盡共而俟論數算之事直言去扑不言去矢矢亦去之是以下文司射執弓挾一个搢扑明此時去矢後更挾之釋獲者東面于中西坐先數右獲注固東面矣復言之者少南就右獲音義數所主反二算爲純注純猶全也耦隂陽也一純以取實于左手十純則縮而委之注縮從也於數者東西爲從古文縮皆作蹙音義縮所六反每委異之注易校數音義易以豉反有餘純則横諸下注又異之也自近爲下音義近附近之近一算爲竒竒則又縮諸純下注又從之音義竒居宜反興自前適左注從中前北也更端故起東面坐注少北於故坐兼斂算實于左手一純以委十則異之注變於右也其餘如右獲注謂所縮所横者司射復位釋獲者遂進取賢獲執之由阼階下北面告于公注賢獲勝黨之算也執之者齊而取其餘若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有竒者亦曰竒注告曰某賢於某若干純若干竒若左右鈞則左右各執一算以告曰左右鈞還復位坐兼斂算實八算于中委其餘于中西興共而俟司射命設豐注當飲不勝者射爵音義飲于鴆反疏釋曰自此盡徹豐與觶論二番射訖行射爵之事司宮士奉豐由西階升北面坐設于西楹西降復位勝者之弟子洗觶升酌散南面坐奠于豐上降反位注弟子其少者也不授者射爵猶罰爵略之音義奉芳勇反少詩召反疏注釋曰自此以上其疏見於鄉射於此不復言云不授者射爵猶罰爵略之者案詩云兕觥其觩㫖酒思柔注云觩陳設貌觥罰爵不手授此飲射爵亦不手授故云猶罰爵也案獻酬之爵皆手授之此不手授故云略之也若然士以下飲罰爵者取於豐大夫已上皆手授尊之故下注云授爵而不奠豐尊大夫也其三耦之内雖大夫亦取於豐者以其作三耦與衆耦同事故不復殊之司射袒執弓挾一个搢扑東面于三耦之西命三耦及衆射者勝者皆袒決遂執張弓注執張弓言能用之也右手挾弦不勝者皆襲説決拾卻左手右加弛弓于其上遂以執弣注固襲説決拾矣復言之者起勝者也不勝者執弛弓言不能用之也兩手執弣無所挾也音義弛尸氏反疏注釋曰云固襲説決拾矣復言之者起勝者也者起勝者射畢之時降堂皆就次襲説決拾矣故云固襲今復言之者以其勝者更袒決遂故復言不勝襲説決拾卻欲與勝者相起復發故復言之也司射先反位注居前俟所命入次而來飲三耦及衆射者皆升飲射爵于西階上注不勝之黨無不飲疏注釋曰以其經云三耦及衆射者皆升飲射爵者言升之明知不勝之黨無不飲但大射者所以擇士以助祭今若罰爵在於不勝之黨雖數中亦受罰及其助祭雖飲射爵亦得助祭但在勝黨雖不飲罰爵若不數中亦不得助祭以其飲罰據一黨而言及其助祭取一身之藝義故不同也小射正作升飲射爵者如作射一耦出揖如升射及階勝者先升升堂少右注先升尊賢也少右辟飲者亦因相飲之禮然疏注釋曰云亦因相飲之禮然者案鄉飲酒鄉射獻酬之禮獻者在右酬者在左故云亦也不勝者進北面坐取豐上之觶興少退立卒觶進坐奠于豐下興揖注立卒觶不祭不拜受罰不備禮也右手執觶左手執弓疏注釋曰案鄉飲酒皆祭坐卒爵拜既爵故此決之受罰不備禮也云右手執觶左手執弓者以其執弛弓不釋於地明知來飲時兩手執弓今受罰爵右手執爵爲便左手執弓可知不勝者先降注後升先降略之不由次也降而少右復竝行疏注釋曰云後升先降略之不由次也者案上文勝者先升此文不勝者先降故云略之不由次云降而少右復竝行者見下文與升飲者相左明降至堂下此二人少右復竝行以其辟升者在左故也與升飲者相左交于階前相揖適次釋弓襲反位㒒人師繼酌射爵取觶實之反奠于豐上退俟于序端注㒒人師酌者君使之代弟子也自此以下辯爲之酌升飲者如初三耦卒飲若賓諸公卿大夫不勝則不降不執弓耦不升注此耦謂士也諸公卿或闕士爲之耦者不升其諸公卿大夫相爲耦者不降席重恥尊也疏注釋曰知此耦謂士者以大夫坐於上士立於下經云耦不升故云此耦謂士也是以鄭解其意云諸公卿或闕士爲之耦者不升其諸公卿大夫相爲耦者不降席以大夫在堂上故云不降席云重恥尊也者解士不升大夫已上不降席意以其卑者對飲尊者是可恥之事不對飲是重恥尊者也㒒人師洗升實觶以授賓諸公卿大夫受觶于席以降適西階上北面立飲卒觶授執爵者反就席注雖尊亦西階上立飲不可以已尊枉正罰也授爵而不奠豐尊大夫也疏注釋曰云不可以已尊枉正罰也者正罰謂上文飲者在左勝者在右於西階之上北面跪取豐上之觶飲之是也今雖不取於豐亦於西階北面是不可以己尊枉正罰也若飲公則侍射者降洗角觶升酌散降拜注侍射賓也飲君則不敢以爲罰從致爵之禮也疏注釋曰云侍射賓也者以其賓與君對射耦自相飲故知侍射者賓也云飲君則不敢以爲罰從致爵之禮也者罰爵如上文罰者飲之而已今則從燕臣致爵於君之禮下文所謂夾爵者是也但此經云角觶與上文觶皆是三升曰觶觶與角連故謂之角觶或單言角或單言觶是以禮記少儀云侍射則約矢侍投則擁矢勝則洗爵而請不角注云角謂觥罰爵也於尊長與客如獻酬之爵又詩云我姑酌彼兕觥毛𫝊云兕觥角爵箋云兕觥罰爵是其角觶兕觥皆罰爵此角觶以兕角爲之非謂四升曰角者也若然此角觶對下文飲君云象觶故云角觶也公降一等小臣正辭賓升再拜稽首公答再拜賓坐祭卒爵再拜稽首公答再拜賓降洗象觶升酌膳以致下拜小臣正辭升再拜稽首公答再拜公卒觶賓進受觶降洗散觶升實散下拜小臣正辭升再拜稽首公答再拜注賓復酌自飲者夾爵也但如致爵則無以異於燕也夾爵亦所以恥公也所謂若飲君燕則夾爵疏注釋曰云所謂若飲君燕則夾爵者言所謂鄉射文彼云燕者則此經夾爵也賓坐不祭卒觶降奠于篚階西東面立注不祭象射爵疏釋曰案上文受罰者取爵於豐飲之不祭此云君爵不祭是以賓飲夾爵亦不祭皆與射同故云也擯者以命升賓賓升就席注擯者司正也今文席爲筵若諸公卿大夫之耦不勝則亦執弛弓特升飲注此耦亦謂士也特猶獨也以尊爲耦而又不勝使之獨飲若無倫匹孤賤也衆皆繼飲射爵如三耦射爵辯乃徹豐與觶注徹除也司宮尊矦于服不之東北兩獻酒東面南上皆加勺設洗于尊西北篚在南東肆實一散于篚注爲大矦獲者設尊也言尊矦者獲者之功由矦也不於初設之者不敢必君射也君不射則不獻大矦之獲者散爵名容五升音義獻素多反疏釋曰自此盡矦而俟論設尊獻服不之事注釋曰云不於初設之者不敢必君射也君不射則不獻大矦之獲者若然此設大矦之獲者君不射則不設之不豫設者不敢必君射案上張矦先設大矦君射大矦張之必君射者但聖人射法一與一奪以大射者爲祭擇士所以助祭人君不可不親故奪其尊使之必射故豫張大矦至此設大矦之尊君射訖乃設之者許其自優暇容有不射之理是以不射則不設射乃設之云散爵名容五升者案韓詩𫝊云一升曰爵二升曰觚三升曰觶四升曰角五升曰散是其散容五升也司馬正洗散遂實爵獻服不注言服不者著其官尊大矦也服不司馬之屬掌養猛獸而敎擾之者洗酌皆西面音義擾而小反疏注釋曰云服不者著其官尊大矦也者自此已前皆以事名之於此而言服不著其官言尊大矦故也云服不司馬之屬者以其服不在大司馬下六十官之屬者云掌養猛獸而敎擾之者猛獸熊羆之屬敎之使擾馴人意象王者服不服諸矦使歸服王者云洗酌皆西面者以其設尊設洗皆東面故知洗爵酌酒皆西面向之也若然獻旅食尊後酌者爲背君此西面不嫌背君以其南統於矦故也服不矦西北三歩北面拜受爵注近其所爲獻疏注釋曰云近其所爲獻者以其服不得獻由矦所爲故不近乏而近矦獻之故云近其所爲獻也司馬正西面拜送爵反位注不俟卒爵略賤也此終言之獻服不之徒乃反位疏注釋曰云不俟卒爵略賤也者案上文獻服不訖又案下文卒祭左个之西北三歩東面設薦俎立卒爵若然卒爵在祭諸矦訖今司馬反位在未祭矦之前故略賤也云此終言之獻服不之徒乃反位者但大矦尊服不與其徒二人共在獲所獻服不亦兼獻其徒此經唯見獻服不不見獻其徒即云司馬反位明獻徒後始反位是以知反位者終言之其實獻徒後乃反位故下司馬正皆獻之是也宰夫有司薦庶子設折俎注宰夫有司宰夫之吏也鄉射記曰獲者之俎折脊脅肺疏注釋曰云宰夫有司宰夫之吏也者諸矦宰夫是士而宰夫有司明是宰夫之吏府史也引鄉射記者此俎實無文故引之爲證卒錯獲者適右个薦俎從之注不言服不言獲者國君大矦服不負矦其徒居乏待獲變其文容二人也司馬正皆獻之薦俎已錯乃適右个明此獻已已歸功於矦也適右个由矦内鄉射記曰東方謂之右个音義錯劉音厝个劉音幹疏注釋曰云國君大矦服不負矦其徒居乏待獲變其文容二人也者案上注云天子服不氏下士一人徒四人掌以旌居乏待獲鄭言容二人者欲見服不與徒二人皆得獻故鄭云司馬正皆獻之云適右个由矦内者以其既祭左个次祭右个乃祭於中故云適右个由矦内獲者左執爵右祭薦俎二手祭酒注祭俎不奠爵不備禮也二手祭酒者獲者南面於俎北當爲矦祭於豆閒爵反注爲一手不能正也此薦俎之設如於北面人焉天子祝矦曰唯若寧矦無或若女不寧矦不屬於王所故抗而射女彊飲彊食貽女曽孫諸矦百福諸矦以下祝辭未聞音義祝侯之又反女音汝射食亦反彊其丈反疏注釋曰云祭俎不奠爵不備禮也者言祭俎者謂祭俎上肺但肺有二種此云祭是祭肺也非是離肺知者案鄉射記云獲者之俎折脊脅肺臑又曰釋獲者之俎折脊脅肺皆有祭則此俎祭肺亦離肺若然凡祭祭肺皆不奠爵是其常云此不奠爵不備禮者但祭肺離肺兩有祭肺皆不奠爵若空有祭肺亦不奠爵今祭俎不奠故云不備禮云天子祝矦曰以下周禮梓人文云諸矦以下祝辭未聞知諸侯不與天子祝辭同而云未聞者以本所射矦天子中之則能服諸矦諸矦中之則得爲諸矦若天子云抗而射女諸矦則不得云抗而射女是以知祝辭有之但未聞耳適左个祭如右个中亦如之注先祭个後中者以外即之至中若神在中鄉射禮曰獻獲者俎與薦皆三祭疏注釋曰以其左右及中故三者皆三祭非謂一處有三祭卒祭左个之西北三歩東面注此鄉受獻之位也不北面者嫌爲矦卒爵疏注釋曰云不北面者嫌爲矦卒爵者前服不受獻之時矦西北面者欲歸功於矦故也今卒爵雖同舊處而東面者以其前受獻爲已今卒爵還爲已卒爵故東面是以云不北面者嫌爲矦卒爵也設薦俎立卒爵注不言不拜既爵司馬正已反位不拜可知也鄉射禮曰獲者薦右東面立飲疏注釋曰云不言不拜既爵司馬正已反位不拜可知也者決鄉射獲者薦右東面立飲不拜既爵此則不言之以其司馬在對司馬不拜既爵司馬已反位不拜既爵可知故不言引鄉射禮者此不言立位之處當同鄉射薦者東面立司馬師受虛爵洗獻隸㒒人與巾車獲者皆如大矦之禮注隸㒒人埽矦道巾車張大矦及參矦干矦之獲者其受獻之禮如服不也隸㒒人巾車於服不之位受之功成於大矦也不言量人者此自後以及先可知疏注釋曰云隸㒒人埽矦道者謂君射時初埽之時亦是隸㒒人也云巾車張大矦者舉尊者而言其參矦干矦亦張之是以上文司馬遂命量人巾車張三矦此直云大矦舉尊而言也云及參矦干矦之獲者以其上文已獻大矦服不獲者明知是糝矦豻矦之獲者可知云隸㒒人巾車於服不之位受之知者以其隸㒒人巾車素無其位而經云如大矦之禮明就大矦之位受獻是以鄭云功成於大矦也云不言量人者此自後以及先可知者案上張矦之時先言量人後言巾車君射之時乃有隸㒒人埽矦道及獻先言隸㒒人後言巾車是自後以及先隸㒒而得獻明量人在巾車之先得獻可知卒司馬師受虛爵奠于篚注獲者之篚獲者皆執其薦庶子執俎從之設于乏少南注少南爲復射妨旌也隸㒒人巾車量人自服不而南疏注釋曰知自服不而南者雖無正文以其受獻於服不之位明繼服不而南可知服不復負矦而俟司射適階西去扑適堂西釋弓説決拾襲適洗洗觚升實之降獻釋獲者于其位少南注獻釋獲者與獲者異文武不同也去扑者扑不升堂也少南辟中疏釋曰自此盡反位論獻釋獲者之事注釋曰言文武不同者以其獻獲者於矦西北面受獻歸功於此矦是其武獻釋獲者升堂酌酒東面獻之就釋算之所是其文故云文武不同薦脯醢折俎皆有祭注俎與服不同唯祭一爲異疏注釋曰云俎與服不同者以其俱用一俎云唯祭一爲異者上祭矦之俎引鄉射獲者俎與薦皆三祭鄭鄉射注云祭矦三處至此獻釋獲者不主祭矦止唯一祭肺耳故云唯祭一爲異釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵右祭脯醢興取肺坐祭遂祭酒注祭俎不奠爵亦賤不備禮疏注釋曰上祭矦之時祭俎不奠爵不備禮至此祭俎亦祭肺不奠爵賤亦不備禮興司射之西北面立卒爵不拜既爵司射受虛爵奠于篚釋獲者少西辟薦反位注辟薦少西之者爲復射妨司射視算亦辟俎也音義辟婢亦反疏注釋曰以其薦俎相將薦既辟俎亦辟可知司射適堂西袒決遂取弓挾一个適階西搢扑以反位注爲將復射疏釋曰自此盡于公如初論司射請公爲三番射事司射倚扑于階西適阼階下北面請射于公如初注不升堂賓諸公卿大夫既射矣聞之可知疏注釋曰云不升堂賓諸公卿大夫既射矣聞之可知者決前司射升堂請射于公升今不升者諸公卿大夫前已射聞之矣反搢扑適次命三耦皆袒決遂執弓序出取矢注曏言拾是言序互言耳音義拾其業反疏釋曰自此盡襲反位論三耦與卿大夫取矢之事注釋曰云曏言拾者謂第一番射時三耦云拾取矢云是言序者謂序出次時三耦先後互者皆次序出次在庭拾取矢司射先反位注言先先三耦也司射既命三耦以入次之事即反位三耦入次袒決遂執弓挾矢乃出反次外西面位曏不言司射先反位三耦未有次外位無所先也疏注釋曰云曏不言司射先反位三耦未有次外位無所先也者此言反位者謂前已有位今乃反之是今禮反於舊位舊位第一番之時三耦次外舊無位司射雖先有位不得言先反位是以決之三耦拾取矢如初小射正作取矢如初注小射正司射之佐作取矢禮殺代之疏注釋曰云禮殺代之者決第一番不言小射正作取矢三耦既拾取矢諸公卿大夫皆降如初位與耦入於次皆袒決遂執弓皆進當楅進坐説矢束上射東面下射西面拾取矢如三耦注皆進當楅進三耦揖之位也凡繼射命耦而已不作射不作取矢從初音義説詩悦反又始鋭反疏注釋曰云凡繼射命耦而已不作射不作取矢從初者言凡繼射命耦者前三耦卒射後大夫降至三耦之南西而北上司射東面于大夫西北耦大夫與大夫命上射曰某御於子命下射曰子與某子射卒遂比衆耦云云至公即席後賓升階復位還筵而後卿大夫繼射後衆皆繼射釋獲皆如初注云諸公卿言取弓矢衆言釋獲互言也既司射所作唯上耦是此文小射正但作三耦拾取矢公以下亦無作拾文故曰不作取矢從初從三耦法也若士與大夫爲耦士東面大夫西面大夫進坐説矢束退反位注説矢束自同於三耦謙也疏注釋曰云自同於三耦謙也者以其三耦是士不束既是大夫若束則異於三耦故云説矢束自同於三耦謙也鄉射坐説矢束注云説矢束者下耦以將拾取彼不言同三耦者彼三耦非大夫故也耦揖進坐兼取乘矢興順羽且左還毋周反面揖注兼取乘矢不敢與大夫拾大夫進坐亦兼取乘矢如其耦北面搢三挾一个揖進大夫與其耦皆適次釋弓説決拾襲反位諸公卿升就席注大夫反位諸公卿乃升就席大夫與已上下位音義个古賀反下同疏注釋曰諸公卿大夫自爲耦者拾取矢在前大夫與士耦者説矢束拾取矢在後今待大夫反位公卿乃升就席者以其上大夫與下大夫同是大夫爵但上下有異耳故上大夫待大夫反位後乃升就席衆射者繼拾取矢皆如三耦遂入于次釋弓矢説決拾襲反位司射猶挾一个以作射如初一耦揖升如初司馬升命去矦負矦許諾司馬降釋弓反位司射與司馬交于階前倚扑于階西適阼階下北面請以樂于公公許注請奏樂以爲節也始射獲而未釋獲復釋獲復用樂行之君子之於事始取苟能中課有功終用成法敎化之漸也射用應樂爲難孔子曰射者何以聼循聲而發發而不失正鵠者其唯賢者乎音義正音征疏注釋曰云請奏樂以爲節也者請若天子騶虞九節諸矦貍首七節大夫采蘋士采蘩皆五節云始射獲而未釋獲者謂第一番三耦射中時雖唱獲未釋算云復釋獲者謂第二番衆耦皆射釋算未作樂云復用樂行之者謂第三番射非直釋算復用樂焉云射用應樂爲難者但禮射其容體比於禮其節奏比於樂又須中於矦名爲應樂節云孔子曰者禮記射義文引之者證射用應樂爲難之意司射反搢扑東面命樂正曰命用樂注言君有命用樂射也樂正在工南北面疏注釋曰云樂正在工南北面者此時工在洗東西面樂正在工南北面司射在西階下東面經云命樂正者東面遙命之樂正曰諾司射遂適堂下北面眂上射命曰不鼔不釋注不與鼔節相應不釋算也鼓亦樂之節學記曰鼔無當於五聲五聲不得不和凡射之鼔節投壺其存者也周禮射節天子九諸矦七卿大夫以下五音義當丁浪反疏注釋曰引學記者證鼓得與樂爲節之事云凡射之鼔節投壺其存者也者射之鼓節多少無文案今禮記投壺篇圖出魯鼔薛鼔云取半以下爲投壺節盡用之爲射節是投壺存者云周禮射節天子九以下者是射人樂師皆有此文引之者證射節多少上射揖司射退反位樂正命大師曰奏貍首閒若一注樂正西面受命左還東面命大師以大射之樂章使奏之也貍首逸詩曾孫也貍之言不來也其詩有射諸矦首不朝者之言因以名篇後世失之謂之曾孫曾孫者其章頭也射義所載詩曰曽孫矦氏是也以爲諸矦射節者采其既有弧矢之威又言小大莫處御於君所以燕以射則燕則譽有樂以時㑹君事之志也閒若一者調其聲之疏數重節音義數音朔疏注釋曰云貍首逸詩曾孫也者以其貍首是篇名曾孫是章頭知者以其射義上文云其節天子以騶虞諸矦以貍首卿大夫以采蘋士以采蘩以類言之騶虞采蘋是篇名貍首篇名可知射義下文諸矦君臣盡志於射文云故詩曰曽孫矦氏四正具舉小大莫處御於君所注云此曾孫之詩諸矦之射節也四正正爵四行也四行者獻賓獻公獻卿獻大夫乃後樂作而射也上云貍首下云曾孫曽孫章頭也是以鄭云曽孫其章頭射義所載曽孫矦氏是也云後世失之謂之曽孫者以曾孫爲篇名是失之云曾孫其章頭也是正世人也云小大莫處已下則燕則譽以上皆射義文彼注以燕以射先行燕禮乃射是也云閒若一者調其聲之疏數重節者謂九節七節五節中閒相去或希疏或密數中閒使如一必疏數如一者重此樂故也大師不興許諾樂正反位奏貍首以射三耦卒射賓待于物如初公樂作而后就物稍屬不以樂志其他如初儀注不以樂志君之射儀遲速從心其發不必應樂辟不敏也志意所擬度也春秋傳曰吾志其目音義度大各反疏釋曰此經云如初者皆如上第二番射法唯作樂爲異耳注釋曰云辟不敏也者若以樂志不與樂節相應則見君不敏今不以樂志遲速從心其發不必應樂是辟不敏也引春秋傳者定八年左氏傳文正月公侵齊門于陽州其時魯人顔息射人中眉退曰我無勇吾志其目也服氏注云志中其目是非其誠詐以自矜引之者證志是意所擬度也卒射如初賓就席諸公卿大夫衆射者皆繼射釋獲如初卒射降反位釋獲者執餘獲進告左右卒射如初司馬升命取矢負矦許諾司馬降釋弓反位小臣委矢司馬師乘之皆如初司射釋弓視算如初釋獲者以賢獲與鈞告如初復位司射命設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初卒退豐與觶如初司射猶袒決遂左執弓右執一个兼諸弦面鏃適次命拾取矢如初注側持弦矢曰執面猶尚也兼矢於弦尚鏃將止變於射也音義乘繩證反疏注釋曰上文皆云挾一个此經云執一个故上注云方持弦矢曰挾以其將射故也此注云側持弦矢曰執謂鏃向上故云兼矢於弦而鏃向上將止變於射也案鄉射禮云矢不挾兼諸弦弣不言面鏃此言面鏃不言兼弣各舉一邊省文之義言兼弦弣者一矢兼弦三矢兼弣也司射反位三耦及諸公卿大夫衆射者皆袒決遂以拾取矢如初矢不挾兼諸弦面鏃退適次皆授有司弓矢襲反位注不挾亦謂執之如司射卿大夫升就席司射適次釋弓説決拾去扑襲反位司馬正命退楅解綱小臣師退楅巾車量人解左下綱司馬師命獲者以旌與薦俎退注解猶釋也今文司馬師無司馬司射命釋獲者退中與算而俟注諸所退射器皆俟備君復射釋獲者亦退其薦俎疏注釋曰云皆俟備君復射者但射已三番於後或射或否臣不敢必君不射故備擬於君也云釋獲者亦退其薦俎者前辟薦俎今既退中與算薦俎不可虚留明亦退之可知公又舉奠觶唯公所賜若賓若長以旅于西階上如初大夫卒受者以虛觶降奠于篚反位疏釋曰此一節論射訖爲大夫舉旅之事司馬正升自西階東楹之東北面告于公請徹俎公許注射事既畢禮殺人倦宜徹俎燕坐疏釋曰自此盡反位坐論徹俎升坐安燕之事遂適西階上北面告于賓賓北面取俎以出諸公卿取俎如賓禮遂出授從者于門外注自其從者音義從才用反大夫降復位注門東北面位疏釋曰云大夫降者大夫雖無俎以賓及公卿皆送俎不可獨立於堂故降復位注釋曰云門東北面位者謂初小臣納卿大夫門東北面揖位案下文賓諸公卿皆入門東面北上謂在西階下知大夫不復在西階下位者以其言復位者復前位其西階下舊無位故知非西階下若然公卿入西階下鄭云諸公卿不入門而右以將燕亦因從賓者也大夫以公卿未入不可猶居西階故在門東北面也庶子正徹公俎降自阼階以東注降自阼階若親徹也以東去藏音義去起呂反賓諸公卿皆入門東面北上注諸公卿不入門而右以將燕亦因從賓司正升賓賓諸公卿大夫皆説屨升就席公以賓及卿大夫皆坐乃安注曏命以我安臣於君尚猶踧踖至此乃敢安音義説土活反羞庶羞注羞進也庶衆也所進衆羞謂􅍧肝膋狗胾醢也或有炮鼈膾鯉雉兔鶉鴽音義􅍧音損又才悶反又士戀反膋力彫反胾壯吏反炮薄交反膾古外反鶉市春反鴽音如疏注釋曰知有􅍧肝膋者此大射先行燕禮燕法其牲唯有狗又案内則云肝膋取狗肝一之以其膋濡炙之舉燋其膋不蓼注云膋腸閒脂故知此羞中有肝膋也又知有狗胾醢者以其公食大夫有牛胾炙羊胾炙豕胾炙此燕無三牲故知胾醢亦用狗知有炮鼈膾鯉者案六月詩云吉甫燕喜既多受祉又云飲御諸友炰鼈膾鯉故知有此也公食大夫有王事之勞乃有之故六月詩鄭注以吉甫逺從鎬地來又日月長乆今飲之酒使其諸友恩舊者待之又加其珍美之饌所以極勸之也是有王事之勞乃有之無王事之勞則無故公食大夫不見也又知有雉兔鶉鴽者公食大夫二十豆有此四者此仍引内則上大夫二十豆者不引二十豆盡以其二十豆有三牲之物此狗故唯引此四者大夫祭薦注燕乃祭薦不敢於盛成禮疏注釋曰云燕乃祭薦不敢於盛成禮者此大夫卑不敢與公卿同時於盛成禮者也司正升受命皆命公曰衆無不醉賓及諸公卿大夫皆興對曰諾敢不醉皆反位坐注皆命者命賓命諸公命卿大夫皆鄉其位也興對必降席敬也司正退立西序端疏注釋曰云興對必降席者經直云興不言降席鄭知降席者以爲反坐故知降席也言敬也者決上文司正命賓與大夫以我安雖未坐不云降而對故以此爲敬若然上不降席者彼直云安未盡慇懃故不降此命使醉是盡慇慇故興降加敬也知司正退立西序端者案司正監酒此將獻士事未訖亦如鄉飲酒監旅時立于西序端也主人洗酌獻士于西階上士長升拜受觶主人拜送注獻士用觶士賤也今文觶作觚疏釋曰自此盡奠于篚論獻士及祝史等之事注辭曰云獻士用觶士賤也者言獻士用觶對上獻大夫用觚觚二升觶三升用大者賤用小者尊故云士賤也士坐祭立飲不拜既爵其他不拜坐祭立飲注其他謂衆士也升不拜受爵疏注釋曰上云長謂士中之長次云士謂長已下下云其他謂衆士者亦謂二十七士以其下經旅食謂庶人在官故知此非府史以下乃薦司正與射人于觶南北面東上司正爲上注司正射人士也以齒受獻既乃薦之也司正大射正也射人小射正略其佐疏釋曰案燕禮薦司正與射人一人司士一人執冪二人此不言其數又不言司士與執冪者二人文不具辯獻士士既獻者立于東方西面北上乃薦士注士既獻易位者以卿大夫在堂臣位尊東也畢獻薦之略賤疏注釋曰云畢獻薦之略賤者案上獻士立飲是畢獻訖乃云乃薦司正與射人于觶南是獻士人獻司正已下若然薦士當在乃薦司正上至此言之者其實薦士在乃薦司正上今此更言士得獻訖立在東方立畢乃薦不待畢獻司正薦乃薦士也是以薦司正言乃者緩辭明司正已下薦在士後也祝史小臣師亦就其位而薦之注亦者亦士也辯獻乃薦也祝史門東北面東上主人就士旅食之尊而獻之旅食不拜受爵坐祭立飲注主人既酌西面士旅食北面受之不洗者於賤略之也疏注釋曰知主人既酌西面士旅食北面受之者以其不可背君南面授故知位之如此若然大史等亦北面則亦西面授酒也其小臣師等案上文位在阼階東南自然北面授主人執虛爵奠于篚復位賓降洗升媵觶于公酌散下拜公降一等小臣正辭賓升再拜稽首公答再拜注賓受公賜多矣禮將終宜勸公序厚意也今文觶爲觚公答拜無再拜疏釋曰自此盡旅酌論賓舉爵爲士舉旅行酬之事注釋曰云賓受公賜多矣禮將終宜勸公序厚意也者上文爲賓爲卿爲大夫舉旅皆臣自致爵今此其賓爲士舉旅行酬因得爲賓致爵於君故鄭云序厚意也賓坐祭卒爵再拜稽首公答再拜賓降洗象觚升酌膳坐奠于薦南降拜小臣正辭賓升成拜公答拜賓反位注反位反席也此觚當爲觶音義觚作觶出注疏注釋曰自此已前賓位在西階下東面無席户牖之閒位則有席此賓升成拜不言降反位明反位者反於户牖之間席位云此觚當爲觶者凡旅酬皆用觶獻士尚用觶故知觚當爲觶下經觚亦當爲觶公坐取賓所媵觚興唯公所賜受者如初受酬之禮降更爵洗升酌膳下再拜稽首小臣正辭升成拜公答拜乃就席坐行之注坐行之若今坐相勸酒有執爵者注士有盥升主酌授之疏注釋曰知士有盥升者以其爲公卿大夫使行旅不可不潔知是士者案下文云士有執膳爵者有執散爵者故知士有盥升主酌授之唯受于公者拜注公所賜者拜其餘則否司正命執爵者爵辯卒受者興以酬士注欲令惠均音義令力呈反疏注釋曰云欲令惠均者以堂上公卿大夫旅徧并堂下之士也大夫卒受者以爵興西階上酬士士升大夫奠爵拜士答拜注興酬士者士立堂下與上坐者異疏注釋曰云興酬士者決向來堂上相旅皆坐相酬執爵者行之大夫末受酬者興西階上酬士故鄭云士立堂下與上坐者異也大夫立卒爵不拜實之士拜受大夫拜送士旅于西階上辯注祝史小臣師旅食皆及焉疏注釋曰鄭知祝史以下皆得旅酬前得獻祝史與旅皆得獻明此旅酬得獻之可知士旅酌注旅序也士以次自酌相酬無執爵者疏注釋曰云無執爵者對上文卿大夫等有執爵者以其坐故也士無執爵者以其賤不坐故以次自酌以相酬無執爵者也若命曰復射則不獻庶子注獻庶子則正禮畢後無事音義復扶又反疏注釋曰獻酬之禮庶子以下最後得獻若獻庶子之後正禮畢不得更有射事故命復射在獻庶子之前司射命射唯欲注司射命賓及諸公卿大夫射欲者則射不欲者則止可否之事從人心也疏注釋曰此乃三番射後爵行無算非直懈怠復有醉者是以不可恣心所欲卿大夫皆降再拜稽首公答拜注拜君樂與臣下執事無已不言賓賓從羣臣禮在上疏注釋曰云不言賓賓從羣臣禮在上者謂初酬賓直言賓再舉旅言若長不專於賓已是禮殺第三舉旅云唯公所賜若賓若長至此爲士舉旅直云唯公所賜復不言若賓若長賓至此降沒不言賓是賓禮以漸而殺且從羣臣禮在上矣壹發中三矦皆獲注其功一也而和者益多尚歡樂也矢揚觸或有參中者音義中丁仲反和戸卧反樂音洛疏注釋曰上云第二番第三番唯公得中三矦皆釋獲至此燕後復射禮殺臣與君同是以鄭云和者益多尚歡樂也云其功一也者謂三矦所中皆是功故云一也云矢揚觸或冇參中者卿大夫主射參矦士主射豻矦其中或揚觸容中别矦皆與釋主人洗升自西階獻庶子于阼階上如獻士之禮辯獻降洗遂獻左右正與内小臣皆於阼階上如獻庶子之禮注庶子既掌正六牲之體又正舞位授舞器與膳宰樂正聨事又掌國子戒令敎治世子之官也左右正謂樂正㒒人正也位在中庭之左右小樂正在頌磬之北右也工在西即北面工遷於東則東面大樂正在笙磬之北左也工在西則西面工遷於東則北面㒒人正相大師工升堂與其師士降立于小樂正之北北上工遷於東則陪其工後國君無故不釋縣二正君之近官也内小臣奄人掌君隂事隂令后夫人之官也獻三官於阼階别内外臣也同獻更洗以時事不聨也獻正下及内小臣則磬人鍾人鎛人鼔人㒒人師㒒人士盡獻可知也庶子内小臣位在小臣師之東少退西上音義相息亮反縣音懸别彼列反疏注釋曰云小樂正在頌磬之北右也工在西即北面者工在西謂遷樂於下時大師少師上工立於鼔北也云工遷於東則東面者案上遷樂於東之時直云大師少師上工皆東坫之東不見小樂正從之明留在西縣之北東面向工矣云大樂正在笙磬之北左也工在西則西面者案上文司射東面命樂正單言樂正者謂大樂正既東面命之則大樂正元立於東矣以其工在西階下故知西面向之矣云工遷於東則北面者案上文樂正反位大師既西面明樂正北面可知是以鄉射工遷於東南西面北上樂正北面立于其南此亦與彼同北面也云國君無故不釋縣二正君之近官也言此者人君路寢之庭樂縣不釋樂正與㒒人正同掌樂事是君之近官也云同獻更洗以時事不聯也者以其雖同獻於阼階上獻有前後故更爵洗之是以云時事不聨也云庶子内小臣位在小臣師之東者案公食堂上夾北有宰夫内宰在東北此射禮堂上夾北無宰位則位不得在堂上又非樂人不得在樂正位以其與小臣師同名小臣故知小臣師之東也又云少退西上者見公食在宰東北少退故知此亦少退知西上者以此位皆西上故也無算爵注算數也爵行無次數唯意所勸醉而止疏釋曰自此盡無算樂論爵與恣意無數之事士也有執膳爵者有執散爵者執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公答再拜注席下席西受賜爵者以爵就席坐公卒爵然後飲注酬之禮爵代舉今爵竝行嫌不代也竝行猶代者明勸惠從尊者來疏注釋曰凡行酬之法轉爵遞飲今膳散兩有宜得即飲猶待公卒爵乃飲猶代飲然明惠從公來嫌得即飲不代故必卒爵然後飲故曰嫌不代執膳爵者受公爵酌反奠之注燕之歡在飲酒成其意也疏注釋曰云燕之歡在飲酒者諸安燕之歡正在於飲酒故受公爵者更酌反奠於公所擬公更賜爵是其歡燕成之意也受賜者興授執散爵者執散爵者乃酌行之注與其所歡者唯受于公者拜卒爵者興以酬士于西階上士升大夫不拜乃飲實爵注乃猶而也疏注釋曰鄭轉乃爲而者乃是緩之辭於禮不切故爲而也士不拜受爵大夫就席士旅酌亦如之公有命徹冪則賓及諸公卿大夫皆降西階下北面東上再拜稽首注命徹冪者公意殷勤欲盡酒公命小臣正辭公答拜大夫皆辟升反位注升不成拜於將醉正臣禮疏注釋曰於例臣於堂下再拜稽首得小臣以君命辭其拜不成當升成拜今直升不成拜者以其拜於下是臣之正禮故鄭云於將醉正臣禮士終旅於上如初注卿大夫降而爵止於其反席卒之疏注釋曰上文卿大夫酬辯始酬士公命徹冪公卿以下降而爵止是以卿大夫升反席士以下相酬而卒之無算樂注升歌閒合無次數唯意所樂音義閒閒厠之閒樂音洛宵則庶子執燭於阼階上司宮執燭於西階上甸人執大燭於庭閽人爲燭於門外注宵夜也燭燋也甸人掌共薪蒸者庭大燭爲其位廣也爲作也作燭候賓出音義甸大見反閽音昏燋哉約反字林子弔反共音恭疏釋曰自此盡篇終論禮畢容公卿出入之事賓醉北面坐取其薦脯以降注取脯重得君之賜奏陔注陔夏樂章也其歌頌類也以鍾鼔奏之其篇今亡賓所執脯以賜鍾人于門内霤遂出注必賜鍾人鍾人以鍾鼔奏陔夏賜之脯明雖醉志禮不忘樂音義霤力又反疏釋曰案鄉飲酒鄉射賓出無取脯賜鍾人之事者彼是臣禮此爲君法故詳略不同卿大夫皆出注從賓出公不送注臣也與之安燕交歡嫌亢禮也疏注釋曰案燕義云使宰夫爲獻主臣莫敢與君亢禮曏來安燕交歡君若送之是臣與君亢禮故君不送賓也故燕禮注云賓禮訖是臣也公入驁注驁夏亦樂章也以鍾鼔奏之其詩今亡此公出而言入者射宮在郊以將還爲入燕不驁者於路寢無出入也音義驁五刀反疏注釋曰云驁夏亦樂章也者案周禮鍾師有九夏皆樂章其中有驁夏如陔夏故云亦樂章也云以鍾鼓奏之案鍾師以鍾鼔奏九夏鄭云先擊鍾次擊鼓故云以鍾鼓奏之也云其詩今亡者鄭注鍾師云九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具是其今亡云此公出而言入者射宮在郊以將還爲入者天子射在虞庠周之小學在西郊案鄉射記於郊則閭中鄭云諸矦大學在郊是諸矦大射所故言入者射宮在郊以將還爲入也鄭知燕在路寢者燕禮記云燕朝服於寢與羣臣賓客燕不合在燕寢故知從路寢也此篇所解多不具者以其諸矦大夫射先行燕禮大射三番多依鄉射是以與禮同者於此不復重釋之也儀禮注疏卷七儀禮注疏卷七考證前射三日宰夫戒宰及司馬射人㝛視滌臣恂按此節疏以宰夫戒爲句下九字爲句鄉射禮首節疏引此又以宰夫戒宰及司馬爲句敖繼公則以宰夫戒貫下通作一句樂人㝛縣于阼階東注沽洗所以修絜百物沽字從釋文疏作姑簜在建鼔之間疏今大予樂官有焉臣學健按大予漢樂官名或本作子者誤厥明疏故云其爲字從豆爲形以豐爲聲也臣紱按疏以􅞱爲豐之本字注亦作諧聲詁之而􅞱字字書未載大夫繼而東上敖繼公云繼而之下當有西字臣紱按小卿在賓西大夫繼之則在小卿之西而席則東上也敖説得之小臣師納諸公卿大夫疏下有小臣正下監本譌作小今改正主人卒洗賓揖乃升石經及朱子本敖本無乃字更爵洗升酌散以降敖繼公云此亦當酌膳云散誤也臣紱按上文賓酢主人酌膳此主人自酢于公所以達公意亦酌膳也敖説得之主人盥洗升媵觚于賓敖繼公云此觚亦當作觶臣紱按凡酬用觶敖説是疏論主人酬賓之事酬賓二字監本譌受賓爵三字今以經并燕禮疏文改正之賓大夫之右此下六節舊本合爲一節全無注文今依朱子分節并補注至疏則不可復尋矣主人洗觚觚監本譌作酬今依石經及朱子本敖本改坐授瑟乃降授石經作受誤司正降自西階南面坐取觶升酌散降南面坐奠觶奠石經及敖本作取蓋縁上文坐取觶而混遂告曰曰石經作于誤工人士與梓人升自北階疏則鄉射記長與距随是也鄉射記長四字監本作上文横三字臣紱按上文既無其文而横字與下三字不屬考鄉飲記訂正之長其縱距随其横也疏云午十字謂之臣紱按此倒句法猶言十字謂之午耳上耦出次西面揖進疏亦上射在北居右右監本作左朱子通解作右從之臣恂按次北西面時上射居右既揖而進上射乃之左南揚弓命去矦矦監本譌作俟石經同今依朱子本楊本敖本改正授獲者退立于西方敖繼公云或言授獲者下當有旌字上射降三等三監本作二石經及朱子本楊本敖本竝作三證之疏文當以三爲是司馬師坐乘之石經乘之下有卒字楊本敖本同司射東面于大夫之西北北石經作比依石經則比字連下耦字爲句朱子本楊本敖本俱作北下射進坐横弓疏取不背君向南爲順也監本取字下脱不字順字下有故字臣紱按經意謂君在阼不可背之也脱不字則悖矣故字亦當衍揖以耦左還上射于左敖繼公云于左當作于右退者與進者相左相揖還石經及楊本敖本無還字司射作射如初作射之射監本譌作揖今依石經及朱子本楊本敖本改正司射西面命白注或曰維當爲縜縜監本譌作絹今据考工記訂正與鄉射禮乃張矦節疏同賓降取弓矢于堂西敖繼公云此言降而不言升似有闕文一小射正授弓拂弓敖繼公云授當作受受弓者受于有司也賓諸公卿大夫之矢皆異束之以茅卒敖繼公云卒字衍北面眂算眂石經及敖本作視釋文作眂今從釋文下經北面眂上射同東面坐敖繼公云此坐字衍鄉射無之臣學健按蓋因下文坐字而誤叠之司射袒執弓袒字上石經及楊本敖本有遂字若諸公卿大夫之耦不勝敖繼公云比耦時大夫有與士爲耦者諸公卿無與士爲耦者此諸公卿衍文卒司馬師受虛爵監本脱師字今依石經及朱子本楊本敖本補薦脯醢折俎皆有祭敖繼公云折上亦似脱設字三耦拾取矢如初小射正作取矢如初三耦監本作二耦今依石經及朱子本楊本敖本改正敖繼公云下一句似衍搢三挾一个揖進敖繼公云揖進之進當作退鄉射云揖退是也諸公卿升就席敖繼公云公卿之下不言大夫文脱耳司射命設豐實觶如初敖繼公云實觶上當更有設豐二字如鄉射之文此脱矢不挾兼諸弦面鏃敖繼公云弦字下蓋脱弣字司馬正升自西階李如圭云馬字疑衍臣紱按鄉射此一節亦云司正升自西階李説是公答拜賓反位反位上監本脱賓字今依石經及朱子本敖本補大夫卒受者以爵興西階上酬士疏大夫末受酬者興西階上酬士監本作大夫未能受酬者輒興西階上臣紱按未字蓋末字之譌能字輒字當衍脱酬士二字則語意不完尋繹經注以此爲是主人洗升自西階疏堂上夾北無宰位則位不得在堂上則位不得在堂上監本譌作又按執事者堂上臣紱按文既不屬而執事者三字亦不倫今尋繹上下文義以此爲是受賜者興敖繼公云受賜下當有爵字如上篇唯受于公者拜卒爵者興敖繼公云卒爵之間當有受字如上篇儀禮注疏卷七考證
