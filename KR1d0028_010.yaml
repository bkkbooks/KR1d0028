body:
  text: 儀禮注疏卷十漢鄭氏注唐陸德明音義賈公彥疏覲禮第十覲禮至于郊王使人皮辨用璧勞矦氏亦皮辨迎于帷門之外再拜注郊謂近郊去王城五十里小行人職曰凡諸矦入王則逆勞于畿則郊勞者大行人也皮辨者天子之朝朝服也璧無束帛者天子之玉尊也不言諸矦言矦氏者明國殊舍異禮不凡之也郊舍狹寡為帷宫以受勞掌舍職曰為帷宫設旌門音義勞力到反疏釋曰自此盡乃出論侯氏至近郊天子使使者勞侯氏之事注釋曰云郊謂近郊者案聘禮云至於近郊君使卿勞故知此郊者亦近郊也知近郊去王城五十里者成周與王城相去五十里而君陳序云分正東郊成周鄭云今河南洛陽相去則然是近郊五十里也引小行人職者約近郊勞是大行人以其尊者宜逸小行人既勞于畿明近郊使大行人也案大行人上公三勞侯伯再勞子男一勞此雖不辨勞數案小行人云凡諸侯入王則逆勞于畿不辨尊卑則五等同有畿勞其子男唯有此一勞而已侯伯又加逺郊勞上公又加近郊勞則此云近郊據上公而言若然聘禮使臣聘而云近郊勞者臣禮異於君禮君禮宜先逺臣禮宜先近故也若然書傳略説云天子之子十八曰孟侯者於四方諸侯來朝迎於郊孝經注亦云天子使世子郊迎者皆異代法非周禮也案玉人職云案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯注云夫人謂王后勞諸侯皆九勞大夫皆五此文不見者以其聘禮於聘客主國夫人尚有勞以二竹簋方明后亦有略言王勞不言后文不具也云皮辨者天子之朝朝服者司服云眂朝則皮辨故知在朝服皮辨至入廟乃裨冕也云璧無束帛者天子之玉尊者此對諸侯玉卑故聘禮云束帛加璧是諸侯臣所執小行人合六幣云璧以帛琮以錦琥以繡璜以黼是諸侯所執以致享皆有束帛配之諸侯玉卑故也此乃行勞所用以享禮况之耳云不言諸侯言侯氏者明國殊舍異禮不凡之也者言諸侯則凡之總稱言侯氏則指一身不凡之也而所勞之處或非一國舍處不同故不總言諸侯而云侯氏也云郊舍狹寡為帷宫以受勞者周禮十里有廬三十里有宿五十里有市市有館郊關之所各自有舍或來者多館舍狹寡故不在館舍以帷為宫以受勞禮也云掌舍職曰為帷宫設旌門者謂為帷宫則設旌旗以表四門彼天子所舍平日之事引之者證諸侯行亦有帷宫設旌為門之事也案聘禮使卿勞賓受於門內司儀諸侯之臣相為國客亦是受勞於館不為帷宫者彼臣禮卿行旅從徒衆少故在館此諸侯禮君行師從徒衆多故於帷宫襄二十八年左氏傳云子産相鄭伯以如楚舍不為壇注云至敵國郊除地封土為壇以受郊勞又外㒒言曰先大夫相先君適四國未嘗不為壇今子草舍無乃不可乎子産曰大適小則為壇小適大苟舍而已焉用壇彼亦是諸侯相朝當為壇以為帷宫受勞之事也使者不答拜遂執玉三揖至于階使者不讓先升矦氏升聽命降再拜稽首遂升受玉注不答拜者為人使不當其禮也不讓先升奉王命尊也升者升壇使者東面致命矦氏東階上西面聽之疏注釋曰云升者升壇者以帷宫無堂可升故知升者升壇也云使者東面致命侯氏東階上西面聽之者知面位如此者並約下文就館賜侯氏車服而知也使者左還而立矦氏還璧使者受矦氏降再拜稽首使者乃出注左還還南面示將去也立者見矦氏將有事於已俟之也還玉重禮疏釋曰直云使者左還不云拜送玉者凡奉命使皆不拜送若卿歸饔餼不拜送幣亦斯類也若身自致者乃拜送下文儐使者及聘禮私覿私面皆拜送幣是也注釋曰云左還還南面示將去也者以其東面致命而左還明左還者南面也未降而南面示將去故也云立者見侯氏將有事於已俟之者經云而立即云侯氏還璧故知立者見侯氏將有還玉之事於已故俟之不降云還玉重禮者案聘義圭璋還之璧琮加束帛報之所以輕財重禮彼以璧琮不還則為輕財者以其璧琮加束帛故為輕則不還此以天子之璧不加束帛尊之與圭璋同故亦還之為重禮也矦氏乃止使者使者乃入矦氏與之讓升矦氏先升授几矦氏拜送几使者設几答拜注矦氏先升賓禮統焉几者安賓所以崇優厚也上介出止使者則已布席也疏釋曰自此盡遂從之論侯氏儐使者遂從入廟之事注釋曰云侯氏先升賓禮統焉者行賓禮是賓客之禮是以賓在館為主人主人先升使者為賓賔後升故云禮統焉謂賓統有此堂也云几者安賓所以崇優厚者案大宰云贊玉几注云立而設几優尊也此使者亦不坐而設几故云所以崇優厚也聘禮卿勞受儐不設几者諸侯之卿卑故不與此同也云上介出止使者則已布席者經不云上介出止使者鄭云上介出止使者案至館皆不敢當皆使上介出請事又見此經云使者乃入始云侯氏與之讓升是侯氏不出故知使上介止使者也云則已布席者以其經不云布席而云設几几不可設於地明有席席之所設唯在此時案聘禮受聘云几筵既設是几筵相將故云上介出止使者則已布席也矦氏用束帛乘馬儐使者使者再拜受矦氏再拜送幣注儐使者所以致尊敬也拜者各於其階疏注釋曰云儐使者所以致尊敬也者案聘禮使卿用束帛勞賓賔不還束帛賓儐卿以束錦此使者以玉勞侯氏侯氏還玉仍亦儐使者是致尊敬天子之使故也知拜各於其階者此賓與使行敵禮若鄉飲酒鄉射賓主拜各於其階也使者降以左驂出矦氏送於門外再拜矦氏遂從之注騑馬曰驂左驂設在西者其餘三馬矦氏之士遂以出授使者之從者于外從之者遂隨使者以至朝疏注釋曰知左驂設在西者陳四馬與人以西為上案聘禮禮賓時賓執左馬以出此亦以左驂出故知左驂設在西也又知其餘三馬侯氏之士遂以出授使者之從者于外者亦案聘禮禮賔執左馬以出記云主人之庭實則主人遂以出賔之士訝受之此侯氏在館如主人明三馬亦侯氏之士以出授使者從者可知云從之者遂隨使者以至朝者亦如聘禮云下大夫勞賔使者遂以賔入至於朝其義同故知義然也天子賜舍注以其新至道路勞苦未受其禮且使即安也賜舍猶致館也所使者司空與小行人為承擯今文賜作錫疏釋曰自此盡乘馬論賜侯氏舍館侯氏儐使之事注釋曰云賜舍猶致館者猶聘禮賓至於朝君使卿致館此不言致館言賜舍者天子尊極故言賜舍也云所使者司空與者聘禮使卿致館此亦宜使卿知是司空非卿者周禮以天地春夏秋冬六卿無致館之事司空主營城郭宫室館亦宫室之事故知所使者司空也但司空亡無正文故云與以疑之知小行人為承擯者案聘禮致館賓主人各擯介故知此亦陳擯介必知使小行人為承擯者案小行人云及郊勞眂館將幣為承而擯是其義也曰伯父女順命于王所賜伯父舍注此使者致館辭音義女音汝疏釋曰此及下經皆云伯父者案下文謂同姓大國舉同姓大國則同姓小國及異姓之國禮不殊也矦氏再拜稽首注受館儐之束帛乘馬注王使人以命致館無禮猶儐之者尊王使也矦氏受館於外既則儐使者於內疏注釋曰云王使人以命致館無禮猶儐之者尊王使也者決聘禮卿無禮致館賓無束帛儐卿此王使亦無禮致館其賓猶儐使者用束帛乘馬故云尊王使也云侯氏受館於外者案聘禮大夫帥至館卿致館而云賓迎再拜卿退賓送再拜則聘禮致館不在外此不見大夫帥至館即云天子賜舍是侯氏受舍于外可知與聘禮異也知既則儐使者於內者以其既受館則為已所有明儐使者在內可知也天子使大夫戒曰某曰伯父帥乃初事注大夫者卿為訝者也掌訝職曰凡訝者賓客至而往詔相其事戒猶告也其為告使順循其事也初猶故也今文帥作率音義訝五嫁反疏釋曰自此盡再拜稽首論天子使大夫戒侯氏期日使行覲禮之事注釋曰知大夫是卿為訝者以其周禮秋官掌訝職云諸侯有卿訝故知大夫即卿為訝者云其為告使順循其事也初猶故者以其四時朝覲自是尋常故使恆循故事之常也矦氏再拜稽首注受覲日也諸侯前朝皆受舍于朝同姓西面北上異姓東面北上注言諸侯者明來朝者衆矣顧其入覲不得並耳受舍于朝受次于文王廟門之外聘禮記云宗人授次次以帷少退於君之次則是次也言舍者尊舍也天子使掌次為之諸侯上介先朝受焉此覲也言朝者覲遇之禮雖簡其來之心猶若朝也分别同姓異姓受之將有先後也春秋傳曰寡人若朝于薛不敢與諸任齒則周禮先同姓疏釋曰此一經論前朝一日諸侯各遣上介受次於朝之事注釋曰云言諸侯者明來朝者衆矣者上注云言侯氏者明國殊舍異禮不凡之於此言諸侯凡之者以其諸國同時遣上介故言來朝者衆矣若其行禮自有前後故鄭云顧其入覲不得並耳云受舍於朝受次于文王廟門之外者以其春夏受贄於朝無迎法受享於廟有迎禮秋冬受贄受享皆在廟並無迎法是以大門外無位既受覲於廟故在廟門外受次知在文王廟門外者案聘禮云不腆先君之祧既拚以俟則諸侯待朝聘之賓皆在大祖之廟以其諸侯無二祧遷主所藏皆在始祖之廟故以始祖為祧案天子待覲遇亦當在祧祭法云天子七廟有二祧又案周禮守祧職云掌守先王先公之廟祧鄭注遷主所藏曰祧穆之遷主藏於文王廟昭之遷主藏於武王廟今不在武王廟而在文王廟者父尊而子畀故知在文王廟也若然先公木主藏於后稷廟受覲遇不在后稷廟者后稷生非王故不宜在焉云言舍者尊舍也者此賔以帷為次非屋舍尊天子之次故以屋舍言之是尊舍也若天子春夏受享諸侯相朝聘迎賓客者皆有外次即聘禮記宗人授次是也有外次於大門外者則無廟門外之內次天子覲遇在廟者有廟門外之內次無大門外之外次此文是也云天子使掌次為之者案周禮掌次云掌王次舍之法以待張事故知使掌次為之諸侯兼官無掌次使館人為之故聘禮云館人布幕于寢門外鄭注云館人掌次舍帷幕者是也云諸侯上介先朝受焉者知使上介者案下文諸侯覲於天子為宫方三百步上介皆奉其君之旗置于宫明知此亦使上介也云其來之心猶若朝也者案周禮大宗伯云春曰朝秋曰覲鄭注云朝之言朝也欲其來之早覲之言勤欲其勤王事各舉一邉而言其實早來勤王通有也故鄭云其來之心猶若朝故變覲言朝也云分别同姓異姓受之將有先後者案此經同姓西面異姓東面案下曲禮云天子當依而立諸侯北面而見天子曰覲彼此皆是覲禮彼諸侯皆北面不辨同姓異姓與此不同者此謂廟門外為位時彼謂入見天子時故鄭注云覲者位於廟門外而序入入謂北面見天子時引春秋者案隱十一年經書滕侯薛侯來朝左傳曰爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯也若然彼服注云爭長先登授玉此位在門外引之者以其在先即先登外內同故引以為證矦氏裨冕釋幣于禰注將覲質明時也裨冕者衣禆衣而冠冕也禆之為言埤也天子六服大裘為上其餘為裨以事尊卑服之而諸侯亦服焉上公衮無升龍侯伯鷩子男毳孤絺卿大夫玄此差司服所掌也禰謂行主遷主矣而云禰親之也釋幣者告將覲也其釋幣如聘大夫將受命釋幣于禰之禮既則祝藏其幣歸乃埋之於祧西階之東音義禆婢支反劉音卑禰乃禮反埤婢支反一音卑鷩必列反毳尺鋭反絺丁禮反劉本作希張里反疏釋曰此經明諸侯之在館內將覲於王先釋幣告於行主之禮注釋曰知將覲質明時者案聘禮賓厥明釋幣于禰故知此亦質明時也云禆之為言埤者讀從詩政事一埤益我取裨陪之義云天子六服大裘為上其餘為禆者天子吉服有九而言六服者據六冕而言以大裘為上無埤義衮冕以下皆為禆故云其餘為禆云以事尊卑服之者即司服所云王祀昊天上帝則大裘而冕祀五帝亦如之祀先王則衮冕以下至羣小祀則玄冕舉天子而言故云以事尊卑服之云而諸侯亦服焉者亦據司服而言諸侯唯不得有大裘上公則衮冕以下故鄭云此差司服所掌也云上公衮無升龍者案白虎通引禮記曰天子乘龍載大旗象日月升龍傳曰天子升龍諸侯降龍以此言之上得兼下下不得僣上則天子升降俱有諸侯直有降龍而已若然彼升龍文承大旗之下知不施於旌旗而據衣服者案司常云交龍為旗又云諸侯建旗注云諸侯畫交龍一象其升朝一象其下復則旌旗升降俱有而白虎通云諸侯降龍者據衣服而言案玉藻諸侯玄冕以祭不得服衮冕以下是以鄭注司服云諸侯自祭於其家則降若然諸侯自家祭降魯與二王之後皆不得用衮冕鷩冕毳冕則此等及孤卿大夫絺冕玄冕者是入君廟及入天子之廟故服也今云諸侯告禰用裨冕者將入天子之廟故服以告禰謂若曽子問云諸侯裨冕以朝鄭注云為將廟受亦斯之類也云禰謂行主遷主矣者案禮記曽子問云師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也彼雖據天子其諸侯行亦然以其皆有遷廟木主若然大夫無木主聘禮賓釋幣于禰者大夫雖無木主以幣帛主其神亦為行主也而云禰親之者以其在外唯有遷主可事故不言遷主而云禰也云其釋幣如聘大夫將受命釋幣于禰之禮者案聘禮將行釋幣于禰此禮無文故約與之同乃受命即出行故云將受命釋幣于禰皆是告將行無祭祀知既則祝藏其幣歸乃埋之於祧西階之東者此無正文案聘禮祝告祝又入取幣降卷幣實于篚埋于西階東此亦與彼同云祧者諸侯遷主藏於始祖之廟諸侯既以始祖之廟為祧遷主歸還入祧廟故知此幣埋于祧西階之東也乘墨車載龍旗弧韣乃朝以瑞玉有繅注墨車大夫制也乘之者入天子之國車服不可盡同也交龍為旗諸侯之所建弧所以張縿之弓也弓衣曰韣瑞玉謂公桓圭侯信圭伯躬圭子榖璧男蒲璧繅所以藉玉以韋衣木廣袤各如其玉之大小以朱白蒼為六色今文玉為璧繅或為璪音義韣音獨繅音早縿所銜反又所感反信音申疏釋曰自此盡乃出論諸侯發館至天子廟門之外以次行覲禮之事注釋曰云墨車大夫制也者案周禮巾車職云孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車故知墨車大夫制也必言墨車大夫制者對玉路金路象路之等天子諸侯之制也云乘之者入天子之國車服不可盡同者巾車云同姓金路異姓象路四衛革路並得與天子同據在本國所乘下記云偏駕不入王門偏駕金路象路等是也既不入王門舍於客館乘此墨車以朝也云交龍為旗諸侯之所建者司常職文也云弧所以張縿之弓也者爾雅説旌旗正幅為縿故以此弧弓張縿之兩幅故云張縿之弓也云弓衣曰韣者案月令云后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前言帶以弓韣韣是弓衣可知云瑞玉謂公桓圭之等皆大宗伯典瑞職文云繅所以藉玉至為六色其義疏已見於聘禮記天子設斧依於戶牖之間左右几注依如今綈素屏風也有繡斧文所以示威也斧謂之黼几玉几也左右者優至尊也其席莞席紛純加繅席畫純加次席黼純音義依於豈反綈大西反屏步丁反莞音官純諸允反劉之閏反疏注釋曰云依如今綈素屏風也者案爾雅牖户之間謂之扆以屏風為斧文置於依地孔安國顧命傳云扆屏風畫為斧文置户牖間是也言綈素者綈赤也素白也漢時屏風以綈素為之象古者白黑斧文故鄭以漢法為况云有繡斧文所以示威也者案周禮繢人云青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五色備謂之繡此白黑斧以比方繡次為之故云有繡斧文所以示威也云斧謂之黼者據繡次言之白與黑謂之黼即為此黼字也據文體形質言之刃白而銎黑則為此斧字故二字不同也云几玉几也者案周禮司几筵云左右玉几故知此几是玉几也注左右有几優至尊也亦與此同又案大宰云贊玉几鄭注云玉几王所依也立而設几優尊者但几唯須其一又几坐時所以馮依今左右及立兩設之皆是優至尊也兩注相兼乃具云其席莞席以下亦司几筵文案彼云大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞席紛純等鄭注云紛純者紛如綬有文而狹繅席者削蒲蒻展之編以五采若今合歡矣畫純者謂畫雲氣次席者桃枝席有次列成文此次席即顧命所謂篾席也篾謂竹青據竹而言次謂次列據文體而説是以顧命云牖間南嚮敷重篾席孔傳曰桃枝竹義與鄭同天子衮冕負斧依注衮衣者禆之上也繢之繡之為九章其龍天子有升龍有降龍衣此衣而冠冕南鄉而立以俟諸侯見音義繢户內反鄉許亮反疏釋曰云負斧依者負謂背之南面也注釋曰云衮衣者禆之上也者但裨衣者自衮冕至玄冕五者皆禆衣故云禆之上也上文云禆衣者總五等諸侯指其衣有三等不得定其衣號故總言禆衣此據天子一身故指其衣體言衮冕云繢之繡之為九章者衣繢而裳繡衣在上為陽陽主輕浮故對方為繢次裳在下為隂隂主沈深故比方刺之為繡次是以尚書衣言作繢裳言紩繡為九章者鄭注司服云冕服九章登龍於山登火於宗彜尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彛皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也云南鄉而立者此文及司几筵雖不云立案下曲禮云天子當寧而立又云當扆而立在朝在廟皆云立故知此南面而立以俟諸侯之見也嗇夫承命告于天子注嗇夫蓋司空之屬也為末擯承命於侯氏下介傳而上上擯以告天子天子見公擯者五人見侯伯擯者四人見子男擯者三人皆宗伯為上擯春秋傳曰嗇夫馳疏注釋曰云嗇夫蓋司空之屬也者無正文知司空屬者案五官之內無嗇夫之名故知是司空之屬但司空職亡故言蓋以疑之云末擯承命於侯氏下介傳而上上擯以告於天子者案周禮司儀職兩諸侯相朝皆為交擯則此諸侯見天子交擯可知此所陳擯介當在廟之外門東陳擯從北鄉南門西陳介從南鄉北各自為上下此經先云嗇夫承命告于天子則命先從侯氏出下文天子得命呼之而入命又從天子下至侯氏即令入故下注云君乃許入若然此覲遇之禮略唯有此一辭而已無三辭之事司儀云交擯三辭者據諸侯自相見於大門外法其天子春夏受享於廟見於大門外亦可交擯三辭矣云天子見公擯者五人以下並大行人文云皆宗伯為上擯者案大宗伯職云朝覲會同則為上相鄭注云相詔王禮也出接賓曰擯入詔禮曰相若四時常朝則小行人為承擯故小行人職云將幣為承而擯此文嗇夫為末擯若子男三擯此則足矣若侯伯四擯别增一士若上公五擯更别增二士若時會殷同則肆師為承擯故肆師職云大朝覲佐擯鄭注云為承擯是其義也引春秋傳者案左氏傳昭十七年夏六月朔日有食之叔孫昭子救日食引夏書云辰不集于房瞽奏鼓嗇夫馳庶人走鄭引者欲見嗇夫是卑官得為末擯之意也天子曰非他伯父實來豫一人嘉之伯父其入豫一人將受之注言非他者親之辭嘉之者美之辭也上擯又傳此而下至嗇夫侯氏之下介受之傳而上上介以告其君君乃許入今文實作實嘉作賀疏釋曰此經直云伯父其入不云迎之禮記郊特牲云覲禮天子不下堂而見諸侯故無迎法若然案夏官齊僕云掌馭金路以賓朝覲宗遇饗食皆乘金路其法儀各以其等為車送逆之節者覲遇雖無迎法至於饗即與春夏同故連言之矦氏入門右坐奠圭再拜稽首注入門右執臣道不敢由賓客位也卑者見尊奠摯而不授疏注釋曰云卑者見尊奠摯而不授者案士昏禮云壻執鴈升奠鴈又云若不親迎則婦入三月然後壻見主人出門壻入門奠摯再拜出鄭注云奠摯者壻有子道不敢授也又士相見凡臣見於君奠摯再拜與此奠圭皆是卑者不敢授而奠之擯者謁注謁猶告也上擯告以天子前辭欲親受之如賓客也其辭所易者曰伯父其升疏注釋曰云其辭所易者曰伯父其升者此又不見謁告之辭鄭注云上擯告以天子前辭者謂擯者謁以上辭云天子曰非他伯父實來子一人嘉之伯父其入豫一人將受之是擯者於門外傳王辭告之使入此擯者謁告還用彼辭所改易者唯改入字為升故云伯父其升也以其喚使升堂親受之也矦氏坐取圭升致命王受之玉矦氏降階東北面再拜稽首擯者延之曰升升成拜乃出疏擯者請之侯氏坐取圭則遂左降拜稽首送玉也從後詔禮曰延延進也疏注釋曰云侯氏坐取圭則遂左者以經侯氏得擯者之告坐取圭即言升致命無出門之文明知遂向門左從左堂塗升自西階致命也云從後詔禮曰延延進也者以其賓升堂擯者不升若特牲少牢祝延尸使升尸升祝從升與此文同皆是從後詔禮之事四享皆束帛加璧庭實唯國所有注四當為三古書作三四或皆積畫此篇又多四字字相似由此誤也大行人職曰諸侯廟中將幣皆三享其禮差又無取於四也初享或用馬或用虎豹之皮其次享三牲魚臘籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨此地物非一國所能有唯所有分為三享皆以璧帛致之疏釋曰自此盡事畢論侯氏行覲禮訖相隨即行三享之事注釋曰云四當為三古書作三四或皆積畫此篇又多四字字相似由此誤也者知四當為三者諸文唯謂三享無四享之事所以誤作四者由古書作三四之字或皆積畫者堯典云帝曰咨亖嶽皋陶云外薄亖海泰誓序云作泰誓三篇是古書三四皆積畫也云此篇又多四字者下有四傳擯又云路下四亞之又云束帛四馬四門四尺四字既多積畫四又似三由此故誤為四字也引大行人者欲證三享為正文云其禮差又無取於四也者案聘禮小聘曰問不享大聘雖有享不言數明一享而已案大行人五等諸侯皆同三享若然三與一及不享是其禮之差是無取於四之義故從三為正云初享或用馬或虎豹之皮者案下經先陳馬聘禮特言皮故知初享以此二者為先言或者聘禮記云皮馬相間可也又聘禮經夕幣時皮則北首展幣時更云馬則幕南北面此下經亦用馬案郊特牲云虎豹之皮示服猛也是其或用馬或用虎豹之皮為初享也云其次享三牲魚臘籩豆之實以下皆禮器文是以禮器云大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也彼諸侯國為王祫祭而致之與此因覲致之同以其因覲即助祭因祭即致享物若不當三年祫祭即特致三享也云皆以璧帛致之者案聘禮束帛加璧享君束錦加琮享夫人小行人亦云璧以帛琮以錦是五等諸侯享天子與后此云璧帛致之者據享天子而言若享后即用琮錦但三享在庭分為三假一度致之據三享而言非謂三度致之為皆也凡享者貢國所有或因朝而貢或嵗之常貢嵗之常貢則小行人云春入貢及大宰九貢是也因朝而貢者則大行人云侯服嵗一見其貢祀物之等是也皆有璧帛以致之案小行人云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故注云合同也六幣所以享也五等諸侯享天子用璧享后用琮其大各如其瑞皆有庭實以馬若皮皮虎豹之皮用圭璋者二王之後也二王後尊故享用圭璋而特之禮器曰圭璋特義亦通於此其於諸侯亦用璧琮耳子男於諸侯則享用琥璜下其瑞也凡二王後諸侯相享之玉大小各降其瑞一等若如此言鄭知五等享玉各如其瑞者見玉人職云璧琮九寸諸侯以享天子言九寸據上公琮以享后不言者文不具公依命數與瑞等則侯伯子男之享玉亦如其瑞可知又知五等自相享各降其瑞一等者又見玉人職云瑑琮八寸諸侯以享夫人鄭云獻於所朝聘君之夫人兼言聘者欲見聘使亦下君之瑞一寸與君同直言瑑琮享夫人不言瑑璧以享君亦文不具若然侯伯子男自相享各降其瑞一寸可知圭璋據二王後享天子與后者五等諸侯既用璧琮二王後尊明用圭以享天子用璋以享后可知又知二王後自相享亦用璧琮者以五等諸侯降於享天子明二王後退用璧琮可知子男自相享用琥璜者以其子男瑞用璧享天子可與瑞同自相享不得與瑞等降用琥璜可知若然子男之臣自相聘亦享用琥璜不得踰君故也又知五等之臣聘享之玉皆降其君一寸者又見玉人云瑑圭璋八寸璧琮八寸以俯聘八寸據上公之臣則侯伯子男之臣各降其君一寸可知案孝經緯援神契云二王後稱公大國稱侯則二王之後為公而前則謂公者案典命云上公九命為伯其國家宫室車旗衣服禮儀皆以九為節鄭注云上公者謂王之三公有德者加命為二伯二王之後亦為上公若然典命云王之三公八命有功加一命為二伯則周公召公是也本國猶稱侯則魯侯燕伯是也奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜稽首注卓讀如卓王孫之卓卓猶的也以素的一馬以為上書其國名後當識其何産也馬必十匹者不敢斥王之乘用成數敬也疏釋曰云中庭西上者案昏禮云參分庭一在南又聘禮云庭實皮則攝之注云參分庭一在南又米筥設于中庭鄭注云言當中庭者南北之中也則此云中庭亦是南北之中不參分庭一在南者以其三享同陳須入庭深設之故也注釋曰云卓讀如卓王孫之卓卓猶的也者以音字既同而讀從之卓王孫是司馬相如之妻文君之父也於十馬之內以素的一馬以為上故訓卓為的也云書其國名後當識其何産也者謂若晉有鄭之小駟復有屈産之類是也云馬必十匹者不敢斥王之乘用成數敬也者此為庭實故用十匹案康王之誥二伯率諸侯而入皆布乘黃朱而陳四匹者彼據二王之後以國所有享新王享物陳於庭用圭以馬致享馬不得上堂亦陳於庭直以圭升堂致命乘馬若乘皮故以四為禮非所享之物故用四馬與此異也擯者曰豫一人將受之注亦言王欲親受之疏注釋曰云亦言王欲親受之者亦上親受之也矦氏升致命王撫玉矦氏降自西階東面授宰幣西階前再拜稽首以馬出授人九馬隨之注王不受玉撫之而已輕財也以馬出隨矦氏出授王人於外也王不使人受馬者至于享王之尊益君矦氏之卑益臣疏釋曰云授宰幣王既撫玉不受幣幣即束帛加璧并玉言幣故小行人合六幣皮馬與玉皆為幣此單言宰即大宰大宰主幣故周禮大宰職云大朝覲會同贊玉幣玉獻玉几玉爵注云助王受此四者是也注釋曰云王不受玉撫之而已輕財也者案聘義圭璋還之為重禮璧琮受不還為輕財是以圭璋親受璧琮初即不親為輕財故也云以馬出隨侯氏出授王人於外也者謂侯氏牽馬而出馬隨侯氏之後出授王人於外也云王之尊益君侯氏之卑益臣者春夏受贄於朝雖無迎法王猶在朝至受享又迎之而稱賓主至覲禮受享皆無迎法不下堂而見諸侯已是王尊為君禮臣卑為臣禮王猶親受其玉今至于三享貢國所有行供奉之節故使自執其馬王不使人受之於庭者是王之尊益君侯氏之卑益臣故也聘禮享用皮及賓私覿馬皆使人受之者見他國之君不臣人之臣故與此異也若然聘禮享君尚有幣問卿大夫此諸侯覲天子享天子訖亦當有幣問公卿大夫是以隱七年左氏傳云初戎朝于周發幣于公卿而凡伯不賓服注云戎以朝禮及公卿大夫發陳其幣凡伯以諸侯為王卿士不修賓主之禮敬報於戎是以冬天王使凡伯來聘還戎伐之於楚丘以歸是諸侯朝天子亦有幣及公卿大夫之事也事畢注三享訖乃右肉袒于廟門之東乃入門右北面立告聽事注右肉袒者刑宜施於右也凡以禮事者左袒入更從右者臣益純也告聽事者告王以國所用為罪之事也易曰折其右肱無咎疏釋曰自此盡降出論侯氏受刑王免之降出之事注釋曰刑袒於右者右是用事之便又是隂隂主刑以不能用事故刑袒於右也云凡以禮事者左袒左袒者無問吉凶禮皆袒左知者士喪禮云主人出南面左袒扱諸面之右檀弓云延陵季子葬其子於嬴博之間葬訖左袒故云凡以該之引易曰折其右肱無咎者案易豐卦九三云折其右肱無咎凡卦爻二至四三至五兩體交互各成一卦先儒謂之互體故鄭隨其義而注云三艮爻艮為手互體為巽巽又為進退手而便於進退右肱也猶大臣用事於君君能誅之故無咎引之者證刑理宜於右之義云告聽事者告王以國所用為罪之事也者加得字解之當云告王以國所用為者有得罪之事也正是罪之一辭解擬受刑之意又解云告王以已無罪引下文伯父無事解之不辭之甚也擯者謁諸天子天子辭於矦氏曰伯父無事歸寧乃邦注謁告寧安也乃猶女也矦氏再拜稽首出自屏南適門西遂入門左北面立王勞之再拜稽首擯者延之曰升升成拜降出注王辭之不即左者當出隱於屏而襲之也天子外屏勞之勞其道勞也音義勞力報反疏注釋曰云當出隱於屏而襲之也者以屏外不見天子為隱向者右袒今王辭以無事故宜襲也云天子外屏者據此文出門乃云屏南即是外屏云天子外屏取禮緯之文故禮緯云天子外屏諸侯內屏大夫以簾士以帷是也天子賜矦氏以車服迎于外門外再拜注賜車者同姓以金路異姓以象路服則衮也鷩也毳也古文曰迎于門外也疏釋曰自此盡亦如之論王使人賜侯氏車服之事注釋曰云同姓金路異姓象路者案周禮巾車掌五路自玉路至木路玉路以祀尊之不賜諸侯金路云同姓以封象路云異姓以封革路云以封四衛木路云以封蕃國鄭云同姓謂王子母弟率以功德出封雖為侯伯其畫服猶如上公賜魯侯鄭伯服則衮冕得乘金路以下與上公同則太公與杞宋雖異姓服衮冕乘金路矣異姓謂舅甥之國與王有親者得乘象路異姓侯伯同姓子男皆乘象路以下四衛謂要服以內庶姓與王無親者自侯伯子男皆乘革路以下蕃國據九州外為總名皆乘木路而已鄭直言金路象路者略之也云服則衮也鷩也毳也據司服而言案司服上陳王之吉服有九下云公之服自衮冕而下如王之服侯伯自鷩冕而下如公之服子男自毳冕而下如侯伯之服也路先設西上路下四亞之重賜無數在車南注路謂車也凡君所乘車曰路路下四謂乘馬也亞之次車而東也詩云君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄衮及黼重猶善也所加賜善物多少由恩也春秋傳曰重錦三十兩疏注釋曰云凡君所乘車曰路者鄭注周禮云路大也君之居以大為名是以云路寢路門之等引春秋者閔二年左氏傳云狄人伐衛又云及狄人戰于熒澤衛師敗績遂滅衛夜與國人出狄入衛遂從之又敗諸河宋桓公逆諸河宵濟立戴公以廬於曹齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩鄭引之證重賜無數在車南也諸公奉篋服加命書于其上升自西階東面大史是右注言諸公者王同時分命之而使賜侯氏也右讀如周公右王之右是右者始隨入於升東面乃居其右古文是為氏也音義篋苦協反大音泰疏注釋曰云言諸公者王同時分命之而使賜侯氏也者以其言諸非一之義以諸侯來覲者衆各停一館故命諸公分往賜之云右讀如周公右王之右者案襄公二十一年左氏傳晉欒盈出奔楚范宣子殺羊舌虎囚伯華於是祁奚老矣聞之乘驛而見宣子祁奚曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放太甲而相之而卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷鄭引此者證大史是右是左公而在公右之義也云是右者始隨入於升東面乃居其右者大史卑明始時隨公後升訖公東面大史乃居其右故云是右謂於是乃居公右而並東面知並立者以其在公右宣王命故也矦氏升西面立大史述命注讀王命書也矦氏降兩階之間北面再拜稽首注受命升成拜注大史辭之降也春秋傳曰且有後命以伯舅耊老母下拜此辭之類音義耊大結反又音鐵疏注釋曰引春秋者僖九年經夏公會宰周公齊侯宋子衛侯之等于葵丘傳云王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受鄭引之者證此大史述王辭侯氏下拜亦如此故鄭云此辭之類也但彼以齊侯年老故未降已辭此下拜禮也故降拜乃辭之彼齊侯不升成拜者亦以年老故也大史加書于服上矦氏受注受篋服使者出矦氏送再拜儐使者諸公賜服者束帛四馬儐大史亦如之注既云拜送乃言儐使者以勞有成禮略而遂言疏注釋曰云既云拜送乃言儐使者以勞有成禮略而遂言者經云侯氏送再拜者事勢宜終故連言之其實儐使者在拜送前必知此儐後略言者以儐有成禮可依故後略言案上篇以來每有儐禮皆是成禮也同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓小邦則曰叔舅注據此禮云伯父同姓大邦而言疏釋曰案周禮冢宰職云掌建邦之六典以佐王治邦國注云大曰邦小曰國邦之所居亦曰國者彼經或邦國連言或單言國則邦國連言據諸侯單言國據王以邦在國上故云大曰邦小曰國惟王建國是王之所居亦曰國彼對文則别散文則通故此大國言國小國言邦也注釋曰鄭云據此禮云伯父同姓大邦而言者鄭欲解稱伯父叔父不要同姓為定之意也據此云伯父者即上文云伯父此文即云同姓大國則曰伯父是以云據此禮云伯父同姓大邦而言也若據文則不要同姓與大國案下曲禮東西二伯不問同姓異姓皆稱伯父州牧而稱叔父鄭云牧尊于大國之君而謂之叔父辟二伯亦以此為尊是也又云同姓大國則曰伯父者惟據此禮所云伯父而言不據他文故鄭此注決為不定之意饗禮乃歸注禮謂食燕也王或不親以其禮幣致之略言饗禮互文也掌客職曰上公三饗三食三燕矦伯再饗再食再燕子男一饗一食一燕疏注釋曰云禮謂食燕也者案聘禮及諸文言饗皆單云饗無云禮鄭所引掌客五等饗食燕三者具有今饗下有禮故以禮為食燕也云王或不親以其禮幣致之鄭言此者欲解經變食燕而言饗禮見王有故不親食燕則以禮幣致之故言饗禮云略言饗禮互文者直言饗見王無故親饗之若王有故亦以酬幣之禮致之食燕之禮見王有故以侑幣之禮致之亦宜有王無故親食燕故云互文也引掌客者見五等諸侯饗食燕皆具有證經之禮是食燕之義也以此文為互則饗食燕皆有酬幣侑幣是以掌客職三饗三食三燕云云即云若弗酌則以幣致之鄭注云若弗酌謂君有故不親饗食燕彼是諸侯自相待法此鄭引之證經天子待諸侯法則天子待諸侯三者皆有幣可知案掌客云王巡守從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮則天子使公卿大夫存俯省至諸侯之國諸侯與之饗食禮皆有幣與諸侯同可知也若大國之孤聘於天子及鄰國其饗食燕有侑幣酬幣亦與子男同故大行人云凡大國之孤執皮帛以繼小國之君出入三積不問一勞又云其他皆眂小國之君鄭注云他謂二車及介牢禮賓主之間擯者將幣裸酢饗食之數故知饗食燕亦有幣也案聘禮云若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐致饗以酬幣亦如之是親饗食之有幣可知又云燕與俶獻無常數又不言致燕以幣則無致燕之禮親燕亦無酬幣鹿鳴序云燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意則飲食據饗食有幣若然發首云燕羣臣嘉賓者文王於羣臣嘉賔恩厚燕之無數故先言其實無幣也若然天子燕已臣及四方卿大夫諸侯燕已臣及四方卿大夫皆無酬幣也諸矦覲於天子為宫方三百步四門壇十有二尋深四尺加方明于其上注四時朝覲受之於廟此謂時會殷同也宫謂壝土為埒以象墻壁也為宫者於國外春會同則於東方夏會同則於南方秋會同則於西方冬會同則於北方八尺曰尋十有二尋則方九十六尺也深謂髙也從上曰深司儀職曰為壇三成成猶重也三重者自下差之為三等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也上下四方之神者所謂明神也會同而盟明神監之則謂之天之司盟有象者猶宗廟之有主乎王巡守至于方嶽之下諸矦會之亦為此宫以見之司儀職曰將會諸矦則命為壇三成宫旁一門詔王儀南鄉見諸矦也音義壝以垂反埒音劣重直龍反監工銜反守音狩疏釋曰自此盡四傳擯論會同王為壇見諸侯之事注釋曰云四時朝覲受之於廟者案曲禮下經言之春夏朝宗在朝不在廟而言四時朝覲皆在廟者朝宗雖在朝受享則在廟故并言之云此謂時會殷同也者以司儀職云將合諸侯則令為壇三成與此為一事則合者合諸侯也故知此為壇見諸侯謂時會殷同時也案大宗伯云時見曰會殷見曰同鄭注云時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而會不協而盟是也殷猶衆也十二嵗王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四時分來終嵗則遍若如注則時會殷同亦有朝覲在廟而獨云四時朝覲在廟者以其周禮大行人諸侯依服數來朝時會無常期假令當方諸侯有不順服則順服者皆來朝王其中則有當朝之嵗者復有不當朝之嵗者若當朝之嵗者自於廟朝覲若不當朝之嵗者當在壇朝若十二年王不巡守則殷朝亦云既朝乃於壇者六服之內若以當嵗者即在廟則依服數十二嵗合有侯服年年朝者在廟朝覲其五服自甸男采衛要五服若以十二嵗王巡守總合朝服不得獨在廟在壇朝故鄭會同皆言既朝覲乃為壇於國外也朝事儀未在壇朝而先言帥諸侯拜曰亦謂帥已朝者諸侯而言也云為宫者於國外春會同則於東方云云者經直言為壇鄭知逐四方為之者案司儀云將合諸侯則令為壇三成鄭注云合諸侯謂有事而會也為壇於國外以命事天子春帥諸侯拜日於東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川丘陵於西郊則為壇於國西冬禮月與四瀆於北郊則為壇於國北既拜禮而還加方明於壇上而祀焉鄭引此文下及朝事儀而言故知為壇皆依方為之但四方之壇並宜在四郊之內以其拜日之等於近郊退來就壇明壇在近郊之內但去城不知逺近或四方皆依成數東方八里南方七里西方九里北方六里四方此其定分案職方王會同或出畿在諸侯之國故職方氏令諸侯供待之事則無常數云八尺曰尋者依考工記云殳長尋有四尺從軫差之知尋長八尺云三重者自下差之為三等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺者此以下基九十六尺上下三等每等兩相各丈二尺共二丈四尺三等總七丈二尺通堂上二丈四尺合九丈六尺也云方明者上下四方神明之象也者謂合木為上下四方故名方此則神明之象故名明此約解得名方明神之義也云所謂明神也者所謂秋官司盟之職云北面詔明神既盟則二之是也云則謂之天之司盟有象者案春秋襄十一年經書公會晉侯宋公之等伐鄭鄭人懼行成秋七月同盟于亳范宣子曰不慎必失諸侯乃盟載書曰凡我同盟母薀年母壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間茲命司慎司盟名山名川明神殛之注云二司天神司慎察不敬者司盟察盟者是為天之司盟也云有象者猶宗廟之有主乎者以其宗廟木主亦上下四方為之故云猶宗廟之有主無正丈約同之故云乎以疑之雖同四方為之但宗廟主止一神而已此下文以六色為六神用六玉禮之有此别但取四方同而已云王巡守至於方嶽之下諸侯會之亦為此宫以見之者案下文祭天燔柴祭山丘陵升祭川沈祭地瘞鄭注云升沈必就祭者也則是謂王巡守及諸侯之盟祭也是王巡守在方嶽亦為此宫可知是以司儀注云王巡守殷國而同則其為宫亦如此與以其與宫同也案司儀云王合諸侯令為宫據時會而言其巡守據王就方嶽殷國此王有故不行諸侯同來此二者其壇文約與時會同故云與以疑之是以鄭注大宗伯云殷同王亦為壇於國外亦時會有文者也引司儀者彼此同是一事但文有詳略此不言者取司儀以足之云南鄉見諸侯也者王在堂上公於上等侯伯於中等子男於下等奠玉拜皆升堂授玉乃降也方明者木也方四尺設六色東方青南方赤西方白北方黑上玄下黃設六玉上圭下璧南方璋西方琥北方璜東方圭注六色象其神六玉以禮之上宜以蒼璧下宜以黃琮而不以者則上下之神非天地之至貴者也設玉者刻其木而著之音義琥音虎琮才宗反疏注釋曰云上宜以蒼璧下宜以黃琮者案大宗伯云蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方玄璜禮北方據彼文上宜用蒼璧下宜用黃琮今於四方還依宗伯唯上不用璧下不用琮故鄭云而不以者則上下之神非天地之至貴者也案宗伯注此禮天以冬至謂天皇大帝在北極者也禮地以夏至謂神在崑崙者也鄭云非天地之貴其天地之貴即昊天崑崙是也既非天地之貴即日月之神故下云祭天燔柴祭地瘞鄭注天地謂日月也若然日月用圭璧者典瑞云圭璧以祀日月故用圭璧也四方用圭璋之等案大宗伯注云禮東方以立春謂蒼精之帝而大昊勾芒食焉餘三方皆據天帝人帝人神則此亦非彼神也以其下文有日月四瀆山川丘陵之神迎拜以為明神故知非天帝人帝之等是以司盟云凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神鄭注云有疑不協也明神神之明察者謂日月山川也覲禮加方明於壇上所以依之也是鄭解方明之神明日月山川之等非天帝也若然四方禮神還用圭璋琥璜非天神還用禮玉者尊此明神而與天神同故用之也云刻其木而著之者雖無正文以意言之以其非置於坐以禮神於上下猶南北為順刻木於四方亦順不刻木安於中則不可故知義然也上介皆奉其君之旗置于宫尚左公矦伯子男皆就其旗而立注置於宫者建之豫為其君見王之位也諸公中階之前北面東上諸矦東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左皆建旗公東上侯先伯伯先子子先男而位皆上東方也諸矦入壝門或左或右各就其旗而立王降階南鄉見之三揖土揖庶姓時揖異姓天揖同姓見揖位乃定古文尚作上疏注釋曰云上介皆奉其君之旗置于宫尚左者此雖不言前期鄭云豫為其君見王之位也則亦前期一日可也公侯就旗據臨朝之時也此旗鄭雖不解鄭注夏官中夏辨號名此表朝位之旗與銘旌及在軍徽幟同皆以尺易仞小而為之也云中階之前已下皆朝事儀明堂位文以朝事儀論會同之事明堂位周公朝諸侯于明堂不在宗廟皆與此同故鄭依之也言上者皆以近王為上云尚左者建旗公東上侯先伯伯先子子先男而位皆上東方者以其侯伯别階相對子男雖隔門亦相對皆以東為上故云侯先伯子先男也云諸侯入壝門或左或右各就其旗而立者案下注云諸侯初入門王官之伯帥之則此云諸侯入壝門或左或右者是二伯初帥之各依左右若康王之誥云大保帥西方諸侯入應門左畢公帥東方諸侯入應門右皆北面此雖無應門亦二伯帥諸侯初入宫門或左或右亦皆北面立定乃始各就其旗而立王乃降南面見之而揖必知王有降揖之事者燕禮大射公降揖羣臣使定位故知王亦然又知王土揖庶姓之等者此是司儀職王在壇揖諸侯之事彼與此同鄭彼注云土揖推手小下之也時揖平推手也天揖推手小舉之以推手曰揖引手曰撎故為此解也若然覲禮天子不下堂而見諸侯今王降者以在壇會同相見與覲異故也以其覲禮廟門設擯此則當壝門設擯是以雖繼覲禮之下覲禮無降揖法此與諸侯對面相見故有降揖之事四傳擯注王既揖五者升壇設擯升諸矦以會同之禮其奠瑞玉及享幣公拜於上等矦伯於中等子男於下等擯者每延之升堂致命王受玉撫玉降拜於下等及請事勞皆如覲禮是以記之云四傳擯者每一位畢擯者以告乃更陳列而升其次公也矦也伯也各一位子男俠門而俱東上亦一位也至庭乃設擯則諸矦初入門王官之伯帥之耳古文傳作傅音義俠古洽反作傅音付疏注釋曰知奠瑞玉及享幣公拜於上等侯伯於中等子男於下等擯者每延之升堂致命王受玉撫玉降拜於下等者三等拜禮皆司儀職文擯者延之升堂以下約上覲禮之法云王受玉謂朝時撫玉謂享時是以司儀三等之下云其將幣亦如之鄭云將幣享也又云及請事勞皆如覲禮者請事謂上文侯氏奠圭擯者請侯氏王欲親受之勞謂侯氏受刑後王勞之故云皆如覲禮云公也侯也伯也各一位者以其面位同故各自設擯云子男俠門而俱東上亦一位也者以其雖隔門相去近又同北面東上故共一位設擯故有四傳擯云至庭乃設擯者對上覲禮門外設擯案此上經諸侯各就其旗而立乃云四傳擯則在諸侯之北故知至庭乃設擯云則諸侯初入門王官之伯帥之耳者約顧命而知之天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明注此謂會同以春者也馬八尺以上為龍大旗大常也王建大常縿首畫日月其下及旒交畫升龍降龍朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乘大路建大常十有二旒樊纓十有二就二車十有二乘帥諸侯而朝日於東郊所以教尊尊也退而朝諸矦由此二者言之已祀方明乃以會同之禮見諸矦也凡會同者不協而盟司盟職曰凡邦國有疑會同則掌其盟約之載書及其禮儀北面詔明神既盟則藏之言北面詔明神則明神有象也象者其方明乎及盟時又加於壇上乃以載辭告焉詛祝掌其祝號音義樊步干反約如字又於妙反詛莊慮反疏釋曰自此盡西門外論將見諸侯先禮日月山川之事注釋曰云此謂會同以春者也者案下文於南門西門北門之外禮日月四瀆會同以夏秋冬此云拜日於東門之外故知會同以春者也云馬八尺以上為龍者是周禮廋人職文案彼云馬八尺以上為龍七尺以上為騋六尺以上為馬五尺以上為駒云大旗大常也者案周禮司常云日月為常交龍為旗則旗與常别此既象日月則是大常而云大旗者九旗各有定稱亦有通名故桓二年臧哀伯云三辰旗旗服氏注云凡旗之總名故大常亦謂之大旗是以諸侯建交龍為旗亦謂之常大行人云五等諸侯亦曰建常九斿亦是通稱也云王建大常縿首畫日月其下及旒交畫升龍降龍知義然者以其先言日月後言龍故知縿首畫日月依爾雅説旌旗云正幅為縿長尋曰旐謂旌旗身也其下屬旒乃畫日月交龍案左傳云三辰旗旗服注云三辰謂日月星孔君尚書傳亦云畫日月星於衣服旌旗鄭注司服亦云王者相變至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也若然大常當有星所以司常及此直云日月不云星者既言三辰則日月星俱有周禮司常不言星者司常九旗皆以二字為名故略不言星是以此文亦略不言星案文大常之上又有交龍則諸侯交龍為旗無日月王之大常非直有日月兼有交龍司常不言交龍亦是於文略引朝事儀以下至朝諸侯此亦同法故引之證此拜日於東門之事云天子冕而執鎮圭者案玉藻天子玄冕拜日於東門之外則知此亦玄冕也搢大圭者則周禮玉人職大圭長三尺杼上終葵首是也云乘大路者則周禮玉路也以周之玉路因殷之大路飾之以玉故猶以大路為名云樊纓十有二就者案巾車鄭注云樊馬大帶纓馬鞅就成也以五采罽飾之一匝為一成樊與纓各飾為十二匝十二就也云二車十有二乘者案周禮大行人云上公二車九乘侯伯七乘子男五乘而天子十二以為節故十二乘二車者飾皆與正路同當亦飾之以玉使人乘之少儀云乘二車則式佐車則否是也云帥諸侯朝日於東郊者朝日即拜日一也以其朝必有拜云所以教尊尊也者天子至尊猶往朝日是教天下尊敬其所尊者故云教尊尊也云退而朝諸侯者朝日於東郊退就壇使諸侯朝已云由此二者言之已祀方明乃以會同之禮見諸侯也者言二者諸侯朝事儀與此覲禮其朝事儀朝日退乃始朝諸侯此覲禮加方明於壇上公侯伯子男就其旗而立王乃四傳擯見之是已祀方明乃始見諸侯二者同故云由此二者言之若然朝事儀直有朝日禮畢退見諸侯此覲禮祀方明禮畢乃朝諸侯不同者以其邦國有疑則有盟事朝日既畢乃祀方明於壇祀方明禮畢退去方明於下天子乃升壇與諸侯相見朝禮既畢乃更加方明於壇與諸侯行盟誓之禮若邦國無疑王帥諸侯朝日而已無祀方明之事是以朝事儀直云朝日教尊尊而朝諸侯不言祀方明之事鄭云已祀方明者據此覲禮上下有盟誓而言此天子乘龍及下文禮日之等若有盟誓文當在宫方三百步之上今退文在下者欲見盟誓非常尋常無盟誓之事直朝日而已故也云凡會同者不協而盟者左氏傳云有事而會不協而盟引此者解此經反祀方明之意反祀方明者為不協而盟故也故引司盟證之云既盟則藏之者盟誓既訖寫此盟辭頒之於六官司盟之官覆寫一通自藏擬後覆驗云言北面詔明神則明神有象也象者其方明乎鄭言此者司盟云詔明神不言方明此文直言方明不言明神鄭欲合為一事故云言北面詔明神則明神有形象可告以其方明有四方四色是其象無正文以義約為一事故言乎以疑之云及盟時又加於壇上乃以載辭告焉者對前祀方明加於壇上祀訖退而乃朝諸侯訖又加於壇上以載辭告之云詛祝掌其祝號者案春官詛祝職云掌盟詛類造攻説禬禜之祝號注云八者之辭皆所以告神明也盟詛主要誓大事曰盟小事曰詛又云作盟詛之載辭以敘邦國之信是也禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外注此謂會同以夏冬秋者也變拜言禮者容祀也禮月於北郊者月太隂之精以為地神也盟神必云日月山川焉者尚著明也詩曰謂豫不信有如皎曰春秋傳曰縱子忘之山川神祇其忘諸乎此皆用明神為信也疏注釋曰知此謂會同夏秋冬者以經禮日之等各於其門外上經禮日於東門之外已是春會同明知此是夏秋冬也既所禮各於門外為壇亦各合於其方是以司儀云將合諸侯則令為壇三成宫旁一門鄭注云天子春率諸侯拜日於東方則為壇於國東夏禮日於南郊則為壇於國南秋禮山川丘陵於西郊則為壇於國西冬禮月四瀆於北郊則為壇於國北云變拜言禮者容祀也者言拜無祀祀則兼拜上經云拜日無盟誓不加方明於壇直拜日教尊尊而已此經三時皆言禮見有盟誓之事加方明於壇則有祀日與四瀆及山川之事故言禮是以或言拜或言禮云禮月於北郊者月太隂之精以為地神也者鄭據經三時先北後西不以次第以其祭地於北郊祭月四瀆亦於北郊與地同但日者太陽之精故於東郊南郊於陽方而禮之以月是地神四瀆與山陵俱是地神以山陵出見為微隂故配西方四瀆為極隂故月同配北方又以月尊故先言之而又祭於北郊也云盟神必云日月山川焉者為其著明也者以山川是著見日月是其明故同為明神也引詩者日明詩人以為明證引春秋者定元年二月孟懿子會城成周宋仲幾不受功即云云士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎引之者山川神為盟神義也不言月者諸文無以月為盟神之事故不引據此覲禮言月以月明為盟神可知祭天燔柴祭山丘陵升祭川沈祭地瘞注升沈必就祭者也就祭則是謂王巡守及諸矦之盟祭也其盟揭其著明者燔柴升沈瘞祭禮終矣備矣郊特牲曰郊之祭也迎長日之至也大報天而主日也宗伯職曰以實柴祀日月星辰則燔柴祭天謂祭日也柴為祭日則祭地瘞者祭月也日月而云天地靈之也王制曰王巡守至于岱宗柴是王巡守之盟其神主日也春秋傳曰晉文公為踐土之盟而傳云山川之神是諸矦之盟其神主山川也月者太隂之精上為天使臣道莫貴焉是王官之伯會諸矦而盟其神主月與古文瘞作殪音義揭苦蓋反疏釋曰上論天子在國行會同之禮於國之四郊拜禮於日月山川之神以為盟主已備於上今更言祭日月山川者據天子巡守於四嶽各隨方向祭之以為盟主故重見此文注釋曰云升沈必就祭者也者對上經山川丘陵但於四郊望祭之故不言升沈之事此經言升沈必是就山川丘陵故言升沈案爾雅云祭山曰庪懸祭川曰浮沈不言升此山丘陵云升者升即庪懸也此祭川直言沈不言浮者以牲體或沈或浮不言浮亦文略也云就祭則是謂王巡守及諸侯之盟祭也者此經主為天子春東郊夏南郊皆禮日即此經祭天燔柴也秋西郊即此經祭山丘陵升是也冬北郊即此經祭川沈祭地瘞也以其川即四瀆也鄭兼言諸侯之盟者以其諸侯自盟亦祭山川為神主故兼言之此經兼有王官之伯以月為神主不言者無正文故不言也云其盟揭其著明者亦如上釋以日月為明山川為著也云燔柴升沈瘞祭禮終矣者案周禮禋祀實柴燎是歆神始禮未終而言禮終者以其祭禮有三始樂為下神始禋柴為歆神始牲體為薦饌始燔柴在樂為下神之後是下神之禮終故云禮終案爾雅祭天曰燔柴祭地曰瘞埋柴與瘞相對則瘞埋亦是歆神若然則升沈在柴瘞之間則升沈亦是歆神之節皆據樂為下神之後而為祭禮終矣或可周禮此三者為歆神至祭祀之後更有此柴瘞升沈之事若今時祭祀訖始有柴瘞之事者也引郊特牲者案易緯三王之郊一用夏正春分以後始日長於建寅之月郊天云迎長日之至者預迎之又云大報天而主日也者鄭注云大猶遍謂郊天之時祭尊可以及卑日月以下皆祭以日為主又云大宗伯職曰以實柴祀日月星辰者此所引不取月與星辰之義直取日而已與此經燔祭文同鄭引此諸文者欲證此經祭天燔柴是祭日非正祭天神以其日亦是天神故以祭天言之是以鄭云則燔柴祭天謂祭日也又云柴為祭日則祭地瘞者祭月也者以其前文天子在國外祀日月燔祭既是日祭地是月可知亦非正地神也云日月而云天地靈之者以其尊之欲為方明之主故變日月而云天地是神靈之也云王制曰王巡守至於岱宗柴是王巡守之盟其神主日也者案彼注以為告至案舜典嵗二月東巡守至於岱宗柴注為考績燔燎柴此又為祭日柴不同者但巡守至岱宗之下有此三種之柴告至訖别有考績皆正祭之神别有祭日以為方明之主尚書與王制并此文唯有柴之文故注不同互見為義明皆有是以此引王制之柴以為祭日引春秋者僖公二十八年晉文公敗楚於城濮為踐土之盟傳云山川之神引之證諸侯之盟用山川為主此不言宋仲幾者所引之言皆是諸侯之事云月者太隂之精主為天使臣道莫貴焉者鄭注周禮九嬪職引孔子云日者天之明月者地之理隂契制故月上屬為天使婦從夫放月紀此二處俱是緯文鄭言此者證王官之伯臣中最尊奉王使出與諸侯盟其神主月以其無正文故言與以疑之鄉來所解諸侯以山川為主王官之伯以月為主案襄十一年左傳云秋七月諸侯同盟於亳云司慎司盟名山名川彼非直有山川兼有二司則此所云日月山川者兼有此二司可知又王官之伯非直奉王使出會諸侯而盟若受弓矢之賜得專征伐亦與諸侯為盟記几俟于東箱注王即席乃設之也東箱東夾之前相翔待事之處疏注釋曰云王即席乃設之也者案公食大夫記宰夫筵出自東房則此天子禮几筵亦在東房其席先敷其几且俟于東箱待王即席乃設之謂若聘禮賓即席乃授几若然公食大夫宰夫設筵加席几同時預設者公親設湇可以略几故以几與席同時設之若為神几筵亦同時而設故聘禮几筵設擯者出請命云東箱東夾之前者案上文覲在文王廟中案鄭周禮注宗廟路寢制如明堂明堂有五室四堂無箱夾則宗廟亦無箱夾之制此有東夾者此周公制禮據東都乃有明堂此文王廟仍依諸侯之制是以有東夾室若然樂記注云文王廟為明堂制者彼本無制字直云文王廟為明堂云相翔待事之處者翔謂翺翔無事故公食賓將食辭於公親臨已食公揖退於箱以俟賓食是相翔待事之處也偏駕不入王門注在旁與已同曰偏同姓金輅異姓象輅四衛革輅蕃國木輅駕之與王同謂之偏駕不入王門乘墨車以朝是也偏駕之車舍之於館與疏注釋曰云在旁與已同曰偏者依周禮巾車掌王五輅玉輅以祀不賜諸侯金輅以賓同姓以封象輅以朝異姓以封革輅以即戎以封四衛木輅以田以封蕃國此玉輅者天子所乘為正四輅者諸侯乘之為偏是據諸侯在旁與王同為偏云不入王門乘墨車以朝是也者據上文而言云偏駕之車舍之於館與者偏駕既云不入王門又云乘墨車而至門外諸侯各停於館明舍在館無正文故言與以疑之奠圭于繅上注謂釋於地也疏釋曰此解侯氏入門右奠圭釋於地時當以繅藉承之乃釋於地此繅謂以韋衣木版朱白蒼與朱緑畫之者非謂絢組尺為繫者彼所以繫玉使固者也儀禮注疏卷十儀禮注疏卷十考證使者不答拜答字石經並作答曰伯父女順命于王所石經無曰字嗇夫承命告于天子敖繼公云或言嗇夫微者不可以與國君接而直告至尊嗇字疑大字之誤天子曰非他曰字石經作伯四享皆束帛加璧疏夕幣時皮則北首北字監本訛作左今據聘禮改正矦氏升致命疏聘義圭璋還之為重禮璧琮受不還為輕財受不還監本作不授還臣紱按聘義但言已聘而還圭璋不言及璧琮賈蓋約其文耳歸寧乃邦邦字監本訛作拜今依石經及朱子本改正使者出侯氏送再拜疏皆是成禮也監本皆字下有是成篇之法五字臣學健按此冗復無義當是衍文同姓大國則曰伯父疏東西二伯不問同姓異姓皆稱伯父州牧而稱叔父臣紱按異姓焉得有稱伯父之理顯與曲禮原文不合但此賈氏失解非寫刻之訛未便遽改也饗禮乃歸注上公三饗三食三燕三饗監本訛作三享臣紱按享者以下享上之稱饗則以上饗下及同等相饗之稱也故聘享之享與饗食燕之饗三禮未嘗混用唯左傳饗或作享今此三饗再饗一饗考掌客原文正之疏並同又按掌客職矦伯亦三饗此云再饗是鄭氏記憶之訛諸侯覲於天子疏職方王會同或出畿在諸侯之國臣紱按夏官職方氏無會同出畿之文天子乘龍載大旗旗監本訛作旆今依石經及敖本改正張淳云諸本旆作旗從諸本然則宋本固有作旆者矣記几俟于東箱几石經作矦疏明堂有五室四堂無箱夾則宗廟亦無箱夾之制臣紱按明堂無箱夾可也宗廟若無箱夾何以行禮總緣考工鄭注謂宗廟路寢制如明堂孔賈因之遂多迷繆朱子已辨之儀禮注疏卷十考證
