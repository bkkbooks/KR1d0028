body:
  text: 儀禮注疏卷二漢鄭氏注唐陸德眀音義賈公彥疏士昏禮第二昏禮下逹納采用鴈注逹通逹也將欲與彼合昏姻必先使媒氏下通其言女氏許之乃後使人納其采擇之禮納采而用鴈為摯者取其順隂陽往來詩云取妻如之何匪媒不得昏必由媒交接設紹介皆所以養亷恥音義采七在反擇也疏釋曰從此下至主人許賔入授如初禮陳納采問名之禮云下逹者謂未行納采已前男父先遣媒氏至女氏之家通辭往來女氏許之乃遣使者行納采之禮也言下逹者男為上女為下取陽唱隂和之義故云下逹謂以言辭下通於女氏也是以下記昏辭云吾子有惠貺室某也注云稱有惠明下逹謂此下逹也云納采用鴈者昏禮有六五禮用鴈納采問名納吉請期親迎是也唯納徴不用鴈以其自有幣帛可執故也且三禮不云納言納者恐女氏不受若春秋內納之義若然納采言納者以其始相采擇恐女家不許故言納問名不言納者女氏已許故不言納也納吉言納者男家卜吉往與女氏復恐女家翻悔不受故更言納也納徴言納者納幣帛則昏禮成復恐女家不受故更云納也請期親迎不言納者納幣則昏禮已成女家不得移改故皆不言納也其昏禮有六尊卑皆同故春秋莊公二十二年經書冬公如齊納幣穀梁傳曰納幣大夫之事也禮有納采有問名有納徵有告期四者備而後娶禮也公之親納幣非禮也故譏之彼無納吉者以莊公在母喪內親行納幣非禮之事故闕其納吉以非之也注釋曰鄭云必先使媒氏下通其言女氏許之乃後使人納其采擇之禮者欲見納采之前有此下逹之言也案周禮地官有媒氏職是天子之官則諸侯之國亦有媒氏傳通男女使成婚姻故云媒氏也云用鴈為摯者取其順隂陽往來者案周禮大宗伯云以禽作六摯卿執羔大夫執鴈士執雉此昏禮無問尊卑皆用鴈故鄭注其意云取順隂陽往來也順隂陽往來者鴈木落南翔冰泮北徂夫為陽婦為隂今用鴈者亦取婦人從夫之義是以昏禮用焉引詩者證須媒下逹之義也云昏必由媒交接設紹介者詩云匪媒不得是由媒也其行五禮自納采以下皆使使往是交接設紹介也云皆所以養廉恥者解所以須媒及設紹介者皆所以養成男女使有廉恥也使媒通之媵御沃盥交之等皆是行事之漸養廉恥之義也主人筵於戶西西上右几注主人女父也筵為神布席也戶西者尊處將以先祖之遺體許人故受其禮於稱廟席西上右設几神不統於人席有首尾音義為于偽反處昌慮反疏釋曰此女將受男納采之禮故先設神座乃受之注釋曰云筵為神布席也者下文禮賓云徹几改筵是為人設席故以此為神席也云戶西者以戶西是賓客之位故為尊處也必以西為客位者以地道尊右故也知受禮於禰廟者以記云凡行事受諸禰廟也云席西上右設几神不統於人者案鄉射燕禮之等設席皆東上是統於人今以神尊不統於人取地道尊右之義故席西上几在右也云席有首尾者以公食記蒲筵萑席皆卷自末是席有首尾也使者玄端至注使者夫家之屬若羣吏使往來者玄端士莫夕之服又服以事其廟有司緇裳音義使所吏反注使者同莫音暮疏注釋曰云使者夫家之屬者案士冠贊者於中士下士差次為之此云夫家之屬亦當然假令主人是上士屬是中士主人是中士屬是下士主人是下士屬亦當是下士禮窮即同也云玄端士莫夕之服又服以事其廟者此亦如士冠禮玄端士莫夕於朝之服也但士以玄端祭廟今使者服玄端至亦於主人廟中行事故云又服以事其廟也云有司緇裳者案士惟有三等之裳玄裳黃裳雜裳此云緇裳者即玄裳者矣以其緇玄大同小異也然士有三等裳今直言玄裳者據主人是上士而言案士冠云有司如主人服則三等士之有司亦如主人服也擯者出請事入告注擯者有司佐禮者請猶問也禮不必事雖知猶問之重慎也疏注釋曰云擯者有司佐禮者案士冠禮有司並是主人之屬及羣吏佐主人行禮之人故知此擯者亦是主人有司佐禮者也在主人曰擯云請猶問也禮不必事雖知猶問之重慎也者案論語云無必故云不必事也以其前已有下達之事今使者來在門外是知有昏事也而猶問之重慎也主人如賓服迎於門外再拜賓不答拜揖入注門外大門外不答拜者奉使不敢當其盛禮疏釋曰案士冠禮主人迎於大門外云主人西面賓東面此及鄉飲酒鄉射皆不言面位者文不具耳當亦如士冠也注釋曰知門外是大門外者以其大夫唯有兩門寢門大門而已廟在寢門外之東此下有至於廟門明此門外是大門外可知也云不答拜者奉使不敢當其盛禮者此士卑無君臣之禮故賓雖屬吏直言不答拜不言辟若諸侯於使臣則言辟是以聘禮擯迎入門公拜賓辟不答拜公食大夫主為賓已故賓再拜稽首亦辟乃拜之以其君尊故也至于廟門揖入三揖至于階三讓注入三揖者至內霤將曲揖既曲北靣揖當碑揖音義霤力又反疏注釋曰凡入門三揖者以其入門賓主將欲相背故須損賓主各至堂塗北面相見故亦須揖至碑碑在堂下三分庭之一在北是庭中之節故亦須揖但士冠注云入門將右曲揖將北曲揖當碑揖此注至內霤將曲揖既曲北面揖當碑揖文不同者鄭舉二文相兼乃足也三者禮之大節尊卑同故鄉飲酒鄉射聘禮公食大夫皆有此三揖之法但注有詳略耳主人以賓升西面賓升西階當阿東面致命主人阼階上北面再拜注阿棟也入堂深示親親今文阿為庪音義庪居委反疏釋曰賓則使者也禮之通例賓主敵者賓主俱升若士冠與此文是也若鄉飲酒鄉射皆主尊賓卑故初至之時主人升一等賓乃升至卒洗之後亦俱升唯聘禮公升二等賓始升者彼注云亦欲君行一臣行二也覲禮王使人勞侯氏使者不讓先升者奉王命尊故也主人阼階上北面再拜者主人不言當阿則如鄉飲酒主人當楣再拜注釋曰案鄉飲酒聘禮皆云賓當􅎝無云當阿者獨此云當阿故云示親親也凡士之廟五架為之棟北一楣下有室戶中脊為棟棟南一架為前楣楣前接簷為庪鄉射記云序則物當棟堂則物當楣故云是制五架之屋也鄉大夫射於庠庠則有室故物當前楣士射於序序則無室故物當棟此士之廟雖有室其棟在室外故賔得深入當之也授于楹間南面注授於楹間眀為合好其節同也南面並授也疏注釋曰楹間謂兩楹之間賔以鴈授主人於楹間者明和合親好令其賔主逺近節同也凡賔主敵者授於楹間不敵者不於楹間是以聘禮賔覿大夫云受幣於楹間南面鄭注云受幣楹間敵也聘禮又云公側襲受玉於中堂與東楹之間鄭注云東楹之間亦以君行一臣行二至禮賔及賔私覿皆云當東楹是尊卑不敵故不於楹間也今使者不敵而於楹間故云明為合好也云南面並授也者以經云南面不辨賔主故知俱南面並授也賔降出主人降授老鴈注老羣吏之尊者疏釋曰授鴈訖賔降自西階出門主人降自阼階授老鴈於階立待後事也注釋曰大夫家臣稱老是以喪服公食大夫以貴臣為室老春秋左氏傳云執臧氏老論語云趙魏老禮記大夫室老行事皆是老為家臣之貴者士雖無君臣之名云老亦是羣吏中尊者也擯者出請注不必賔之事有無疏注釋曰此主人不知賔有事使擯出請者亦是不必賔之事有無也賔執鴈請問名主人許賔入授如初禮注問名者將歸卜其吉凶古文禮為醴疏釋曰此一使兼行納采問名二事相因又使還須卜故因即問名乃還卜之故云一使也云主人許者擯請入告乃報賔賔得主人許乃入門升堂授鴈與納采禮同故云如初禮也注釋曰言問名者問女之姓氏不問三月之名故下記問名辭云某既受命將加諸卜敢請女為誰氏鄭云誰氏者謙也不必其主人之女是問姓氏也然以姓氏為名者名有二種一者是名字之名三月之名是也一者是名號之名故孔安國注尚書以舜為名鄭君目録以曽子為姓名亦據子為名皆是名號為名者也今以姓氏為名亦名號之類也鄭云將歸卜其吉凶者亦據下記文也擯者出請賔告事畢入告出請醴賔注此醴亦當為禮禮賔者欲厚之疏釋曰此下至送于門外再拜主人禮賔之事注釋曰云此醴亦當為禮者亦士冠禮賓為醴字彼已破為禮故云亦以此醴酒禮賓字從禮者以大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢及以酒禮之用齊酒禮之皆不依酒醴為名皆取相禮故知此醴亦為禮敬之禮不取用醴為醴之義也秋官司儀云諸公相為賔及將幣賓亦如之注云上於下曰禮敵者曰儐聘禮卿亦云無儐注云無儐辟君大夫已上尊得有禮儐兩名士以下卑惟稱禮也賓禮辭許注禮辭一辭疏注釋曰禮賓一辭許者主人禮賔之常法鄉己行納采問名賓主之情已通矣故略行一辭而已主人徹几改筵東上側尊甒醴于房中注徹几改筵者鄉為神今為人側尊亦言無玄酒側尊於房中亦有篚有籩豆如冠禮之設音義甒亡甫反鄉許亮反為于偽反疏釋曰徹几改筵者於戶西禮神坐徹去其几於後授賓改設其筵設側尊甒醴在東房之中以禮賓也注釋曰經云東上者統於主人注云鄉為神今為人者為神則西上為人則東上不同故辨之云側尊亦言無玄酒者醴禮側無玄酒配之以其醴象大古質故士冠與此昏禮之等皆無玄酒也鄭知此亦有篚有籩豆如冠禮者此下云贊者酌醴加角柶明有篚盛之又云贊者薦脯醢則有籩豆可知但冠禮尊在服北南上則此尊與篚等亦南上故云如冠禮之設也主人迎賔于廟門外揖讓如初升主人北面再拜賓西階上北面答拜主人拂几授校拜送賓以几辟北面設于坐左之西階上答拜注拂拭也拭几者尊賓新之也校几足辟逡遁古文校為枝音義拂音弗校胡鮑反辟房益反一音避注同拭音式逡七旬反遁音旬疏釋曰云主人迎賓於廟門外揖讓如初升者如納采時三揖三讓也云主人北面再拜者拜賔至此堂飲之是以公食大夫燕禮鄉飲酒鄉射大射皆云拜至並是拜賓至此堂也但燕禮大射公食大夫皆云至再拜先言至者欲見賓至乃拜之是有尊卑不敵之義餘皆言拜至至在拜下者體敵之義也若然此為禮賔有拜至者前雖有納采問名之事以昏禮有相親之義也故雖後亦拜至也聘禮享禮及禮賓不拜至者聘禮不取相親之義故不拜至是以彼鄭注云以賓不於此始至也云主人拂几者此拂几雖不言外拂內拂又不言三案有司徹主人西面左手執几縮之以右袂推拂几三二手橫執几進授尸於筵前注云衣袖謂之袂推拂去塵示新云拂者外拂之也則此亦外拂之三也凡行禮敵者拂几皆若此卑於尊者則內拂之故聘禮云宰夫內拂几三奉兩端以進鄭云內拂几不欲塵坌尊者是也若然冠禮賓無几者冠禮比昏為輕故無几鄉飲酒鄉射及燕禮賓輕故無几聘賓及公食大夫賓重故有几也云授校者凡授几之法卑者以兩手執几兩端尊者則以兩手於几間執之授設皆然是以聘禮宰夫奉兩端以進有司徹云尸進二手受於手間注云受從手間謙也雖不言兩手兩手授之可知又案聘禮云公東南鄉外拂几三卒振袂中攝之進西鄉賓進訝受几於筵前以此言之公尊中執几以一手則賓以兩手於几兩端執之也而此亦賓主不敵授校者昏禮異於餘禮云拜送者此當再拜送君於聘賓則一拜故聘禮云公一拜送鄭注云公尊也是也此几以安體非已所得故賓受訖然後答拜下經受醴之時先拜乃受者彼是入口之物已所當得故先拜乃受之云賓以几辟者以賓卑故以几辟聘禮賓卑亦云以几辟有司徹不云以几辟者尊尸故也覲禮不云以凡辟者尊王故也凡授几之法受時或受其足或受於手間皆橫受之及其設之皆旋几縱執乃設之於坐南北面陳之位為神則右之為人則左之為異不坐設之者几輕故也注釋曰鄭知校几足者既夕記云綴足用燕几校在南御者坐持之故知校是几足也贊者酌醴加角柶面葉出于房注贊佐也佐主人酌事也贊者亦洗酌加角柶覆之如冠禮矣出房南面待主人迎受古文葉作擖音義柶音四疏注釋曰云贊者亦洗酌加角柶覆之如冠禮矣者案冠禮云贊者洗於房中側酌醴加柶覆之此與冠禮同故知如冠禮矣主人受醴面枋筵前西北面賓拜受醴復位主人阼階上拜送注主人西北面疑立待賔即筵也賓復位於西階上北面明相尊敬此筵不主為飲食起音義枋彼命反疑魚乞反為于偽反下巾為益為同疏注釋曰經唯云主人西北面知疑立者鄉飲酒云主人阼階東疑立眀此亦然也凡主人將授酒醴於筵前待賓即筵前乃授之此鄭云即筵謂就筵前與下賓即筵别也是以冠禮禮子及下禮婦皆於筵西受醴然禮賓進筵前受醴是不躐席之事也云賓復位於西階上北面明相尊敬此筵不主為飲食起者但此筵為行禮故拜及啐皆於西階也贊者薦脯醢注薦進賓即筵坐左執觶祭脯醢以柶祭醴三西階上北面坐啐醴建柶興坐奠觶遂拜主人答拜注即就也左執觶則祭以右手也凡祭於脯醢之豆間必所為祭者謙敬示有所先也啐嘗也嘗之者成主人意建猶扱也興起也奠停也音義觶之豉反啐七內反扱初洽反疏釋曰此經云坐奠觶遂拜言遂者因事曰遂因建柶興坐奠觶不復興遂因坐而拜冠禮禮子並醮子及此下禮婦不言坐奠觶遂者皆文不具聘禮賓不言拜者禮中有拜可知也注釋曰鄭云祭以右手出於鄉射也云凡祭於脯醢之豆間者謂祭脯醢置之皆於豆間此及冠禮鄉飲酒鄉射燕禮大射皆有酒醢則在籩豆之間此注不言籩直言豆者省文公食大夫及有司徹豆多者則言祭於上豆之間也云必所為祭者謙敬示有所先也者案曲禮云主人延客祭注云祭祭先也君子有事不忘本也此云謙敬示有所先先即本謂先世造此食者也云啐嘗也嘗之者成主人意者主人設饌望賓為美之今客嘗之告旨是成主人意也賓即筵奠于薦左降筵北面坐取脯主人辭注薦左籩豆之東降下也自取脯者尊主人之賜將歸執以反命辭者辭其親徹疏釋曰此奠於薦左不言面位下贊禮婦奠於薦東注云奠於薦東升席奠之此亦奠於薦東升席奠之明皆升席南面奠也必南面奠者取席之正又祭酒亦皆南面並因祭酒之面奠之則冠禮禮子亦南面奠之聘禮禮賓賓北面奠者以公親執束帛待賜已不敢稽留故由便疾北面奠之也鄉飲酒鄉射酬酒不祭不舉不祭故北靣奠於薦東也燕禮大射重君物賓祭酬酒故亦南面奠注釋曰云降下也自取脯者尊主人之賜將歸執以反命者案下記云賓右取脯左奉之乃歸執以反命是也賓降授人脯出主人送于門外再拜注人謂使者從者授於階下西面然後出去音義從才用反後從者皆同疏注釋曰鄭知人謂使者從者者以其此脯使者將歸故授從者也又知授於階下西面然後出去者以其賓位在西授脯文在出上故知西階下西面授之然後出去也納吉用鴈如納采禮注歸卜於廟得吉兆復使使者往告婚姻之事於是定音義復扶又反疏釋曰案上文納采在前問名在後今此不云如問名而云如納采者問名賔不出大門故此納吉如其納采也注釋曰鄭知義然者案下記云納吉曰吾子有貺命某加諸卜占曰吉使某也敢告凡卜筮皆於禰廟故然也未卜時恐有不吉婚姻不定故納吉乃定也納徴玄纁束帛儷皮如納吉禮注徴成也使使者納幣以成昏禮用玄纁者象隂陽備也束帛十端也周禮曰凡嫁子娶妻入幣純帛無過五兩儷兩也執束帛以致命兩皮為庭實皮鹿皮今文纁皆作熏音義纁許云反儷音麗純側其反疏釋曰此納徴無鴈者以有束帛為贄故也是以孝經鈎命決云五禮用鴈是也案春秋左氏莊公二十二年冬公如齊納幣不言納徴者孔子制春秋變周之文從殷之質故指幣禮而言周文故以義言之徵成也納此則昏禮成故云徴也注釋曰云用玄纁者象隂陽備也束帛十端也者周禮凡嫁子娶妻入幣緇帛無過五兩鄭彼注云納幣用緇婦人隂也凡於娶禮必用其類五兩十端也必言兩者欲得其配合之名十者象五行十日相成也士大夫乃以玄纁束帛天子加以榖圭諸侯加以大璋雜記云納幣一束束五兩兩五尋然則每端二丈若彼據庶人直用緇色無纁故鄭云用緇婦人隂此玄纁俱有故云象隂陽備也案玉人穀圭天子以聘女大璋諸侯以聘女故鄭據而言焉玄纁束帛者合言之陽竒隂耦三玄二纁也其大夫無冠禮而有昏禮若試為大夫及幼為大夫者依士禮若五十而爵改娶者大夫昏禮玄纁及鹿皮則同於士餘有異者無文以言也請期用鴈主人辭賓許告期如納徴禮注主人辭者陽倡隂和期日宜由夫家來也夫家必先卜之得吉日乃使使者往辭即告之音義請音情又七井反和戶卧反疏釋曰請期如納徴禮納徴如納吉禮納吉如納采禮案上納采之禮下至主人拜送於門外其中揖讓升降及禮賓送迎之事此皆如之注釋曰壻之父使使納徴訖乃卜婚日得吉日又使使往女家告日是期由男家來今以男家執謙故遣使者請女家若云期由女氏故云請期女氏知陽倡隂和當由男家出故主人辭之使者既見主人辭遂告主人期日也是以下記云使者曰某使某受命吾子不許某敢不告期曰某日注云某吉日之甲乙是告期之辭故鄭云辭即告也期初昏陳三鼎于寢門外東方北面北上其實特豚合升去蹄舉肺脊二祭肺二魚十有四臘一肫髀不升皆飪設扃冪注期取妻之日鼎三者升豚魚臘也寢壻之室也北面鄉內也特猶一也合升合左右胖升於鼎也去蹄蹄甲不用也舉肺脊者食時所先舉也肺者氣之主也周人尚焉脊者體之正也食時則祭之飯必舉之貴之也每皆二者夫婦各一耳凡魚之正十五而鼎減一為十四者欲其敵偶也臘臘也肫或作純純全也凡臘用全髀不升者近竅賤也飪熟也扃所以扛鼎冪覆之古文純為鈞髀為脾今文扃作鉉冪皆作密音義去起吕反注同肫劉音純又之春反字林之閏反髀步米反字林方爾反云骹骨也又作脾飪而甚反扃古螢反冪亡狄反壻悉計反鄉許亮反胖音判飯扶晚反近附近之近竅苦弔反扛音江脾必爾反又毗支反鉉胡畎反疏釋曰此文下盡合巹一莭論夫家欲迎婦之時豫陳同牢之饌也云陳三鼎於寢門外東方北面北上者謂在乎寢門外也言東方北面是禮之正但數鼎故云北面北上則此及少牢皆是也特牲陳鼎於門外北面北上當門而不在東方者辟大夫故也今此亦東方不辟大夫者重婚禮攝盛也鼎不言北上直言北面士冠所云是也凡鼎陳於外者北面為正阼階下西面為正士喪禮小斂陳一鼎於門外西面者喪禮小斂在東方者未忍異於生時於大斂奠及朔月奠既夕陳鼎皆如小斂奠門外皆西面者是喪禮至既夕不變也士虞陳三鼎于門外之右北面北上入設於西階前東面北上不在東者既葬鬼事之反吉故也公食陳鼎七當門南面西上者以賓是外人向外統之注釋曰云期取妻之日者此陳同牢之饌下云親迎之禮其中無厥眀之文明是娶婦之日也云鼎三者升豚魚臘也者即經文自顯也云寢壻之室也者命士以上之父子異宫自然别有寢若不命之士父子同宫雖大院同居其中亦隔别各有門户故經總云寢門外也云合升合左右胖升于鼎也者以夫婦各一故左右胖俱升若祭則升右也云去蹄蹄甲不用也者以其踐地穢惡也云舉肺脊者食時所先舉者案下文贊者告具揖婦即對筵皆坐祭祭薦黍稷肺即此祭肺也下文云贊爾黍稷授肺脊皆食以湆醬皆祭舉食舉也即此舉肺脊也祭時二肺俱有生人唯有舉肺皆祭今此得有祭肺者禮記郊特牲論娶婦玄冕齋戒鬼神隂陽也故與祭祀同二肺也據下文先用祭肺後用舉肺此經先言舉肺後言祭肺者以舉肺脊長大故先言是以特牲少牢入鼎時舉肺脊在前云肺者氣之主也周人尚焉者案禮記明堂位云有虞氏祭首夏后氏祭心殷祭肝周祭肺鄭注云氣主盛也但所尚不同故云周人尚焉云脊者體之正也食時則祭之者對祭肺未食時祭也云飯必舉之貴之也者但一身之上體總有二十一節前有肩臂臑後有肫胳脊在中央有三脊正脡橫脊而取中央正脊故云體之正凡云先以對後案特牲舉肺脊後食幹骼注云肺氣之主也脊正體之貴者先食啖之所以導食通氣此不言先食啖之從彼可知也云每皆二者夫婦各一耳者釋經多之義云凡魚之正十五而鼎減一為十四者據特牲記云魚十有五注云魚水物以頭枚數隂中之物取數於月十有五日而盈少牢饋食禮亦云十有五而俎尊卑同則是尊卑同用十五而同鼎也云欲其敵偶也者夫婦各有七也此夫婦鬼神隂陽故同祭禮十五而去一若乎生人則與此異故公食大夫一命者七魚再命者九魚三命者十有一魚天子諸侯無文或諸侯十三魚天子十五魚也云臘兔臘也者少牢用麋臘士臘可知故曲禮云兔曰眀視也云肫或作純純全也凡臘用全者此或少牢文案少牢臘一純注云純猶全也凡牲體則用一胖不得云全其臘則左右體脅相配共為一體故得全名也特牲少牢亦用全士喪大斂與士虞皆用左胖不全者喪禮略云今文冪皆作密者鄭以省文故兼下綌冪總疊之故云皆也設洗於阼階東南注洗所以承盥洗之器棄水者音義盥音管饌于房中醯醬二豆菹醢四豆兼巾之黍稷四敦皆蓋注醯醬者以醯和醬生人尚褻味兼巾之者六豆共巾也巾為禦塵蓋為尚溫周禮曰食齊視春時音義饌仕戀反劉仕轉反醯呼西反巾之如字劉居近反敦音對劉又都愛反下敦南對敦同食音嗣齊才計反下同疏注釋曰鄭知以醯和醬者得醢者無醬得醬者無醯若和之則夫妻皆有是以知以醯和醬也云生人尚褻味者此文與公食皆以醯和醬少牢特牲不言之故云然也引周禮釋敦皆有蓋者飯宜溫比春時故也大羹湆在爨注大羹湇煮肉汁也大古之羹無鹽菜爨火上周禮曰羹齊視夏時今文湇皆作汁音義大如字又音太羹劉音戶庚反湇去急反爨七亂反大音泰疏注釋曰湇與汁一也知大古之羹無鹽菜者左傳桓二年臧哀伯云大羹不致禮記郊特牲云大羹不和謂不致五味故知不和鹽菜唐虞以上曰大古有此羹三王以來更有鉶羹則致有五味雖有鉶羮猶存大羹不忘古也引周禮證大羹須熱故在爨臨食乃取也尊于室中北墉下有禁玄酒在西綌冪加勺皆南枋注墉墻也禁所以庪甒者玄酒不忘古也綌粗葛今文枋作柄音義墉音容墻也綌去逆反勺上灼反庪居委反疏注釋曰云禁所以庪甒者士冠云甒此亦士禮雖不言甒然此尊亦甒也庪承於甒云禁者因為酒戒故以禁言之也云玄酒不忘古也者古謂黃帝以前以禮運云汙尊而抔飲謂神農時雖有黍稷未有酒醴則神農以上以水為玄酒也禮運又云後聖有作以為醴酪據黃帝以後雖有酒醴猶是不忘古也尊于房戶之東無玄酒篚在南實四爵合卺注無玄酒者略之也夫婦酌於內尊其餘酌於外尊合卺破匏也四爵兩卺凡六為夫婦各三酳一升曰爵音義卺音謹匏白交反酳以刃反疏注釋曰云無玄酒者略之者此對上文夫婦之尊有玄酒此尊非為夫婦故略之也云夫婦酌於內尊其餘酌於外尊者據上文玄酒知之云一升曰爵者韓詩外傳云一升曰爵二升曰觚三升曰觶四升曰角五升曰散是也主人爵辨纁裳緇袘從者畢玄端乘墨車從車二乘執燭前馬注主人壻也壻為婦主爵辨而纁裳玄冕之次大夫以上親迎冕服冕服迎者鬼神之鬼神之者所以重之親之纁裳者衣緇衣不言衣與帶而言袘者空其文眀其與袘俱用緇袘謂緣袘之言施以緇緣裳象陽氣下施從者有司也乘二車從行者也畢猶皆也墨車漆車士而乘墨車攝盛也執燭前馬使從役持炬火居前照道音義袘以跂反又音移從才用反乘繩證反迎魚正反衣緇衣上於既反下如字緣以絹反照音照疏釋曰自此至俟于門外論壻親迎之節注釋曰云主人壻也者以其親迎向女家女父稱主人男稱壻已下皆然今此未至女家仍據男家而言故云主人是壻為婦主故下親迎至男家壻還稱主人也云爵辨而纁裳者以爵辨亦冕之類故亦纁裳也云玄冕之次者鄭注周禮辨師云一命之大夫冕而無旒士變冕為爵辨故云冕之次也云大夫以上親迎冕服者士家自祭服玄端助祭用爵辨今爵辨用助祭之服親迎以為攝盛則卿大夫朝服以自祭助祭用玄冕親迎亦當玄冕攝盛也若上公有孤之國孤絺冕卿大夫同玄冕侯伯子男無孤之國卿絺冕大夫玄冕也孤卿大夫士為臣卑須攝盛取助祭之服以親迎則天子諸侯為尊則尊矣不須攝盛宜用家祭之服則五等諸侯玄冕以家祭則親迎不過玄冕天子親迎當服衮冕矣是以禮記郊特牲云玄冕齊戒鬼神隂陽也將以為社稷主以社稷言之據諸侯而説故知諸侯玄冕也其孤卿雖絺冕以助祭至於親迎亦用玄冕臣乃不得過君故也云冕服迎者鬼神之鬼神之者所以重之親之者約郊特牲文云纁裳者衣緇衣不言衣與帶而言袘者空其文眀其與袘俱用緇者鄭言纁裳者衣緇衣言緇衣即玄衣大同故也上士冠陳爵辨服云緇衣緇帶此文有緇袘無衣帶二字故云空其文以袘著緇者欲見袘與衣帶色同故云俱用緇也云袘謂緣者謂純緣於裳故字從衣云袘之言施者義取施及於物故作袘也云以緇緣裳象陽氣下施者男陽女隂男女相交接示行事有漸故云象陽氣下施故以衣帶上體同色之物下緣於裳也云從者有司也乘二車從行者也者以士雖無臣其僕隸皆曰有司使乘二車從壻大夫已下有二車士無二車此有者亦是攝盛也云墨車漆車者案巾車注云棧車不革鞔而漆之則士之棧車漆之但無革為異耳案考工記云棧車欲其弇鄭云無革鞔又云飾車欲其侈鄭云革鞔則大夫以上皆有革鞔則得飾車之名飾者革上又有漆飾士卑無飾雖有漆不得名墨車故唯以棧車為名若然自卿已上更有異飾則又名玉金象夏篆夏縵之等也云士乘墨車攝盛也者案周禮巾車云一曰玉輅以祭祀又云金路同姓以封象路異姓以封革路以封四衛木路以封蕃國孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車士乘大夫墨車為攝盛則大夫當乘卿之夏縵卿當乘孤之夏篆已上有木路質而無飾不可使孤乘之禮窮則同也孤還乘夏篆又於臣之外特置亦是尊則尊矣不欲攝盛若然庶人當乘士之棧車則諸侯天子尊則尊矣亦不欲攝盛依巾車自乘本車矣玉路祭祀不可以親迎當乘金輅矣以攝盛言之士之子冠與父同則昏亦同但尊適子皆與父同庶子宜降一等也婦車亦如之有裧注亦如之者車同等士妻之車夫家共之大夫以上嫁女則自以車送之裧車裳幃周禮謂之容車有容則固有蓋音義裧昌占反共音恭疏注釋曰婦車亦墨車但有裧為異耳曰士妻之車夫家共之者即此是也云大夫以上嫁女則自以車送之者案宣公五年冬左傳云齊髙固及子叔姬來反馬也休以為禮無反馬而左氏以為得禮禮婦人謂嫁曰歸明無大故不反於家經書髙固及子叔姬來故譏乘行匹至也士昏則異據士禮無反馬蓋失之矣士昏禮曰主人爵辨纁裳緇袘從者畢玄端乘墨車從車二乘執燭前馬婦車亦如之有裧此婦乘夫家之車鵲巢詩曰之子于歸百兩御之又曰之子于歸百兩將之國君之禮夫人始嫁自乘其車也何彼穠矣篇曰曷不肅雍王姬之車言齊侯嫁女以其母王姬始嫁之車逺送之則天子諸侯女嫁留其車可知今髙固大夫反馬大夫亦留其車禮雖散言以詩論之大夫以上至天子有反馬之禮留車妻之道反馬壻之義髙固秋月逆叔姬冬來反馬則婦人三月祭行故行反馬禮也以此鄭針膏肓言之則知大夫以上嫁女自以其車送之若然詩注以為王姬嫁時自乘其車針膏肓以為齊侯嫁女乘其母王姬始嫁時車送之不同者彼取三家詩故與毛詩異也凡婦車之法自士已上至孤卿皆與夫同有裧為異至於王后及三夫人并諸侯夫人皆乘翟車案周禮巾車王后之五路重翟厭翟安車皆有容蓋又云翟車輦車鄭注云詩國風碩人曰翟茀以朝謂諸侯夫人始來乘翟茀之車以朝見於君盛之也此翟茀蓋厭翟也然則王后始來乘重翟車又詩序云王姬下嫁於諸侯車服不繫其夫下王后一等以此差之王后始來乘重翟則上公夫人用厭翟侯伯子男夫人用翟車若然巾車安車次厭翟在翟車之上者以其安車在宫中所乘有容蓋與重翟厭翟有差退之在下其實安車無翟飾不用為嫁時所乘也三夫人與三公夫人當用翟車九嬪與孤妻同用夏篆世婦與卿大夫妻同用夏縵女御與士妻同用墨車也其諸侯夫人姪娣及二媵拜姪娣依次下夫人以下一等為差也云裧車裳幃周禮謂之容者案巾車職重翟厭翟安車皆有容蓋鄭司農云容謂幨車山東謂之裳幃或謂之幢容後鄭從之衛詩云漸車帷裳是山東名幃裳也云車有容則固有蓋者巾車云有容蓋容蓋相配之物此既有裧之容眀有蓋可知故云固有蓋矣至于門外注婦家大門之外疏注釋曰知是大門之外者以下有揖入乃至廟廟在大門內故知此大門外也主人筵于戶西西上右几注主人女父也筵為神布席疏注釋曰以先祖之遺體許人將告神故女父先於廟設神席乃迎壻也女次純衣纁衻立於房中南面注次首飾也今時髲也周禮追師掌為副編次純衣絲衣女從者畢袗玄則此衣亦玄矣衻亦緣也衻之言任也以纁緣其衣象隂氣上任也凡婦人不常施衻之衣盛昏禮為此服喪大記曰復衣不以衻眀非常音義衻如占反髲皮義反追丁回反編必連反袗之忍反疏釋曰不言裳者以婦人之服不殊裳是以內司服皆不殊裳彼注云婦人尚専一德無所兼連衣裳不異其色是也注釋曰云次首飾也今時髲也周禮追師掌為副編次者案彼注云副之言覆所以覆首為之飾其遺象若今步繇矣編編列髮為之其遺象若今假紒矣次次第髮長短為之所謂髲髢言所謂謂如少牢主婦髲鬄也又云外內命婦衣鞠衣袒衣者服編衣褖衣者服次其副唯於三翟祭祀服之士服爵辨助祭之服以迎則士之妻亦服褖衣助祭之服也若然案內司服王后之六服褘衣揄翟闕翟鞠衣展衣褖衣素沙素沙與上六服為裏五等諸侯上公夫人與王后同侯伯夫人自揄翟而下子男夫人自闕翟而下案玉藻有鞠衣袒衣褖衣注云諸侯之臣皆分為三等其妻以次受此服公之臣孤為上卿大夫次之士次之侯伯子男之臣卿為上大夫次之士次之其三夫人以下內命婦則三夫人自闕翟而下九嬪自鞠衣而下世婦自袒衣而下女御自褖衣而下嫁時以服之諸侯夫人無助天子祭亦各得申上服與祭服同也云純衣絲衣者此經純亦是絲理不眀故見絲體也云女從者畢袗玄則此衣亦玄矣者此鄭欲見既以純為絲恐色不眀故云女從袗玄則此絲衣亦同玄色矣云衻亦緣也者上纁裳緇袘袘為緣故云衻亦緣也云衻之言任也以纁緣其衣象隂氣上任也者婦人隂象隂氣上交於陽亦取交接之義也云凡婦人不常施衻之衣盛昏禮為此服者此純衣即褖衣是士妻助祭之服尋常不用纁為衻今用之故云盛昏禮為此服云喪大記曰復衣不以衻眀非常者以其始死招魂復魄用生時之衣生時無衻知亦不用衻明為非常所服為盛昏禮故服之引之者證衻為非常服也然鄭言凡婦人服不常施衻者鄭欲見王后已下初嫁皆有衻之意也姆纚笄宵衣在其右注姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母纚縚髮笄今時簪也纚亦廣充幅長六尺宵讀為詩素衣朱綃之綃魯詩以綃為綺屬也姆亦玄衣以綃為領因以為名且相别耳姆在女右當詔以婦禮音義姆莫候反劉音母又音茂纚山買反劉霜綺反縚他刀反本又作𠬢同綃音消别彼列反疏釋曰此經欲見女既在房須有傳命者之事也注釋曰云姆婦人年五十無子出而不復嫁能以婦道教人者婦人年五十隂道絶無子乃出之案家語云婦人有七出不順父母出淫出妬出無子出惡疾出多言出竊盜出又莊二十七年何休注公羊云無子棄絶世也淫佚棄亂類也不事舅姑棄悖德也口舌棄離親也盜竊棄反義也嫉妬棄亂家也惡疾棄不可奉宗廟也又家語有三不去曽經三年喪不去休云不忘恩也賤取貴不去休云不背德也有所受無所歸不去休云不窮窮也休又云喪父長女不娶無教戒也世有惡疾不娶棄於天也世有刑人不娶棄於人也亂家女不娶類不正也逆家女不娶廢人倫也是五不娶又案易同人六二鄭云天子諸侯后夫人無子不出則猶有六出其天子之后雖失禮鄭云嫁於天子雖失禮無出道逺之而已若其無子不廢逺之后尊如故其犯六出則廢之然就七出之中餘六出是無德行不堪教人故無子出能以婦道教人者以為姆既教女因從女向夫家也云若今時乳母者漢時乳母與古時乳母别案喪服乳母者據大夫子有三母子師慈母保母其慈母闕乃令有乳者養子謂之為乳母死為之服緦庶師教之乳母直養子而己漢時乳母則選德行有乳者為之并使教子故引之以證姆也云纚縚髮者此纚亦如士冠纚以繒為之廣充幅長六尺以縚髮而結之姆所以異於女者女有纚兼有次此姆則有纚而無次也云笄今時簪者舉漢為况義也云宵讀為詩素衣朱綃之綃者引詩以為證也云姆亦玄衣以綃為領因以為名者此衣雖言綃衣亦與純衣同是緣衣用綃為領故因得名綃衣也必知綃為領者詩云素衣朱綃詩又云素衣朱襮爾雅釋器云黼領謂之襮襮既為領眀朱綃亦領可知案上文云女緣衣下文云女從者畢袗玄皆是褖衣則此綃衣亦褖衣矣女與女從襌黼領此姆以玄綃為領也若然特牲云綃衣者謂以綃繒為衣知此綃為領者以下女從者云被顈黼據領明此據領也云姆在女右當詔以婦禮者案禮記少儀云贊幣自左詔辭自右地道尊右之義故姆在女右也女從者畢袗玄纚笄被顈黼在其後注女從者謂姪娣也詩諸娣從之祁祁如雲袗同也同玄者上下皆玄也顈襌也詩云素衣朱襮爾雅云黼領謂之襮周禮曰白與黑謂之黼天子諸侯后夫人狄衣卿大夫之妻刺黼以為領如今偃領矣士妻始嫁施襌黼於領上假盛飾耳言被眀非常服音義被皮義反顈苦迥反劉古熒反黼音斧姪大結反字林丈一反娣大計反襌音丹襮音博刺七亦反疏釋曰此是女從之人在女後為尊卑威儀之事也注釋曰知女從是姪娣者案下文云雖無娣媵先鄭云古者嫁女必姪娣從為之媵即此女從故云女從者謂姪娣也云詩者韓奕萹引之證娣姪之義也云袗同也同玄者上下皆玄者此袗讀從左氏袀服振振一也故云同玄上下皆玄也同者即婦人之服不殊裳云顈襌也者此讀如詩云褧衣之褧故為襌也引詩爾雅周禮者證黼得為領之義也黼謂刺之在領為黼文名為襮故云黼領謂之襮云天子諸侯后夫人狄衣者案周禮內司服云掌王后之六服褘衣揄狄闕狄又注云侯伯之夫人揄狄子男之夫人亦闕狄唯二王後褘衣故云后夫人狄衣也云卿大夫之妻刺黼以為領者以士妻言被眀非常故知大夫之妻刺之常也不於后夫人下言領於卿大夫妻下乃云刺黼為領則后夫人亦同刺黼為領也但黼乃白黑色為之若於衣上則畫之若於領上則刺之以為其男子冕服衣畫而裳繡繡皆刺之其婦人領雖在衣亦刺之矣然此士妻言被襌黼謂於衣領上别刺黼文謂之被則大夫以下刺之不别被之矣案禮記郊特牲云綃黼丹朱中衣大夫之僣禮也彼天子諸侯中衣有黼領上服則無之今此婦人事華飾故於上服有之中衣則無也云如今偃領矣者舉漢法鄭君目驗而知至今已逺偃領之制亦無可知也云士妻始嫁施襌黼於領上假盛飾耳言被眀非常服者對大夫以上妻則常服有之非被也主人玄端迎於門外西面再拜賓東面答拜注賓壻疏釋曰此言男至女氏之大門外女父出迎之事也主人揖入賓執鴈從至于廟門揖入三揖至于階三讓主人升西面賓升北面奠鴈再拜稽首降出婦從降自西階主人不降送注賓升奠鴈拜主人不答眀主為授女耳主人不降送禮不參音義為于偽反疏釋曰此言女父近賓壻入廟門升堂父迎出大門之事也云賔升北面奠鴈再拜稽首者此時當在房外當楣北面知在房外者見隱二年紀履緰來逆女公羊傳曰譏始不親迎也何休云夏后氏逆於庭殷人逆於堂周人逆於戶後代漸文迎於房者親親之義也注釋曰云賔升奠鴈拜主人不答明主為授女耳者案納采阼階上拜至問名納吉納徴請期轉相如皆拜獨於此主人不答眀主為授女耳云主人不降送禮不參者禮賔主冝各一人今婦既從主人不送者以其禮不參也壻御婦車授綏姆辭不受注壻御者親而下之綏所以引升車者曲禮曰僕人之禮必授人綏疏注釋曰云僕人之禮必授人綏者曲禮文今壻御車即㒒人禮㒒人合授綏姆辭不受謙也婦乘以几姆加景乃驅御者代注乘以几者尚安舒也景之制蓋如眀衣加之以為行道禦塵令衣鮮眀也景亦眀也驅行也行車輪三周御者乃代壻今文景作憬音義乘如字禦魚吕反今力呈反憬音景疏注釋曰云乘以几者謂登車時也几所以安體謂若尸乘以几之類以重其初昏與尸同也云景之制蓋如眀衣者案既夕禮明衣裳用布袂屬幅長下膝鄭注云長下膝又有裳於蔽下體深也此景之制無正文故云蓋如眀衣不直云制如眀衣此嫁時尚飾不用布案詩云衣錦褧衣裳錦褧裳鄭云褧襌也蓋以襌縠為之中衣裳用錦而上加襌縠焉為其文之大著也庶人之妻嫁服也士妻䊷衣纁衻彼以庶人用襌縠連引士妻䊷衣則此士妻衣上亦用襌縠碩人是國君夫人亦衣錦褧衣則尊卑同用襌縠庶人卑得與國君夫人同用錦為文大著此士妻不用錦不為文大著故云行道禦風塵也壻乘其車先俟于門外注壻車在大門外乘之先者道之也男率女女從男夫婦剛柔之義自此始也俟待也門外壻家大門外音義道音導疏注釋曰云壻車在大門外者謂在婦家大門外知者以其壻於此始言乘其車故知也云男率女女從男夫婦剛柔之義自此始也者並郊特牲文云門外壻家大門外者命士已上父子異宫故解為壻家大門外若不命之士父子同宫則大門父之大門外也婦至主人揖婦以入及寢門揖入升自西階媵布席于奧夫入于室即席婦尊西南面媵御沃盥交注升自西階道婦入也媵送也謂女從者也御當為訝訝迎也謂壻從者也媵沃壻盥於南洗御沃婦盥於北洗夫婦始接情有廉恥媵御交道其志音義媵以證反奧烏報反御依注音訝五嫁反下並同道音導疏釋曰此眀夫導於婦入門升階及對席媵御沃盥之儀云主人揖婦以入者此則詩云好人提提宛然左辟是也云夫入于室即席者謂壻也婦在尊西未設席壻既為主東面須設饌訖乃設對席揖即對席為前後至之便故也注釋曰云升自西階道婦入也者以尋常賔客主人在東賔在西今主人與妻俱升西階故云道婦入也云媵送也謂女從者也者即姪娣也云御當為訝訝迎也謂壻從者也者以其與婦人為盥非男子之事謂夫家之賤者也知媵沃壻盥於南洗御沃婦盥於北洗者以其有南北二洗又云媵御沃盥交眀知夫婦與媵御南北交相沃盥也贊者徹尊冪舉者盥出除冪舉鼎入陳于阼階南西面北上匕俎從設注執匕者執俎者從鼎而入設之匕所以别出牲體也俎所以載也音義别彼列反疏釋曰案特牲少牢公食與有司徹及此昏禮等執匕俎舉鼎各别人者此吉禮尚威儀故也士喪禮舉鼎右人以右手執匕左人以左手執俎舉鼎人兼執匕俎者喪禮略也云從設者以從男之事故從吉祭法也注釋曰公食執匕俎之人入加匕於鼎陳俎於鼎南其匕與載皆舉鼎者為之特牲注云右人也尊者於事指使可也則右人於鼎北南面匕肉出之左人於鼎西俎南北面承取肉載於俎士虞右人載者喪祭少變故在西方長者在左也今昏禮鬼神隂陽當與特牲禮同亦右人匕左人載遂執俎而立以待設也云匕所以别出牲體也者凡牲有體别為肩臂臑肫胳脊脅之等於鼎以次别匕出之載者依其體别以次載之於俎故云别出牲體也北面載執而俟注執俎而立俟豆先設疏注釋曰知俟豆先設者下文菹醢後乃云俎入設於豆東故知也匕者逆退復位于門東北面西上注執匕者事畢逆退由便至此乃著其位略賤也音義匕一作朼必履反劉云匕器名朼者朼載也疏注釋曰云至此乃著其位略賤也者案士冠未行事陳主人位訖即言兄弟及擯者之位此於初陳鼎門外時不見執匕者位至此乃著其位故言略賤也贊者設醬于席前菹醢在其北俎入設于豆東魚次臘特于俎北注豆東菹醢之東疏注釋曰醬與菹醢俱在豆知不在醬東者下文醬東有黍稷故知在菹醢東也贊設黍于醬東稷在其東設湇于醬南注饌要方也疏注釋曰豆東兩俎醬東黍稷是其要方也設對醬于東注對醬婦醬也設之當特俎疏注釋曰壻東面設醬在南為右婦西面則醬在北為右皆以右手取之為便故知設之當特俎東也菹醢在其南北上設黍于臘北其西稷設湇于醬北御布對席贊啓會卻于敦南對敦于北注啓發也今文啓作開古文卻為綌音義會古外反卻去逆反疏釋曰菹醢在其南北上者謂菹在醬南其南有菹有醢若壻醢在菹北從南向北陳為南上此從北向南陳亦醢在菹南為北上也云湇即上文大羮湇在爨者羮宜熱臨食乃將入是以公食大夫云大羮湇不和實於鐙由門入公設之於醬西是也又生人食公食大夫是也特牲士虞等為神設皆為敬尸尸亦不食也鄉飲酒鄉射燕禮大射不設者湇非飲食之具故無也少牢無湇者文不備有司徹有湇者賔尸禮褻故有之與少牢禮異也云設湇于醬北者案上設壻湇於醬南在醬黍之南特俎出於饌北此設婦湇於醬北在特俎東饌內則不得要方上注云要方者據大判而言耳云啓會卻於敦南對敦於北者取壻東面以南為右婦西面以北為右各取便也卻仰也謂仰於地也贊告具揖婦即對筵皆坐皆祭祭薦黍稷肺注贊者面面告饌具也壻揖婦使即席薦菹醢疏注釋曰知贊者西面告饌具者以其所告者冝告主人主人東面知西面告也云薦菹醢者以其儀禮之內單言薦者皆據籩豆而言也贊爾黍授肺脊皆食以湇醬皆祭舉食舉也注爾移也移置席上便其食也皆食食黍也以用也用者謂用口啜湇用指咂醬古文黍作稷音義啜昌恱反咂子闔反疏釋曰云祭舉食舉也者舉謂舉肺以其舉以祭以食故名肺為舉則上文云肺者祭肺也注釋曰云爾移也者爾訓為近謂移之使近人故云移置席上便其食也案玉藻云食坐盡前謂臨席前畔則不得移黍於席上此云移置席上者鬼神隂陽故此昏禮從特牲祭祀云皆食食黍也者案特牲少牢祭舉食舉乃飯此先食黍乃祭舉相反者彼九飯禮成故先食舉以為導食氣此三飯禮略故不須導也此先爾黍稷後授肺特牲亦然以其士禮同也少牢佐食先以舉肺脊授尸乃爾黍者大夫禮與士異故也然士虞亦先授舉肺脊後乃爾黍者喪禮與吉反故也云用者謂用口啜湇用指咂醬者以其大羹汁不用箸醬又不須以箸故用口啜湇用指咂醬也三飯卒食注卒已也同牢示親不主為食起三飯而成禮也音義飯扶晚反注及下同為于偽反疏注釋曰云同牢示親不主為食起者少牢十一飯特牲九飯而禮成此獨三飯故云同牢示親不主為食起三飯而成禮也贊洗爵酌酳主人主人拜受贊戶內北面答拜酳婦亦如之皆祭注酳潄也酳之言演也安也潄所以潔口且演安其所食酳酌內尊音義潄所又反演以善反疏釋曰自此至尊否論夫婦食訖酳乃徹饌於房之節云主人拜受者壻拜當東面酳婦亦如之者婦拜當南面是以少牢云饌皆答拜鄭注云在東面席者東面拜在西面席者皆南面拜故知婦拜南面若贊答婦拜亦於戶內北面也云皆祭者祭先也注釋曰云酳漱也酳之言演也安也漱所以潔口且演安其所食者案特牲云主人洗角升酌酳尸注云酳猶演也是獻尸也謂之酳者尸既卒食又欲頤衍養樂之又少牢云主人酌酒乃酳尸注云酳猶羡也既食之而又飲之所以樂之三注不同者文有詳略相兼乃具士虞亦是酳尸注直云酳安食也不言養樂及羡者喪故略之此三酳俱不言獻皆云酳直取其潔故注云漱所以潔口演安其所食亦頤衍養樂之義知酳酌內尊者以下文云贊酌於戶外尊故知此夫婦酌內尊也贊以肝從皆振祭嚌肝皆實于菹豆注肝肝炙也飲酒宜有肴以安之音義嚌才訃反炙諸夜反疏釋曰案特牲少牢獻尸以肝從尸嚌之加於菹豆與此同禮之正也主人與祝亦以肝從加於俎不加於豆者下尸故不敢同之也士虞獻尸尸以肝加於俎者喪祭故鄭云加於俎從其牲體也以喪不志於味但此云實不云加異於祭故也卒爵皆拜注婦拜見上篇見母章此篇婦見奠菜一章及內則女拜尚右手贊答拜受爵再酳如初無從三酳用卺亦如之注亦無從也疏釋曰卒爵皆拜贊答拜者獻主處也云再酳如初者如自贊洗爵以下至答拜受爵也注釋曰云亦無從也者三酳用卺亦如之亦自贊洗爵至受爵鄭直云亦無從用卺文承再酳之下眀知事事如再酳以其初酳有從再酳如初無從三酳用卺亦無從故鄭以亦無從言之其實皆同再酳也贊洗爵酌于戶外尊入戶西北面奠爵拜皆答拜坐祭卒爵拜皆答拜興注贊酌者自酢也疏釋曰言皆者皆夫婦也三酳乃酌外尊自酢者皆是略賤者也既合卺乃用爵不嫌相襲爵眀更洗餘爵也主人出婦復位注復尊西南面之位疏釋曰直云主人出不云處所案下文云主人説服於房矣則此時亦東房矣注釋曰云復尊西南面之位者婦人不冝出復入故因舊位而立也乃徹于房中如設于室尊否注徹室中之饌設於房中為媵御餕之徹尊不設有外尊也音義為於偽反餕音俊疏注釋曰經云乃徹於房中如設於室雖據豆俎而言理兼於尊矣故云徹尊不設有外尊眀徹中兼尊也云尊否者唯尊不設於房中而言也知為媵御餕之者下文云媵餕主人之餘已下是也主人説服于房媵受婦説服于室御受姆授巾注巾所以自潔清今文説作稅音義説吐活反清如字又才性反稅舒鋭反疏釋曰自此至呼則聞論夫婦寢息及媵御餕之事也云主人説服於房媵受婦説服於室御受者與沃盥交同亦是交接有漸之義也注釋曰疊今文為稅不從者稅是追服之言非脫去之義故不從也御衽于奧媵衽良席在東皆有枕北止注衽卧席也婦人稱夫曰良孟子曰將覸良人之所之止足也古文止作趾音義衽而甚反覸古遍反疏釋曰衽於奧主於婦席使御布婦席使媵布夫席此亦示交接有漸之義也注釋曰云衽卧席也者案曲禮云請席何鄉請衽何趾鄭云坐問鄉卧問趾因於隂陽彼衽稱趾眀衽卧席也若然前布同牢席夫在西婦在東今乃夫在東婦在西易處者前者示有隂陽交會有漸故男西女東今取陽往就隂故男女各於其方也云孟子者案孟子離婁萹云齊人有一妻一妾而處室者其良人出則必厭酒肉而後反其妻問所與飲食者則盡富貴也而未嘗有顯者來吾將覸良人之所之注云覸視也彼覸為視亦得為見故鄭此注為見也引之者證婦人稱夫為良人之義也云古文止作趾者雖疊古文趾為足亦一義也主人入親説婦之纓注入者從房還入室也婦人十五許嫁筓而禮之因著纓眀有繫也蓋以五采為之其制未聞音義説吐活反著丁略反疏注釋曰知從房還入室者夫前出説服於房今言入眀從房入室也云婦人十五許嫁筓而禮之因著纓者案曲禮云女子許嫁纓又云女子許嫁筓而字鄭據此許嫁文而言但言十五許嫁則以十五為限則自十五以上皆可許嫁也云眀有繫也者纓是繫物為之眀有繫也云蓋以五采為之者以周禮巾車職五路皆有繁纓就數鄭注纓皆用五采罽為之此纓雖用絲為之當用五采但無文故云蓋以疑之也云其制未聞者此纓與男子冠纓異彼纓垂之兩傍結其絛此女子纓不同於彼故云其制未聞但纓有二時不同內則云男女未冠筓者總角襟䙬皆佩容臭鄭注云容臭香物也以纓佩之為迫尊者給小使也此是幼時纓也內則又云婦事舅姑子事父母襟纓綦屨注云襟猶結也婦人有纓示繫屬也是婦人女子有二時之纓內則示有繫屬之纓即許嫁之纓與此説纓一也若然筓亦有二等案問喪親始死筓纚據男子去冠仍有筓與婦人之筓並是安髮之筓也爵辨皮辨及六冕之筓皆是固冠冕之笄是其二也燭出注昏禮畢將卧息媵餕主人之餘御餕婦餘贊酌外尊酳之注外尊房戶外之東尊疏釋曰亦隂陽交接之義云酌外尊者賤不敢與主人同酌內尊也媵侍於戶外呼則聞注為尊者有所徴求今文侍作待疏釋曰不使御侍于戶外供承夫婦者以女為主故使媵侍于戶外也夙興婦沐浴纚筓宵衣以俟見注夙早也昏眀日之晨興起也俟待也待見於舅姑寢門之外古者命士以上年十五父子異宫音義見賢遍反注及下皆同疏釋曰自此至授人論婦見舅姑之事云纚笄宵衣者此則特牲主婦宵衣也不著純衣纁衻者彼嫁時之盛服今已成昏之後不可使服故退從此服也注釋曰言昏眀日之晨者以昨日昏時成禮此經言夙興故知是昏之晨旦也云興起也俟待也待見於舅姑寢門之外者因訓即解之也云古者命士以上年十五父子異宫者案內則云由命士以上父子異宫不云年限今鄭知十五為限者以其十五成童是以鄭注喪服亦云子幼謂年十五以下故知十五以後乃異宫也鄭言此限者欲見不命之士父子同宫雖俟見不得言舅姑寢門外也質眀贊見婦于舅姑席于阼舅即席席于房外南面姑即席注質平也房外房戶外之西古文舅皆作咎疏釋曰此經論設舅姑席位所在注釋曰鄭知房外是房戶外之西者以其舅在阼阼當房戶之東若姑在房戶之東即當舅之北南面向之不便又見下記云父醴女而俟迎者母南面於戶外女出於母左以母在房戶西故得女出於母左是以知此房外亦房戶外之西也婦執笲棗栗自門入升自西階進拜奠于席注笲竹器有衣者其形蓋如今之筥􅠚籚矣進拜者進東面乃拜奠之者舅尊不敢授也音義笲音煩衣於既反􅠚羌居反籚音盧疏釋曰此經論婦從舅寢門外入見舅之事也必見舅用棗栗見姑以腶修者案春秋莊二十四年經書秋八月丁丑夫人薑氏入戊寅大夫宗婦覿用幣公羊傳云宗婦者何大夫之妻也覿者何見也用者何用者不宜用也見用幣非禮也然則曷用棗栗云乎腶修云乎注云腶修者脯也禮婦人見舅以棗栗為贄見姑以腶修為贄見夫人至尊兼而用之云乎辭也棗栗取其早自謹敬腶修取其斷斷自修正是用棗栗腶修之義也案雜記云婦見舅姑兄弟姑姊妹皆立於堂下西面北上是見已注云婦來為供養也其見主於尊者兄弟以下在位是為已見不復特見又云見諸父各就其寢注云旁尊也亦為見時不來今此不言者文略也注釋曰知笲竹器者以字從竹故知竹器知有衣者下記云笲緇被纁裏加于橋注云被表也笲有衣者婦見舅姑以飾為敬是有衣也云如今之筥􅠚籚矣者此舉漢法以况義但漢法去今已逺其狀已無可知也云進拜者進東面乃拜者謂從西階進至舅前而拜云奠之者舅尊不敢授也者案下姑奠於席不授而云舅尊不敢授者但舅直撫之而已至姑則親舉之親舉者若親授之然故於舅得云尊不敢授也舅坐撫之興答拜婦還又拜注還又拜者還於先拜處拜婦人與丈夫為禮則俠拜音義俠古洽反疏注釋曰云先拜處者謂前東面拜處也云婦人與丈夫為禮則俠拜者謂若士冠冠者見母母拜受子拜送母又拜母于子尚俠拜則不徒此婦於舅而已故廣言婦人與丈夫行禮則俠拜降階受笲段修升進北面拜奠于席姑坐舉以興拜授人注人有司姑執笲以起答婦拜授有司徹之舅則宰徹之音義段丁亂反本又作腶同脯也疏釋曰此經論婦見姑之事注釋曰云人有司者凡行事者皆主人有司也知舅則使宰徹者此見下記云舅答拜宰徹是也贊醴婦注醴當為禮贊禮婦者以其婦道新成親厚之疏釋曰自此至於門外論舅姑堂上禮婦之事注釋曰云醴當為禮者士冠內則昏義諸文醴皆破從禮者案司儀注上於下曰禮敵者曰儐又案大行人云王禮再祼而酢之等用鬱鬯不言王鬯再祼而酢而言禮則此諸文雖用醴禮賔不得即言主人醴賔故皆從上於下曰禮解之席于戶牖間注室戶西牖東南面位疏注釋曰知義然者以其賔客位於此是以禮子禮婦禮賔客皆於此尊之故也側尊甒醴于房中婦疑立于席西注疑正立自定之貌音義疑魚乞反疏釋曰云婦疑立于席西者以其禮未至而無事故疑然自定而立以待事也若行禮之間而立則云立不得云疑立也贊者酌醴加柶面枋出房席前北房婦東面拜受贊西階上北面拜送婦又拜薦脯醢注婦東面拜贊北面答之變於丈夫始冠成人之禮音義冠古亂反下猶冠冠子同疏釋曰云面枋出房者以其贊授故面枋冠禮贊酌醴將授賔則面葉賔受醴將授子乃面枋也此婦又拜并下經婦又拜者皆俠拜也注釋曰云婦東面拜贊北拜答之變於丈夫始冠成人之禮者案冠禮禮子與此禮婦俱在賔位彼禮子南面受醴此則東面不同故決之彼南面者以向賔拜此東面者以舅姑在東亦面之拜也婦升席左執觶右祭脯醢以柶祭醴三降席東面坐啐醴建柶興拜贊答拜婦又拜奠于薦東北面坐取脯降出授人于門外注奠于薦東升席奠之取脯降出授人親徹且榮得禮人謂婦氏人疏注釋曰鄭知奠者升席奠之者見上冠禮禮子禮賔皆云即筵奠於薦東降筵北面坐取脯明此奠時升席南面奠乃降北面取脯降出授人云親徹且榮得禮者言且兼二事何者下饗婦之俎不親徹此親徹又自出門授人故云親徹且榮得禮下饗不親徹俎者於禮時禮訖故於後略之知人是婦氏人者以其在門外婦往授之眀是婦氏之人也舅姑入于室婦盥饋注饋者婦道既成成以孝養音義饋其位反養豫亮反特豚合升側載無魚臘無稷並南上其他如取女禮注側載者右胖載之舅俎左胖載之姑俎異尊卑並南上者舅姑共席於奧其饌各以南為上其他謂醬湇菹醢女謂婦也如取婦禮同牢時並當作併音義取七住反併步項反疏釋曰自此至之錯論婦饋舅姑成孝養之事云其他如取女禮者則自側載以下南上以上與取女異異者彼則有魚臘并稷此則無魚臘與稷彼男東面女西面别席其醬醢菹夫則南上婦則北上今此舅姑共席東面俎及豆等皆南上是其異也注釋曰豚載皆合升若成牲載一胖是常得云側此乃各載一胖故亦云側但周人尚右故知右胖載之舅俎左胖載之姑俎是以鄭云異尊卑也云並南上者舅姑共席于奧其饌各以南為上者決同牢男女東西相對各上其右也云其他謂醬湇菹醢者以同牢時夫婦各有此四者今以饋舅姑亦各有此四物故云如同牢時也雖不言酒既有饋明有酒在其他中酒在內者亦在北牖下外尊亦當在房戶外之東鄭不云者略耳婦贊成祭卒食一酳無從注贊成祭者授處之今文無成也疏注釋曰贊成祭者謂授之又處置令知在於豆間也席于北墉下注室中北墻下疏釋曰此席將為婦餕之位處也婦徹設席前如初西上婦餕舅辭易醬注婦餕者即席將餕也辭易醬者嫌淬汚音義淬七內反本或作染汚汚穢之汚疏釋曰婦徹設於席前如初西上者此直餕餘舅辭易醬者舅尊故也不餕舅餘者以舅尊嫌相褻言西上者亦以右為上也注釋曰言將者事未至以其此始言婦餕之意至下文婦餕姑之饌乃始餕耳云辭易醬者嫌淬汚者以其醬乃以指咂之淬汚也婦餕姑之饌御贊祭豆黍肺舉肺脊乃食卒姑酳之婦拜受姑拜送坐祭卒爵姑受奠之注奠於篚疏釋曰云御贊祭豆黍肺舉肺脊者御贊婦祭之也注釋曰鄭知奠之於篚者此云如取女禮取女有篚明此亦奠之於篚可知也婦徹于房中媵御餕姑酳之雖無娣媵先於是與始飯之錯注古者嫁女必娣姪從之謂之媵姪兄之子娣女弟也娣尊姪卑若或無娣猶先媵客之也始飯謂舅姑錯者媵餕舅餘御餕姑餘也古文始為姑音義從才用反疏注釋曰云古者嫁女必姪娣從謂之媵者媵有二種若諸侯有二媵外别有姪娣是以莊公十九年經書秋公子結媵陳人之婦于鄄公羊傳曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何女弟也諸侯夫人自有姪娣并二媵各有姪娣則九女是媵與姪娣别也若大夫士無二媵即以姪娣為媵鄭云古者嫁女必姪娣從謂之媵是據大夫士言也云姪兄之子娣女弟也娣尊姪卑者解經云雖無娣媵先之義以其若有姊乃先媵即姪也云猶先媵客之也者對御是夫之從者為後若然姪與娣俱名媵今言雖無娣媵先似娣不名媵者但姪娣俱是媵今去娣娣外唯有姪經言媵先以對御為先非對娣也稱媵以其姪娣俱是媵也云始飯謂舅姑者舅姑始飯而今媵餕舅餘御餕姑餘是交錯之義若媵御沃盥交也舅姑為飯始不為餕始俗本云與始餕之錯者誤也舅姑共饗婦以一獻之禮舅洗于南洗姑洗于北洗奠酬注以酒食勞人曰饗南洗在庭北洗在北堂設兩洗者獻酢酬以潔清為敬奠酬者眀正禮成不復舉凡酬酒皆奠於薦左不舉其燕則更使人舉爵音義勞力報反疏釋曰自此至歸俎於婦氏人論饗婦之事此饗與上盥饋同日為之知者見昏義舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦鄭彼注云昏禮不言厥眀此言之者容大夫以上禮多或異日故知此士同日可也此與上事相因亦於舅姑寢堂之上與禮婦同在客位也云共饗婦以一獻之禮者案下記云饗婦姑薦焉注云舅姑共饗婦舅獻姑薦脯醢但薦脯醢無盥洗之事今設此洗為婦人不下堂也云姑洗於北洗洗者洗爵則是舅獻姑酬共成一獻仍無妨姑薦脯醢也注釋曰云凡酬酒皆奠於薦左不舉者此經直云奠酬不言處所故云凡通鄉飲酒鄉射燕禮之等云燕則更使人舉爵者案燕禮獻酬訖别有人舉旅行酬是也饗亦用醴禮知者以下記云庶婦使人醮之注云使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之是也若然知記非醴婦者以記云庶婦使人醮之眀適婦親之案上醴婦雖適使贊者饗則親之明記使人醮庶婦當饗節也舅姑先降自西階婦降自阼階注授之室使為主眀代已疏注釋曰案曲禮云子事父母升降不由阼階阼階是主人尊者升降之處今舅姑降自西階婦降自阼階是授婦以室之事也云授之室昏義之文也歸婦俎于婦氏人注言俎則饗禮有牲矣婦氏人丈夫送婦者使有司歸以婦俎當以反命於女之父母眀其得禮疏釋曰案雜記云大饗卷三牲之俎歸於賔館是賔所當得也饗時設几而不倚爵盈而不飲肴乾而不食故歸俎此饗婦婦亦不食故歸之也注釋曰經雖不言牲既言俎俎所以盛肉故知有牲此婦氏人即上婦所授脯者也故上注引此婦氏人證所授人為一也舅饗送者以一獻之禮酬以束錦注送者女家有司也爵至酬賔又從之以束錦所以相厚古文錦皆作帛疏釋曰此一獻與饗婦一獻同禮則異彼兼有姑此依常饗賔客法注釋曰知送者是女家有司者案左氏傳云齊侯送薑氏非禮也凡公女嫁於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之以此而言則尊無送卑之法則大夫亦遣臣送之士無臣故知有司送之也云古文錦皆為帛者此及下文錦皆為帛不從古文者禮有玉錦非獨此文則禮有贈錦之事故不從古文也姑饗婦人送者酬以束錦注婦人送者隸子弟之妻妾凡饗速之疏注釋曰左氏傳云士有隸子弟士卑無臣自以其子弟為㒒隸并已之子弟之妻妾但尊無送卑故知婦人送者是隸子弟之妻妾也云凡饗速之者案聘禮饗食速賔則知此舅姑饗送者亦速之也凡速者皆就館速之是以下云若異邦則贈丈夫送者以束錦鄭云就賔館則賔自有館若然婦人送者亦當有館男子則主人親速其婦送者不親速以其婦人迎客不出門當别遣人速之若異邦則贈丈夫送者以束錦注贈送也就賔館疏釋曰案莊二十七年冬莒慶來迎叔姬公羊傳曰大夫越竟逆女非禮也鄭注喪服亦云古者大夫不外娶今言異邦得外娶者以大夫尊外娶則外交故不許士卑不嫌容有外娶法故有異邦送客也注釋曰鄭知就館者贈賄之等皆就館故知此亦就館也若舅姑既沒則婦入三月乃奠菜注沒終也奠菜者以篚祭菜也蓋用堇音義堇音謹疏釋曰自此至饗禮論舅姑沒三月廟見之事必三月者三月一時天氣變婦道可以成之故也此言舅姑俱沒者若舅沒姑存則當時見姑三月亦廟見舅若舅存姑沒婦人無廟可見或更有繼姑自然如常禮也案曽子問云三月而廟見稱來婦也擇日而祭於禰成婦之義也鄭云謂舅姑沒者也以祭成婦義者婦有供養之禮猶舅姑存時盥饋特豚於室此言奠菜即彼祭於禰一也奠菜亦得稱祭者若學記云皮辨祭菜之類也注釋曰此注云奠菜者以篚案下云婦執笲菜篚即笲一也鄭知菜蓋用堇者舅姑存時用棗栗腶修義取早起肅栗治腶自修則此亦取謹敬因內則有堇荁枌榆供養是以疑用堇故云蓋也席于廟奧東面右几席于北方南面注廟考妣之廟北方墉下疏釋曰案周禮司几筵云每敦一几鄭注云周禮雖合葬及同時在殯皆異几體實不同祭於廟同几精氣合又祭統云設同几同几即同席此即祭於廟中而别席者此既廟見若生時見舅姑舅姑别席異面是以今亦别席異面象生不與常祭同也注釋曰鄭知廟考妣廟者曽子問云擇日而見於禰又象生時見舅姑故知考妣廟也祝盥婦盥于門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜于皇舅某子注帥道也入入室也某氏者齊女則曰薑氏魯女則曰姬氏來婦言來為婦嘉美也皇君也疏釋曰洗在門外祝與婦就而盥之者此亦異於常祭象生見舅姑在外沐浴乃入舅姑之寢故洗在門外也云祝帥婦以入者象特牲隂厭祝先主人入室也云某子者言若張子李子也婦拜扱地坐奠菜于几東席上還又拜如初注扱地手至地也婦人扱地猶男子稽首音義扱初洽反疏注釋曰云扱地手至地者以手之至地謂之扱地則首不至手又與男子空首不同云婦人扱地猶男子稽首者婦人肅拜為正今云扱地則婦人之重拜也猶男子之稽首亦拜中之重故以相况也案周禮大祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褎拜九曰肅拜鄭云稽首拜頭至地也頓首拜頭叩地也空首拜頭至手所謂拜手也吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者振動謂戰栗變動之拜鄭大夫云竒拜謂一拜也褒讀為報報拜再拜是也後鄭謂一拜答臣下拜再拜拜神與尸鄭司農云肅拜但俯下手今時撎是也但九拜之中四者是正拜即稽首頓首空首肅拜是也稽首拜中之重是臣拜君之拜也頓首平敵相與之拜故左氏傳齊侯拜魯侯為稽首魯君答以頓首齊於魯責稽首答曰非天子無所稽首是臣於君以稽首故燕禮臣於君皆云稽首也空首者君答臣下拜也肅拜者婦人以肅拜為正若以男子於軍中亦肅拜故左氏傳晉郤至云敢肅使者是也餘五者皆依於正拜振拜鄭云書曰王動色變者是武王觀兵白魚入王舟王動色變武王於時拜天神為此拜當附稽首也竒拜直為一拜是君答臣下之拜當以附空首也褒拜為尸及神亦當附稽首也其吉拜先吉拜為頓首後稽顙則吉拜當附頓首也凶拜為先稽顙後吉拜之此周之三年之喪拜當附稽首也左氏傳穆嬴抱太子適趙氏頓首於宣子者私求法故不為肅拜喪小記云婦人為夫與長子稽首者為重喪故亦不肅拜也婦降堂取笲菜入祝曰某氏來婦敢告于皇姑某氏奠菜于席如初禮注降堂階上也室事交乎户今降堂者敬也於姑言敢告舅尊於姑疏釋曰此為來婦奠於姑設於北坐之前以見姑也注釋曰不直云降而云降堂者則在階上故云降堂階上也云室事交乎户今降堂者敬也者室事交乎户禮器文彼子路與季氏之祭云室事交乎户堂事交乎階今此既是室之事當交於户今乃交於階故言敬也云於姑言敢告舅尊於姑者上文於舅言敢奠嘉菜不言告是舅尊於姑言告是姑卑也婦出祝闔牖户注凡廟無事則閉之疏釋曰先言牖後言戶者先闔牖後閉戶故為文然也注釋曰以其祭訖則闔牖戶明是無事則閉之以其鬼神尚幽暗故也老醴婦于房中南面如舅姑醴婦之禮注因於廟見禮之疏釋曰舅姑生時見訖舅姑使贊醴婦於寢之户牖之間今舅姑沒者使老醴婦於廟之房中其禮則同使老及處所則别也注釋曰象舅姑生時因見禮之故此亦因廟見禮之也壻饗婦送者丈夫婦人如舅姑饗禮疏釋曰舅姑存舅姑自饗送者如上文今舅姑沒故壻兼饗丈夫婦人如舅姑饗禮并有贈錦之等記疏釋曰凡言記者皆經不備者也士昏禮凡行事必用昏昕受諸禰廟辭無不腆無辱注用昕使者用昏壻也壻悉計反從士從胥俗作壻女之夫腆善也賓不稱幣不善主人不謝來辱音義昕音欣腆他典反疏注釋曰云用昕使者謂男氏使向女家納采問名納吉納徵請期五者皆用昕昕即明之始君子舉事尚早故用昕旦也云用昏壻也者謂親迎時也知辭無不腆者郊特牲云告之以直信信事人也信婦德也注云此二者所以教婦正直信也是賓納徴之時不得謙虛為辭注云主人不謝來辱者此亦是不為謙虛教女正直之義也摯不用死皮帛必可制注摯鴈也皮帛儷皮束帛也疏釋曰云摯不用死者凡摯亦有用死者是以尚書云三帛二生一死摯即士摯雉今此亦是士禮恐用死鴈故云不用死也云皮帛必可制者可制為衣物此亦是教婦以誠信之義也臘必用鮮魚用鮒必殽全注殽全者不餒敗不剝傷音義鮒音附餒奴罪反疏釋曰臘用鮮者義取夫婦日新之義云魚用鮒者義取夫婦相依附者也云殽必全者義取夫婦全節無虧之理此並據同牢時也女子許嫁筓而醴之稱字注許嫁已受納徴禮也筓女之禮猶冠男也使主婦女賓執其禮疏釋曰女子許嫁謂年十五已上至十九已下案曲禮女子許嫁纓有筓兼有纓示有繫屬此不言纓文不具也云醴之稱字者猶男子冠醴之稱字同是以禮記喪服小記云丈夫冠而不為殤婦人筓而不為殤是其義同也注釋曰知許嫁已受納徴禮也者以納采門名納吉三禮雖使者往來未成交親故曲禮云非受幣不交不親鄭據納徴唯未行請期親迎也二者要待女二十為之云筓女之禮猶冠男也使主婦女賓執其禮者案雜記云女雖未許嫁年二十而筓禮之婦人執其禮鄭注云言婦人執其禮明非許嫁之筓彼以非許嫁筓筓輕故無主婦女賓使婦人而已明許嫁筓當使主婦對女賓執其禮其儀如冠男也又許嫁者用醴禮之不許嫁者當用酒醮之敬其早得禮也祖廟未毁教于公宫三月若祖廟已毁則教于宗室注祖廟女高祖為君者之廟也以有緦麻之親就尊者之宫教以婦德婦言婦容婦功宗室大宗之家疏釋曰此為諸侯同族之女將嫁之前教成之法注釋曰經直云祖廟鄭知女高祖為君者之廟也以有緦麻之親者以其諸侯立五廟太祖之廟不毁親廟四以次毁之經故云未毁與已毁是據高祖之廟而言故云祖廟女高祖為君者之廟也共承高祖是四世緦麻之親若三世共曾祖是小功之親若共祖是大功之親若共禰廟是齊衰之親則皆教於公宫今直言緦麻者舉最疏而言親者自然教於公宫可知也云教以婦德婦言婦容婦功者昏義文鄭彼注云婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也云宗室大宗之家者案喪服小記繼别為宗謂别子之世適長子族人來宗事之者謂之宗者收族者也高祖之廟既毁與君絶服者則皆以大宗之家教之又小宗有四或繼祖或繼禰或繼曾祖或繼高祖此等至五代皆遷不就之教者小宗卑故也問名主人受鴈還西面對賓受命乃降注受鴈于兩楹間南面還于阼階上對賓以女名疏釋曰此亦記經不具者案經直云問名如納采之禮納采禮中無主人西面對事故記之也注釋曰知受鴈於兩楹間南面者納采時賓當阿東面致命主人阼階上北面再拜又云授于楹間南面問名如納采之禮故亦楹間南面授鴈於彼唯不云西面故記之也云還于阼階上對賓以女名者此即西面對與拜時北面異處也祭醴始扱一祭又扱再祭賓右取脯左奉之乃歸執以反命注反命謂使者問名納吉納徴請期還報于壻父音義奉芳勇反疏釋曰云祭醴者謂贊醴賓之時禮成於三其為三祭之時始祭醴之初故云始扱一祭及又扱則分為兩祭故云又扱再祭是為三也云賓右取脯左奉之乃歸者經直云降筵北面坐取脯不言用左右手故記之也云右取脯左奉之者謂先用右手取得脯乃用左手兼奉之以降授從者於西階下乃歸執以反命注釋曰知反命是此問名納吉納徵請期者以下云凡使者歸反命曰某既得將事矣敢以禮告言凡非一則知四者皆有反命也以納采與問名同使親迎又無使者故據此四者而言也納徵執皮攝之內文兼執足左首隨入西上參分庭一在南注攝猶辟也兼執足者左手執前兩足右手執後兩足左首象生曲禮曰執禽者左首隨入為門中厄狹西上中庭位併音義攝之涉反辟必亦反為于偽反厄於賣反狹音洽疏釋曰案經直云納徴玄纁束帛儷皮如納吉禮則授幣得如授鴈之禮至於庭實之皮無可相如故記之注釋曰執皮者二人相隨而入至庭北面皆以西為左一手執兩足毛在內故云內文云左首象生者案聘禮執皮者皆左首此亦執皮而左首故云象生與執禽者同故引曲禮執禽者左首為證必象生者取婦人生息之義云隨入為門中厄狹者皮皆橫執之案匠人云天子廟門容大扃七個注云大扃中鼎之扃長三尺每扃為一個共二丈一尺此士廟門降殺甚小故云門中厄狹而執皮者又橫執之故二人相隨乃可以入不得並行也至中庭則稍寬故得俱北面西上也賓致命釋外足見文主人受幣士受皮者自東出于後自左受遂坐攝皮逆退適東壁注賓致命主人受幣庭實所用為節士謂若中士下士不命者以主人為官長自由也音義見賢遍反下注婦見皆同長丁丈反疏釋曰此亦為經不見主人之士受皮之事故記之也云釋外足者據人北面以足向上執之足逺身為外釋之則文見故釋外足見文也云受皮者取皮自東方出于後自左受者謂自東方出於執皮者之後至於左北面受之故云自左受也逆退者二人相隨自東而西今以後者先向東行故云逆退也注釋曰云賓致命主人受幣庭實所用為節者以其上經納徴受幣如納吉之禮其目已具今言之者為執皮者釋外足見文及士受皮時節不見故云賔堂上致命時庭中執皮者釋外足見文主人堂上受幣時主人之士於堂下受取皮是其庭實所用為節也云士謂若中士下士不命者但諸侯之士國皆二十七人依周禮典命侯伯之士一命子男之士不命命與不命國皆分為三等上九中九下九案周禮三百六十官皆有官長其下皆有屬官但天子之士上士三命中士再命下士一命與諸侯之士異若諸侯上中下士同命今言士謂若中士下士不命者據上士為官長者若主人是中士則士是下士若主人是下士則士是不命之士府史之等此不命與子男之士不命者别彼雖不得君簡䇿之命仍得人君口命為士此則不得君命是官長自辟除者也案既夕宰舉幣是士之府史則庭實胥徒為之云自由也者謂由執皮者之左受之也父醴女而俟迎者母南面于房外注女既次純衣父醴之于房中南面蓋母薦焉重昏禮也女奠爵于薦東立于位而俟壻壻至父出使擯者請事母出南面房外示親授壻且當戒女也音義迎魚敬反疏釋曰此亦前經不具故記之注釋曰云女既次純衣父醴之于房中南面者見於上文云蓋母薦焉者舅姑共饗婦姑薦脯醢故知父母醴女亦母薦脯醢重婚禮故母薦也云女奠爵于薦東立于位而俟壻者案士冠禮子與醮子及此篇禮賓禮婦皆奠爵于薦東明此亦奠薦東也云壻至父出使擯者請事者見于上文云母出南而房外示親授壻且當戒女也者並參下文而言也女出于母左父西面戒之必有正焉若衣若筓母戒諸西階上不降注必有正焉者以託戒之使不忘疏釋曰此記亦經不具以母出房戶之西南面女出房西行故行出于母左父在阼階上西面故因而戒之云母戒諸西階上者母初立房西女出房母行至西階上乃戒之也注釋曰云託戒使不忘者謂託衣筓恆在身而不忘持戒亦然故戒使不忘也下文父母及庶母重云戒者並與此文相續成也此士禮父母不降送案桓公三年經書九月齊侯送薑氏于歡穀梁傳曰禮送女父不下堂母不出祭門祭門則廟門言不出廟門則似得下堂者彼諸侯禮與此異以其大夫諸侯天子各有昏禮故不同也婦乘以几從者二人坐持几相對注持几者重慎之疏釋曰上經雖云婦乘以几不見從者二人持之故記之也此几謂將上車時而登若王后則履石大夫諸侯亦應有物履之但無文以言今人猶用臺是石几之類也婦入寢門贊者徹尊冪酌玄酒三屬于尊棄餘水于堂下階間加勺注屬注也玄酒涗水貴新昏禮又貴新故事至乃取之三注于尊中音義屬音燭注同涗舒鋭反疏釋曰經中唯置酒尊不見徹冪以下事故記之記云酌玄酒三注於尊謂於外器中酌取此涗水三度注于玄酒尊中禮成於三故三注之也注釋曰云玄酒涗水貴新者案郊特牲云明水涗齊貴新也又云凡涗新之也是禮有貴新也今昏禮事至乃取之故云貴新也若然禮有玄酒涗水明水三者各逐事物生名玄酒據色而言涗水據新取為號其實一也以上古無酒用水為酒後代雖有酒用之配尊不忘本故也明水者案周禮秋官司烜氏云以隂鑒取明水於月郊特牲云其謂之明水也由主人之潔著此水也注云著猶成也言主人齊潔此水乃成可得也配尊之酒三酒加玄酒鬱鬯與五齊皆用明水配之郊特牲云五齊加明水三酒加玄酒不言鬱鬯者記人文略也相對玄酒與明水别通而言之明水亦名玄酒故禮運云玄酒在室彼配鬱鬯五齊是明水名為玄酒也以其俱是水故通言水也若天子諸侯祭祀得鬱鬯與五齊三酒並用卿大夫士祭直用三酒與玄酒無五齊與鬱鬯及明水若生人相禮不忘本亦得用以其用醴醴則五齊之中醴齊之類也笲緇被纁裏加于橋舅答拜宰徹笲注被表也笲有衣者婦見舅姑以飾為敬橋所以庪笲其制未聞今文橋為鎬音義裏音里鎬戶老反疏釋曰上經雖云笲不言表裏加飾之事故記之也婦席薦饌于房注醴婦饗婦之席薦也疏釋曰此亦於經不見故記之但醴婦時唯席與薦無爼其饗婦非直有席薦并有俎俎則不饌于房從鼎升于俎入設于席前今據醴婦時同有席與薦饌于房中者而言也饗婦姑薦焉注舅姑共饗婦舅獻爵姑薦脯醢疏釋曰經直言舅姑共饗婦以一獻之禮唯言饗婦不言姑薦故記之也婦洗在北堂直室東隅篚在東北面盥注洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房戶與隅間疏釋曰經唯言北洗不言洗處及篚故記之也注釋曰房與室相連謂之房無北壁故得北堂之名故云洗在北堂也云所謂北洗者經中所謂北洗也云北堂房半以北者以其南堂是户外半以南得堂名則堂是户外之稱則知此房半以北得堂名也知房無北户者見上文云尊于房户之東房有南戶矣燕禮大射皆云羞膳者升自北階立于房中不言入房是無北壁而無戶是以得設洗直室東隅也云洗南北直室東隅者是南北節也云東西直房戶與隅間者是東西節也婦酢舅更爵自薦注更爵男女不相因也疏釋曰謂舅姑饗婦時舅獻姑薦今婦酢舅婦自薦之嫌别人薦故記之也不敢辭洗舅降則辟于房不敢拜洗注不敢與尊者為禮音義辟音避疏釋曰此當在婦酢舅之上退之在下者欲見酬酒洗時亦不辭故也此對士冠鄉飲酒之等主與賓為禮皆辭洗此則不敢也此事於經不見故記之也凡婦人相饗無降注姑饗婦人送者于房無降者以北洗篚在上疏釋曰本設北洗為婦人有事不下堂今以北洗及篚在上故不降經不言故記之也言凡者欲見舅姑共饗婦及姑饗婦人送者皆然故言凡也婦入三月然後祭行注入夫之室三月之後於祭乃行謂助祭也疏釋曰此據舅在無姑或舅沒姑老者若舅在無姑三月不須廟見則助祭案內則云舅沒則姑老者謂姑六十亦傳家事任長婦婦入三月廟見祭菜之後亦得助夫祭故鄭云謂助祭也此亦謂適婦其庶婦無此事亦以經不見故記之也庶婦則使人醮之婦不饋注庶婦庶子之婦也使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之其儀則同不饋者共養統於適也音義醮子召反適丁狄反下同共九用反疏注釋曰不饗者以適婦不醮而有饗今使人醮之以醮替饗故使人醮之不饗也云酒不酬酢曰醮者亦如庶子醮然知亦有脯醢者以其饗婦及醮子皆有脯醢故知亦有脯醢也云其儀則同者適婦用醴於客位東面拜受醴贊者北面拜送今庶婦雖於房外之西亦東面拜受醮者亦北面拜送故云其儀則同也云不饋者共養統於適也者謂不盥饋特豚以其共養統于適婦也昏辭曰吾子有惠貺室某也注昏辭擯者請事告之辭吾子謂女父也稱有惠明下逹貺賜也室猶妻也子謂公冶長可妻也某壻名音義貺音况妻七計反疏注釋曰鄭知昏辭是擯者請事告之辭者以其言吾子有惠貺室某也是使告主人辭明知是擯者出門請事使者告之辭也知吾子謂女父者使人告擯者稱前已有惠貺其妻於壻某申明是女父乃得以女許人故知吾子女父也云明下逹者此擯者稱有惠貺室即壻家舊已有辭下逹女家見許今得言貺室也故引上文下逹以釋此也引子謂公冶長可妻也者證以女許人稱貺室室猶妻也某有先人之禮使某也請納采注某壻父名也某也使名也疏釋曰亦是使者門外通連上語告擯者之辭也注釋曰以其使者稱向主人擯者故知上某是壻父下某是使者名也對曰某之子憃愚又弗能教吾子命之某不敢辭注對曰者擯出納賓之辭某女父名也吾子謂使者古文弗為不無能字音義憃失容反劉敕用反疏注釋曰鄭知對曰者擯出納賔之辭者以其上文賔告擯者辭下經致命主人明此是中間擯者出領賔告之辭入告主人擯者又領主人此語以告使者知也致命曰敢納采疏釋曰此使者升堂致命於主人辭若然亦當有主人對辭如納徵致命主人對辭不言之者文不具也問名曰某既受命將加諸卜敢請女為誰氏注某使者名也誰氏者謙也不必其主人之女疏釋曰問名賔在門外請問名主人許無辭者納采問名同使前已相親於納采許昏訖故於問名略不言主人所傳辭也是以於此有見賔升堂致命主人之辭也自此已下有納吉納徵請期之等皆有門外賔與擯者傳辭及升堂致命主人對或理有不須言或理須辭而文不具以情商度義可皆知也注釋曰知某使者名也者以使者對主人稱某既受命明是使者之名也云誰氏者謙也者以其下逹乃納采則知女之姓矣今乃更問主人女為誰氏者恐非主人之女假外人之女收養之是謙不敢必其主人之女也其本云問名而云誰氏者婦人不以名行明本不問女之三月名此名即姓號之名若尚書孔注云虞氏舜名舜為諡號猶為名解之明姓氏亦得為名若然本問名上氏姓故云誰氏也對曰吾子有命且以備數而擇之某不敢辭注卒曰某氏不記之者明為主人之女疏釋曰云吾子有命者正謂行納采問名使者將命來是已有命來擇即是且以備數而擇之也注釋曰云卒曰某氏者主人終卒對客之辭當云某氏對使也云不記之者明為主人之女者若是他女當稱女氏以答今不言之者明是主人之女容舊知之故不對是以云明為主人之女也醴曰子為事故至於某之室某有先人之禮請醴從者注言從者謙不敢斥也今文於為于音義為于偽反對曰某既得將事矣敢辭注將行先人之禮敢固以請注主人辭固如故某辭不得命敢不從也注賔辭也不得命者不得辭已之命納吉曰吾子有貺命某加諸卜占曰吉使某也敢告注貺賜也賜命謂許以女名也某壻父名疏注釋曰知某是壻父名者以其云命某加諸卜是壻父卜故知某是壻父名對曰某之子不教唯恐弗堪子有吉我與在某不敢辭注與猶兼也古文與為豫音義與音預注同疏注釋曰云我與在以其夫婦一體夫既得吉婦吉可知故云我兼在占吉中也納徵曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某也請納徵致命曰某敢納徵對曰吾子順先典貺某重禮某不敢辭敢不承命注典常也法也疏釋曰吾子有命以下至請納徵是門外向擯者辭也云致命曰某敢納徵者是升堂致命辭也云對曰者是堂上主人對辭也餘見納采請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日注三族謂父昆弟已昆弟子昆弟虞度也不億度謂卒有死喪此三族者已及子皆為服期期服則踰年欲及今之吉也雜記曰大功之末可以冠子嫁子音義度大各反億於力反卒寸忽反期音期疏釋曰云某既申受命矣者申重也謂前納采已後每度重受主人之命也云惟是三族之不虞使某也請吉日者今將成昏須及吉時但吉凶不相干若值凶不得行吉禮故云惟是三族死生不可億度之事若值死時則不得娶及今吉時使某請吉日以成昏禮也注釋曰鄭知三族是父已子三者之昆弟若大功之喪服內不廢成禮若期親內則廢故舉合廢者而言以其父昆弟則伯叔父伯叔母已昆弟則已之親兄弟子昆弟則己之適子庶子者皆已之齊衰期服之內親故三族據三者之昆弟也引雜記者見大功之末既葬則可以嫁子娶妻經云三族不據之矣今據父之昆弟期於子小功不得與子娶妻若於子期於父小功亦不得娶妻知今皆據壻之父而言若然已父昆弟於子為小功而言此三族者已與子皆為服期者亦據大判而言耳對曰某既前受命矣唯命是聽注前受命者申前事也曰某命某聽命于吾子注曰某壻父名也對曰某固唯命是聽使者曰某使某受命吾子不許某敢不告期曰某日注某吉日之甲乙疏釋曰云曰某日者是使者傳主人吉日之辭注釋曰云某吉日之甲乙者謂以十日配十二辰若云甲子乙丑丙寅丁卯之類故鄭略舉甲乙而言之也對曰某敢不敬須注須待也凡使者歸反命曰某既得將事矣敢以禮告主人曰聞命矣注告禮所執脯疏注釋曰知禮是所執脯者上文禮賔賔皆北面取脯降授從者今此云歸以反命故知禮是所執脯也父醮子注子壻也音義醮子召反疏釋曰女父禮女用醴又在廟父醮子用酒又在寢不同者父禮女子以先祖遺體許人以適他族婦人外成故重之而用醴復在廟告先祖也男子直取婦入室無不反之故輕之而用酒在寢知醮子亦不在廟者若在廟當以醴筵於戶西右几在神位今不言故在寢可知也命之辭曰往迎爾相承我宗事注相助也宗事宗廟之事音義相雪亮反勗帥以敬先妣之嗣若則有常子曰諾唯恐弗堪不敢忘命注勗勉也若猶女也勉帥婦道以敬其為先妣之嗣女之行則當有常深戒之詩云大姒嗣徽音音義勗許玉反女音汝下同太音泰疏釋曰云以敬其為先妣之嗣者謂婦人入室使之代姑祭也注釋曰詩大姒嗣徽音者大雅文王詩大姒者文王妃嗣繼徽美也娶大姒眀以繼先妣美音也引之者證敬其為先妣之嗣也賔至擯者請對曰吾子命某以兹初昏使某將請承命對曰某固敬具以須注賔壻也命某某壻父名兹此也將行也使某行昏禮來迎疏注釋曰云命某某壻父名者以其經有二某經云命某者是壻自稱父以對擯者也使某者是壻名故不言也父送女命之曰戒之敬之夙夜毋違命注夙早也早起夜卧命舅姑之教命古文毋為無疏釋曰上送女之時父母俱戒訖今此記人又云此戒者當同是送女時并有此戒續成前文庶母所戒亦然以前後語時不同故記人兩處記之注釋曰但父戒之使無違舅命母戒之使無違姑命故父云命母云戒也若然此注又云命舅姑之教命有姑字者傳寫悮也云古文母為無不從者以許氏説文毋為禁辭故從經今文毋為正也母施襟結帨曰勉之敬之夙夜無違宮事注帨佩巾音義襟其鴆反帨舒鋭反疏釋曰宫事謂姑命婦之事若內宰職云后教六宫婦人稱宫故也庶母及門內施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸襟鞶注庶母父之妾也鞶鞶囊也男鞶革女鞶絲所以盛帨巾之屬為謹敬申重也宗尊也愆過也諸之也示之以襟鞶皆託戒使識之也不示之以衣笄者尊者之戒不嫌忘之視乃正字今文作示俗誤行之音義鞶步于反愆去連反盛音成重直用反識申志反疏注釋曰云男鞶革女鞶絲者內則文男女用物不同故并引男子鞶革於經無所當也云所以盛帨巾之屬為謹敬者案內則云針管線纊施鞶帙鄭云鞶帙言施眀為針管線纊有之是鞶以盛帨巾之屬此物所以供事舅姑故云謹敬也云不示之以衣笄者尊者之戒不嫌忘之者前文父戒以衣笄此經母施襟結帨庶母直示之以襟鞶不示以衣笄故鄭決之也云視乃正字今文作示俗誤行之者案曲禮文童子常視母誑注云視今之示字彼注破視從示此注以視為正字以示為俗誤不同者但古文字少故眼目視瞻與以物示人皆作視字故此注云視乃正字今文作示是俗人以今示解古視故云誤也彼注云視今之示字者以今曉古故舉今文示而言兩注相兼乃具也壻授綏姆辭曰未教不足與為禮也注姆教人者宗子無父母命之親皆沒已躬命之注宗子者嫡長子也命之命使者母命之在春秋紀裂繻來逆女是也躬猶親也親命之則宋公使公孫壽來納幣是也言宗子無父是有有父者禮七十老而傳八十齊喪之事不及若是者子代其父為宗子其取也父命之音義適丁狄反長丁丈反紀音已裂音列繻音須傳直専反齊側皆反疏注釋曰云宗子者適長子也者案喪服小記云繼别為宗繼禰者為小宗大宗小宗皆是適妻所生長子也云命之命使者謂納采已下至請期五者皆命使者也云母命之在春秋紀裂繻來逆女是也者案隱二年經書秋九月紀裂繻來逆女公羊傳曰裂繻者何紀大夫也何以不稱使昏禮不稱主人何休云為養廉逺恥也又云然則曷稱稱諸父兄師友宋公使公孫夀來納幣則其稱主人何辭窮也辭窮者何無母也休注云禮有母母當命諸父兄師友稱父兄師友以行宋公無母莫使命之辭窮故自命之自命之則不得不稱使又云然則紀有母乎曰有有則何以不稱毋母不通也休注云禮婦人無外事但得命諸父兄師友稱諸父兄師友以行耳母命不得逹故不得稱母通使文所以逺别也服注亦云不稱主人母命不通故稱使婦人無外事若然直命使子之父兄師友使命使者不自親命使者此注云命之命使者似母親命者鄭略言之其實使子父兄師友命使者也云躬猶親也親命之則宋公使公孫夀來納幣是也者成八年文義取公羊傳如何説舉納幣其餘使親命之也云言宗子無父至不及者案曲禮七十曰老而傳注云傳家事任子孫是謂宗子之父又王制云八十齊喪之事弗及也注云八十不齊則不祭也子代之祭是謂宗子不孤二者皆是宗子有父雖主家事其昏事則父命使者也支子則稱其宗注支子庶昆弟也稱其宗子命使者疏釋曰云稱其宗者謂命使者當稱宗子以命之以大小宗皆然也弟則稱其兄注弟宗子母弟疏注釋曰知此弟是宗子同母弟者以上攴子謂庶昆弟稱其宗子命使者故知此弟宗子同母弟也若不親迎則婦入三月然後壻見曰某以得為外昏姻請覿注女氏稱昏壻氏稱姻覿見也音義見賢遍反注下除相見並同覿音狄疏釋曰上已言親迎自此已下至篇末論壻不親迎過三月及壻往見婦父母事也必亦待三月者亦如三月婦廟見一時天氣變婦道成故見外舅姑自此至敢不從並是壻在婦家大門外與擯者請對之辭注釋曰女氏稱昏壻氏稱姻者爾雅釋親文所以别男女則男曰昏女曰姻者義取壻昏時往娶女則因之而來及其親則女氏稱昏男氏稱姻義取送女者昏時往男家因得見之故也主人對曰某以得為外昏姻之數某之子未得濯溉于祭祀是以未敢見今吾子辱請吾子之就宫某得走見注主人女父也以白造緇曰辱音義濯丈角反溉古代反造七報反疏釋曰云某之子未得濯溉於祭祀者前祭之夕濯溉祭器以其自此以前未廟見未得祭祀故未敢相見也云請吾子之就宫者使壻還就家是欲往就見也注釋曰云以白造緇曰辱者謂以潔白之物造置於緇色器中是汙白色猶今賔至已門亦是屈辱故云以白造緇曰辱也對曰某以非他故不足以辱命請終賜見注非他故彌親之辭命謂將走見之言今文無終賜疏釋曰此壻對擯者辭注釋曰云非他故彌親之辭者上擯云得為外昏姻是相親之辭今又云非他故是為壻而來見彌相親之辭也對曰某以得為昏姻之故不敢固辭敢不從注不言外亦彌親之辭古文曰外昏姻主人出門左西面壻入門東面奠摯再拜出注出門出內門入門入大門出內門不出大門者異於賔客也壻見於寢奠摯者壻有子道不敢授也摯雉也疏注釋曰云出內門入大門者以大夫士迎賔皆於大門外故此決之也云壻見於寢者聘禮凡見賔客及士親迎皆於廟聘禮敬賔客故在廟親迎在廟者以先祖之遺體許人故在廟此壻見外舅姑非賔非親迎故知在適寢也云奠摯者壻有子道不敢授也者凡執摯相見皆親授受此獨奠之象父子之道質故不親授奠之而已云摯雉也者以其士執雉是其常也擯者以摯出請受注欲使以賔客禮相見疏注釋曰案聘禮賔執摯入門右從君臣禮辭之乃出由門左西向北面從賔客禮此亦然故知所請受者請退從賔客相見受之壻禮辭許受摯入主人再拜受壻再拜送出注出已見女父疏釋曰云受摯入者亦如聘禮受摯乃更西入也注釋曰云出己見女父者以其相見訖擬出更與主婦相見也見主婦主婦闔扉立于其內注主婦主人之婦也見主婦者兄弟之道宜相親也闔扉者婦人無外事扉左扉音義扉音非疏注釋曰云見主婦者兄弟之道宜相親也者爾雅母與妻之黨為兄弟故知主婦於壻者兄弟之道也故云宜相親也云闔扉者婦人無外事者婦人送迎不出門見兄弟不踰閾是無外事也云扉左扉者士喪禮卜葬云闔東扉主婦立於其內既言東扉即是左扉故知是左扉也壻立于門外東面主婦一拜壻答再拜主婦又拜壻出注必先一拜者婦人於丈夫必俠拜主人請醴及揖讓入醴以一獻之禮主婦薦奠酬無幣注及與也無幣異於賔客疏注釋曰訓及為與者以主人與壻揖讓而入寢門升堂醴壻故訓及為與也云無幣異於賔客者士冠禮醴賔酬之以幣昏禮饗賔酬以束錦燕禮大射酬賔客皆有幣此無幣故云異於賔客也壻出主人送再拜儀禮注疏卷二儀禮注疏卷二考證下逹納采用鴈疏春秋莊公二十二年春秋監本作左氏臣學健按下所引者穀梁傳則上當云春秋至于廟門石經全部廟字皆作庿唯此作廟蓋亦錯出者授于楹間南面注南面並授也敖繼公云授宜作受受者南面則授者北面矣臣紱按授者受者皆南面經蓋以授該受也敖説不可從擯者出請賔告事畢疏用齊酒禮之監本脫酒字臣世駿按此句是大行人注文主人迎賔于廟門外疏有司徹注云拂者外拂之也臣紱按今有司徹注無此文當是彼注脫也賔即筵奠于薦左疏賔祭酬酒賔監本作君臣紱按燕禮大射儀祭酬祭者賔也期初昏陳三鼎于寢門外注肫或作純敖繼公云當作純以少牢禮證之良是主人爵辨疏天子諸侯為尊則尊矣不須攝盛尊則尊矣監本作尊則衮矣臣紱按諸侯唯上公得服衮侯伯以下不得也賈氏常有尊則尊矣之語此當從之婦乘以几疏此景之制無正文故云蓋如明衣不直云制如眀衣監本脫不字臣學健按此釋注蓋字之義若無不字則是決辭矣推尋文義增正之贊者徹尊冪舉者盥出除冪敖氏集説冪原作幂冪乃後人改正者今石經作冪則唐人已改之矣設對醬于東臣紱按或因設醬有對而謂俎亦有六相對非也同牢三俎經文甚眀蓋緣楊復儀禮圖之誤刻而誤卒爵皆拜注婦拜見上篇見母章此篇婦見奠菜一章及內則女拜尚右手臣恂按此注不類漢人文體通解本有此蓋後人誤以為鄭注而入之者今仍存而附論之贊洗爵酌于戶外尊敖繼公云戶字疑衍主人説服于房媵受婦説服于室御受下受字監本訛作授今依石經及朱子本敖本改正注巾所以自潔清臣紱按清字陸又音才性反蓋即潔淨之淨漢時未有淨字故清字兩用之三禮注中多有此互見聘禮夙興婦沐浴纚笄宵衣以俟見疏子幼謂年十五以下臣紱按監本此句下有則不隨母嫁五字蓋衍喪服注無之降階受笲段修監本作腶修釋文作段從之石經作股誤特豚合升側載疏酒在內者亦在北墉下墉監本作牖臣紱案正室有南牖無北牖是以西北隅謂之屋漏若有北牖則無所藉戶明矣下經席于北墉下可證於是與始飯之錯敖繼公云此句未詳與始飯三字皆誤與臣恂按此言媵御與餕于始飯之敦黍交錯以遍也言與始飯者見不食舉也或曰古文始為姑媵御止餕姑飯之黍而不敢褻舅之敦黍也亦可通舅姑共饗婦以一獻之禮疏饗則親之眀記使人醮庶婦當饗節也舊本云親明記醮庶婦使人當饗節也臣紱按親字上下有脫文尋繹疏意當作此解士昏禮凡行事必用昏昕注壻悉計反從士從胥俗作壻女之夫臣恂按此十四字不類康成語且東漢未有反切之法又此節記無壻字康成何緣以注中壻字自音而自解之蓋後人攙入者耳祭醴始扱一祭一石經及敖本作一納徴執皮攝之疏聘禮執皮者皆左首此亦執皮而左首臣恂按聘禮皮如入右首而東此疏云左首蓋賈氏誤記耳敖繼公謂彼處右首亦當作左首説見聘禮饗婦姑薦焉疏唯言饗婦唯言饗婦監本訛作時同眀日不可解今以經文訂正之對曰某之子憃愚疏賔告之辭句下監本有下經致語四字臣紱按此四字無著蓋以上有下經致命之文而誤父醮子注子壻也句下敖本有醮之禮如冠醮與其異者於寢爾十三字未詳所由豈他本盡脫抑或敖氏所增今仍監本命之辭曰石經及敖本無辭字壻授綏姆辭曰未教不足與為禮也注姆教人者以上經與注共十九字監本脫今依石經及朱子本楊復儀禮圗本敖本補弟則稱其兄石經及敖本無則字主人對曰某以得為外昏姻之數敖繼公云此言之數下言之故疑有一誤對曰某以得為昏姻之故以得二字石經作得以敖繼公云宜作以得注古文曰外昏姻監本脫此句今依朱子本敖本補儀禮注疏卷二考證
