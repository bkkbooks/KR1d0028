body:
  text: 儀禮注疏卷五漢鄭氏注唐陸德明音義賈公彥疏鄉射禮第五鄉射之禮主人戒賓賓出迎再拜主人答再拜乃請注主人州長也鄉大夫若在焉則稱鄉大夫也戒猶警也語也出迎出門也請告也告賓以射事不言拜辱此為習民以禮樂不主為賓已也不謀賓者時不獻賢能事輕也今郡國行此禮以季春周禮鄉老及鄉大夫三年正月獻賢能之書於王退而以鄉射之禮五物詢衆庶諸矦之鄉大夫既貢士於其君亦用此禮射而詢衆庶乎音義長丁大反警音景語魚據反為于偽反疏釋曰自此至無介論州長將射先戒賓之事案大射前三日宰夫戒宰及司馬又射前一日樂人宿縣此不言日數則戒賓與射同日矣禮同鄉飲酒也以其鄉射先行鄉飲酒鄉飲酒戒賓與飲酒同日知此鄉射戒賓與射亦同日也注釋曰案鄉大夫是諸矦鄉大夫則此州長亦諸侯之州長以士為之是以經云釋獲者執鹿中記云士鹿中是皆為此州長射而言是諸矦州長可知若天子州長中大夫為之若然記云大夫兕中者為鄉大夫詢衆庶而言也云鄉大夫若在焉則稱鄉大夫也者謂大夫來臨禮之時州長戒賓不自稱稱鄉大夫以戒賓也云出迎出門也者謂出序之學門亦如鄉飲酒出庠門皆有一門入門即至堂耳云不言拜辱者此為習民以禮樂不主為賓已也者對鄉飲酒主人戒賔賔拜辱者彼為賓已非為習民以禮樂故也云不謀賓者時不獻賢能事輕也者還決卿飲酒獻賢能故須就先生而謀賓介禮重對此不獻賢能為輕故不謀賓也云今郡國行此禮以季春者漢時雖無諸矦國而置郡為守其王之子弟猶名國其君曰相故鄭注禮記云如今從大守相臨之禮是也引之者證時節與周異也云周禮至衆庶皆周禮鄉大夫職文引之者證此鄉射中兼有鄉大夫行射禮故有射於堂及兕中之事云五物者案彼云一曰和二曰容三曰主皮四曰和容五曰興舞鄭注云和載六德容包六行也庶民無射禮因田獵分禽則有主皮主皮者張皮射之無矦也主皮和容興舞則六藝之射與禮樂與當射之時民必觀焉因詢之也是也鄭云和載六德者和是六德之下六德大故舉下以載上也容為孝者人有孝行則性行含容故以孝為容孝是六行中之大故舉上以包下故云容包六行也云主皮六藝之射者但六藝之中射總言諸射不專據主皮但三物教萬民射唯有主皮此詢衆庶不兼士已上故以主皮為六藝之射以和容為禮者禮之用和為貴又行禮有容儀是以漢時謂禮為容故以禮為和容也以與舞為樂者為樂必興舞故興舞以表樂也若然六德與六行在身所有故可舉少以兼多六藝施於外非獨身所行不可舉一以包六但六者之中御與書數三者於施化民為緩故特舉禮樂與射而言之鄭以主皮和容興舞非射及禮樂之正名故云與以疑之賓禮辭許主人再拜賓答再拜主人退賓送再拜注退還射宫省録射事疏注釋曰射宮者鄉庠州序是也知省録射事者即下文云乃張矦之等是也下言飲酒之事知不為飲酒事者以飲酒者止為射事故以射為主也無介注雖先飲酒主於射也其序賓之禮略疏注釋曰鄭云雖先飲酒者自此已下先言飲酒獻後乃射以是禮記射義云古者諸矦之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮是也但鄉飲酒之禮有介一人以輔賓此無介者主於射序賓之禮略故無介以輔賓也乃席賓南面東上注不言於户牖之間者此射於序疏釋曰自此以下至羮定論將射預前設席位尊罍樂縣及張矦之事也注釋曰云不言於戶牖之間者此射於序者決鄉飲酒在庠以其序無室庠有室此據州長射於序以其無室無户牖設席亦當户牖之處耳言東上亦主人在東故席端在東不得以曲禮席南向北向西方為上因隂陽解之也衆賓之席繼而西注言繼者甫欲習衆庶未有所殊别音義别彼列反疏注釋曰甫始也言始欲習衆庶未有所殊别此決鄉飲酒三賔之席不屬殊别彼有德之人故各自特不繼有所殊别席主人於阼階上西面注阼階東階尊於賓席之東兩壺斯禁左玄酒皆加勺篚在其南東肆注斯禁禁切地無足者也設尊者北面西曰左尚之也肆陳也音義斯如字劉音賜勺上灼反篚音匪疏注釋曰云斯禁禁切地無足者也者案州長是士應言禁制不言者其中兼有鄉大夫禮故舉大夫斯禁與鄉飲酒同云設尊者北面西曰左尚之也者經云左玄酒據人設尊北面故以西為左若據酒則以南面為上地道尊右以西為右玄酒在右故云尚之若然云左據設尊又云尚之據酒尊也設洗於阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆注榮屋翼也音義深申鴆反縣於洗東北西面注此縣謂磬也縣於東方辟射位也但縣磬者半天子之士無鍾音義縣音懸辟音避疏注釋曰云此縣謂磬也者對大射縣鍾磬鎛具有也云縣於東方辟射位也者此言射決鄉飲酒無射事縣於階間也云但縣磬者半天子之士無鍾者案周禮小胥職云半為堵全為肆鄭云鍾磬者編縣之二八十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫天子之卿大夫判縣者東西各有鍾磬為肆諸矦之卿大夫判縣者分一肆於兩廂東縣磬西縣鍾若天子之士特縣者直東廂有鍾磬二虡為一肆諸矦之士分取磬而已縣於東方為特縣故云無鍾對大夫及天子士有鍾若然此既兼鄉大夫詢衆庶當為判縣宜有鍾而總云無鍾者方以禮樂化民雖大夫亦同士特縣也若鄉飲酒方賓鄉人之賢者從士禮也其天子諸矦鍾磬鎛具卿大夫天子士已下亦無鎛知者以其諸矦卿大夫士半天子卿大夫士若有鎛添鍾磬為三半不得故知卿大夫已下皆無鎛也乃張矦下綱不及地武注矦謂所射布也綱持舌繩也武迹也中人之迹尺二寸矦象人綱即其足也是以取數焉音義射食亦反疏釋曰此已下論預張矦之事注釋曰鄭知矦用布者案下記云獸矦大夫士皆言布矦則餘賓射大射其矦皆用布此鄉射采矦二正亦用布可知云綱持舌繩也者周禮梓人云上綱與下綱出舌尋縜寸焉注云綱所以繫矦於植者也故云綱持舌繩也云武迹也中人之迹尺二寸者無正文蓋考驗當時而言似云中人足扼圍九寸也漢禮云五武成步步六尺或據此而言也云矦象人者案鄭注梓人云上下皆出舌一尋者亦人張手之節也以其張矦之法下兩舌半上舌兩頭綱皆出一尋即是上廣下狹象人張足六尺張臂八尺故云象人也云綱即其足也者謂經下綱象足云是以取數焉者以下綱象足張之六尺是取數於武也不繫左下綱中掩束之注事未至也音義中丁仲反疏注釋曰案下記云東方謂之右個注矦以向堂為面也則此左下綱以西畔而言云中掩束之者案記云鄉矦一大倍中以為躬躬二丈倍躬以為左右舌四丈兩舌各出一丈又云下舌半上舌則左右各出五尺今將此五尺與下綱不繫者中掩左廂向東待將射乃解之故云事未至也乏參矦道居矦黨之一西五步注容謂之乏所以為獲者御矢也矦道五十步此乏去矦北十丈西三丈音義為于偽反獲如字疏釋曰乏參矦道者謂三分矦道云居矦黨之一者黨旁也謂在矦西北邪向之故以旁言之其居旁之一者謂矦道內三分之居一分之地十丈也云西五步者據矦之正北落西有五步即三大也注釋曰云容謂之乏者案周禮射人職云王以六耦射三矦三獲三容五正彼據王三矦有三容容者以革為之可以容身故云容也云乏者謂矢於此匱乏不去故云乏也云獲者御矢也者謂唱獲者恐矢至其身故云獲者御矢也云矦道五十步者記云鄉矦五十弓弓之下制六尺與步相應故鄭云步也云此乏去矦北十丈者五十步計之步六尺五十步則三十丈三分取一為十大云西三丈者經云西五步五六三十故云三丈也遠近如此者一得避矢一得去堂二十丈聞唱獲聲是其節也羹定注肉謂之羹定猶熟也謂狗熟可食音義定多佞反疏注釋曰云謂狗熟者此與鄉飲酒同亨狗於東方是也主人朝服乃速賓賓朝服出迎再拜主人答再拜退賓送再拜注速召也射賓輕也戒時玄端今郡國行此鄉射禮皮辨服與禮為異音義朝直遙反疏釋曰自此至當楣北面答再拜論主召賓從已之事此主人與賓俱朝服案鄉飲酒賓主俱不言服者以彼賓禮重故戒與速賓俱朝服故不言此習禮輕是故戒時玄端召時乃朝服故須言之也注釋曰必此戒時玄端者見公食大夫云賓朝服即位於大門外如聘注云於是朝服則初時玄端宜與彼同皆是戒時不言服後速時朝服故知此亦戒時玄端矣且鄉飲酒戒速俱不言服知皆朝服者下記云鄉朝服而謀賓戒是也云今郡國已下引之者欲見與周異也賓及衆賓遂從之及門主人一相出迎於門外再拜賓答再拜注相主人家臣擯贊傳命者音義相息亮反傳文專反下傳同疏釋曰鄉飲酒云賓及衆賓皆從之彼兼介故云皆此無介故不言皆也云主人一相出迎於門外注與鄉飲酒同此亦主人自迎而言一相者使之傳賓言兼相禮也揖衆賓注差卑禮宜異疏注釋曰此賓與衆賓同是鄉人無爵者而云差卑者唯據立為賓者尊衆賓即為卑不論有爵無爵也云禮宜異者賓則拜之衆賓則揖之是其異也主人以賓揖先入注以猶與也先入入門右西面疏注釋曰云以猶與者案左氏傳云蔡侯以吳子及楚人戰于柏舉彼以者能東西之日以以謂驅使前人之稱此言嫌有驅使之稱故以為與謂主人與賓是以為平敵之義故須訓之云先入入門右西面者此注亦與鄉飲酒同以其賓入東面故西面待之賓厭衆賓衆賓皆入門左東面北上賓少進注引手曰厭少進差在前也今文皆曰揖衆賓音義厭於涉反下賓厭同疏釋曰此經亦與鄉飲酒同此云賓少進彼亦宜然不言者文不具也主人以賓三揖皆行及階三讓主人升一等賓升注三讓而主人先升者是主人先讓於賓不俱升者賓客之道進宜難也疏釋曰言皆行者賓主既行衆賓亦行故云皆行鄉飲酒亦皆不言者文略也注釋曰知主人先讓於賓者以其主人之法先升導賓賓後升進宜難禮之當然故知主人先讓賓也此先升一等禮之常燕禮君升一等者尊君故也主人阼階上當楣北面再拜賓西階上當楣北面答再拜注主人拜賓至此堂音義楣亡悲反疏注釋曰知拜是拜至者鄉飲酒義云拜至拜洗公食亦云當楣北嚮再拜故知拜是拜至主人坐取爵於上篚以降注將獻賓也疏釋曰自此至主人阼階上答拜論主人獻賓之事凡取爵於篚以降者皆是上篚鄉飲酒不言上者文略也賓降注從主人也主人阼階前西面坐奠爵興辭降注重以主人事煩賓也今文無阼階賓對注對答疏釋曰鄉飲酒注云賓主之辭未聞此不注從可知主人坐取爵興適洗南面坐奠爵于篚下盥洗注盥手又洗爵致潔敬也古文盥皆作浣音義浣戶管反賓進東北面辭洗注必進者方辭洗宜違位也言東北面則位南於洗矣主人坐奠爵于篚興對賓反位注反從降之位也鄉飲酒曰當西序東面主人卒洗一揖一讓以賓升賓西階上北面拜洗主人阼階上北面奠爵遂答拜乃降注乃降將更盥也古文一皆作一賓降主人辭降賓對主人卒盥一揖一讓升賓升西階上疑立注疑止也有矜莊之色音義疑魚乞反疏注釋曰鄉飲酒注云疑讀為仡然從於趙盾之仡疑正立自定之貌此言疑止也有矜莊之色二注相兼乃具也主人坐取爵實之賓之席前西北面獻賓注進於賓也凡進物曰獻疏注釋曰云凡進物曰獻者欲見此賓乃是鄉民而已無尊卑上下猶言獻者此獻直是進物而言進獻之也案周禮玉府注云古者致物於人尊之則曰獻彼據尊敬前人雖卑亦曰獻若齊侯獻捷於魯之類義與此别也賓西階上北面拜主人少退注少退猶少辟也音義辟婢亦反一音避疏注釋曰鄉飲酒文與此同注云少退少辟及下文云賓少退注云少退逡巡義亦與此同賓進受爵于席前復位注復位西階上位主人阼階上拜送爵賓少退薦脯醢注薦進賓升席自西方注賓升降由下也疏注釋曰凡席升由下降由上下文降席不由上者以主人在東敬主人不得降由上又於席西拜便使升降皆由下故云賓升降由下也乃設折俎注牲體枝解節折以實俎也音義折之設反後皆放此主人阼階東疑立賓坐左執爵右祭脯醢奠爵于薦西興取肺坐絶祭注卻左手執本右手絶末以祭也肺離上為本下為末疏注釋曰鄭皆約鄉飲酒知之也尚左手嚌之注嚌嘗也右手在下絶以授口嘗之音義嚌才計反興加于俎坐捝手執爵遂祭酒興席末坐啐酒注捝拭也啐嘗也古文捝作説音義捝始鋭反啐七內反拭音式降席坐奠爵拜告旨注降席席西也旨美也執爵興主人阼階上答拜賓西階上北面坐卒爵興坐奠爵遂拜執爵興注卒盡主人阼階上答拜賓以虛爵降注將洗以酢主人疏釋曰自此至賓西階上答拜論賓酢主人之事鄉飲酒不言虛爵直云降洗此直云虛爵降不言洗互見為義相兼乃具也主人降注從賔也降立阼階東西面當東序疏注釋曰皆鄉飲酒文也賓西階前東面坐奠爵興辭降主人對賓坐取爵適洗北面坐奠爵于篚下興盥洗注賓北面盥洗自外來疏注釋曰對主人自內出南面上文主人坐取爵適洗南面是也主人阼階之東南面辭洗賓坐奠爵于篚興對主人反位注反位從降之位也主人辭洗進也疏注釋曰云反位從降之位也者即上東序之西南面位云主人辭洗進者經直言反不言進鄭以言反位由前進乃反位故鄭却本之主人辭洗進也賓卒洗揖讓如初升疏釋曰言如初則亦一揖一讓也主人拜洗賓答拜興降盥如主人之禮賓升實爵主人之席前東南面酢主人注酢報主人阼階上拜賓少退主人進受爵復位賓西階上拜送爵薦脯醢主人升席自北方乃設折俎祭如賓禮注祭薦俎及酒亦嚌啐不告旨注酒巳物自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賓西階上北面答拜注自由也啐酒於席末由前降便也音義便婢面反後放此疏注釋曰鄭知義然者亦約鄉飲酒得知也主人坐奠爵于序端阼階上再拜崇酒賓西階上答再拜注序端東序頭也崇充也謝酒惡相充滿也疏釋曰奠爵于序端此擬下獻衆賓故云取爵于序端與鄉飲酒同也主人坐取觶于篚以降注將酬賓音義觶之豉反疏釋曰自此至當西序論酬賓之事賓降主人奠觶辭降賓對東面立主人坐取觶洗賓不辭洗注不辭洗以其將自飲卒洗揖讓升賓西階上疑立主人實觶酬之阼階上北面坐奠觶遂拜執觶興注酬勸酒賓西階上北面答拜主人坐祭遂飲卒觶興坐奠觶遂拜執觶興賓西階上北面答拜主人降洗賓降辭如獻禮注以將酌已疏注釋曰鄭言此者前不辭洗主人自飲至此辭洗以將酌已故辭也升不拜洗注酬禮殺也音義殺所界反賓西階上立主人實觶賓之席前北面注酬賓賓西階上拜主人坐奠觶于薦西賓辭坐取觶以興反位注賓辭辭主人復親酌已音義復扶又反疏注釋曰此辭前獻時親酌已今復親酌已主人阼階上拜送賓北面坐奠觶于薦東反位注酬酒不舉疏注釋曰鄉飲酒注引曲禮不盡人之歡之事此不言亦從彼注可知主人揖降賓降東面立于西階西當西序注主人將與衆賓為禮賓謙不敢獨居堂主人西南面三拜衆賓衆賓皆答一拜注三拜示遍也一拜不備禮也獻賓畢乃與衆賓拜敬不能並音義遍音遍疏注釋曰云三拜示遍也者衆賓無問多少止為三拜而已是示遍也云一拜不備禮也者衆賓人皆一拜是拜不備禮此亦答大夫拜法以其此禮中含鄉大夫法若答士拜則亦再拜見於特牲也云獻賓畢乃與衆賓拜者自爾來唯與賓拜未與衆賓拜今始拜之故云敬不能並主人揖升坐取爵于序端降洗升實爵西階上獻衆賓衆賓之長升拜受者三人注長其老者言三人則衆賓多矣國以多德行道藝為榮何常數之有乎音義長丁丈反行下孟反疏注釋曰衆賓之長升拜受者三人此雖非賓賢能其衆亦三人在堂上與鄉飲酒數同其堂下衆賓無定數故鄭云言三人則衆賓多矣云國以多德行道藝為榮者案周禮大司徒以鄉三物教萬民一曰六德二曰六行三曰六藝此既鄉人則德行亦據六德六行道藝則六藝也此並與鄉飲酒賓介與衆賓之類並來與在射中是以孔子射於矍相之圃觀者如堵墻彼亦據孔子為鄉大夫習人以禮樂之射至於誓之於後僅有存焉亦無常數之事也主人拜送注拜送爵於衆賓右疏注釋曰知在衆賓右者約鄉飲酒獻衆賓皆於西階上賓右知之也坐祭立飲不拜既爵授主人爵降復位注既盡疏釋曰此還據堂上三人者降復賓南東面位衆賓皆不拜受爵坐祭立飲注自第四以下又不拜受爵禮彌略疏注釋曰此謂堂下衆賓無數者故鄭云自第四以下云又不拜受爵禮彌略者三賓雖坐祭立飲不拜既爵仍拜受此衆賓非直坐祭立飲不拜既爵又不拜受爵故云禮彌略也每一人獻則薦諸其席注諸於疏釋曰此還據堂上三人有席者故云薦諸其席謂席前也衆賓辨有脯醢注薦於其位音義辨音遍疏注釋曰還據堂下無席者故鄭云薦於其位不云席也主人以虛爵降奠于篚注不復用揖讓升賓厭衆賓升衆賓皆升就席疏釋曰自此以下至舉觶者降論旅酬之事一人洗舉觶于賓注一人主人之吏疏注釋曰主人之吏亦謂府吏以下非屬官也升實觶西階上坐奠觶拜執觶興賓席末答拜舉觶者坐祭遂飲卒觶興坐奠觶拜執觶興賓答拜降洗升實之西階上北面注將進奠觶賓拜注拜受觶舉觶者進坐奠觶于薦西注不授賤不敢也疏注釋曰以其是主人之吏既賤故不敢親授奠之也賓辭坐取以興注若親受然疏注釋曰云若親受然者賓辭即坐取以興故云若親受然也舉觶者西階上拜送賓反奠于其所舉觶者降疏釋曰云反奠於其所者還於薦西以其射後賓北面舉之為旅酬故不奠於薦東也大夫若有遵者則入門左注謂此鄉之人為大夫者也謂之遵者方以禮樂化民欲其遵法之也其士也於旅乃入卿大夫士非鄉人禮亦然主於鄉人耳今文遵為僎音義僎音遵疏注釋曰云大夫若有遵者言若者或無不定故云若也鄭知是當鄉大夫者以其鄉射既與人行射禮而言大夫者當鄉大夫可知云其士也於旅乃入者下記云士既旅不入明未旅間皆得入是以未旅而射其士皆在也知卿大夫士非鄉人禮亦然者以其同是卿大夫士禮無異故也但異鄉不助主人樂賓為别也主人降注迎大夫於門內也不出門别於賓音義别彼列反疏注釋曰鄭知迎大夫於門內者以其上文大夫入門左此經直云主人降不云出故知迎大夫於門內可知賓及衆賓皆降復初位注不敢居堂俟大夫入也初位門內東面疏注釋曰知初位門內東面者上文賓厭衆賓皆入門左東面北上故知也主人揖讓以大夫升拜至大夫答拜主人以爵降大夫降主人辭降大夫辭洗如賓禮席於尊東疏尊東明與賓夾尊也不言東上統於尊也疏注釋曰上云尊於賓席之東則賓在尊西今大夫言席於尊東明與賓夾尊可知云不言東上統於尊也者席於尊東繼尊而言又不言東上西上是以下云大夫降席東南面降由上故知西上統於尊也升不拜洗主人實爵席前獻于大夫大夫西階上拜進受爵反位主人大夫之右拜送大夫辭加席主人對不去加席注辭之者謙不以巳尊加賢者也不去者大夫再重席正也賓一重席音義去起呂反重直容反下皆同疏釋曰云升不拜洗者以大夫尊故不拜洗也云反位者大夫反西階上位云主人大夫之右拜送者謂在大夫之東拜送爵也注釋曰云辭之者謙不敢以已尊加賢者鄉射之禮鄉人為賓下記云若大夫與則以公士為賓亦選賢者為之故辭加席又不以巳尊加賢者也云不去者大夫再重席正也者鄉飲酒云公三重大夫再重故知大夫再重席禮之正也云賓一重席者鄉人故一重縱公士為賓亦一重也乃薦脯醢大夫升席設折俎祭如賓禮不嚌肺不啐酒不告旨西階上卒爵拜主人答拜注凡所不者殺於賓也大夫升席由東方疏注釋曰云凡所謂經中三事以其殺於賓若然上云不拜洗亦是殺於賓之類也云大夫升席由東方者以其大夫席西上升由下故知大夫升席由束方也大夫降洗注將酢主人也大夫若衆則辨獻長乃酢疏釋曰自此至皆升就席論大夫酢主人訖賓主皆升就席之事知大夫若衆則辨獻長乃酢者此經據一大夫而言故獻大夫即酢案有司徹主人洗爵獻長賓于西階上然後衆賓長升拜受爵宰夫贊主人酌若是以辨乃升長賓主人酌酢於長賓西階上北面賓在左注云主人酌自酢序賓意賓卑不敢酢賓尸與凡卑飲酒禮同可以相參示是辨獻長乃酢也主人復阼階降辭如初卒洗主人盥注盥者雖將酌自飲尊大夫不敢褻疏注釋曰云盥者雖將酌自飲者以其下文大夫洗爵升授主人爵是主人酌以自酢故云雖將酌自飲云不敢褻者決有司徹主人自酌不盥是此為尊大夫雖自酢亦不敢褻也揖讓升大夫授主人爵于兩楹間復位主人實爵以酢于西階上坐奠爵拜大夫答拜坐祭卒爵拜大夫答拜主人坐奠爵于西楹南再拜崇酒大夫答拜主人復阼階揖降注將升賓疏釋曰云主人坐奠爵於西楹南者前獻賓賓酢主人主人飲酢訖奠爵於東序端將後獻衆賓不得奠於篚中此受大夫酢不奠于篚者為士於旅乃入擬獻士故奠爵于此也大夫降立于賓南注雖尊不奪人之正禮疏注釋曰大夫尊在堂則席之于尊東特尊之今降而在賓下者欲使賓主相對行禮若在其北則妨賓主揖讓之正禮故云不奪人之正禮主人揖讓以賓升大夫及衆賓皆升就席席工于西階上少東樂正先升北面立于其西注言少東者明樂正西側階不欲大東辟射位音義大音泰疏釋曰自此至告于賓論作樂之事云席工者謂為工設席下文乃升席也注釋曰云言少東者明樂正西側階者既言席工于西階上少東則在西階東矣復云樂正立于其西則近席西其言從近故知樂正側近西階東則不欲大東辟射位大射亦同此注燕禮注亦然者燕亦容有射法鄉飲酒工位與此同注不言者不射故也工四人二瑟瑟先相者皆左何瑟面鼓執越內弦右手相入升自西階北面東上工坐相者坐授瑟乃降注瑟先賤者先就事也相扶工也面前也鼓在前變於君也執越內弦右手相由便也越瑟下孔所以發越其聲也前越言執者內有弦結手入之淺也相者降立西方音義相息亮反何胡可反疏釋曰云工四人二瑟則是二人歌可知經不言相歌二人者以其空相亦與相瑟者同故不言直言瑟之難者也注釋曰云瑟先賤者先就事也者案大射大師少師歌衆工瑟是知瑟者賤也凡工者皆先瑟後歌是賤者先即事故序亦在前若然得獻亦在前以隨其先後而取之故也云鼓在前變於君也者鄉射與大射相對大射君禮而後首此臣禮前首故云變於君燕禮與鄉飲酒相對是以燕禮面鼓又與鄉飲酒後首相變云執越內弦右手相者案鄉飲酒注云內弦側擔之者據瑟體而言燕禮注云內弦弦為主者據弦體而説此言內弦右手相由便語異義同也云前越言執者內有弦結手入之淺也者瑟體首寬尾狹內越孔雖長廣狹亦等但弦居瑟上近首鼓處則寬近尾不鼓處則狹側持之法近鼓持之手入則淺近尾持之手入則深是以通與燕禮言面鼓則云執之手入淺也大射與鄉飲酒言後首則云挎越手入深故也云相者降立西方者其相者是弟子位在西者是以下文云樂正適西方命弟子贊工遷樂於下故知此相工是弟子故降立還於西方也笙入立于縣中西面注堂下樂相從也縣中磬東立西面音義縣音懸疏注釋曰云堂下樂相從也者案上大云縣于洗東北西面此云立于縣中明是堂下相從皆在東方也云縣中磬東立西面者謂在磬東當磬之東鄭知不在磬西西面者若磬西西面則笙者背磬不可故知在磬東西面也乃合樂周南關雎葛覃卷耳召南鵲巢采繁采蘋注不歌不笙不間志在射略於樂也不略合樂者周南召南之風鄉樂也不可略其正也昔大王王季文王始居岐山之陽躬行以成王業至三分天下乃宣周南召南之化本其德之初刑于寡妻至于兄弟以御于家邦故謂之鄉樂用之房中以及朝廷饗燕鄉射飲酒此六篇其風化之原也是以合金石絲竹而歌之音義合如字劉音閣間間厠之間大音泰疏釋曰言乃者以其作樂之法先歌後乃合樂今不歌不笙不間唯合樂故言乃以見非常故也注釋曰據鄉飲酒燕禮作樂有四節今不歌不笙不間唯有合樂故云志在射略於樂也云合樂者周南召南之風鄉樂也者上注已云頌及大雅天子樂小雅諸矦樂此二南卿大夫樂但鄉飲酒鄉射是大夫士為主人故大夫士樂為鄉樂者也云不可略其正也者二南是大夫士之鄉樂已之正樂故云不可略其正者也云昔太王已下於鄉飲酒注已説義具於彼此注略言之耳若然者燕禮與鄉飲酒大同注又與燕禮不異者以其鄉射與鄉飲酒同是大夫士禮卿大夫士行射禮先行鄉飲酒禮鄉飲酒與鄉射自為首尾故鄉飲酒注具於此略言燕禮是諸矦禮天子諸矦射先行燕禮則燕禮與大射自為首尾是以燕禮歌笙間合鄭亦具注之大射又略言之也工不興告于樂正曰正歌備注不興者瞽矇禮略也音義矇音蒙疏釋曰言正歌者升歌也升歌鹿鳴是上歌諸侯樂非已正樂故以二南為正歌也言備者凡作樂皆三終此備明亦三終也注釋曰云不興者瞽矇禮略也者以工告樂正以卑告尊當興今以瞽矇無目不可責其備禮故不興者於禮略也樂正告于賓乃降注樂正降者堂上正樂畢也降立西階東北面疏注釋曰言告于賓者作樂主為樂賓今歌備故告賓言歌備也言樂正降者堂上正樂畢也者以其鄉飲酒燕禮但升歌笙間合樂皆是正歌今略去升歌笙間三者唯有合樂於堂上故云堂上正樂畢也云正樂者對後無算樂非正樂也下射雖歌騶虞亦是堂下非堂上故以堂上決之也云降立西階東北面者此無正文約堂上樂正位在西階東北面今降亦當在西階東北面也主人取爵于上篚獻工大師則為之洗注尊之也君賜大夫樂又從之以其人謂之大師也音義為于偽反疏注釋曰自此至反升就席論主人獻工笙之事但天子諸矦官備有大師少師瞽人作樂之長大夫士官不備不合有大師君有賜大夫士樂器之法故春秋左氏云晉矦歌鍾二肆取半以賜魏絳魏絳於是乎始有金石之樂禮也時以樂人賜之故鄭云君賜大夫樂又從之以其人謂之大師也賓降主人辭降注大夫不降尊也疏注釋曰云大夫不降尊也者此賓降大夫若降直與賓共文今不言大夫降鄉飲酒亦云賓降不言大夫降明大夫皆不降以其尊故也工不辭洗卒洗升實爵工不興左瑟一人拜受爵注左瑟辟主人授爵也一人無大師則工之長者疏注釋曰此言工不辭洗及一人拜受爵皆上大師也不言大師言工一人者欲見有大師則大師不辭洗拜受爵若無大師則凡工不辭洗拜受爵故變言工與一人假令大師左瑟先獻若歌則後獻亦先獻工一人是以鄭云一人無大師則工之長者以鄉飲酒獻工時云一人不興受爵注云一人工之長者也大師為歌者未得獻先獻瑟工之長者也主人阼階上拜送爵薦脯醢使人相祭注人相者音義相息亮反疏注釋曰云人相者則弟子相之既相工明祭亦相之可知工飲不拜既爵授主人爵衆工不拜受爵祭飲辨有脯醢不祭注祭飲不興受爵坐祭坐飲疏釋曰云工飲不拜既爵者還是上一人拜受爵者雖不拜既爵仍拜受也下衆工又對上一人拜受爵衆工不拜受爵也注釋曰云祭飲不興受爵坐祭坐飲者對上賓主坐祭立飲故云坐祭坐飲亦不拜既爵可知也不洗遂獻笙于西階上注不洗者賤也衆工而不洗矣而衆笙不洗者笙賤於衆工正君賜之猶不洗也疏注釋曰云衆工而不洗矣而衆笙不洗者笙賤於衆工正君賜之猶不洗也鄭云此者欲見工在上貴君賜之大師為之洗笙賤位在下使正君賜之笙人猶不為之洗况衆笙乎欲取賜笙人不為之洗之意不取衆笙不為洗也笙一人拜于下盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙不拜受爵坐祭立飲辨有脯醢不祭主人以爵降奠于篚疏釋曰此經總獻笙人雖賤中亦有尊卑故一人升階受爵餘者不升不拜既爵則同也反升就席注亦揖讓以賓升衆賓皆升疏注釋曰云亦揖讓以賓升衆賓皆升者謂亦前大夫若有遵者則入門左主人降賓及衆賓皆降主人共大夫行禮訖主人揖讓以賓升大夫及衆賓皆升就席相似故云亦若然上賓降時雖不言衆賓降衆賓卑從降可知故今從賓升也主人降席自南方注禮殺由便疏注釋曰自此盡未旅論立司正之事也云禮殺由便者對上文主人受酢爵時禮盛故主人降席自北方啐酒於席末亦然今此立司正禮殺故降席自南方故云禮殺由便也側降注賓不從降疏注釋曰側降猶特降故云賓不從降也作相為司正司正禮辭許諾主人再拜司正答拜注爵備樂畢將留賓以事為有懈倦失禮立司正以監之察儀法也詩云既立之監或佐之史音義懈古賣反監古咸反疏注釋曰云爵備者謂賓及衆賓與遵者并工笙並得獻是爵備也云樂畢者合樂訖是樂畢以無歌笙與間故不言樂成而云畢而已也云將留賓以事者下有射事射訖行旅無算之事故須立司正以監之但中間為射變司正為司馬射訖反為司正以監察儀法也引詩者證監與正為一物皆察儀法也主人升就席司正洗觶升自西階由楹內適阼階上北面受命于主人注洗觶者當酌以表其位顯其事也楹內楹北疏釋曰云受命于主人者謂受主人請安賓之命是以下云請安于賓鄭注云傳主人之命也西階上北面請安于賓注傳主人之命賓禮辭許司正告于主人遂立于楹間以相拜注相謂贊主人及賓相拜之辭主人阼階上再拜賓西階上答再拜皆揖就席注為已安也今文揖為升司正實觶降自西階中庭北面坐奠觶興退少立注奠觶表其位也少立自修正慎其位也古文曰少退立疏釋曰此云北面坐奠觶鄉飲酒亦然者此二者皆臣禮故北面奠觶燕禮大射皆司正南面奠觶者彼是君禮欲取還不背君故南面奠觶故大射云南面坐奠觶興右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠於其所北面立注云皆所以自昭明於衆也將於觶南北面則右還於觶北南面則左還如是得從觶西往來也必從觶西往來者為君在阼不背之也又取威儀多此及鄉飲酒在阼非君直北面奠觶又威儀簡故也進坐取觶興反坐不祭遂卒觶興坐奠觶拜執觶興洗北面坐奠于其所注今文坐取觶無進又曰坐奠之拜興少退北面立于觶南注立觶南亦其故擯位疏注釋曰云立觶南亦其故擯位者案上未有擯位此云擯位者案射禮云擯者退中庭是擯者在中庭有位燕禮大射皆擯者為司正則此卿射及鄉飲酒云作相為司正相即擯者也故知觶南者中庭故擯位也未旅注旅序也未以次序相酬以將射也旅則禮終也疏注釋曰旅衆也而言序者謂衆以次序相酬必於未旅而射者旅則醉禮終恐不得射故於未旅而射也此大夫士禮將射先行鄉飲酒後行旅酬而已故射前未旅而射後乃始行旅酬燕禮大射國君禮故先行燕禮雖行一獻以其辨尊卑故行四舉旅大射主為射故再獻訖即射燕禮主為燕故三舉旅乃射彼皆與此不同也三耦俟于堂西南面東上注司正既立司射選弟子之中德行道藝之高者以為三耦使俟事於此疏注釋曰自此已下盡樂正北面立於其南論三番射事鄭知司正既立司射既選弟子之中為三耦俟事於此者經云俟於堂西明此時始選故知既立司正司射乃選弟子俟事於此也故記云三耦者使弟子司射前戒之注云弟子賓黨之少者也前戒謂先射請戒之司射適堂西袒決遂取弓于階西兼挾乘矢升自西階階上北面告于賓曰弓矢既具有司請射注司射主人之吏也於堂西袒決遂者主人無次隱蔽而已袒左免衣也決猶闓也以象骨為之著右大擘指以鈎弦闓體也遂射韝也以韋為之所以遂弦者也其非射時則謂之拾拾斂也所以蔽膚斂衣也方持弦矢曰挾乘矢四矢也大射曰挾乘矢於弓外見鏃於弣右巨指鈎弦古文挾皆作接音義袒徒旱反決古穴反挾音協一音子協反乘繩證反闓音開著丁略反又直略反擘補革反韝古矦反見賢遍反鏃子木反又七木反弣芳甫反疏釋曰云司射取弓於階西兼挾乘矢者以其司射之弓矢豫陳於西階故司射於堂西袒決遂訖即取弓矢於階西是以下記云司射之弓矢與撲倚於西階之西是也云有司請射者此有司謂司馬故大射云司射自阼階前曰為政請射注為政謂司馬司馬政官主射禮諸侯之州長無司馬官直言有司請射以比司馬也注釋曰云司射主人之吏也者大射諸矦禮有大射正為長射人次之司射又次之小射正又次之皆是士為之則此大夫士禮不得用士故知是主人之吏為之可知云於堂西袒決遂者主人無次隱蔽而已者此對大射人君禮有次在東方不須適堂西也云袒左免衣也知袒左者凡事無問吉凶皆袒左是以士喪主人左袒此及大射亦皆袒左不以吉凶相反唯有受刑袒右故覲禮云乃右肉袒於廟門之東注云右肉袒者刑宜施於右是也云決猶闓也以象骨為之者大射注亦然案繕人云掌王之用弓弩矢箙繒弋決拾鄭注云士喪禮決用正王棘若檡棘則天子用象骨與無正文故引士喪禮又言與以疑之若然諸矦及大夫生用象死用棘天子無問死生皆用象者蓋取其滑也云著右大擘指以鈎弦闓體也知者以右巨指鈎弦故知著於右大擘指也以右擘著極是以大射云朱極三注云以朱韋為之三者食指將指無名指是也云遂射韝也以韋為之以遂弦者也者大射注亦云遂射韝也以朱韋為之著左臂所以遂弦也云其非射時則謂之拾拾斂也所以蔽膚斂衣也者此篇及大射將射云袒決遂射訖則云説決拾於公雖射亦謂之拾故大射云公就物小射正奉決拾以笥大射正執弓皆以從於物彼亦臨時而云拾以公射袒朱襦言拾以見斂衣故變文以見義也云所以蔽膚斂衣也者言蔽膚據士斂衣據大夫已上是以下記大夫與士射袒纁襦燕禮記云君射袒朱襦若對君大夫亦與士同亦蔽膚也云方持弦矢曰挾知者下記云凡挾矢於二指之間橫之是言其方可知引大射挾乘矢於弓外見鏃於弣是其方也若側持弓矢則名執故下文云司射猶袒決遂左執弓石執一個兼諸弦面鏃注云側持弓矢曰執面猶尚也並矢於弦尚其鏃是也云乘矢四矢也者下云司射搢三挾一個又詩云四矢反兮是四矢曰乘凡物四皆曰乘也引大射者欲見挾為方持弦矢賓對曰某不能為二三子許諾注言某不能謙也二三子謂衆賓已下音義為于偽反疏注釋曰二三子謂衆賓已下者謂除三耦之外通射者而言故云謂衆賓已下也若然投壺禮賓固辭乃許者彼因燕而為之再辭乃許此為衆習禮不專為已故一辭即許大射不請者彼為擇士而射故不須云許直告射節而已此為衆庶習禮故云為二三子許諾亦一辭而許也司射適阼階上東北面告于主人曰請射于賓賓許司射降自西階階前西面命弟子納射器注弟子賓黨之年少者也納內也射器弓矢決拾旌中籌楅豐也賓黨東面主人之吏西面音義少申召反楅音福疏釋曰鄭知弟子是賓黨之年少者以其賓黨西方東面今以西面命之明是賓黨是以鄭云賓黨東面主人之吏西面也言弟子故知少者知射器弓矢以下者並案下文所陳用者知之也云賓黨東面主人之吏西面者案投壺賓黨及主黨皆為弟子皆得與投壺者彼燕法主歡心故皆與今此射與鄉人習禮鄉飲酒同故賓黨主黨皆不與也乃納射器皆在堂西賓與大夫之弓倚于西序矢在弓下北括衆弓倚于堂西矢在其上注上堂西廉矢亦北括音義倚於綺反括古活反疏釋曰云賓與大夫之弓倚於西序矢在弓下北括衆弓倚於堂西矢在其上者以其序在堂上故矢在弓下堂西矢在堂上其弓在堂下隨其所宜而已注釋曰云上堂西亷者以其在堂西故矢在上者還在堂上之亷稜也云矢亦北括者其在堂上西序者北括故知堂下者於上亦北括也主人之弓矢在東序東注亦倚于東序也矢在其下北括疏注釋曰上賓大夫弓矢在西序矢在弓下北括此主人弓矢如上也司射不釋弓矢遂以比三耦於堂西三耦之南北面命上射曰某御於子命下射曰子與某子射注比選次其才相近者也古文曰某從於子音義比毗志反近附近之近疏釋曰言遂以者司射因上階前令弟子納射器不釋弓矢遂比三耦因曰遂故云遂以也注釋曰云比選次其才相近者也者才雖各自用乃因選其力相近為宜也司正為司馬注兼官由便也立司正為涖酒爾今射司正無事疏注釋曰言兼官者若以諸侯對大夫大夫兼官諸矦具官特以諸矦對天子天子具官諸矦兼官各有所對故云兼官云由便也者俟司正為司馬不煩餘官也案射義云孔子射於矍相之圃射至於司馬使子路執弓矢出延射又使公罔之裘序點揚觶而語但此篇是州長春秋習射法兼有鄉大夫三年貢士之後以五物詢衆庶射於庠鄉大夫五物詢衆庶而引孔子射於矍相之事則孔子魯之鄉大夫也以其天子鄉大夫卿為之諸矦鄉大夫使下大夫為之是其差也但鄉飲酒之禮二人舉觶為無算爵據此篇未旅先射射訖行旅酬酬訖賓使二人舉觶為無算爵未射時詢衆庶得使公罔之裘序點二人揚觶者揚觶實在射後一酬訖始行之今孔子詢衆庶之時借取庶算爵時於旅也語故使公罔之裘序點二人揚觶以詢衆庶此篇司射恆執弓矢子路亦執弓矢則子路為司射也射於矍相時云射至司馬此文又云司正為司馬則使子路詢衆庶時當此節也司馬命張矦弟子説束遂繫左下綱注事至也今文説皆作稅音義説吐活反又始鋭反疏注釋曰上張矦時不繫左下綱中掩束之今弟子説其束下致地遂繫左不綱於植事至故也司馬又命獲者倚旌于矦中注為當負矦也獲者亦弟子也謂之獲者以事名之疏注釋曰案下記云司馬階前命張矦遂命倚旌以記言之司馬命張矦與命倚旌其事相因故云遂明同是西階前也云為當負矦也者下云司馬命獲者執旌以負矦是也知獲者亦弟子者堂下位主人之黨在東賓弟子在西下云獲者由西方坐取旌倚于矦中言由西方是賓黨弟子可知亦亦上張矦者也云以事名之者以其唱獲故名獲者也獲者由西方坐取旌倚于矦中乃退樂正適西方命弟子贊工遷樂于下注當辟射也贊佐也遷徙也音義辟音避弟子相工如初入降自西階阼階下之東南堂前三笴西面北上坐注笴矢幹也今文無南音義相息亮反笴古老反幹古但反疏釋曰言如初入者亦如上升堂時相者亦左何瑟面鼓內弦右手相如入升時也注釋曰云笴矢幹也者案矢人注矢幹長三尺是去堂九尺也樂正北面立于其南注北面鄉堂不與工序也音義鄉許亮反疏注釋曰云不與工序也者工西面北上以南北為序樂正北面則東西為列故云不與工序也司射猶挾乘矢以命三耦各與其耦讓取弓矢拾注猶有故之辭拾更也音義拾其劫反除決拾之外皆同更音庚疏釋曰自此盡取撲搢之以反位論司射誘射教三耦射法之事大射有次三耦取弓矢於次注云取弓矢不拾者次中隱蔽處則此無次取弓矢拾也拾更也遞取弓矢見威儀故也注釋曰云猶有故之辭者前已云司射兼挾乘矢此云猶是有故之辭云此者欲見司射恆執弓矢未改之意三耦皆袒決遂有司左執弣右執弦而授弓注有司弟子納射器者也凡納射器者皆執以俟事疏注釋曰前有司請射解為司馬此有司為弟子者以有事者皆有司故鄭注解上有司請射與大射為政請射同故解為司馬此經以納射器使弟子不見出文則弟子執射器入者即使守之以授用者故知有司還是弟子是以鄭云凡納射器者皆執以俟事遂授矢注受於納矢而授之疏注釋曰此授矢者則上文有司授弓者以其弟子執弓矢故授弓訖復授矢是以鄭云受於納矢而授之三耦皆執弓搢三而挾一個注未違俟處也搢插也插於帶右音義插初洽反下同疏注釋曰上云三耦俟於堂西又云遂以比三耦於堂西此云三耦皆執弓搢三而挾一個前後皆用前位乃未違俟處下文乃云三耦皆進由司射之西立於其西南東面北上是移本位者也云搢插也插於帶右者以其左手執弓右手抽矢而射故知插於帶右故詩云左旋右抽是也司射先立于所設中之西南東面三耦皆進由司射之西立于其西南東面北上而俟司射東面立于三耦之北搢三而挾一個注為當誘射也固東面矣復言之者明卻時還音義復扶又反下復言同疏注釋曰云固東面矣復言之者明卻時還者司射先在中西南東面今三耦立定司射卻來向三耦之北東面明司射卻時右還西南東面也揖進當階北面揖及階揖升堂揖豫則鉤楹內堂則由楹外當左物北面揖注鉤楹繞楹而東也序無室可以深也周立四代之學於國而又以有虞氏之庠為鄉學鄉飲酒義曰主人迎賓於庠門外是也庠之制有堂有室也今言豫者謂州學也讀如成周宣榭災之榭周禮作序凡屋無室曰榭宜從榭州立榭者下鄉也左物下物也今文豫為序序乃夏后氏之學亦非也音義豫音榭出注下遐嫁反疏釋曰凡行射禮耦耦各相對揖故司射誘射發東面位揖進當西階北面揖及階揖升堂揖訖東行向兩楹間物須過兩楹是以豫則鉤楹內北過以記云序則物當棟物近北故過由楹北也堂則由楹外過而東行以記云堂則物當楣物近南故過由楹南也云當左物者以南面為正東為左物北面又揖也注釋曰云鉤楹繞楹而東也者北而東也云序無室可以深也者據州立序而言云周立四代之學於國者案王制云有虞氏上庠下庠夏后氏東序西序殷人左學右學周人東膠虞庠周立四代者通已為四代也但質家貴右故虞殷大學在西郊小學在國中文家貴左故夏周大學在國中王宫之東小學在西郊周所立前代學者立虞夏殷三代大學若然立虞氏上庠則周之小學為有虞氏之庠制在西郊也立殷之右學則瞽宗周立之亦在西郊立夏后氏之東序則周之東膠立在王宫之東以其改東序為東膠東膠兼二代名故云周立四代學文王世子亦論四代學中學樂之事云而又以有虞氏之庠為鄉學者與周立虞庠同制故引鄉飲酒義為證鄉立庠之義也云庠之制有堂有室也者則此篇云堂則由楹外又記云堂則物當楣是也論語云由也升堂矣未入於室室堂相將有室必有堂言此者見庠則室堂俱有對榭則有堂無室也云今言豫者謂州學也者周禮地官州長職云春秋以禮會民而射于序是也云讀如成周宣榭災之榭者案宣公十六年經書成周宣榭火彼雖不據學以其無室與爾雅無室曰榭同故引以為證也云周禮作序者據州長職文云凡屋無室曰榭宜從榭者鄭廣解榭名爾雅云闍謂之臺有木者謂之榭又成周宣榭及此州立榭皆是無室故云凡以該之不得從豫及序故云宜從榭也云州立榭者下鄉也者以其鄉之庠有室有堂州榭則有堂無室故云下鄉也云今文豫為序序乃夏后氏之學亦非也不從今文者以其虞庠夏序皆是有室州之序則無室故云非言亦者古文為豫已非今文作夏后氏之序亦非若然禮記學記及州長職并下記皆作序鄭不破之者以鄉立虞庠依虞有室州立夏序去室猶取序名是以鄭注州長云序州黨之學也故不破之也及物揖左足履物不方足還視矦中俯正足注方猶併也志在於射左足至右足還併足則是立也南面視矦之中乃俯視併正其足音義併步頂反疏注釋曰云志在於射者解足未正先視矦中之意言左足至者解左足履物也右足還併足則是立也者解經不方足還及正足之言若然云還時兼視矦中也此不言畫物早晚案大射納射器之下即言工人士與梓人升自北階兩楹間疏數容弓若丹若墨度尺而午此不言者卑者文略亦當在納射器後即畫之也不去旌注以其不獲音義去起吕反疏注釋曰以其旌擬唱獲今以為三耦誘射不唱獲故不去旌也誘射注誘猶教也將乘矢注將行也行四矢象有事於四方疏注釋曰云象有事於四方者詩云四矢反兮以御亂兮是四夫有事於四方執弓不挾右執弦注不挾矢盡疏注釋曰案上文司射將射時云搢三而挾一個又云將乘矢故知矢盡空執弦也南面揖揖如升射降出于其位南適堂西改取一個挾之注改更也不射而挾之示有事也今文曰適序西疏釋曰云出于其位南適堂西者上文司射位設于所設中之西南東面今乃適位南而北回適堂西者取教衆耦威儀之法故也云改取一個挾之者此不在西階而在堂西故適堂西即云改取一個也遂適階西取撲搢之以反位注撲所以撻犯教者書云撲作教刑音義撻他逹反疏注釋曰引書者舜典文也彼謂教學之刑此為教射法教雖不同用撲是一故引為證也司馬命獲者執旌以負矦注欲令射者見矦與旌深有志於中音義令力呈反中丁仲反疏釋曰自此盡搢撲論三耦為第一番射法注釋曰云欲令射者見侯與旌深有志於中者凡射主欲中矦使獲者舉旌唱獲以是豫使見之望深有志於中也獲者適矦執旌負矦而俟注俟待也今文俟為立疏釋曰俟待也而待者謂待司馬命去矦司射還當上耦西面作上耦射注還左還也作使也疏注釋曰知左還者經云還當上耦上耦位在司射之西南東面司射還欲西面與上耦相當故知左還回身當之取便可知也司射反位上耦揖進上射在左並行當階北面揖及階揖上射先升三等下射從之中等注中猶間也音義間間側之間疏釋曰云司射反位者反中西南東面位也上射升堂少左下射升上射揖並行注並併也併東行疏注釋曰知並行併東行者以其既言升乃言並行故知併東行向物也云少左者言上射先升少左避下射升階也皆當其物北面揖及物揖皆左足履物還視矦中合足而俟疏釋曰皆左足履物者謂先以左足履物東頭合足而俟俟司馬命去矦司馬適堂西不決遂袒執弓注不決遂因不射不備疏注釋曰云因不射不備此決司射誘射行事袒即決遂執弓挾矢今司馬不射故不備直袒而已也若然大射司馬正不射而袒又復決遂者彼大射志於射故司馬正雖不射而袒復決遂以其不為射仍不挾矢也出于司射之南升自西階鉤楹由上射之後西南面立于物間右執簫南揚弓命去矦注鉤楹以當由上射者之後也簫弓末也大射曰左執弣揚猶舉也疏注釋曰鉤楹者於西楹西而北東行過由上射之後乃西南面立於物間者欲取南揚弓向矦便故也右執簫者不可一手揚弓故引大射曰左手執弣左當卻手則右執簫者右當覆手也獲者執旌許諾聲不絶以至于乏坐東面偃旌興而俟注聲不絶不以宫商不絶而已鄉射威儀省偃猶仆也音義省所景反仆音赴疏釋曰云而俟者待射者發矢當坐故下云獲者坐而獲也注釋曰云鄉射威儀省者決大射云負侯皆許諾以宫趨直西及乏南又諾以商至乏聲止是其唱諾為宮商是其威儀多此不者威儀省故也司馬出于下射之南還其後降自西階反由司射之南適堂西釋弓襲反位立于司射之南注圍下射者明為二人命去侯音義還劉户串反一音環疏注釋曰司馬由上射之後立於物間命去矦訖物間南行西向適階降是其順矣今命去矦訖乃圍下射之後繞下射之東南行而適西階者若出物間西行則似直為上射命去矦是以并下射圍繞之明為二人命去矦也司射進與司馬交于階前相左由堂下西階之東北面視上射命曰無射獲無獵獲上射揖司射退反位注射獲謂矢中人也獵矢從傍音義無射之射食亦反傍蒲郎反或作旁疏釋曰云交於階前相左者既云司射與司馬交於階前相左乃云由堂下西階之東北面則相左之時在西階之西司馬由北而西行司射由南而東行各以左相近故云相左也司射既不升堂不得以司射向北司馬向南而相左也注釋曰云射獲謂矢中人也者人謂獲者亦以事名云獵矢從傍者謂從乏傍也乃射上射既發挾弓矢而后下射射拾發以將乘矢注后後也當從后疏注釋曰引孝經説取孝經緯援神契文彼説孝經云然後能保其社稷之等皆作后后者後也故不從古文後是以云當從后獲者坐而獲注射者中則大言獲獲得也射講武田之類是以中為獲也疏釋曰此未釋算故下經云獲而未釋獲鄭云但大言獲未釋其算是也注釋曰云獲得也射講武田之類是以中為獲也者詩云舍拔則獲謂射著禽獸為獲獲則得也戰伐得囚俘亦曰獲射著正鵠亦曰獲但舉旌以宫大言獲也偃旌以商小言獲也舉旌以宮偃旌以商注宮為君商為臣聲和律呂相生疏注釋曰宮為君商為臣禮記樂記文宮數八十一聲最濁故為君酉中央土商數七十二次君故為臣配西方金云聲和律呂相生者以其以黃鍾之初九下生林鍾之初六林鍾又上生大蔟之九二初九與九二雖非以次相生大蔟亦由黃鍾所生故云聲和由律呂相生故舉旌以宮偃旌以商不取其餘律呂也獲而未釋獲注但大言獲未釋其算卒射皆執弓不挾南面揖揖如升射注不挾亦右執弦如司射上射降三等下射少右從之中等並行上射於左注降下疏釋曰此上射下射升與降階上射為先又上射升降皆在左與升射者目木左交于階前相揖由司馬之南適堂西釋弓説決拾襲而俟于堂西南面東上三耦卒射亦如之音義説吐活反又始説反司射去撲倚于西階之西升堂北面告于賓曰三耦卒射注去撲乃升不敢佩刑器即尊者之側疏注釋曰云不敢佩刑器即尊者之側者此司射將升堂即賓前故去撲於階西乃升是不敢佩刑器即於尊者之側也大射司射去撲倚於階西適阼階下北面告於公曰三耦卒射不升堂亦去撲者國君尊雖堂下亦去撲也賓揖注以揖然之疏注釋曰大射司射告公三耦卒射不見公揖然之者公尊故也司射降搢撲反位司馬適堂西袒執弓由其位南進與司射交于階前相左升自西階鉤楹自右物之後立于物間西南面揖弓命取矢注揖推之也疏釋曰自此盡加於楅論三耦射訖取矢之事注釋曰推手曰揖引手曰厭故周禮司儀天揖時揖土揖鄭注皆以推手解之是以推手為揖但揖弓者向矦而推之以其命取矢故也揚弓者向乏而揚之以其命去矦故也獲者執旌許諾聲不絶以旌負矦而俟注俟弟子取矢以旌指教之疏注釋曰此即下文弟子取矢委於楅是也司馬出于左物之南還其後降自西階遂適堂前北面立于所設楅之南命弟子設楅注楅猶幅也所以承笴齊矢者疏注釋曰云楅猶幅也訓楅為幅者義取若布帛有邊幅整齊之意故云所以承笴齊矢即下云委於楅北括又大射云既拾取矢梱之注云梱齊等之是其承笴也乃設楅于中庭南當洗東肆注東肆統於賓疏釋曰此弟子設楅之時司馬教之故大射云小臣師設楅司馬正東面以弓為畢鄭注云畢所以教助執事者明此亦然注釋曰云東肆統於賓者然則楅有首尾故下記云楅長如笴博二寸厚寸有半龍首鄭注云兩端為龍首若然則有首無尾而言西上者應有刻飾記之為首尾也司馬由司射之南退釋弓于堂西襲反位弟子取矢北面坐委于楅北括乃退司馬襲進當楅南北面坐左右撫矢而乘之注撫拊之也就委矢左右手撫而四四數分之也上既言襲矣復言之者嫌有事即袒也凡事升堂乃袒音義乘成證反拊芳甫反數所主反下俟數同疏釋曰云司射之南退釋弓者司馬往堂西釋弓還依三耦所行之處亦取威儀進止之事故曰司射之南也云委矢於楅北括者順射時矢南行故也注釋曰云撫拊之也者言撫者撫拍之義言拊者取拊近之理故轉從拊也云就委矢左右手撫而四四數分之也者謂司馬北面就所委矢之南以右手撫四矢於東以左手撫四矢於西是四四數而分之也云上既言襲矣復言之者嫌有事即袒也者案上文命弟子設楅退時已襲今復言襲進者嫌有事則袒故重言之也云凡事升堂乃袒者堂下雖有事亦不袒若司射不問堂上堂下有事即袒司馬與司射遞行事恐同故明之也若矢不備則司馬又袒執弓如初升命曰取矢不索注索猶盡也音義索悉各反弟子自西方應曰諾乃復求矢加于楅注增故曰加嚮獲者許諾至此弟子曰諾事同互相明音義應應對之應復扶又反嚮許亮反又作嚮疏注釋曰上言獲者執旌許諾故曰嚮獲者許諾至此弟子曰諾以其事同互相明也言互者獲者執旌許諾不言弟子許諾則弟子亦許諾此直言弟子自西方應曰諾不言獲者應諾則獲者亦應諾可知以其事同省文故互相明之司射倚撲于階西升請射于賓如初賓許諾賓主人大夫若皆與射則遂告于賓適阼階上告于主人主人與賓為耦注言若者或射或否在時欲耳射者繹已之志君子務焉大夫遵者也告賓曰主人御于子告主人曰子與賓射音義與音預疏釋曰自此盡比衆耦辨論次番將射比衆耦之事但射禮三而止第一番直司射與三耦誘射不釋算第二番三耦與衆耦俱射釋算第三番兼有作樂為射節注釋曰云言若者或射或否者以若是不定之辭故知或射或否射者繹已之志者禮記射義文繹謂陳已之志意也云大夫遵者也者上云大夫有遵者是也故與賓主同在任情之限云告賓曰主人御於子告主人曰子與賓射此約下大夫與士射之辭以賓比大夫以主人比士尊賓之義也遂告于大夫大夫雖衆皆與士為耦告于大夫曰某御于子注大夫皆與士為耦謙也來觀禮同爵自相與耦則嫌自尊别也大夫為下射而云御于子尊大夫也士謂衆賓之在下者及羣士來觀禮者也禮一命已下齒於鄉里音義别彼列反疏注釋曰云大夫為下射而云御於子尊大夫也者上命三耦云命上射曰某御於子命下射曰子與某子射今命大夫云某御於子與上射同者尊大夫也大夫雖為下射其辭不與下射同也云士謂衆賓之在下者言衆賓則與賓俱來者也下記云大夫與則公士為賓鄭注云公士在官之士則衆賓之內亦有士矣與賓俱至則得主人之所命者也其將射而至者非主人之所命直來觀禮者也但是一命已下莫問先後而至皆齒於堂下故鄭總云士謂衆賓之在下者及羣士來觀禮者也云禮一命已下齒於鄉里者周禮黨正十月行正齒位之禮云一命齒於鄉里再命齒於父族三命不齒案鄉飲酒注云此篇無正齒位之事則鄉射先行鄉飲酒之禮亦無正齒位之法而云一命以下齒於鄉里者鄉飲酒鄉射雖無正齒位之禮士立於下是以一命者在下與鄉里齒是其常法諸侯之士無再命以上若為公卿大夫自在尊東為遵也言士謂衆賓之在下者則堂上三賓不與大夫為耦矣亦皆射故下文云衆賓與射者皆降是也西階上北面作衆賓射注作使司射降搢撲由司馬之南適堂西立比衆耦注衆耦大夫耦及衆賓也命大夫之耦曰子與某子射其命衆耦如三耦音義比毗志反疏注釋曰云衆耦大夫耦及衆賓也者言大夫之耦唯謂堂下之士言衆賓則兼堂上三賓故下云衆賓皆降云命大夫之耦曰子與某子射此即上文命下射之辭也云其命衆耦如三耦者上命三耦云命上射曰某御於子命下射曰子與某子射是也以其俱是士故命辭同衆賓將與射者皆降由司馬之南適堂西繼三耦而立東上大夫之耦為上若有東面者則北上注言若有者大夫士來觀禮及衆賓多無數也疏釋曰言由司馬之南適堂西者上文司馬位在司射之南東面是也注釋曰云多無數也者以其言若亦是不定之辭故無常數也衆賓若少以南面為正若多不受則西邊東面北上若然大夫來在尊東為遵而此言之者鄭總解來觀禮之義不謂大夫輒在此位也賓主人與大夫皆未降注言未降者見其志在射音義見賢遍反疏釋曰言未降後有降階之理故下云三耦卒射賓主人大夫揖皆由其階降與耦俱升射也注釋曰言志在射者以其射在於堂上故也司射乃比衆耦辨注衆賓射者降比之耦乃遍音義遍音遍疏注釋曰云衆賓射者降比之耦乃遍者以上文司射降比衆耦下文乃云衆賓將與射者皆降鄭恐衆賓堂上後降者不比故兼堂上後降亦比乃遍也遂命三耦拾取矢司射反位注反位者俟其袒決遂來疏釋曰自此盡為上論拾取矢並衆耦皆就射位之事注釋曰云反位者俟其袒決遂來者下文云三耦拾取矢進立於司馬之西南是也此司射反位不言先者將欲為下番射司射堂西命三耦及衆賓皆袒決遂執弓就位司射先反位鄭注云言先三耦及衆賓嚮不言先三耦未有拾取矢位無所先以此言之明言先反者對未反位之辭俱有位得言先若一有一無不得言先即此文是以下文注決此也若俱無亦得言先故上文司射比三耦於堂西云司射先立於所設中之西南東面三耦皆進由司射之西立於其西南東面北上而俟是其皆未有位亦得言先三耦拾取矢皆袒決遂執弓進立于司馬之西南注必袒決遂者明將有射事疏釋曰立于司馬之西南者案上司射位在中西南司馬位在司射南今立於司馬之西南亦東面北上也注釋曰云必袒決遂者明將有射事者始取矢未有射事而袒決遂者以其取矢訖即有射故豫著之故云將有射事也司射作上耦取矢注作之者還當上耦如作射疏注釋曰案上文司射作射之時左還當上耦西面作上耦射今作取矢亦如之故云還當上耦如作射司射反位上耦揖進當楅北面揖及楅揖注當楅楅正南之東西疏注釋曰此上耦發位東行時一南一北並行及將至楅南下耦在南稍進當前楅南俱北面揖其時上射稍西下射稍東東西相當故云當楅楅正南之東西也上射東面下射西面上射揖進坐橫弓卻手自弓下取一個兼諸弣順羽且興執弦而左還退反位東面揖注橫弓者南踣弓也卻手由弓下取矢者以左手在弓表右手從裏取之便也兼并矢於弣當順羽既又當執弦也順羽者手放而下備不整理也不言毋周在阼非君周可也音義卻去逆反踣蒲北反毋亦作無同疏釋曰言順羽且興者謂以右手順羽之時則興故云且興也言左還者以左手向外而西回東面揖者揖下射使取矢也注釋曰云橫弓者南踣弓也者覆左手以執弓卻右手以取矢便故知不北踣弓也云以左手在弓表者表弓背也覆手以執背故云左手在弓表云右手從裏取之便也者覆手在表執弓右手卻在裏取矢故云便也云不言毋周在阼非君周可也者案大射云左旋毋周反面揖鄭注云左還反其位毋周右還而反東面也君在阼還周則下射將背之此直云左還反位不言毋周明還周可也鄭云下射將背之則上射亦左還毋周也下射進坐橫弓覆手自弓上取一個興其他如上射注覆手由弓上取矢者以左手在弓裏右手從表取之亦便音義覆芳伏反疏注釋曰云以左手在弓裏右手從表取之亦便者上射在西云南踣弓此不云踣弓則亦南踣弓知者以其亦用左手執弓覆右手取矢則執弓卻左手可知既仰左手向上執弓而南踣故用右手弓上向下取矢亦便也既拾取乘矢揖皆左還南面揖皆少進當楅南皆左還北面搢三挾一個注楅南鄉當楅之位疏注釋曰云楅南鄉當楅之位者上云進當楅北面揖今至此位皆還北面也揖皆左還上射於右注上射轉居右便其反位也下射左還少南行乃西面疏注釋曰云上射轉居右便其反位也者此決射時升降上射皆居左彼自堂西不復庭位故也此復庭位故上射轉在右是以鄭云便其反位也云下射左還少南行乃西面者以其初北面時東西相當今西行宜並故下射少南行乃西面取並行故也與進者相左相揖反位注相左皆由進者之北疏注釋曰云由進者之北者以其進取矢者東行此則西行由進者之北則得相左也三耦拾取矢亦如之後者遂取誘射之矢兼乘矢而取之以授有司于西方而后反位注取誘射之矢挾五個弟子逆受於東面位之後疏釋曰云三耦拾取矢亦如之者上耦亦在三耦之中連而言之注釋曰云取誘射之矢挾五個者以其前拾取矢皆搢三挾一個乃反位此則先取四矢亦搢三挾一個乃並取誘射之矢兼挾之故五個也云弟子逆受於東面位之後者弟子即納射器者因留圭授受於堂西西方今見下耦將司射矢來向位仍西面弟子即往逆受之訖下射乃反東面故云授有司於西方而后反位謂反向東面位是以鄭亦云弟子逆受於東面位之後也衆賓未拾取矢皆袒決遂執弓搢三挾一個由堂西進繼三耦之南而立東面北上大夫之耦為上注未猶不也衆賓不拾者未射無楅上矢也言此者嫌衆賓三耦同倫初時有射者後乃射有拾取矢禮也疏注釋曰云未猶不也者若言未謂此第一番初時未有拾取矢禮以其第一番唯有三耦射無賓射法不得云未是以轉為不以其全不拾取矢也云言此者嫌衆賓三耦同倫初時有射者此解經云衆賓不拾之意有此嫌故明之云後乃射有拾取矢禮也者據第三番衆賓乃射自然有楅上拾取矢禮後文見之也司射作射如初一耦揖升如初司馬命去矦獲者許諾司馬降釋弓反位司射猶挾一個去撲與司馬交于階前升請釋獲于賓注猶有故之辭司射既誘射恆執弓挾矢以掌射事備尚未知當教之也今三耦卒射衆足以知之矣猶挾之者君子不必也音義去起呂反疏釋曰自此盡共而俟論第二番射之事案大射第二番射司馬命去矦云如初此司馬命去矦不言如初者此臣禮威儀省司馬初命去矦時獲者許諾聲不絶以至於乏再番三番命去矦獲者直許諾無不絶聲故不言如初大射君禮威儀多故第二番與前同獲者以宮商趨之故言如初於第三番禮殺獲不以宮商直許諾又不得言如初注釋曰云今三耦卒射衆足以知之矣猶挾矢者君子不必也者司射教射者三耦卒射衆賓足知射禮猶挾矢教之者君子不必也案論語孔子云君子無必無固無我以不必即知故仍教之賓許降搢撲西面立于所設中之東北面命釋獲者設中遂視之注視之當教之疏注釋曰云當教之者謂教其釋算安置左右及數算告勝負之事亦教之也釋獲者執鹿中一人執算以從之注鹿中謂射於榭也於庠當兕中疏注釋曰以州長是士射於榭鄉大夫是大夫為之射於庠下記云士則鹿中大夫兕中故云鹿中謂射於榭也於庠當兕中也釋獲者坐設中南當楅西當西序東面興受算坐實八算于中橫委其餘于中西南末興共而俟注興還北面受算反東面實之音義共九勇反疏釋曰云設中南當楅南北節西當西序東西節注釋曰云興還北面受算反東面實之者以其所納射器皆在堂西執中與算皆從堂西來向西序之南南面故執中者既東面坐設訖興還向北面受算回向東面實之也司射遂進由堂下北面命曰不貫不釋注貫猶中也不中正不釋算也古文貫作關音義貫古亂反中丁仲反正音征疏注釋曰言不貫者以其以布為矦故中者貫穿布矦故以中為貫也是以鄭云貫猶中也中則貫也上射揖司射退反位釋獲者坐取中之八算改實八算于中興執而俟注執所取算疏釋曰八算者人四矢一耦八矢雖不知中否要須一矢則一算改實八算擬後來者用之乃射若中則釋獲者坐而釋獲每一個釋一算上射於右下射於左若有餘算則反委之注委餘算禮尚異也委之合於中西音義中丁仲反疏釋曰云上射於右下射於左者以釋算者東面為正依投壺禮賓黨於右主黨於左是以上射於右賓黨也下射於左主黨也注釋曰云委餘算禮尚異也者手中餘算未知有幾不必盡中所有餘亦得於後釋要委餘於地别取中內八算者禮尚異故不用餘者云委之合於中西者算法多少視射人多少不定要橫委其餘於中西手中餘者與之合也又取中之八算改實八算于中興執而俟三耦卒射賓主人大夫揖皆由其階降揖主人堂東袒決遂執弓搢三挾一個賓於堂西亦如之皆由其階階下揖升堂揖主人為下射皆當其物北面揖及物揖乃射卒南面揖皆由其階階上揖降階揖賓序西主人序東皆釋弓説決拾襲反位升及階揖升堂揖皆就席注或言堂或言序亦為庠榭互言也賓主人射大夫止於堂西疏注釋曰上云榭則鉤楹內謂射於榭者也堂則由楹外謂射於庠者也此當有鄉大夫射於庠亦有州長射於序故互見其義互言者今袒決遂則言堂東西見在庠也在榭亦然釋弓説決拾則言序東序西序則榭也在庠亦然故言序東西周公省文欲兩見之也云大夫止於堂西者上賓主人大夫俱降無堂西之文下云大夫袒決遂就其耦故知此時止於堂西故記云大夫降立於堂西以俟射也大夫袒決遂執弓搢三挾一個由堂西出于司射之西就其耦大夫為下射揖進耦少退揖如三耦及階耦先升卒射揖如升射耦先降降階耦少退皆釋弓于堂西襲耦遂止于堂西大夫升就席注耦於庭下不並行尊大夫也在堂如上射之儀近其事得申疏注釋曰言在堂如上射之儀者謂耦先升是如上射先升法以其近射事故得申也衆賓繼射釋獲皆如初司射所作唯上耦注於是言唯上耦者嫌賓主人射亦作之大射三耦卒射司射請于公及賓疏注釋曰云於是言唯上耦者嫌賓主人射亦作之鄭言此者若三耦射下即言所作唯上耦則賓主人射作之未可知故於衆賓射訖乃言此明賓主射不作可知故於此乃言所作唯上耦明除賓主矣故鄭云於是言唯上耦嫌賓主射亦作之引大射者公尊公與賓射不作直請記云賓主人射則司射擯升降是雖不作猶為擯相之但不請也卒射釋獲者遂以所執餘獲升自西階盡階不升堂告于賓曰左右卒射降反位坐委餘獲于中西興共而俟注司射不告卒射者釋獲者於是有事宜終之也餘獲餘算也無餘算則空手耳俟俟數也疏注釋曰云宜終之也者決前番射司射告卒射此二番射不告卒使獲者告是宜終之也云餘獲餘算者一不必盡中故有餘算也云無餘算則空手耳者或賓主八矢盡中釋八算故空手告也司馬袒決執弓升命取矢如初獲者許諾以旌負矦如初司馬降釋弓反位弟子委矢如初大夫之矢則兼束之以茅上握焉注兼束大夫矢優之是以不拾也束於握上則兼取之順羽便也握謂中央也不束主人矢不可以殊於賓也言大夫之矢則矢有題識也肅慎氏貢枯矢銘其括今文上作尚音義題大兮反識申志反枯音户字又作楛疏釋曰自此盡司馬乘矢論取矢之事注釋曰云束於握上則兼取之順羽便也者握上則兼取之順持之處今束於握之上取持於中央握之向下順羽便故乘矢總束之也云不束主人矢不可以殊於賓也者主人鄉大夫則是大夫當束之不敢殊别於賓故不束若主人是州長則士自然不束也肅慎氏者國語文引之者證矢有題識以有題識故束者得知是大夫之夫也司馬乘矢如初司射遂適西階西釋弓去撲襲進由中東立于中南北面視算注釋弓去撲射事已疏注釋曰凡言遂者因上事司射於上無事而言遂適者以司射與司馬遞行事今以司馬進乘矢司射遂適西階西釋弓去撲也注釋曰云射事已此始再番射未已而言已者前番不釋獲今據第二釋獲之功成則為已是以下記云司射釋弓矢視算與獻釋獲者釋弓矢注云唯此二事休武主文休武者射記數算主文者冼爵獻釋獲者是也釋獲者東面于中西坐先數右獲注固東面矣復言之者為其少南就右獲音義數所主反為于偽反疏注釋曰釋獲者在中西東面釋算之時賓黨於右主黨於左今將數算宜就之是以少南就右獲仍東面也二算為純注純猶全也耦隂陽疏注釋曰云耦隂陽者隂陽對合故二算為耦隂陽也一純以取實于左手十純則縮而委之注縮從也於數者東西為從古文縮皆為蹙音義從子容反疏注釋曰凡言從橫者南北為從東西為橫今釋算者東面而言從橫則據數算東為正是以東西者為從南北者為橫故鄭云於數者東西為從也每委異之注易校數有餘純則橫於下注又異之也自近為下疏釋曰此則以南北為橫也一算為竒竒則又縮諸純下注竒猶虧也又從之興自前適左東面注起由中西就左獲少北於故東面鄉之疏注釋曰云少北如故故則右算也又移至左算之後東面鄉之是以云少北於故坐兼斂算實于左手一純以委十則異之注變於右疏注釋曰云變於右者右則一一取之於地實於左手此則總斂於左手一一取之於左手委於地是變也必變之者禮以變為敬也其餘如右獲注謂所縮所橫司射復位釋獲者遂進取賢獲執以升自西階盡階不升堂告于賓注賢獲勝黨之算也齊之而取其餘疏注釋曰云齊之而取其餘者解經取賢獲以算為獲以其唱獲則釋算故名算為獲左右數齊有餘則賢獲故以告也若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有竒者亦曰竒注賢猶勝也言賢者射之以中為雋也假如右勝告曰右賢於左若干純若干竒音義中丁仲反疏注釋曰若干者數不定之辭凡數法自二已上得稱若干竒則一也一外無若干鄭亦言若干者因純有若干竒亦言若干竒言若干者衍字也若左右鈞則左右皆執一算以告曰左右鈞降復位坐兼斂算實八算于中委其餘于中西興共而俟疏釋曰此將為第三番射故豫設之或實或委一如前法也司射適堂西命弟子設豐注將飲不勝者設豐所以承其爵也豐形蓋似豆而卑音義飲於鴆反疏釋曰自此盡徹豐與觶論罰爵之事注釋曰云設豐所以承其爵也者案燕禮君尊有豐此云承爵豐則兩用之燕禮注豐形似豆卑而大此不言大彼以承尊故言大此承爵不言大或小耳弟子奉豐升設于西楹之西乃降勝者之弟子洗觶升酌南面坐奠于豐上降袒執弓反位注勝者之弟子其少者也耦不酌下無能也酌者不授爵略之也執弓反射位不俟其黨已酌有事音義少詩召反下遐嫁反下相下同疏注釋曰知弟子是少者以其執弟子禮使令故知少者也云執弓反射位不待其黨已酌有事者以此弟子由堂西固在射賓中矣黨即衆賓是也案下文三耦及衆射者皆與其耦進立于射位今酌者不待其黨與俱進而先反射位者由已酌酒有事訖其黨未得司射命又無事不得共酌者同就射位故酌者先得反射位也司射遂袒執弓挾一個搢撲北面于三耦之南命三耦及衆賓勝者皆袒決遂執張弓注執張弓言能用之也右手執弦如卒射疏注釋曰云右手執弦如卒射者上文卒射執弓不挾右執弦矢盡故也此非卒射亦執張弓為無矢亦右執弦也故注云如卒射不勝者皆襲説決拾卻左手右加弛弓于其上遂以執弣注固襲説決拾矣復言之者起勝者也執弛弓言不能用之也兩手執弣又不得執弦音義弛尸紙反弣芳甫反疏注釋曰云固襲説決拾矣者謂前降堂時既襲説決拾矣云起勝者也者謂至此復言不勝者謂以此襲説決拾以不能用也起發勝者袒決遂能用也云兩手執弣又不得執弦者上勝者言執張弓如卒射則左手執弓右手執弦此則云執弣明弛弓於左手之上執弣橫之而不得執弦則宜右手共執弓弣故云兩手執弣又不得執弦也司射先反位注居前俟所命來疏注釋曰云居前俟所命來者以衆射者皆止於堂西未向射位而司射先反位下文司射命衆耦衆耦等乃來就射位是得命即來故云俟所命來也來訖司射乃作之也三耦及衆射者皆與其耦進立于射位北上司射作升飲者如作射一耦進揖如升射及階勝者先升堂少右注先升尊賢也少右辟飲者也亦相飲之位音義辟音避疏注釋曰云少右辟飲者也者以其豐在西楹之西正當西階飲者升少西又當辟豐上之爵故云少右辟飲者也云亦相飲之位者以其相飲者皆北面於西階授者在東飲者在西故云亦相飲之位不勝者進北面坐取豐上之觶興少退立卒觶進坐奠于豐下興揖注立卒觶不祭不拜受罰爵不備禮也右手執觶左手執弓疏注釋曰此無正文以祭禮皆左手執爵用右手以祭故知此亦用左手執弓右手執觶可知也不勝者先降注後升先降略之不由次疏注釋曰此對射時升降皆有上射在先今後升先降故云略之不由次第也與升飲者相左交于階前相揖出于司馬之南遂適堂西釋弓襲而俟注俟復射疏注釋曰俟復射者謂俟第三番射也有執爵者注主人使贊者代弟子酌也於既升飲而升自西階立于序端疏注釋曰以初使勝黨弟子酌酒於豐上以發首故使弟子今云有執爵者明主人使贊者代弟子酌於豐上以次至終也贊者謂主人之賤不射者此則鄉飲酒云主人之贊者之類也云於既升飲而升自西階立于序端者謂於上耦既飲訖贊者乃升自西階酌訖奠於豐上如下文贊者既立於序端立於序端文出於大射也執爵者坐取觶實之反奠于豐上升飲者如初注每者輒酌以至於遍疏釋曰云執爵者坐取觶實之者謂初飲訖反奠於豐上贊者取此觶實之反奠於豐上云升飲者如初已下皆如初故鄭云每者輒酌以至於遍也三耦卒飲賓主人大夫不勝則不執弓執爵者取觶降洗升實之以授于席前注優尊也受觶以適西階上北面立飲注受罰爵者不宜自尊别卒觶授執爵者反就席大夫飲則耦不升注以賓主人飲耦在上嫌其升若大夫之耦不勝則亦執弛弓特升飲注尊者可以孤無能對衆賓繼飲射爵者辨乃徹豐與觶注徹猶除也設豐者反豐於堂西執爵者反觶於篚司馬洗爵升實之以降獻獲者于矦注鄉人獲者賤明其主以矦為功得獻也疏釋曰自此盡負侯而俟論司馬獻獲者之節注釋曰云鄉人獲者賤明其主以矦為功得獻也者案大射云司馬正洗散遂實爵獻服不服不矦西北三步北面拜受爵注云近其所為獻彼國君禮使服不士官唱獲故就其所為唱獲獻之此鄉人獲者賤故獻於矦明以矦為功得獻也薦脯醢設折俎俎與薦皆三祭注皆三祭為其將祭矦也祭矦三處也音義處昌慮反疏注釋曰三處者下文右與左中是也獲者負矦北面拜受爵司馬西面拜送爵注負矦負矦中也拜送爵不同面者辟正主也其設薦俎西面錯以南為上為受爵于矦薦之於位古文曰再拜受爵疏注釋曰知負侯中者以下云適右個又適左個後言中明先居中可知云拜送爵不同面者辟正主也者案上文正主獻賓獻衆賓皆北面與受獻者同面今此輿受獻不同面故云辟正主也云其設薦俎西面錯以南為上者獲者據下文東面而云西面錯據設人而言以南為上者特牲少牢東面籩豆皆以南方為上故知此亦然云受爵於矦薦之於位者此云負矦北面拜受爵是受爵於矦云薦之於位者下云左個之西北三步東面設薦是薦之於位也若然不薦亦在矦者以其酒在人手可得就矦獻獲者薦乃設之於地若與酒俱在矦所則正祭矦何名獻獲也若大射則獻與薦俱在乏乃適侯祭之君禮與此異也獲者執爵使人執其薦與俎從之適右個設薦俎注獲者以矦為功是以獻焉人謂主人贊者上設薦俎者也為設籩在東豆在西俎當其北也言使設新之音義個音幹疏釋曰此將祭矦也注釋曰云獲者以矦為功是以獻焉者以獲者卑賤因矦有功乃得獻今還以得獻之酒獻矦故云是以獻也云人謂主人贊者以其前使為獲者設薦俎是主人之贊者今還使之設薦俎故知人是主人贊者知籩在東豆在西俎當其北也者以其矦以北面為正依特牲少牢皆籩在右故知籩在東右廂豆在西左廂可知也云言使設新之者鄭意嫌更使人設之其實薦此者仍前人而云使人設薦俎示新之而已故云言使設也獲者南面坐左執爵祭脯醢執爵興取肺坐祭遂祭酒注為矦祭也亦二手祭酒反注如大射疏注釋曰此正祭矦故獲者南面鄉矦祭故鄭云為矦祭也云亦二手祭酒反注如大射者案大射云獲者左執爵右祭薦俎二手祭酒鄭注云二手祭酒者南面於俎之北當為矦祭於豆間爵反注為一手不能正也此薦俎之設如於北面人焉此祭亦然故云如大射也興適左個中亦如之注先祭左個後中者以外即之至中若神在中也左個之西北三步東面設薦俎獲者薦右東面立飲不拜既爵注不就乏者明其享矦之餘也立飲薦右近司馬於是司馬北面疏注釋曰云不就乏者明其享矦之餘也者若就乏則已所當得今不就乏近矦者明享矦之餘云立飲於薦右近司馬者解在薦右之意也知於是司馬北面者此約獻釋獲者司射之位案下文司射獻釋獲者釋獲者薦右東面拜受爵司射北面拜送爵故知此時司馬亦北面也若然釋獲者在司射之西北面立飲此獲者不北面飲者案大射注北鄉受獻之位也不北面者嫌為矦卒爵此亦然故不北面也司馬受爵奠于篚復位獲者執其薦使人執俎從之辟設于乏南注遷設薦俎就乏明已所得禮也言辟之者不使當位辟舉旌偃旌也設于南右之也凡他薦俎皆當其位之前音義辟扶益反注辟之辟舉及下並辟薦同疏注釋曰云遷設薦俎就乏明已所得禮也者前設近矦見享矦之餘此近乏者已所有事之處遷近乏是明其已所得禮故也云設於南右之也者以右取之便也云凡他薦俎皆當其位之前者言凡見廣解薦處謂凡燕及食并祭祀之薦俎皆當其位之前唯此與大射獲者與釋獲者薦俎辟設不當前也獲者負矦而俟疏釋曰獲者既受獻負矦而俟第三番射也司射適階西釋弓矢去撲説決拾襲適洗洗爵升實之以降獻釋獲者于其位少南薦脯醢折俎有祭注不當其位辟中疏釋曰自此盡反位論司射獻釋獲之事此薦脯醢及折俎有祭肺一與獻獲者同但彼三祭此一祭為異也有祭者亦薦有脯醢俎有祭肺以為將食而祭故言有祭也注釋曰云不當其位辟中者以釋獲者位在中西故獻之於其位少南所以辟中也釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵祭脯醢興取肺坐祭遂祭酒興司射之西北面立飲不拜既爵司射受爵奠于篚釋獲者少西辟薦反位注辟薦少西之者為復射妨司射視算也亦辟俎疏注釋曰云亦辟俎者上獻獲者訖獲者執其薦使人執俎從之設于乏南此釋獲者受獻訖釋獲者少西辟薦不云辟俎亦辟俎與獲者同可知故云亦辟俎也司射適堂西袒決遂取弓于階西挾一個搢撲以反位注為將復射疏釋曰自此盡反位論將為下番射作之使拾取矢之事司射去撲倚于階西升請射于賓如初賓許司射降搢撲由司馬之南適堂西命三耦及衆賓皆袒決遂執弓就位注位射位也不言射者以當序取矢疏注釋曰云位射位者知是射者下云各以其耦反於射位故知此是射位在司射之西南東面者也云不言射者以當序取矢者以此當次序拾取矢時故不言射位也司射先反位注言先三耦及衆賓也既命之即反位不俟之也嚮不言先三耦未有拾取矢位無所先音義先悉薦反下同疏注釋曰言先三耦及衆賓也者此下有三耦及衆賓故知先三耦及衆賓也云嚮不言先三耦未有拾取矢位無所先者案前第二番將射命三耦拾取矢司射反位不言先未有位無所先故決之第三番無位者以司射之西南有三耦射位至再番司射反於故位三耦將移於司馬之西南拾取矢之位未往之時未有故位三耦既無故位故司射不得言先故以此決之也凡射大射與鄉射各有三位此鄉射無次有堂西取弓矢袒決遂及比耦之位又有三耦射位在司射位西南又有拾取矢及再番射位是三位大射有次次內有袒決遂取弓矢之位又有堂東次比耦之位又有射位并拾取矢之位是亦有三位但君臣禮異故位事不同也三耦及衆賓皆袒決遂執弓各以其耦進反于射位注以猶與也今文以為與疏注釋曰訓以為與者春秋之義能東西之曰以若存以字謂嫌尊卑不同任意以之故轉為與則平敵之義也司射作拾取矢三耦拾取矢如初反位賓主人大夫降揖如初主人堂東賓堂西皆袒決遂執弓皆進階前揖注南面相俟而揖行也疏注釋曰言南面者謂賓主各於堂東西南面立相待言揖行者謂各於堂上北面相見而揖揖訖行向楅也及楅揖拾取矢如三耦注及楅當楅東西也主人西面賓東面相揖拾取矢不北面揖由便也疏注釋曰云及楅當楅東西也者賓主出堂東西相見揖訖東西行至楅所也云不北面揖由便也者決三耦及衆賓皆於楅南北面揖及楅揖此則無楅南北面揖賓主各由東西便故也卒北面搢三挾一個注亦於三耦為之位疏注釋曰經云搢三挾一個與上三耦取矢訖搢三挾一個同又同處故云亦於三耦為之位也揖退注皆已揖左還各由其塗反位疏注釋曰云皆已揖左還各由其塗反位者謂賓主北面揖退之時賓主皆左還相背各向堂塗反堂東西之位知左還者約上三耦也賓堂西主人堂東皆釋弓矢襲及階揖升堂揖就席注將袒先言主人將襲先言賓尊賓也疏注釋曰袒是盡敬之事襲是修容之禮故上經將袒先言主人此經襲則先言賓是尊賓故也大夫袒決遂執弓就其耦注降袒決遂於堂西就其耦於射位與之拾取矢疏注釋曰知於堂西者上文賓主人大夫降賓堂西袒決遂又上文大夫射時堂西袒決遂故知也揖皆進如三耦耦東面大夫西面大夫進坐説矢束注説矢束者下耦以將拾取音義説吐活反又始鋭反疏釋曰大夫西面者為下射故也興反位而后耦揖進坐兼取乘矢順羽而興反位揖注兼取乘矢者尊大夫不敢與之拾也相下相尊君子之所以相接也疏釋曰此大夫與耦取矢踣弓覆手仰手一如上三耦法其揖退之儀亦如上左還而西也大夫進坐亦兼取乘矢如其耦北面搢三挾一個注亦於三耦為之位揖退耦反位大夫遂適序西釋弓矢襲升即席注大夫不序於下尊也衆賓繼拾取矢皆如三耦以反位司射猶挾一個以進作上射如初一耦揖升如初注進前也嚮言還當上耦西面是言進終始互相明也今文或言作升射疏釋曰自此盡退中與算而俟論第三番用樂射之事注釋曰云嚮言還當上耦西面是言進終始互相明也者上番將射時云司射還當上耦西面作上耦射不言進明還當上耦時者進近上耦乃作之此直進作射不言還當上耦明進時亦還當上耦而作之故言終始互相明也司馬升命去侯獲者許諾司馬降釋弓反位司射與司馬交于階前去撲襲升請以樂樂于賓賓許諾司射降搢撲東面命樂正曰請以樂樂于賓賓許注東面於西階之前也不就樂正命之者傳尊者之命於賤者遙號命之可也樂正亦許諾猶北面不還以賓在堂音義樂樂下字音洛傳直專反疏注釋曰知在西階之前不就樂正命之者以經云司射降搢撲即言東面命樂正無行進之事故知西階之前遙命之也云樂正亦許諾知者案大射云司射東面命樂正曰命用樂樂正曰諾是樂正許諾之事此不言者文不具故言之云猶北面不還以賓在堂者此亦無文樂正位東階東南北面大師位其北西面賓在堂南面樂正猶北面不還西面是以下文特云東面命大師明此時不西面受命矣大射鄭注彼云樂正西面受命左還東面命大師與此禮異者雖無正文鄭以義言君在阼故也司射遂適階間堂下北面命曰不鼓不釋注不與鼓節相應不釋算也鄉射之鼓五節歌五終所以將八矢一節之間當拾發四節四拾其一節先以聽也疏注釋曰云鄉射之鼓五節者以卿大夫士同五節是以射人云王以騶虞九節諸侯以貍首七節卿大夫以采蘋五節士以采蘩五節是卿大夫士同五節云歌五終所以將八矢者下記云歌騶虞若采蘋皆五終是也云一節之間當拾發四節四拾其一節先以聽也者尊卑樂節雖多少不同四節以盡乘矢則同其餘外皆以聽以知樂終始長短也王九節者五節先以聽諸矦七節者三節先以聽卿大夫士五節者一節先以聽皆四節拾將乘矢但尊者先以聽則多卑者先以聽則少優至尊先知審固也此節亦取矦道之數故鄭注射人云九節七節五節者奏樂以為射節之差言節者容矦道之數也凡射皆與臣下共為若與尊者同耦自然與尊者同節若不與尊者同耦則各自用其節樂當與射義同上射揖司射退反位樂正東面命大師曰奏騶虞間若一注東面者進還鄉大師也騶虞國風召南之詩篇也射義曰騶虞者樂官備也其詩有一發五豝五豵于嗟騶虞之言樂得賢者衆多嘆思至仁之人以充其官此天子之射節也而用之者方有樂賢之志取其宜也其他賓客卿大夫則歌采蘋間若一者重節音義豝音巴豵子工反疏注釋曰云東面者進還鄉大師也者以其大師西面樂正北面明知進身鄉大師乃命之云此天子之射節也者據周禮射人而知云取其宜也者騶虞喻得賢者多此鄉射亦樂賢故云取其宜也云其他賓客卿大夫則歌采蘋者采蘋是卿大夫樂節其他謂賓射與燕射若州長他賓客自奏采蘩若然此篇有鄉大夫州長射法則同用騶虞以其同有樂賢之志也云間若一者重節者間若一謂五節之間長短希數皆如一則是重樂節也大師不興許諾樂正退反位乃奏騶虞以射三耦卒射賓主人大夫衆賓繼射釋獲如初卒射降注皆應鼓與歌之節乃釋算降者衆賓疏釋曰云樂正退反位者反工南北面位也注釋曰降者衆賓者次審射時賓與主人大夫卒射皆升堂此降者衆賓也釋獲者執餘獲升告左右卒射如初注卒已也今文曰告于賓司馬升命取矢獲者許諾司馬降釋弓反位弟子委矢司馬乘之皆如初司射釋弓視算如初注算獲算也今文曰視數也釋獲者以賢獲與鈞告如初降復位司射命設豐設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初司射猶袒決遂左執弓右執一個兼諸弦面鏃適堂西以命拾取矢如初注側持弦矢曰執面猶尚也並矢於弦尚其鏃將止變於射也疏釋曰言猶袒者亦是有故之辭以其常袒恐不袒故言猶以連之也注釋曰云側持弦矢曰執者對方持弦矢曰挾云並矢於弦尚其鏃將止變於射也者亦是對將射挾矢而言司射反位三耦及賓主人大夫衆賓皆袒決遂拾取矢如初矢不挾兼諸弦弣以退不反位遂授有司于堂西注不挾亦謂執之如司射也不以反射位授有司者射禮畢疏注釋曰云不挾亦謂執之如司射也者執之如司射兼諸弦弣則與司射異以其司射直執一個無三矢兼於弣三耦以下則執一個並於弦又以三矢並於弣所以異也辨拾取矢揖皆升就席注謂賓大夫及衆賓也相俟堂西進立于西階之前主人以賓揖升大夫及衆賓從升立時少退于大夫三耦及弟子自若留下疏注釋曰知相俟于堂西者以經言辨拾取矢訖乃言揖皆升就席則知先取矢者皆相待堂西其主人則在堂東遍取矢訖乃揖而升堂就席也云主人以賓揖升大夫及衆賓從升立時少退于大夫三耦及弟子自若留下者衆賓則三賓也皆依上文獻後升及留在下之法司射乃適堂西釋弓去撲説決拾襲反位疏釋曰司射之撲在階西今來取撲於堂西之等以其不復射故也司馬命弟子説矦之左下綱而釋之注説解也釋之不復射掩束之音義説吐活反復扶又反疏注釋曰上初張矦時云乃張矦下綱不及地武不繫左下綱中掩束之鄭云事未至也又至將射時司馬命張矦弟子説束遂繫左下綱鄭注云事至今言司馬命弟子説矦之左下綱而釋之直言説矦之左下綱而釋之明未全去備復射故鄭下注云諸所退皆俟於堂西備復射也故知此釋之為三番射畢不復射若有射則行燕射旅酬以後乃為之故於此時中掩左下綱如初張時也命獲者以旌退命弟子退楅司射命釋獲者退中與算而俟注諸所退皆俟堂西備復射也旌言以者旌恆執也獲者釋獲者亦退其薦俎疏注釋曰獲者釋獲者亦退薦俎者上獻時皆有薦俎辟之於右今獲者以旌退釋獲者退中故知亦退薦俎也司馬反為司正退復觶南而立注當監旅酬音義監古銜反疏釋曰自此盡司正降復位論射訖行旅酬之事故司馬反為司正鄭云當監旅酬也樂正命弟子贊工即位弟子相工如其降也升自西階反坐注贊工遷樂也降時如初入樂正反自西階東北面疏釋曰前為將射遷工于東方西面樂正北面今將旅酬作樂故遷升于堂上也注釋曰云降時如初入者以經直云如其降也降時威儀不見故取上文降時如初入初入則上工四人已下是也云樂正反自西階東北面者上初升於西階之東樂正立于其西合樂訖工告樂正曰正歌備樂正告于賓乃降立于西階東北面又將射時樂正命弟子贊工遷樂于下弟子相工如初入降自西階東北面近其事知不升者以正樂畢上無告請于賓之事宜與正歌備已後同也賓北面坐取俎西之觶興阼階上北面酬主人主人降席立于賓東賓坐奠觶拜執觶興主人答拜賓不祭卒觶不拜不洗實之進東南面注所不者酬而禮殺也賓立飲音義殺所界反疏釋曰賓北面坐取俎西之觶者謂上一人舉觶于賓賓奠于薦西者也注釋曰云賓立飲者鄉飲酒當此賓酬主人時云賓不祭立飲是也主人阼階上北面拜賓少退注少退少逡遁也音義逡七旬反遁音旬主人進受觶賓主人之西北面拜送注旅酬而同階禮殺也疏注釋曰對獻酬之時賓主各於其階故云同階禮殺也賓揖就席主人以觶適西階上酬大夫大夫降席立于主人之西如賓酬主人之禮注其既實觶進西南面立鄉所酬疏釋曰云主人以觶適西階上酬大夫者旅酬恆執此觶以相酬故言以知義然者上文命獲者以旌退鄭注云旌言以者旌恆執也是也注釋曰云其既實觶進西南面立鄉所酬知者以上賓酬主人阼階上實觶進東南面則知此主人酬大夫西階上實觶而亦進西南面可知也主人揖就席若無大夫則長受酬亦如之注長謂以長幼之次酬衆賓音義長丁丈反疏釋曰云若無大夫者鄉人為公卿大夫來觀禮者為遵或有或無不定故云若有大夫先酬之無大夫則酬長以鄉射無介直有三賓以長幼之次受酬此言酬衆賓則三賓也司正升自西階相旅作受酬者曰某酬某子注某者字也某子者氏也稱酬者之字受酬者曰某子旅酬下為上尊之也春秋傳曰字不若子此言某酬某子者射禮略於飲酒飲酒言某子受酬以飲酒為主疏注釋曰云旅酬下為上尊之也者以旅酬者少長以齒逮下之道前人雖卑其司正命之飲酒呼之稱謂尊於酬者故受酬者為某子酬他為某也云春秋傳曰者案莊十年秋九月經書荆敗蔡師于莘以蔡侯獻舞歸公羊傳曰荆者何州名也州不若國國不若氏氏不若人人不若名名不若字字不若子何休云爵最尊也鄭引之者證旅酬下為上之義酬者稱字受酬者稱子子是尊稱云此言某酬某子者射禮略於飲酒飲酒言某子受酬以飲酒為主者此鄉射主於射略於飲酒故稱酬他者字又稱受酬飲酒者為子是字不若子飲酒言某子受酬直以飲酒為主故也受酬者降席司正退立于西序端東面注退立俟後酬者也始升相立階西北面疏注釋曰云始升相立階西北面者鄉飲酒注亦然知者以司正升自西階與西階之酬者立故知始時在西階西北面也衆受酬者拜興飲皆如賓酬主人之禮辨遂酬在下者皆升受酬于西階上注在下謂賓黨也鄉飲酒記曰主人之贊者西面北上不與無算爵然後與此異於賓音義與音預疏注釋曰引鄉飲酒記者欲見賓黨在西主黨在東主黨不與酬之義卒受者以觶降奠于篚司正降復位疏釋曰自此盡唯賓論舉觶於賓與大夫為無算爵之事云司正降復位者司正當監旅酬訖故降使二人舉觶於賓與大夫為無算始也使二人舉觶于賓與大夫注二人主人之贊者舉觶者皆洗觶升實之西階上北面皆坐奠觶拜執觶興賓與大夫皆席末答拜舉觶者皆坐祭遂飲卒觶興坐奠觶拜執觶興賓與大夫皆答拜舉觶者逆降洗升實觶皆立于西階上北面東上賓與大夫拜舉觶者皆進坐奠于薦右注坐奠之不敢授疏釋曰賓與大夫皆席末答拜者皆席西南而答拜云皆進坐奠于薦右者以其將飲者于右故也注釋曰云坐奠之不敢授者對獻酬時親授主人之贊者卑不敢親授觶也賓與大夫辭坐受觶以興注辭辭其坐奠觶疏釋曰必辭者贊者不敢親授賓與大夫不可自尊故辭之不言取而言受者亦是若親受之然舉觶者退反位皆拜送乃降賓與大夫反奠于其所興注不舉者盛禮已崇古文曰反坐疏注釋曰崇重也凡飲酒禮成於酬前已旅酬所盛禮已重今主人復舉觶為無算爵盡歡情客不盡主人歡故且奠之後舉之故不奠薦左若無大夫則唯賓注長一人舉觶如燕禮媵爵之為疏釋曰嚮二人舉觶為賓與大夫今若無大夫當闕一人故云則唯賓也注釋曰云長一人舉觶如燕禮媵爵之為者燕禮初二大夫媵觶至旅酬復使二人苦命長媵一爵於君與此同故云如燕禮之為彼旅酬此為無算爵不同但一人是同故引為證也司正升自西階阼階上受命于主人適西階上北面請坐于賓注請坐欲與賓燕盡殷勤也至此盛禮已成酒清肴乾強有力者猶倦焉疏釋曰自此盡少退北上論請坐徹俎之事注釋曰云清酒肴乾強有力者猶倦焉者此禮記聘義文案彼云故強有力者將以行禮也酒清人渴而不敢飲也肉乾人飢而不敢食也日莫人倦齊莊正齊而不敢懈惰引之者證此賓須坐之義賓辭以俎注俎者肴之貴者也辭之者不敢以燕坐褻貴肴疏注釋曰俎所盛骨體骨體是肴之貴者故辭之也反命于主人主人曰請徹俎賓許司正降自西階階前命弟子俟徹俎注弟子賓黨也俎者主人贊者設之今賓辭之使其黨俟徹順賓意也上言請坐于賓此言主人曰互相備耳疏注釋曰知弟子是賓黨者以其司正降自西階階前命之明賓黨弟子在西階東面也必使賓黨弟子者徹俎是賓請之故鄭云俎者主人贊者設之今賓辭之使其黨俟徹順賓意也云上言請坐于賓此言主人曰互相備耳者凡辭皆司正請于主人主人有命司正乃傳告賓今丄文云司正請坐于賓直見司正傳主人辭不見主人曰請坐于賓之辭此經直見主人曰請徹俎不見司正傳主人以告賓是互相備也不言互文而云互相備者凡言互文者各舉一事一事自周是互文此據一邊禮一邊禮不備文相續乃備故云互相備若云糗餌粉餈鄭注云餌言糗餈言粉互相足之類也司正升立于序端賓降席北面主人降席自南方阼階上北面大夫降席席東南面注俟弟子升受俎疏注釋曰云俟弟子升受俎者下云司正以俎出授從者注云授賓家從來者也所以厚禮之則此弟子升受俎者案下文據大夫與主人而言若賓俎授司正非弟子也賓取俎還授司正司正以降自西階賓從之降遂立于階西東面司正以俎出授從者注授賓家從來者也古者與人飲食必歸其盛者所以厚禮之音義從才用反注及下從者同疏注釋曰云古者與人飲食必歸其盛者所以厚禮之者鄉飲酒燕禮大射賓客皆有俎徹歸客之左右俎是肴之貴是歸其盛者公食大夫既食有司卷三牲之俎歸于賓館故總云古者與人飲食必歸其盛者所以厚禮之也主人取俎還授弟子弟子受俎降自西階以東主人降自阼階西面立注以東授主人侍者疏注釋曰云以東授主人侍者弟子是賓黨非主人之贊者故知徹主人俎還授主人侍者歸入於內也大夫取俎還授弟子弟子以降自西階遂出授從者大夫從之降立于賓南注凡言還者明取俎各自鄉其席衆賓皆降立于大夫之南少退北上注從降亦為將燕音義為于偽反疏注釋曰賓主人大夫有俎從俎而降此三賓無俎亦從大夫而降亦知賓主人大夫將燕故同降同升也主人以賓揖讓説屨乃升大夫及衆賓皆説屨升坐注説屨者將坐空屨褻賤不宜在堂也説屨則摳衣為其被地音義説吐活反摳苦侯反被皮義反疏釋曰自此盡門外再拜論升坐行無算爵賓醉送出之事注釋曰云説屨則摳衣為其被地者曲禮云摳衣趨隅彼謂升席時引之證説屨低身亦然若不摳衣恐衣被地履之但對文上曰衣下曰裳散文衣裳通此衣即裳也案少儀云排闔説屨於户內一人而已矣鄭注云雖衆敵猶有所尊也彼尊卑在室則尊者説屨在户內其餘説屨於户外若尊卑在堂則亦尊者一人説屨在堂其餘説屨於堂下是以燕禮大射臣皆説屨於階下公不見説屨之文明公舄在堂矣此乃鄉射非臣禮賓主人行敵禮故皆説屨於堂下也乃羞注羞進也所進者狗胾醢也燕設啖具所以案酒音義胾壯吏反啖徒覽反疏注釋曰云所進者狗胾醢也者以其牲用狗故知狗胾也醢未必狗以其醢豫造乃成非臨時之物故知非狗連言之也無算爵使二人舉觶賓與大夫不興取奠觶飲卒觶不拜注二人謂嚮者二人也使之升立于西階上賓與大夫將旅當執觶也卒觶者固不拜矣著之者嫌坐卒爵者拜既爵此坐于席禮既殺不復崇疏釋曰經賓上有于字者誤以此二觶仍是前二人所舉者今以二人升者舉發使行無算爵非新觶以鄭注可知故誤有也若然舉觶上屬賓下屬為句也注釋曰云卒觶者固不拜矣著之者嫌坐卒爵者拜既爵者上正旅酬時賓酬主人賓不祭卒觶不拜不洗今此二人舉觶禮彌殺故云卒觶者固不拜矣嫌坐卒爵者拜既爵者以上獻酬時皆坐卒爵拜既爵嫌此無算爵飲卒觶亦有拜義故明之云坐于席禮既殺不復崇者此決正行獻酬時在於階下有拜既爵此説屨就席禮既殺不復崇重故無拜爵也執觶者受觶遂實之賓觶以之主人大夫之觶長受注長衆賓長而錯皆不拜注錯者實主人之觶以之次賓也實賓長之觶以之次大夫其或多者迭飲於坐而已皆不拜受禮又殺也今文無執觶及賓觶大夫之觶皆為爵實觶觶為之音義迭大結反疏注釋曰云其或多者迭飲於坐而已者衆賓之長在賓西者三人大夫則席於賓東若大夫亦三人則與衆賓等得交錯相酬言其或多者若有一大夫則衆賓二人無所酬直二人迭飲而已若大夫四人已上多於三賓自三人之外亦無所酬則亦自相酬迭飲而已云皆不拜受禮又殺也者上二人舉觶於賓與大夫皆拜受及飲卒不拜是其殺今衆賓與大夫不拜受觶故言禮又殺也此經曰執觶者今文無此執觶又今文賓觶大夫之觶皆為爵不從者以其皆在無算爵之科明不為爵云實觶觶為之者明不從也辨卒受者興以旅在下者于西階上注衆賓之末飲而酬主人之贊者大夫之末飲而酬賓黨亦錯焉不使執觶者酌以其將旅酬不以已尊於人也其末若皆衆賓則先酬主人之贊者若皆大夫則先酬賓黨而已執觶者酌在上辨降復位疏釋曰經云辨謂堂上衆賔已上皆飲訖云卒受者謂最末後飲者注釋曰云衆賓之末飲而酬主人之贊者大夫之末飲而酬賓黨亦錯焉者此亦若堂上交錯也云不使執觶者酌謂不使二人執觶者酌云以其將旅酬不以已尊於人也者其堂上皆坐行酒至此立階上旅在下解經興以旅在下者云其末若皆衆賔則先酬主人之贊者謂大夫或少或無則衆賓為末飲也云若皆大夫者謂大夫多衆賓遍後二觶並酬大夫則大夫為末飲也云執觶者酌在上辨降復位者謂二人舉觶酌堂上衆賓已上辨其堂下自酌相旅二人無事故降復于東階前西面北上位也故鄉飲酒記云主人之贊者西面北上不與無算爵然後與必知復位者下經云執觶者皆與旅是也長受酬酬者不拜乃飲卒觶以實之注言酬者不拜者嫌酬堂下異位當拜也古文曰受酬者不拜疏釋曰謂堂下或賓黨之長或主人贊者之長受堂上酬酬者不拜注釋曰鄭云酬者不拜者嫌酬堂下異位當拜也者嫌堂下異位堂上酬堂下當拜故明之也受酬者不拜受注禮殺雖受尊者之酬猶不拜疏注釋曰堂下卑者受堂上尊者酒當拜由禮殺雖尊者之酬猶不拜也辨旅皆不拜注主人之贊者於此始旅嫌有拜疏注釋曰以鄉飲酒記云主人之贊者不與無算爵然後與故鄭言主人之贊者於此始旅嫌有拜故明之也執觶者皆與旅注嫌已飲不復飲也上使之勸人耳非逮下之惠也亦自以齒與於旅也音義與音預疏注釋曰此即上文二人舉觶者於西階上已卒觶故鄭云嫌已飲不復飲也卒受者以虛觶降奠于篚執觶者洗升實觶反奠于賓與大夫注復奠之者燕以飲酒為歡醉乃止主人之意也無算樂注合鄉樂無次數疏注釋曰知合鄉樂二南者約上正歌時不略其正已歌鄉樂但上有次第先歌關雎次歌葛覃卷耳次歌鵲巢采蘋采蘩皆三終有次數今無次數任賓主所好也賓興樂正命奏陔注陔陔夏其詩亡周禮賓醉而出奏陔夏陔夏者天子諸侯以鍾鼓大夫士鼓而已音義陔古才反疏釋曰此賓興即命奏下文賓降乃作樂也注釋曰云陔陔夏其詩亡者九夏皆詩篇鄭注鍾師云歌之大者載在樂章樂崩亦從而亡云周禮者鍾師云陔夏杜子春云客醉而出奏陔夏雖非正文亦據周禮而言云陔夏者天子諸侯以鍾鼓知者鍾師云以鍾鼓奏九夏是天子法襄公四年穆叔如晉晉矦饗之金奏肆夏之三不拜則陔夏奏用鍾矣大夫士尚有鼓明諸矦亦有鼓故總云天子諸矦以鍾鼓知大夫士用鼓者此鄉射鄉飲酒皆有鼓故知以鼓奏陔而已也賓降及階陔作賓出衆賓皆出主人送于門外再拜注拜送賓于門東西面賓不答拜禮有終疏注釋曰知拜送賓于門東西面者此約迎賓時於此拜也云不答拜禮有終者以行禮有終故不答也明日賓朝服以拜賜于門外注拜賜謝恩惠也音義朝直遙反主人不見如賓服遂從之拜辱于門外乃退注不見不褻禮也拜辱謝其自屈辱疏注釋曰不見不褻禮者禮不欲數數則瀆今主人不見恐相褻故不見也主人釋服乃息司正注釋服説朝服服玄端也息猶勞也勞司正謂賓之與之飲酒以其昨日尤勞倦也月令曰勞農以休息之音義説吐活反勞力報反疏釋曰自此盡經末論息勞司正之事注釋曰上文主人如賓服則主人亦朝服矣今言釋服謂釋去朝服朝服之下衣則次玄端故知釋服説朝服服玄端也玄端即朝服之衣易其裳為異也月令者彼是十月農功畢勞農以休息之為息田夫之臘祭引之者證息勞為休息之義也無介注勞禮略貶於飲酒也此已下皆記禮之異者音義介音界疏注釋曰云勞禮略貶於飲酒也者謂貶於鄉飲酒鄉飲酒禮有介此司正飲酒勞禮無介是貶於鄉飲酒也云此以下皆記禮之異者謂息司正之禮與上飲酒禮異之事也不殺注無俎故也音義殺如字疏注釋曰下文云無俎無俎故不殺殺即有俎也使人速注速召賓疏注釋曰若公食使人召之還司正為賓也迎于門外不拜入升不拜至不拜洗薦脯醢無俎賓酢主人主人不崇酒不拜衆賓既獻衆賓一人舉觶遂無算爵注言遂者明其間闕也賓坐奠觶于其所擯者遂受命于主人請坐于賓賓降説屨升坐矣不言遂請坐者請坐主于無算爵疏注釋曰云言遂者明其間闕也者間闕謂間一人舉觶下有工升歌立司正旅酬及二人舉觶及徹俎之事以其闕此數事故云遂無算爵也云賓坐奠觶于其所擯者遂受命于主人請坐于賓賓降説屨升坐矣此並依正飲酒禮不言遂請坐者請坐主于無算爵者以其請坐主于無算爵今言無算爵自然請坐可知故不須言請坐于賓也無司正注使擯者而已不立之疏釋曰不立司正亦是與飲酒禮異賓不與注昨日至尊不可褻也古文與作豫音義與音預疏注釋曰賓者主人所尊敬不可復召之復召之亦是褻瀆也徵唯所欲注徵召也謂所欲請呼疏注釋曰須止則止須召則召在主人之意故云所欲請呼也以告于鄉先生君子可也注告請也鄉先生鄉大夫致仕者也君子有大德行不仕者音義行下孟反疏注釋曰云鄉大夫致仕者也者此即鄉飲酒注云先生謂鄉中致仕者云君子有大德行不仕者大德行謂六德六行可貢而不仕者此即居士錦帶亦曰處士羞唯所有注用時見物音義見賢遍反疏注釋曰謂昨日所有之餘見物鄉樂唯欲注不歌雅頌取周召之詩在所好音義好呼報反疏注釋曰此即與上無算樂同而云不歌雅頌者以其上飲酒主於射略於樂不用小雅此非鄉射而亦不歌雅頌者亦不可過於正飲酒禮故云周召之詩在所好也記大夫與則公士為賓注不敢使鄉人加尊於大夫也公士在官之士鄉賓主用處士音義與音預疏注釋曰據此鄉射使處士無爵命者為賓故有大夫來不以鄉人加尊于大夫故易去之使公士為賓若然鄉飲酒貢士法賢者為賓其次為介又其次為衆賓有大夫來不易去之以其賓擬貢故也云鄉賓主用處士即君子者也使能不宿戒注能者敏於事不待宿戒而習之疏注釋曰解上賓用處士云能者敏於事者孝經云參不敏鄭云敏猶達也則此通達於事其牲狗也注狗取擇人疏注釋曰鄉飲酒鄉射義取擇賢士為賓天子已下燕亦用狗亦取擇人可與燕者亨于堂東北注鄉飲酒義曰祖陽氣之所發也音義亨普庚反疏注釋曰陽氣起於東北而盛於南方亨狗于東北飲酒是陽故法之尊綌冪賓至徹之注以綌為冪取其堅潔音義綌去逆反疏釋曰凡冪者皆為塵埃加故設之但用冪不用冪不同者凡用醴皆不見用冪質故也即士冠禮子昏禮禮賓贊禮婦聘禮禮賓此等用醴皆無冪是也醮用酒亦無冪者從禮子質也或以尊厭卑亦無冪燕禮君尊有冪方圜壺則無冪昏禮尊於室內有冪尊於房户外為媵御賤故無冪鄉飲酒鄉射有冪者無所厭故也若祭祀之冪冪人云以疏布冪八尊鄭云天地之神尚質以畫布冪六彝鄭云宗廟可以文凡王巾皆黼注云周尚武其用文德則黻可諸矦無文武與王同其喪中之冪皆用疏布士喪禮小斂用功布大斂亦同士虞用絺冪與吉同大夫亦當然也云賓至徹之者巾冪必有執冪賓未至恐塵加賓至徹去不復用以其鄉射飲酒不見更用之文故也燕禮君命徹冪則未命之前重用之者君尊久設恐塵故重覆之蒲筵緇布純注筵席也純緣音義純之閠反又諸允反注同緣以絹反疏釋曰鄉大夫州長與鄉人習禮雖有公鄉之尊無加席唯此一種故記人記之注釋曰云筵席者鄭注周禮序官云鋪陳曰筵藉之曰席然共言之筵席通但在地者為筵取鋪陳之義在上曰席取相承藉之義耳西序之席北上注衆賓統於賓疏釋曰衆賓之序繼賓以西南面東上今云西序之席北上者謂衆賓有東面者則北上此東面非常故記之也若然此鄉射上設席雖不言衆賓之數上文云三拜衆賓鄭云三拜示遍也則衆賓亦三人矣而復有東面者若公卿大夫多尊東不受則於尊西賓近於西則三賓東面北上統於賓也獻用爵其他用觶注爵尊不可褻也以爵拜者不徒作注以爵拜謂拜既爵徒猶空也作起也不空起言起必酢主人薦脯用籩五膱祭半膱橫于上醢以豆出自東房膱長尺二寸注脯用籩籩宜乾物也醢以豆豆宜濡物也膱猶脡也為記者異耳祭橫于上殊之也於人為縮膱廣狹未聞也古文膱為胾今文或作植音義膱音職疏注釋曰云豆宜濡物也者案王制云一為乾豆鄭云謂臘之以為祭祀豆實與此違者以其豆實則醢也鄭注周禮醢人云作醢及臡者必先膊乾其肉乃後細莝之雜以梁麴及鹽漬以美酒塗置甀中百日則成矣是乾以為豆實醢是也云膱猶脡也為記者異耳者鄉飲酒記云脯五脡此云五膱膱與脡不同非訓之是記者異名不同非别有義故鄭云膱猶脡也云於人為縮者脯法於人為縮者鄉飲酒注引曲禮云以脯修置者末朐右未鄭注曲禮云屈中曰朐取左手案之右手擘之便故於人為縮橫祭半膱橫上於脯為橫於人則為縱也俎由東壁自西階升注狗既亨載于東方疏注釋曰云狗既亨載于東方者上云亨于堂東北今云俎由東壁者亨在東北實俎曰載載則于東方東方則東壁故云俎由東壁也云自西階升者既由東壁恐如祭饌由東階升故記人明之若祭饌則東階升特牲少牢是也尊神故由阼階升賓俎脊脅肩肺主人俎脊脅臂肺肺皆離皆右體也進腠注以骨名肉貴骨也賓俎用肩主人用臂尊賓也離猶刲也腠膚理也進理謂前其本右體周所貴也若有尊者則俎其餘體也音義腠七豆反刲苦圭反疏注釋曰云以骨名肉者骨為本有名肉為末無名所食既肉故以骨名肉必知骨有肉者特牲乃食舉注云舉言食者明凡解體皆連肉是有肉也云賓俎用肩主人用臂尊賓也者此據前三體而言以其體有肩臂臑禮記祭統云周人貴肩為其顯故賓用肩尊賓也云離猶刲也者案禮記少儀云牛羊之肺離而不提心鄭云提猶絶也􅩿離之不絶中央少者中央少者即是心也此將食舉肺也云進理謂前其本者此與公食同生人食法少牢進下者是鬼神食法云右體周所貴也者對左殷所貴云若有尊者則俎其餘體也者前有三肩臂臑以次用之賓主已用肩臂有一大夫則用臑二大夫則取後體用膞若有三大夫已上則用胳其脊脅與賓主同故下文云獲者之俎折脊脅肺臑注云臑若膞胳觳折以大夫之餘體是也凡舉爵三作而不徒爵注謂獻賓獻大夫獻工皆有薦疏注釋曰知此三人者以其言三作故知唯此三人而已凡奠者於左注不飲不欲其妨疏釋曰謂若酬賓奠於右賓奠之於左將舉者於右注便其舉也疏釋曰謂若酬一人二人舉奠之於薦右便舉之者也衆賓之長一人辭洗如賓禮注尊之於其黨音義長丁丈反疏釋曰此獻三賓之時主人唯為長者一人洗爵如經文恐已後更洗故記人明之也若有諸公則如賓禮大夫如介禮無諸公則大夫如賓禮注尊卑之差諸公大國之孤也樂作大夫不入注後樂賢也樂正與立者齒注謂其飲之次也尊樂正同於賓黨鄉飲酒記曰與立者皆薦以齒音義與音預三笙一和而成聲注三人吹笙一人吹和凡四人也爾雅曰笙小者謂之和音義和户卧反疏注釋曰云爾雅曰笙小者謂之和者案爾雅釋樂云大笙謂之巢孫氏注云巢高大又云小者謂之和注云和小笙是也獻工與笙取爵于上篚既獻奠于下篚其笙則獻諸西階上注奠爵于下篚不復用也今文無與笙疏注釋曰云奠爵于下篚不復用也者謂堂上不復用無妨堂下更人用之知者獻獲及釋獲者皆取而獻之是也大射獻服不氏用散不用爵者彼君禮與此異也立者東面北上注賓黨疏釋曰此謂一命及不命來觀禮者與堂下衆賓齒東面北上而立司正既舉觶而薦諸其位注薦於觶南疏注釋曰知薦於觶南不薦於觶北者以司正觶南北面立若薦觶北與觶相隔非位前故知觶南位北也三耦者使弟子司射前戒之注弟子賓黨之少者也前戒謂先射請戒之疏注釋曰云使弟子司射前戒之者謂請射之前戒之以其經云三耦俟於堂西故鄭云前戒謂先射請戒之也司射之弓矢與撲倚于西階之西注便其事也音義撲普卜反疏注釋曰此矢謂挾一個者初司射適堂西袒決遂取弓矢于階西兼挾乘矢則誘射之弓矢亦在階西矣若然誘射訖適堂西改取一個挾之遂適階西取撲此一個實在堂西至視算之時於西階西釋弓矢去撲獻釋獲者此亦在西階西故鄭云便其事也司射既袒決遂而升司馬階前命張矦遂命倚旌注著並行也古文曰遂命獲者倚旌疏注釋曰云著並行者謂司射與司馬有不並行事時案上文將射適堂西袒決遂取弓矢於西階上北面告賓曰弓矢既具有司請射其時司馬即階前命倚旌此皆同時故鄭云著並行事如上經納射器及比三耦以前司射獨行事後及司正為司馬與司射並行事故記人記之也凡矦天子熊矦白質諸矦麋矦赤質大夫布矦畫以虎豹士布矦畫以鹿豕注此所謂獸矦也燕射則張之鄉射及賓射當張采矦二正而記此者天子諸矦之燕射各以其鄉射之禮而張此矦則經獸矦是也由是云焉白質赤質皆謂采其地其地不采者白布也熊麋虎豹鹿豕皆正面畫其頭象於正鵠之處耳君畫一臣畫二陽奇隂耦之數也燕射射熊虎豹不忘上下相犯射麋鹿豕志在君臣相飬其畫之皆毛物之音義麋亡悲反正音征下正鵠同鵠户沷反射熊之射食亦反下食麋與射之同疏注釋曰云此所謂獸矦也者周禮梓人云張獸矦以息燕注云息者休農息老物也燕謂勞使臣若與羣臣飲酒而射是也云燕射則張之者燕禮大射正為司射如鄉射之禮是諸矦燕用鄉射之禮故云燕射則張之也天子雖無文據記明天子燕射亦用鄉射之法也云鄉射及賓射當張采矦二正者案周禮射人掌賔射大夫士同二正是賓射二正鄉射無文知亦采矦二正者周禮賓射與賓客為射此鄉射雖與鄉人習禮亦如賓主行射禮又非私相燕勞故約與賓射同也言采矦者梓人云張五采之矦則逺國屬是賓射之矦故云采矦也云而記此者天子諸矦之燕射各以其鄉射之禮者以天子自用鄉射之禮諸矦自用鄉射之禮大夫士亦各隨其君用鄉射之禮也用鄉射之禮謂張矦道五十步及三耦一與鄉射同云張此矦則經獸矦是也由是云焉者謂由是用鄉射法故經云獸矦於此鄉記也云白質赤質皆謂采其地者案周禮掌蜃云共白盛之蜃則此以蜃灰塗之使白為地赤質者亦以赤塗之使赤為地云不采者白布也者謂大夫士直云布矦者也云熊麋虎豹鹿豕皆正面畫其頭者知皆畫首者以其言貍首者射不來者之首明此獸矦等亦正面畫其頭也云象其正鵠之處耳者案梓人云參分其廣而鵠居一焉據大射之矦若賓射之矦則三分其矦正居一焉若燕射之矦則獸居一焉故云象其正鵠之處耳云君畫一臣畫二陽奇隂耦之數也者禮記郊特牲云君之南鄉答陽之義也臣之北面答君也是君陽臣隂又天一生水地二生火是一二隂陽之數故云君一臣二陽奇隂耦之數也云燕射射熊虎豹不忘上下相犯者三者皆猛獸不苟相下若君臣之道亦獻可者替否者不苟相從輒當犯顔而諫似獸等故用之云射麋鹿豕志在君臣相養也者案內則云麋鹿豕皆有軒並是可食之物故云相養也云其畫之皆毛物之者此無正文但畫五正三正之矦各以其色明畫獸矦亦以毛物畫之可知也凡畫者丹質注賓射之矦燕射之矦皆畫雲氣於側以為飾必先以丹采其地丹淺於赤疏注釋曰云賓射之矦燕射之矦者此鄉射以采矦二正是賓射之矦也此獸矦也又是燕射之矦故鄭並言之云皆畫雲氣於側以為飾者鄭解經凡言畫者皆畫雲氣故以雲氣解之也蓋象雲色若賓射之矦天子九十步矦朱白蒼黃玄五正者還畫此五色雲氣於其側七十步矦朱白蒼三正者還畫此三色雲氣於其側五十步矦朱緑二正者還畫此二色雲氣於其側以為飾也云必先以丹采其地者欲畫此五色三色雲氣時必先用丹采此地乃於其上畫雲氣也天子矦九十步之內更有七十五十步矦畿內諸矦七十步矦內更有五十步矦畿外諸矦九十步矦內更有七十五十步矦其畫之采皆如其數也以矦數非一尊卑又不同故云凡以廣之言凡畫雲氣以丹為質地者也云丹淺於赤者案月令云乘朱路駕赤駵載赤旗衣朱衣朱與赤互言之即為一物又案冬官鍾氏云以朱湛丹秫四八為朱色深而湛丹秫故知丹淺於赤鄭言此者欲見以丹為地丹上得見赤色雲之義故言此也射自楹間物長如笴其間容弓距隨長武注自楹間者謂射於庠也楹間中央東西之節也物謂射時所立處也謂之物者物猶事也君子所有事也長如笴者謂從畫之長短也笴矢幹也長三尺與跬相應射者進退之節也間容弓者上下射相去六尺也距隨者物橫畫也始前足至東頭為距後足來合而南面為隨武迹也尺二寸疏注釋曰云自楹間者謂射於庠也知者以其言楹間則是庠則物當楣故知非射於序者也云楹間中央東西之節也者以其楹間南北無限東楹西楹相當故知東西之節也云長如笴者謂從畫之長短也者其下有距隨為橫此言物長又是從迹之稱故知南北之長短也云笴矢幹也長三尺者以矢人職得知也云與跬相應者禮記祭義云故君子跬步而弗忘孝也一舉足謂之跬再舉足謂之步射者履物不過一跬故知以三尺為限也云距隨者物橫畫也始前足至東頭為距後足來合而南面為隨者謂上射下射並足處皆然言長武武迹也中人之迹尺二寸謂橫尺二寸也序則物當棟堂則物當楣注是制五架之屋也正中曰棟次曰楣前曰庪音義架音駕庪九偽反又九委反疏注釋曰云是制五架之屋也者庠序皆然但有室無室為異命負矦者由其位注於賤者禮略疏釋曰其位正據司馬自在已位遙命之遙命者由負矦者賤略之故也對司射比耦則就其位經無司馬命負矦之位故記之也凡適堂西皆出入于司馬之南唯賓與大夫降階遂西取弓矢注尊者宜逸由便也旌各以其物注旌總名也雜帛為物大夫士之所建也言各者鄉射或於庠或於榭疏注釋曰云旌總名也者以周禮司常云九旗對文通帛為旜雜帛為物全羽為旞析羽為旌各别今名物為旌者散文通故云旌總名也云雜帛為物大夫士之所建也者司常文通帛者通體並是絳帛周所尚赤也雜帛者中絳緣邊白也白殷之正色故鄭彼注云言先王正道佐職也云言各者鄉射或於庠或於榭者諸矦鄉大夫是大夫詢衆庶射於庠諸矦州長是士春秋習射於榭大夫士同建物而云各者雖同建物杠則大夫五仞士三仞不同故云各也無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋注無物者謂小國之州長也其鄉大夫一命其州長士不命不命者無物此翿旌也翿亦所以進退衆者糅者雜也杠橦也七尺曰仞鴻鳥之長脰者也八尺曰尋今文糅為縮縚為翿音義糅女又反杠音江脰音豆韜吐刀反翿徒刀反橦直江反疏注釋曰云無物者謂小國之州長也者案典命子男之卿再命大夫一命士不命大夫一命得建物士不命則無物是以不得與上各以其物同别為此旌云此翿旌也者據下文士鹿中翿旌也下云君國中射則皮樹中以翿旌獲此不命士與國君同者士卑不嫌命士以上尊卑自異也云翿亦所以進退衆者此非直用之於獲案喪大記君葬時執翿居前詔傾虧亦所以進退衆人也云七尺曰仞者無正文鄭案書傳云雉長三丈高一丈則牆高一丈禮記祭義云築宫仞有三尺牆高一丈云仞有三尺除三尺之外只有七尺故知七尺曰仞也王肅則依小爾雅四尺曰仞孔君則八尺曰仞所見不同也云鴻鳥之長脰者也者脰則項也云八尺曰尋者亦無正文冬官云車有六等之數云殳長尋有四尺長丈二而云尋有四尺除四尺則尋長八尺矣凡挾矢於二指之間橫之注二指謂左右手之第二指此以食指將指挾之音義將子匠反疏注釋曰云二指謂左右手之第二指知左右手皆挾之者以云二指之間橫之則知左右手也云此以食指將指挾之者以左擘指拓弓右擘指鉤弦故知挾矢以第二第三指間弟二指為食指左傳云子公之食指動是也第三脂為將指左傳云吳王闔閭傷於將指是也故云食指將指之間挾之知不在無名指間者以無名指短與將指不相應故知不是也司射在司馬之北司馬無事不執弓注以不主射故也疏釋曰經不明言司射與司馬南北相當故明之也始射獲而未釋獲復釋獲復用樂行之注君子取人以漸音義射食亦反又食夜反復用之復扶又反疏釋曰始射獲而未釋獲據三耦射時云復釋獲者據第二番射時復用樂行之據第三番射時上射於右注於右物射楅長如笴博三寸厚寸有半龍首其中蛇交韋當注博廣也兩端為龍首中央為蛇身相交也蛇龍君子之類也交者象君子取矢於楅上也直心背之衣曰當以丹韋為之司馬左右撫矢而乘之分委於當音義厚户豆反直音值乘繩證反疏注釋曰云蛇龍君子之類也者易云龍戰於野其血玄黃鄭注云聖人喻龍君子喻蛇是蛇龍總為君子之類也云直心背之衣曰當者直通身之言其楅兩頭為龍首於背上通身著當言當心中央也知丹韋為之者周尚赤上云凡畫者丹質又周禮九旗之帛皆用絳故知此當亦以丹韋為之云司馬左右撫矢而乘之分委於當者若未分時總在於當今則四四在一邊不謂分訖乃置於兩當也楅髤橫而奉之南面坐而奠之南北當洗注髤赤黑漆也音義髤虛求反疏釋曰云南面坐而奠之者取向弟子持矢北面故南面奠之云南北當洗者恐南北不知逺近故記言南北當洗南北節也射者有過則撻之注過謂矢揚中人凡射時矢中人當刑之今鄉會衆賢以禮樂勸民而射者中人本意在矦去傷害之心逺是以輕之以撲撻於中庭而已書曰撲作教刑疏注釋曰云是以輕之以撲撻於中庭而已引書者謂尚書堯典之文彼據教學故彼注云不勤道業則撻之引之者於射時司射搢撲亦是教射法故引證撻犯禮之過者是以尚書亦云矦以明之撻以記之是也衆賓不與射者不降注不以無事亂有事古文與為豫音義與音預疏釋曰鄉射不得與射者雖誓僅有存焉三賓已上容其有文無武者許其不射故記者言之也取誘射之矢者既拾取矢而后兼誘射之乘矢而取之注謂反位已禮成乃更進取之不相因也疏注釋曰云不相因者既自拾取已之乘矢反位東西望訖上射乃更向前兼取誘射之矢禮以變為敬故不相因賓主人射則司射擯升降卒射即席而反位卒事注擯賓主人升降者皆尊之也不使司馬擯其升降主於射疏注釋曰云不使司馬擯其升降主於射者必以司射決之者以司馬本是司正不主射事司射主射事故使司射也鹿中髤前足跪鑿背容八算釋獲者奉之先首注前足跪者象教擾之獸受負也音義奉芳勇反擾而小反疏注釋曰服不氏教擾猛獸不堪受負其有合負物者教擾則屈前足以受負若今駝受負則四足俱屈之類也大夫降立于堂西以俟射注尊大夫不使久列於射位疏釋曰謂主人大夫降時賓主先射大夫則立于堂西其耦在司馬之西射位大夫且立于堂西射至乃就其耦共升射大夫與士射袒纁𥜗注不肉袒殊於耦音義𥜗如朱反耦少退于物注下大夫也既發則然司射釋弓矢視算與獻釋獲者釋弓矢注惟此二事休武主文釋弓矢耳然則擯升降不釋疏釋曰此二者經文自具記之者以唯此二事釋欲顯出賓主升降時不釋故言之是以鄭云然則擯升降不釋也禮射不主皮主皮之射者勝者又射不勝者降注禮射謂以禮樂射也大射賓射燕射是矣不主皮者貴其容體比於禮其節比於樂不待中為雋也言不勝者降則不復升射也主皮者無矦張獸皮而射之主於獲也尚書傳曰戰鬬不可不習故於搜狩以間之也間之者貫之也貫之者習之也凡祭取餘獲陳於澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取何以然所以貴揖讓之取也而賤勇力之取嚮之取也於囿中勇力之取今之取也於澤宫揖讓之取也澤習禮之處非所於行禮其射又主中此主皮之射與天子大射張皮矦賓射張五采之矦燕射張獸矦音義射與音餘疏注釋曰云禮射謂以禮樂射也者射時有禮兼作樂故連樂言之不言鄉射者鄉射用采矦賓射中兼之故不言也云不主皮者貴其容體比於禮其節比於樂者此即九節七節五節應於樂節是也云言不勝者降不復升射也者據主皮射者也禮射二番不勝仍待後番復升射也尚書傳者濟南伏生為尚書作傳云凡祭取餘獲陳於澤然後卿大夫相與射也者此則周禮山虞田訖虞人植旗於中屬禽焉每禽擇取三十餘將向國以祭謂若大司馬云仲春祭社仲夏享礿仲秋祀方仲冬享蒸凡祭乃以餘獲陳於澤宫中卿大夫士共以主皮之禮射取之云雖不中雖中者據向田時也云非所於行禮者云揖讓取即是行禮而云非所於行禮者揖讓雖是禮對大射之等其體比於禮其節比於樂為非所行禮也云此主皮之射與者書傳不言主皮以義約同故云與以疑之也云天子大射以下者案梓人云張皮矦而棲以鵠則春以功即此鄭云天子太射張皮矦也梓人又云張五采之矦逺國屬即此鄭云賓射張五采之矦也梓人又云張獸矦以恩燕即此鄭云燕射張獸矦也鄭言此者證此是禮射與主皮異也若然天子有澤宮又有射宮二處皆行射禮者澤宫之內有班餘穫射又有試弓習武之射若西郊學中射者行大射之禮張皮矦者是也澤宮中射者將欲向射宮先向澤宮中行試弓習武之射此習武之射無矦直射甲革椹質故司弓矢職云王弓弧弓以授射甲革椹質而注引圉師職曰射則充椹質是也主人亦飲于西階上注就射爵而飲也已無俊才不可以辭罰疏釋曰此謂主人在不勝之黨受罰爵之時也注釋曰云就射爵而飲也者謂西楹西豐上射爵也云已無俊才不可以辭罰者以主人尊恐不受罰爵故言此也獲者之俎折脊脅肺臑注臑若膞胳觳之折以大夫之餘體音義臑奴報反膞音純胳音格又音各觳苦角反疏注釋曰上賓主人已用肩臂唯有臑及膞胳觳若脊脅骨多尊卑皆有自臑已下各得其一今鄭具言之欲見科取其一不定以其若無大夫獲者得臑即經所云者故臑在肺下欲見無大夫已合得若大夫一人大夫得臑獲者得膞若大夫二人獲者即得胳若大夫三人獲者即得觳若大夫公卿更多則折之不得整體或更取餘體也故鄭又云折以大夫之餘體也東方謂之右個注矦以鄉堂為面也音義個音幹疏釋曰以其經直云左右個不辨東西故記人明之也釋獲者之俎折脊脅肺皆有祭注皆皆獲者也祭祭肺也以言肺謂刌肺不離嫌無祭肺音義刌寸本反疏注釋曰云以言肺謂刌肺不離者即經中脊脅肺是切肺與祭肺同也云嫌無祭肺者此明記人之意見上已有刌肺不離者即經中脊脅肺是刌肺與祭肺同嫌更不别有祭肺故言皆有祭肺言皆皆獲者欲見釋獲者與主獲者二者皆别有祭肺故云皆也若然上肺即舉肺案公食大夫有切肺與祭肺者優賓使賓祭此二者此以舉肺為祭肺者略賤者之義是以有司徹侑俎羊切肺一侑俎豕亦切肺一鄭云豕又祭肺不嚌肺不備禮則是略賤之類也大夫説矢束坐説之注明不自尊别也音義説吐活反又始鋭反别彼列反歌騶虞若采蘋皆五終射無算注謂衆賓繼射者衆賓無數也每一耦射歌五終也疏注釋曰上用騶虞以化民下用采蘋大夫之樂節亦可皆五終者大夫士皆五節一節一終故云五終也鄭言衆賓無數者謂堂下衆賓繼射者故無數若堂上衆賓則三人也古者於旅也語注禮成樂備乃可以言語先王禮樂之道也疾今人慢於禮樂之盛言語無節故追道古也凡旅不洗注敬殺不洗者不祭注不盛既旅士不入注從正禮也既旅則將燕矣士入齒於鄉人疏注釋曰以其士立於下故齒於鄉人也大夫後出注下鄉人不干其賓主之禮疏注釋曰賓主及衆賓出後乃出故云不干其賓主之禮主人送於門外再拜注拜送大夫尊之也主人送賓還入門揖大夫乃出拜送之疏注釋曰上文大夫後出是大夫意不干賓主之禮此經主人意故鄭云拜送大夫尊之也知主人送賓還入門揖大夫乃出送拜之者以其上經云賓出主人送于門外再拜此記又云大夫後出主人送于門外再拜故知主人送賓還入門揖大夫乃出送再拜之也鄉矦上個五尋注上個謂最上幅也八尺曰尋上幅用布四丈疏注釋曰以五尋尋八尺五八四十故四丈也中十尺注方者也用布五丈今官布幅廣二尺二寸旁削一寸考工記曰梓人為矦廣與崇方謂中也疏注釋曰云方者也者謂矦中也正方十尺云用布五丈今官布幅廣二尺二寸旁削一寸者鄭意此言十尺用布五幅幅廣二尺二寸兩畔各削一寸為縫幅各二尺在故五幅為一丈也漢法幅二尺二寸亦古制存焉故舉以為况若然周禮鄭志純三只只八寸二尺四寸者據繒幅也士喪禮云云則以繒長半幅注云半幅一尺終幅二尺亦謂繒而幅二尺者幅有二種喪禮略用其狹者故周禮鄭云凡為神之衣物必沽而小是也引梓人者彼總據三矦矦中皆廣與崇方引之證經十尺是方也矦道五十弓弓二寸以為矦中注言矦中所取數也量矦道以貍步而云弓者矦之所取數宜用射器也正二寸者骹中之博也今文改弓為肱也音義骹胡飽反又下巧反李苦教反肱古橫反疏注釋曰云言矦中所取數也者謂矦中大小取數于矦道云量矦道以貍步者大射文故彼云以貍步張三矦是用步耳而云弓者六尺為步弓之下制六尺與步相應矦之所取數宜用射器故此經云弓也云正二寸者骹中之博也者案周禮弓人云骹解中有變焉謂弓弣把中側骨之處博二寸故於此處取數焉倍中以為躬注躬身也謂中之上下幅也用布各二丈疏注釋曰身謂中上中下各橫接一幅布者故鄭云中之上下幅用布各二丈也倍躬以為左右舌注謂上個也居兩旁謂之個左右出謂之舌疏注釋曰言謂上個者對下個不得倍躬故謂上個也云兩旁謂之個在躬之兩旁則謂之個云左右出謂之舌謂躬外兩相各出一丈若人舒舌故下云下舌半上舌據出者而言也下舌半上舌注半者半其出於躬者也用布三丈所以半上舌者矦人之形類也上個象臂下個象足中人張臂八尺張足六尺五八四十五六三十以此為也凡鄉矦用布十六丈數起矦道五十弓以計道七十弓之矦用布二十五丈二尺道九十弓之矦用布三十六丈音義衰初危反疏注釋曰半者半其出於躬者也者以其言舌故知半其出者也云用布三丈者上舌兩相各一丈今下舌兩相各五尺通躬二丈故云用布三丈也云矦人之形類也者人形上廣下狹故也云五八四十據上個四丈五六三十據下個三丈以此上下為差也云凡鄉矦用布十六丈數起矦道五十弓以計者用布十六丈者中五幅幅一丈用布五丈上下躬各二丈總四丈上個四丈下個三丈是總十六丈也云道七十弓之矦用布二十五丈二尺者道七十弓弓取二寸二七十四矦中丈四尺七幅幅有丈四尺中用布九丈八尺上下躬各用布二大八尺上下總用布五丈六尺上個倍躬為五丈六尺下舌半上舌上舌出者兩相各出丈四尺下舌半之兩相各出七尺下舌用布一丈四尺通躬二丈八尺總計用布四丈二尺通計用布二十五丈二尺也云道九十弓之矦用布三十六丈者弓取二寸九十弓矦中丈八尺矦中用布九幅幅别丈八尺巾用布十六丈二尺倍中以為躬上下躬各用布三丈六尺上下總七丈二尺倍躬以為左右舌上舌用布亦七丈二尺下舌亦半上舌上舌出者丈八尺下舌半之則下舌總用布五丈四尺以此計之總用布三十六丈也箭籌八十注箭篠也籌算也籌八十者略以十耦為正貴全數其時衆賓從賓音義篠息了反疏注釋曰云箭篠也者謂以箭為籌射之耦隨賓多少今言八十舉成數以十耦為正但一者數之始十者數之終以十耦為成數也長尺有握握素注握本所持處也素謂刋之也刋本一膚音義刊苦干反疏釋曰云長尺復云有握則握在一尺之外則此籌尺四寸矣注釋曰云刋本一膚者公羊傳僖三十一年云觸石而出膚寸而合不崇朝而遍雨乎天下者唯泰山爾何休云側手為膚又投壺云室中五扶注云鋪四指曰扶一指案寸皆謂布四指一指一寸四指則四寸引之者證握膚為一謂刊四寸也楚朴長如笴刋本尺注刋其可持處君射則為下射上射退于物一笴既發則答君而俟注答對也此以下雜記也今文君射則為下君樂作而后就物君袒朱襦以射注君尊小臣以巾執矢以授注君尊不搢矢不挾矢授之稍屬音義屬章欲反若飲君如燕則夾爵注謂君在不勝之黨也賓飲君如燕賓媵觚于公之禮則夾爵夾爵者君既卒爵復自飲音義飲於鴆反夾古洽反觚音孤君國中射則皮樹中以翿旌獲白羽與朱羽糅注國中城中也謂燕射也皮樹獸名以翿旌獲尚文德也今文皮樹為繁豎糅為縚古文無以音義縚吐刀反疏注釋曰知城中是燕射者以其下有賓射大射不在國中故國中是燕射以其燕在寢故也云以翿旌獲尚文德也者以其燕主歡心故旌從不命之士亦取尚文德之義必知取尚文德者以其以文德者舞文舞羽舞也以武德者舞武舞干舞也此既用羽知取尚文德也於郊則閭中以旌獲注於郊謂大射也大射於大學王制曰小學在公宮之左大學在郊閭獸名如驢一角或曰如驢岐蹄周書曰北唐以閭析羽為旌音義大音泰岐巨支反一音支析悉歷反疏注釋曰知於郊謂大射也者案大射云公入鷔從外來入此既言於郊故知大射在郊也云大射於大學者據諸矦而言也天子大射在虞庠小學以其天子大學在國中小學在郊諸矦不得立大學在國立大學在郊故鄭引王制小學在公宮之左大學在郊是殷法諸矦用焉故引為證必知諸矦立大學在郊者見詩魯頌有泮宮禮記云故魯人將有事於上帝必先有事於頖官鄭云頖宮郊之學也則詩泮宮此郊學是也云閭獸名如驢一角或曰如驢岐蹄周書曰北唐以閭者岐蹄巳上山海經文周書見於國語也於竟則虎中龍旜注於竟謂與鄰國君射也畫龍於旜尚文章也通帛為旜音義竟音景注同旜之然反疏注釋曰與鄰國君射則賓射也以其君有送賓之事因送則射云尚文章也者亦若翿旌也云通帛為旜司常文鄭注云凡九旗之帛皆用絳則通帛者正幅為絳長尋曰旐繫旐曰斾通體皆用絳帛為之名旜大夫兕中各以其物獲注兕獸名似牛一角音義兕徐履反疏釋曰下有士則此專據大夫為文而云各以其物者公矦伯大夫再命子男之大夫一命為卿大夫其數雖同旐依命數不同故云各又下云士翿旌以獲唯小國之州長不命者則公矦之州長一命有旌亦入物中則各內兼之矣故云各注釋曰兕似牛一角案爾雅及山海經知之士鹿中翿旌以獲注謂小國之州長也用翿為旌以獲無物也古文無以獲唯君有射于國中其餘否注臣不習武事於君側也古文有作又今文無其餘否疏釋曰天子諸矦皆燕射在國又天子賓射在朝亦在國大夫士燕射賓射不在國大夫又得行大射雖無郊學亦不得在國是以孔子為鄉射射於矍相之固是其一證若然此鄉射亦不在國中亦宜在國外故記於此見之也君在大夫射則肉袒注不袒纁襦厭於君也今文無射音義厭於涉反疏注釋曰上云大夫與士射袒纁襦今與君射為厭與士同故肉袒也儀禮注疏卷五儀禮注疏卷五考證主人戒賓賓出迎再拜主人答再拜乃請敖繼公云請下似脫一賓字臣紱按鄉飲酒禮云乃請賓敖氏蓋以彼例此乃席賓注不言於户牖之間者此射於序敖繼公云不言户牖間者可知也記曰出自東房有東房西房則中有室而席賓於户牖間也明矣臣紱按鄭意以庠有室序無室無室則無户牖故云此射於序然有房無室不成屋制若并無房則籩豆何所置之且經言東西序東西堂皆與廟寢無異則序與庠似無異制也疑敖説為長乃張侯疏上綱與下綱出舌尋縜寸焉縜監本訛作絹今據考工記正之賓厭衆賓衆賓皆入門左敖繼公云賓厭衆賓入門左此衍三字爾主人坐取爵興注致潔敬也致監本訛作飲鄉飲注作致從之主人坐取爵實之賓之席前賓之席前監本作賓席之前敖繼公云當作之席賓卒洗揖讓如初升疏釋曰言如初則亦一揖一讓也疏十二字監本訛在下節之下今移屬此為是大夫若有遵者注卿大夫士非鄉人禮亦然卿監本作鄉臣紱按此兼士言之又非言鄉人則當為卿大夫明矣工四人二瑟疏近鼓持之手入則淺近尾持之手入則深監本無手字淺字尾持之字臣學健按細玩文意如此乃完今補入未旅疏故再獻訖即射獻監本作拜臣紱按上經獻賓獻衆賔是再獻也獻遵則或有或無不定故不數今改獻司射降自西階疏故賓黨主黨皆不與也故賓黨主四字監本作上下經文臣宗楷按四字似無著據黨字則知上字之為賓矣據皆字則知又有主黨矣細繹疏文正之命下射曰下石經誤作不豫則鉤楹內注今文豫為序敖繼公云序之文意明白於豫且記亦以序對言宜從今文臣紱按鄭氏謂榭無室而讀豫為榭殊覺牽強敖説似可從改取一個挾之取監本訛作作今依石經及敖本改正皆當其物疏文二十七字監本訛在下節之下今以經次之當移此乃射上射既發挾弓矢而后下射射敖繼公云弓字衍文大射儀無弓字疏引孝經説取孝經緯援神契文臣紱按據此則注當有引孝經之語而刻本失之告于大夫曰告于上石經及敖本有以耦二字三耦拾取矢皆袒決遂執弓朱子云此拾取矢疑衍與進者相左相揖反位揖字下石經有退字蓋衍文司馬袒決執弓升敖繼公云禮無決而不遂者此決字當衍上經云司馬適堂西不決遂袒執弓此宜如之疏不敢殊别於賓故不束監本脫故不束三字今尋繹上下文義補之及階勝者先升堂少右石經疊少字衍文楊本敖本疊升字興適左個中亦如之亦石經作皆訛司射適階西適敖本作西薦脯醢折俎敖繼公云折俎上當有設字蓋文脫也司射猶挾一個以進作上射如初敖繼公云上字似衍否則上字下當有耦字或云進字亦衍升飲如初敖繼公云大射儀此下云卒退豐與觶如初此脫一句適堂西以命拾取矢如初堂石經作階誤樂正命弟子贊工即位注樂正反自西階東自集説作于文勢較順賓與大夫反奠于其所賓與大夫下石經及敖本有坐字執觶者受觶注今文無執觶以下共二十字又疏此經曰執觶者以下共三十一字監本誤置于卒受者以虛觶降奠于篚節下臣紱按於彼經無所當應移屬于此長受酬注古文曰受酬者不拜監本脫受字今依朱子本補主人釋服乃息司正疏自此盡經末論息勞司正之事疏共十二字監本誤置于明日賓朝服節下臣紱按以經次之應移屬于此獻用爵朱子本獻上有凡字石經及諸本皆無三笙一和而成聲臣紱按注謂三人吹笙一人吹和而引爾雅和為笙之小者以證之是也敖繼公謂一人歌其所吹之詩以和之殊屬臆説笙詩有聲無辭朱子及劉敞論之審矣遂西取弓矢遂監本訛作送今依石經及朱子本楊本敖本改正楅髤橫而奉之奉石經及釋文作拳朱子嘗論其誤今依監本大夫與士射袒纁襦纁石經及楊本敖本作薰敖繼公云古字通用今從纁獲者之俎折脊脅肺臑臣紱按臑在折中不應又出臑字蓋因注文第一字而誤衍也敖本已刪而附論於卷尾但賈疏自作有臑字解故仍其舊而加圈别之中十尺疏純三只只八寸兩只字監本皆訛尺臣紱按只八寸鄭康成答趙商語見天官內宰及聘禮疏中長尺有握注刋本一膚監本一字下衍作字臣紱按膚長四寸言刋其本處一膚之長也通解無作字從之士鹿中翿旌以獲注謂小國之州長也用翿為旌以獲無物也古文無以獲以上經與注共二十九字監本皆脫其經文石經及敖本並有之注則依朱子本楊本補儀禮注疏卷五考證
