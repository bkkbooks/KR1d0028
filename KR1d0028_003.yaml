body:
  text: 儀禮注疏卷三漢鄭氏注唐陸德明音義賈公彥疏士相見禮第三士相見之禮贄冬用雉夏用腒左頭奉之曰某也願見無由達某子以命命某見注贄所執以至者君子見於所尊敬必執贄以將其厚意也士贄用雉者取其耿介交有時别有倫也雉必用死者為其不可生服也夏用腒備腐臭也左頭頭陽也無由達言久無因緣以自達也某子今所因緣之姓名也以命者稱述主人之意今文頭為脰音義贄本又作摯音同腒其居反奉芳勇反見賢遍反下同凡卑於尊曰見敵而曰見謙敬之辭也下以意求之他皆放此耿古幸反介音界别彼列反為于偽反脰音豆疏釋曰自此至送于門外再拜論士與士相見之事也云某也願見無由逹者謂新升為士欲見舊為士者謂久無紹介中間之人達彼此之意雖願見無由得與主人通達相見也云某子以命命某見者某子是紹介中間之人姓名以主人之命命某是賓之名命某來見主人也案少儀始見君子者辭曰某固願聞名於將命者謂以卑見尊法彼又云敵者曰某固願見於將命者此兩士相見亦是敵者不言願見於將命者此既言願見無由達見敵者始欲相見案下文及還贄者皆云於將命者明此亦有願見於將命者不言者文不具也注釋曰云贄所執以至者贄得訓為至新升為士者彼此相見欲相尊敬必執禽鳥始得至故云贄所執以至者也云士贄用雉者對大夫已上所執羔鴈不同也云取其耿介交有時别有倫也者倫類也雉交接有時至於别後則雄雌不雜謂春交秋别也士之義亦然義取耿介不犯於上也云雉必用死者為其不可生服也者經直云冬用雉知用死雉者尚書云三帛二生一死贄則雉義取耿介為君致死也云夏用腒備腐臭也者案周禮庖人云春行羔豚夏行腒鱐鄭云腒乾雉鱐乾魚腒鱐暵熱而乾乾則不腐臭故此取不腐臭也冬時雖死形體不異故存本名稱曰雉夏為乾腒形體異故變本名稱曰腒也云左頭頭陽也者曲禮云執禽者左首雉與羔鴈同是合生執之物以不可生服故殺之雖死猶尚左以從陽也云某子今所因緣之姓名也者謂紹介之姓名云以命者稱述主人之意者言紹介之人稱述主人之辭意傳來賓也云今文頭為脰者鄭不從今文者以其脰項也項不得為頭故不從也但此云某子以命命某見謂舊未相見今始來見主人故須某子傳通孺悲欲見孔子不由紹介故孔子辭以疾且經云某子鄭云某子今所因緣之姓名案鄉飲酒云某子受酬注云某者衆賓姓又鄉射云某酬某子注云某子者氏也與此注某子為姓名不同者彼旅酬下為上尊敬在上以公羊傳名不若字字不若子故下者稱姓以配子彼對面語故不言名此非對面之言於彼遙稱紹介之意若不言名直稱姓是何人故鄭以姓名解之也若然特牲云皇祖某子注為伯子仲子者以孫不宜云父祖姓故以伯子仲子言之望經為義故注有殊若然注宜有名無者誤也主人對曰某子命某見吾子有辱請吾子之就家也某將走見注有又也某子命某往見今吾子又自辱來序其意也走猶往也今文無走疏釋曰云某子命某見者某子則是紹介姓名以某子是中間之人故賓主共稱之也此上下皆言請不言辭辭而不受須相見故言請而已注釋曰鄭轉有為乂者以言某子以命命某往就彼見吾子又自辱來於義為便故從又不從有也云走猶往也者以言走直取急往相見之意非走驟之義故釋從往也云今文無走字者無走於文義不足故不從今文從古文也賓對曰某不足以辱命請終賜見注命謂請吾子之就家主人對曰某不敢為儀固請吾子之就家也某將走見注不敢為儀言不敢外貌為威儀忠誠欲往也固如故也今文不為非古文云固以請疏注釋曰固如故也者固為堅固堅固則如故以再請如前故云固如故也云今文不為非者云非敢於義不便故不從今文非也云古文云固以請者固請於文從便若有以字於文賖緩故不從古文固以請也賓對曰某不敢為儀固以請注言如故請終賜見也今文不為非主人對曰某也固辭不得命將走見聞吾子稱贄敢辭贄注不得命者不得見許之命也走猶出也稱舉也辭其贄為其大崇也古文曰某將走見音義大音泰劉堂餓反下同疏注釋曰云走猶出也者亦如上之走往彼據向賓家故走為往此據出門故云走猶出也云辭其贄為其大崇也者凡賓主相見唯此新升為士有贄又初不相識故有贄為重對重相見則無贄為輕是以始相見辭之為大崇故也云古文曰某將走見者上再番皆云某將走見今此三者亦云某將走見與前同此疉古文不從者以上第一番請賓主皆無不敢為儀第二番賓及主人皆云不敢為儀文句既異若不云某於文不便故須云某也此三番於上已云某也固辭不得命於下不須云某於文便古文更云某將走見文疊故不從也賓對曰某不以贄不敢見注見於所尊敬而無贄嫌大簡疏注釋曰此士相見唯是平敵相抗案曲禮云主人敬客則先拜客客敬主人則先拜主人並不問爵之大小唯以相尊敬為先後故雖兩士亦得云相尊敬不敢空手須以摯相見若無摯相見是則大簡略也主人對曰某不足以習禮敢固辭注言不足習禮者不敢當其崇禮來見已疏注釋曰案上經賓云某不以贄不敢見是賓以崇禮來見主人今主人不敢當其崇禮來見已故變文言不足以習禮故鄭云言不足習禮者不敢當其崇禮來見已也賓對曰某也不依於贄不敢見固以請注言依於贄謙自卑也疏注釋曰凡相見之禮以卑見尊必依摯禮記檀弓云魯人有周豐也者哀公執摯請見之者是下賢非正法今士相見云不依於摯不敢見謙自卑也主人對曰某也固辭不得命敢不敬從出迎于門外再拜賓答再拜主人揖入門右賓奉贄入門左主人再拜受賓再拜送贄出注右就右也左就左也受贄於庭既拜受送則出矣不受贄於堂下人君也今文無也音義下遐嫁反疏注釋曰凡門出則以西為右以東為左入則以東為右以西為左依賓西主東之位也知受摯於庭者以其入門左右不言揖讓而升之事故知在庭也云既拜送則出矣者欲見賓拜送摯訖而言出則去還家無意復待主人留已也云不受摯於堂下人君也者聘禮賓升堂致命授玉又下云君在堂升見無方階亦是升堂見君法故云不於堂下人君也主人請見賓反見退主人送于門外再拜注請見者為賓崇禮來相接以矜莊歡心未交也賓反見則燕矣下云凡燕見於君至凡侍坐於君子博記反見之燕義臣初見於君再拜奠摯而出疏注釋曰鄭解主人留賓之意云請見者為賓崇禮來相接則執摯來見也云以矜莊歡心未交也者正謂入門拜受拜送時賓主俱矜莊相敬歡心未交也云賓反見則燕矣者上士冠禮賓士昏納采之等禮記皆有禮賓饗賓之事明此行禮主人留必不虛宜有歡燕故云則燕矣以摯相見非聘問之禮燕既在寢明前相見亦在寢之庭矣若諸文有留賓者多是禮賓之事知此不行禮賓而云燕者彼諸文皆是為餘事相見以其事重故為禮賓此直當身相見其事輕故直有燕矣是以諸文禮賓此燕賓故直云請見也云凡燕見於君至反見之燕義者凡燕見或反見或本來侍坐非反見下注云此謂特見圖事非立賓主之燕是也侍坐於君子之下乃有侍坐問夜膳葷賜食爵之等不引證燕見者彼直是侍坐法非燕見之禮故也云臣初見於君再拜奠摯而出者鄭欲見自燕見于君下至凡侍坐於君子皆反見燕法其中仍有臣見于君法臣始仕見于君法禮畢奠摯而出君亦當遣人留之燕也若然下有他邦之人則還摯雖不見反燕臣尚燕他邦有燕可知但文不具也主人復見之以其贄曰嚮者吾子辱使某見請還贄於將命者注復見之者禮尚往來也以其贄謂嚮時所執來者也嚮曩也將猶傳也傳命者謂擯相也音義復扶又反又音服嚮許亮反還劉音旋曩乃蕩反傳丈專反擯必刃反相息亮反疏釋曰自此至賓退送再拜論主人還贄于賓之事注釋曰云復見之者禮尚往來也者鄭解主人還贄之意云禮尚往來曲禮文五等諸矦身自出朝及遣臣出聘以其圭璋重不可遙復朝聘訖即還之璧琮財輕故不還彼朝聘用玉自為一禮有不還之義其在國之臣自執摯相見雖禽摯皆還之臣見於君則不還義與朝聘異不可相決也云將猶傳也傳命者謂擯相也者謂出接賓曰擯入詔禮曰相一也故聘禮與冠義皆云每一門止一相是謂擯介為相也主人對曰某也既得見矣敢辭注讓其來答已也疏釋曰上言主人此亦言主人者上言主人者據前為主人而言此云主人者謂前賓今在已家而説也賓對曰某也非敢求見請還贄於將命者注言不敢求見嫌褻主人不敢當也音義褻息列反疏注釋曰云嫌褻主人不敢當也者曰鄉者主人見已今即來見主人賓主頻見是褻也今云非敢求見嫌褻主人不敢更相見也故不敢當相見之法直云還摯而已主人對曰某也既得見矣敢固辭注固如故也賓對曰某不敢以聞固以請於將命者注言不敢以聞又益不敢當疏注釋曰上云非敢求見已是不敢當此云不敢以聞耳聞疏於目見故云又益不敢當也主人對曰某也固辭不得命敢不從注許受之也異日則出迎同日則否疏注釋曰下云賓奉摯入不言主人出迎又不言厥明是與前相見同日知異日出迎者鄉飲酒禮云明日乃息司正主人出迎之司正猶迎之况同僚乎是知異日出迎也若聘禮公迎于大門內至禮賓又出迎者彼初是公迎彼君之命不為迎賓身故至禮賓身雖同日亦出迎之故鄭注云公出迎者已之禮更端是也昏禮賓為男家使初時出迎至醴賓身雖同日亦出迎也有司徹前為尸後為賓所為異故雖同日亦出迎此二者亦是更端之義也案鄉飲酒及公食大夫皆於戒賓之時未行賓主之禮是以賓至乃迎之故雖同日亦迎賓非更端之義也賓奉贄入主人再拜受賓再拜送贄出主人送于門外再拜士見於大夫終辭其贄於其入也一拜其辱也賓退送再拜注終辭其贄以將不親答也凡不答而受其贄唯君於臣耳大夫於士不出迎入一拜正禮也送再拜尊賓疏注釋曰云以將不親答也者事未至謂之將如上士相見賓來見士後將親答就士家而辭則受其贄此則以將不親答終不受也若然經直云終辭其摯不言一辭再辭亦有可知但略而不言也又少儀云始見君子曰願聞名此不言願聞亦文不具也云凡不答而受其摯唯君於臣耳者見下文他邦之人則使擯者還其摯見已君不言還摯又文有三辭初辭中辭終辭初辭之時則云使某中辭云命某以辭在中者傳言而已故云命某然使某者是尊君卑臣之義其心重若云命某者尊君卑臣稍淺漸輕之義故鄭云或言命某傳言耳必知有此義者案僖九年左傳曰天子有事於文武使孔賜伯舅胙以伯舅耋老加勞賜一級無下拜是尊君稱使傳言云命有輕重之義也若常為臣者則禮辭其贄曰某也辭不得命不敢固辭注禮辭一辭其贄而許也將不答而聽其以贄入有臣道也賓入奠贄再拜主人答一拜注奠贄尊卑異不親授也古文一為一賓出使擯者還其贄于門外曰某也使某還贄注還其贄者辟正君也音義辟音避賓對曰某也既得見矣敢辭注辭君還其贄也今文無也擯者對曰某也命某某非敢為儀也敢以請注還贄者請使受之賓對曰某也夫子之賤私不足以踐禮敢固辭注家臣稱私踐行也言某臣也不足以行賓客禮賓客所不答者不受贄擯者對曰某也使某不敢為儀也固以請注言使某尊君也或言命某傳言耳賓對曰某固辭不得命敢不從再拜受注受其贄而去之疏注釋曰云受其摯而去之者以其嘗為臣為輕既不受其摯又相見無饗燕之禮故鄭云而去之以絶之也下大夫相見以鴈飾之以布維之以索如執雉注鴈取知時飛翔有行列也飾之以布謂裁縫衣其身也維謂繫聯其足音義索悉各反注同行戶郎反衣於既反聯音連疏釋曰言下大夫者國皆有三卿五大夫言上大夫據三卿則此下是五大夫也二十七士與五大夫轉相副二則三卿宜有六大夫而五者何休云司馬事省闕一大夫注釋曰云鴈取知時者以其木落南翔冰冸北徂隨陽南北義取大夫能從君政教而施之云飛翔有行列也者義取大夫能依其位次尊卑有敘也上士執雉左頭奉之此云如執雉明執鴈者亦左頭奉之也案曲禮云飾羔鴈者以繢彼天子卿大夫非直以布上又畫之此諸矦卿大夫執摯雖與天子之臣同飾羔鴈者直用布為飾無繢彼不言士則天子之士與諸候之士同亦無飾士賤故無别也上大夫相見以羔飾之以布四維之結于面左頭如麛執之注上大夫卿也羔取其從帥羣而不黨也面前也繫聯四足交出背上於胸前結之也如麛執之者秋獻麛有成禮如之或曰麛孤之摯也其禮蓋謂左執前足右執後足今文頭為脰音義麛莫兮反疏注釋曰云上大夫卿也者即三卿也云羔取其從帥者凡羔羊羣皆有引帥若卿之從君之命者也云羣而不黨也者羊羔羣而不黨義取三卿亦皆正直雖羣居不阿黨也云繫聯四足交出背上於胸前結之者謂先以繩雙繫前兩足復以繩繫後兩足乃以雙繩於左右從腹下向背上交過於胸前結之也云如麛執之者秋獻麛有成禮如之者案周禮獸人云冬獻狼夏獻麋春秋獻獸物鹿豕羣獸及狐狸可也麛是鹿子與鹿同時獻之又庖人云秋行犢麛則獻當在秋時故云秋獻麛也又案禮器曲禮三千鄭云曲猶事也事禮謂今禮也其中事儀三千則禮未亡之時三千條內有此獻麛之法是有成禮可依故此經得如之也云或曰麛孤之摯也者案大宗伯及大行人與聘禮皆云孤執皮帛謂天子之孤與諸候之孤執皮帛今此執麛者謂新升為孤見已君法至餘事則皆皮帛也云其禮蓋謂左執前足右執後足者案經云左頭則與雉鴈同是以曲禮云執禽者左首此鄭又云執之蓋謂左執前足右執後足者此釋經麛執之據四足而言之凡以摯相見之法唯有新升為臣及朝聘及他國君來主國之臣見皆執摯相見常朝及餘會聚皆執笏無執摯之禮又執摯者或平敵或以卑見尊皆用摯尊無執摯見卑之法檀弓云哀公執摯見已臣周豐者彼謂下賢非正法也如士相見之禮注大夫雖摯異其儀猶如士疏釋曰此下大夫及卿其摯雖有羔鴈之異其相見之儀則皆如士也注釋曰云儀猶如士者或兩大夫或兩卿相見皆如上文某也願見無由逹已下至主人拜送于門外也始見于君執摯至下容彌蹙注下謂君所也蹙猶促也促恭慤貌也其為恭士大夫一也音義蹙子六反注及下同慤苦角反疏注釋曰直云見于君不辨臣之貴賤則臣之貴賤皆同故鄭云其為恭士大夫一也不言所而言下者凡臣視祫已下故不言所言下也庶人見於君不為容進退走注容謂趨翔疏釋曰此不言民而言庶人則是庶人在官謂若王制云庶人在官者其祿以是為差即府史胥徒是也注釋曰按鄭注曲禮云行而張足曰趨行而張拱曰翔皆是庶人貌也此庶人見君不趨翔謂是常法論語是孔子行事而云趨進翼如也彼謂孔子與君圖事於堂圖事訖降堂向時揖處至君前橫過向門特加肅敬與庶人同也士大夫則奠摯再拜稽首君答一拜注言君答士大夫一拜則於庶人不答之庶人之摯鶩古文一作一音義鶩亡卜反鴨也疏釋曰臣拜君云再拜稽首則君答一拜者當作空首則九拜中竒拜是也注釋曰云言君答士大夫一拜則於庶人不答之者案曲禮君於士不答拜謂已士此得與大夫同答一拜者士賤君不答拜此以新升為士故答拜聘禮問勞云答士拜者亦以新使反故拜之也云庶人之摯鶩者案大宗伯云以禽作六摯庶人執鶩注云鶩取其不飛遷象庶人安土重遷是也若他邦之人則使擯者還其摯曰寡君使某還摯賓對曰君不有其外臣臣不敢辭再拜稽首受疏釋曰賓不辭即受摯以君所不臣禮無受他臣摯法賓知此法故不敢亢禮於他君故不辭即受之也凡臣無境外之交今得以執摯見他邦君者謂他國之君來朝此國之臣因見之謂若掌客卿皆見以羔之類是也春秋卿大夫與他國之君相見者皆因聘會乃見之非特行也凡燕見于君必辨君之南面若不得則正方不疑君注辨猶正也君南面則臣見正北面君或時不然當正東面若正西面不得疑君所處邪鄉之此謂特見圖事非立賓主之燕也疑度之音義辨皮勉反下同疑音擬又如字度大各反疏注釋曰案上文注以此為博記反見之燕義則此與燕義燕禮立賓主之燕别以其此經君之面位正南臣北面嚮之若不得南面或君東西向則臣亦正方嚮之不可預度君之面位邪立嚮之皆與燕禮君在阼階西面為正異故知此經是特見皆圖事并與賓反見之燕義也知有圖事者論語鄉黨云孔子與君圖事于庭圖事于堂燕禮亦云君與卿圖事之時有此面位無常之法也君在堂升見無方階辨君所在注升見升堂見於君也君近東則升東階君近西則升西階疏釋曰此文據君所在隨便升階無常之事亦謂反燕及圖事之法若立賓主君升自阼階賓及主人升自西階燕禮所云是也凡言非對也妥而後傳言注凡言謂已為君言事也妥安坐也傳言猶出言也若君問可對則對不待安坐也古文妥為綏音義妥他果反為于偽反疏釋曰此據臣與君言之法也注釋曰云凡言謂已為君言事也者謂臣有圖為君言也禮記少儀云量而後入不入而後量是臣有事將入見君須量已所言亦當量君安坐乃可得入而後傳出已言向君道之云妥安坐也者爾雅釋詁文與君言言使臣與大人言言事君與老者言言使弟子與幼者言言孝弟於父兄與衆言言忠信慈祥與居官者言言忠信注博陳燕見言語之儀也言使臣者使臣之禮也大人卿大夫也言事君者臣事君以忠也祥善也居官謂士以下音義孝弟之弟音悌疏釋曰上文據與君言此文則總説尊卑言語之别云與君言言使臣與大人言言事君者但君臣相對有事即言不必與君言恆言使臣與臣言恆言事君今唯言使臣事君者下供上命禮法當然故君以使臣為主臣以事君為正無妨更言餘事已下皆隨事為主可也云與老者言言使弟子者謂七十致仕之人依書傳大夫致仕為父師士致仕為少師教鄉閭子弟雷次宗云學生事師雖無服有父兄之思故稱弟子也云與幼者言言孝弟於父兄者幼既與老者相對此幼即弟子之類孝弟事父兄之名是人行之本故云言孝弟于父兄與衆言言忠信慈祥者此文承老幼之下亦非朝廷之臣但是鄉閭長幼共聚之處使之行忠信慈善之事也云與居官者言言忠信者此與在朝之士言以忠信為主也注釋曰云博陳燕見言語之儀也者據已上博陳與君燕見舉動言語知此博陳也云言使臣者使臣之禮也言事君者臣事君以忠也者並是論語孔子對定公之文云大人卿大夫也者此云言事君明非天子諸侯又非士是卿大夫可知又案下文云凡與大人言始視面中視抱卒視面並是臣視君之法則大人據君也又禮運云大人世及以為禮鄭解為諸侯者以彼上文云天下為家已據天子明下云大人是諸侯可知易革卦云君子豹變據諸侯則大人虎變是天子可知又案論語云狎大人注為天子諸侯為政教者彼據小人不在朝廷故以大人為天子諸侯政教解之鄭皆望文為義故解大人不同云居官謂士以下者以上大夫云事君已據居官卿大夫其居官之內唯有二十七士并府史胥徒故云士以下也凡與大人言始視面中視抱卒視面毋改衆皆若是注始視面謂觀其顔色可傳言未也中視抱容其思之且為敬也卒視面察其納已言否也毋改謂傳言見答應之間當正容體以待之毋自變動為嫌解惰不虛心也衆謂諸卿大夫同在此者皆若是其視之儀無異也古文毋作無今文衆為終音義中如字劉丁仲反抱薄報反毋音無下同解古賣反惰他臥反疏注釋曰云中視抱容其思之且為敬者案曲禮天子視不上於夾夾交領也不下於帶上於夾則敖下於帶則憂視大夫得視面此視君得視面者彼據尋常視君法此據與君言時故不同也云且為敬者此言抱即不視夾不視夾是敬君之常禮故云且為敬也云為嫌解惰不虛心也者禮記云虛中以治之鄭注云虛中言不兼念餘事是虛心之意也云衆謂諸卿大夫同在此者言於君視之髙下如此其卿大夫視君之儀與言者無異也云古文毋作無不從者説文云毋蓋亦禁辭故不從有無之無也云今文衆為終不從者以上已有卒卒為終故從古為衆也若父則遊目毋上於面毋下於帶注子於父主孝不主敬所視廣也因視安否何如也今文父為甫古文毋為無音義上時掌反疏注釋曰案曲禮大夫之臣視大夫得視面不得遊目士之臣視士得旁遊目今子視父鴈與視君同不上於祫與士大夫同者以子於父主孝不主敬所視廣者因視安否何如也若不言立則視足坐則視膝注不言則伺其行起而已疏釋曰已上皆據臣子與君父言語之時此據不言之時注釋曰鄭言伺其行起者行解經立行由立始故以行解立是以論語云立不中門鄭云立行不當棖闑之中央是亦以行解立一也又以起解坐以其起由坐始故也凡侍坐於君子君子欠伸問日之早晏以食具告改居則請退可也注君子謂卿大夫及國中賢者也志倦則欠體倦則伸問日晏近於久也具猶辨也改居謂自變動也古文伸作信早作蚤音義坐才卧反又如字欠起劒反伸音申辨音辨蚤音早疏釋曰此陳侍坐於君子之法注釋曰鄭云君子謂卿大夫者禮之通例大夫得稱君子亦得稱貴人而士賤不得也知及國中賢者者鄉射禮云徵唯所欲以告於鄉先生君子可也鄭云鄉先生鄉大夫致仕者君子有大德行不仕者則曲禮云博聞強識而讓敦善行而不怠謂之君子是也云志倦則欠體倦則伸者鄭注曲禮亦然云古文伸作信早作蚤者此二字古通用故大宗伯云侯執伸圭為信字詩云一之日其蚤獻羔祭韭為蚤字既通用疊古文者據字體非直從今為正亦得通用之義也夜侍坐問夜膳葷請退可也注問夜問其時數也膳葷謂食之葷辛物蔥薤之屬食之以止臥古文葷作薰音義葷香云反薤戶界反疏注釋曰云問夜問其時數也者謂若鍾鼓漏刻之數也云古文葷作薰者玉藻云膳於君有葷桃茢作此葷鄭注論語作焄義亦通若作薰則春秋一薰一蕕薰香草也非葷辛之字故疊古文不從也若君賜之食則君祭先飯遍嘗膳飲而俟君命之食然後食注君祭先飯於其祭食臣先飯示為君嘗食也此謂君與之禮食膳謂進庶羞既嘗庶羞則飲俟君之遍嘗也今文呫嘗膳音義飯扶晚反呫音貼他篋反穀梁未嘗有呫血之盟呫嘗也劉當密反疏釋曰此經及下經論臣侍君坐得賜食之法注釋曰鄭云先飯示為君嘗食也者凡君將食必有膳宰進食則膳宰嘗君前之食備火齊不得下文是也今此文謂膳宰不在則侍食者自嘗自已前食既不嘗君前食則不正嘗食故云示為君嘗食也云此謂君與之禮食者謂君與臣小小禮食法仍非正禮食正禮食則公食大夫是也彼君前無食此君臣俱有食故知小小禮食此即玉藻云若賜之食而君客之則命之祭然後祭彼云客之則此注禮食亦不得祭故一也但此文不云客之命之祭然後祭文不具也若臣嘗食不得云禮食亦不得祭故鄭注玉藻云侍食則正不祭是也若有將食者則俟君之食然後食注將食猶進食謂膳宰也膳宰進食則臣不嘗食周禮膳夫授祭品嘗食王乃食疏注釋曰云膳宰進食則臣不嘗食者臣為君嘗食本為膳宰不在今膳宰既在明臣不嘗食也是以玉藻云若有嘗羞者則俟君之食然後食飯飲而俟注云不祭侍食不敢備禮也不嘗羞膳宰存也是也云膳夫者天子膳夫則諸侯之膳宰引之者證經將食之人是膳宰因將膳與君品嘗食凡君食臣有侍食之時唯子不侍食是以文王世子云命膳宰曰末有原應曰諾然後退是太子不侍食若卿大夫以下則有侍食法故內則云父沒母存冢子御食羣子婦佐餕是也若君賜之爵則下席再拜稽首受爵升席祭卒爵而俟君卒爵然後授虛爵注受爵者於尊所至於授爵坐授人耳必俟君卒爵者若欲其釂然也今文曰若賜之爵無君也音義釂子召反疏注釋曰云受爵者於尊所者曲禮亦是賜爵法而云酒進則起拜受於尊所是也云至於授爵坐授人耳者見曲禮與玉藻并此文並無立授之文故知坐授也云必俟君卒爵者若欲其釂然也者此經文與玉藻文同皆燕而君客之賜爵法故臣先飲以酒是甘味欲美君之味故先飲必待君卒爵而後授虛爵者臣意若欲君盡爵然也案曲禮云侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲彼是大燕飲禮故鄭注引燕禮曰公卒爵而後飲案燕禮當無算爵後得君賜爵待君卒爵乃飲是也退坐取屨隱辟而后屨君為之興則曰君無為興臣不敢辭君若降送之則不敢顧辭遂出注謂君若食之飲之而退也隱辟俯而逡遁興起也辭君興而不敢辭其降於已大崇不敢當也音義辟音避劉房益反一匹亦反為于偽反俯音免逡七旬反遁音巡疏注釋曰云謂君若食之飲之而退也者以上云若君賜之食若君賜之爵下而云退者明為此二者而退也云隱辟俯而逡巡者案曲禮云鄉長者而屨此亦當然云不敢辭其降者謂君降送時明有不降法故曲禮云就屨跪而舉之屏於側注云謂獨退也云若者不定之辭也大夫則辭退下比及門三辭注下亦降也音義比毗志反疏釋曰云大夫則辭退下者對上不敢辭是士士卑不敢辭降大夫之內兼三卿五大夫臣中尊者故得辭降也若先生異爵者請見之則辭辭不得命則曰某無以見辭不得命將走見先見之注先生致仕者也異爵謂卿大夫也辭辭其自降而來走猶出也先見之者出先拜也曲禮曰主人敬賓則先拜賓疏注釋曰此先生即鄉飲酒云就先生而謀賓介亦一也故彼注與此注皆云致仕者也云異爵謂卿大夫也者此士相見本文是士故以卿大夫為異爵也訓走為出者亦謂士見異爵取急意而言走其實非走直出也引曲禮者欲見主敬客先拜也彼云客此云賓者對文賓客異散文賓客通故變文云賓也非以君命使則不稱寡大夫士則曰寡君之老注謂擯贊者辭也不稱寡者不言寡君之某言姓名而已大夫卿士其使則皆曰寡君之某檀弓曰仕而未有祿者君有饋焉曰獻使焉曰寡君之老音義使所吏反疏釋曰云非以君命使則不稱寡者此則玉藻云大夫私事使私人擯則稱名以其非聘問之禮則為私事使私人擯也聘禮云若有言則以束帛如享禮引春秋晉矦使韓穿來言汶陽之田歸於齊玉藻注亦引之是也注釋曰鄭云謂擯贊者辭也者以玉藻自諸矦之於天子以下至大夫皆云擯者曰故知不自稱是擯贊之辭也云其使則皆曰寡君之某者釋經大夫士則曰寡君之老為公事使者也此則玉藻云公士擯則曰寡大夫寡君之老大夫有所往必與公士為賓亦一也彼注云謂聘也大聘使上大夫小聘使下大夫則曰寡君之某故鄭總云某也若然經直云大夫鄭兼云士者經本文是士則云非以君命使可以兼士也但士無特聘問或作介往他國亦有稱謂而云寡君之士某也云檀弓曰仕而未有祿者謂試為大夫士直有試功之祿未有正祿云君有饋焉曰獻者謂有饋物于君與有正祿者同稱獻云使焉曰寡君之老者於他國君邊自稱寡君之某此文亦兼士大夫引之者證公事使稱寡君之某也凡執幣者不趨容彌蹙以為儀注不趨主慎也以進而益恭為威儀耳今文無容疏釋曰案小行人合六幣玉馬皮圭璧帛皆稱幣下文别云執玉則此幣謂皮馬享幣及禽摯皆是注釋曰凡趨有二種有疾趨行而張足曰趨是也有徐趨則下文舒武舉前曳踵是也今此經云不趨者不為疾趨故云主慎也既不云疾趨又不為下文徐趨但徐疾之間為之故以進而益恭為威儀也執玉者則唯舒武舉前曳踵注唯舒者重玉器尤慎也武迹也舉前曳踵備􅠶跲也今文兼者古文曳作抴音義踵諸勇反􅠶音致跲其業反劉居業反抴以制反劉音泄疏釋曰此篇直見在國以禽摯相見之禮無執玉朝聘鄰國之事而云執玉者因執摯相見故兼言朝聘執玉之禮也案玉藻記徐趨之節云圈豚行又與此不同者文有詳略俱是徐趨也注釋曰云唯舒者重玉器尤慎也者案玉藻云執龜玉不趨不趨者不為疾趨又曲禮云凡執主器執輕如不克故為重玉器尤慎也云備􅠶跲也者􅠶跲則鎮倒恐損玉故徐趨也凡自稱於君士大夫則曰下臣宅者在邦則曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣他國之人則曰外臣注宅者謂致仕者去官而居宅或在國中或在野周禮載師之職以宅田任近郊之地今文宅或為託古文茅作苖刺猶剗除也音義刺七亦反劉此歷反剗初限反劉測展反疏釋曰云凡自稱於君士大夫則曰下臣者此與君言之時案玉藻云上大夫曰下臣與此同也注釋曰此亦自稱於君以其致仕不在故指宅而言故云宅者謂致仕者也云或在國中或在野者案爾雅郊外曰野則自郊至畿五百里內皆名野又案鄉大夫職國中七尺野自六尺此亦云在國在野相對其言國外則云野國內則云宅在野者城外畿內皆是也云載師之職者彼鄭注云宅田致仕者之家所受田也引之證彼言宅田據地此言宅據所居一也云刺猶剗除也者案詩有其鎛斯趙注云鎛刺也故以刺為剗除草木者也儀禮注疏卷三儀禮注疏卷三考證贄冬用雉夏用腒贄字石經作摯釋文及敖本皆作贄他本多錯出者若常為臣者常石經及敖本作嘗擯者對曰注還贄者請使受之監本此句下有今按某也蓋主人之名九字係本朱子通解中語未可攙入注疏今去之若不得則正方不疑君敖繼公云疑音擬臣紱按此與檀弓使西河之民疑女於夫子疑字略同俱可作擬字解與衆言言忠信慈祥敖繼公云大戴記注引此無忠信字蓋後人因下文言忠信而誤衍之凡侍坐於君子注具猶辨也辨監本作辨釋文作辦臣紱按康成注周官儀禮凡辦具之辦皆作辨無從力者蓋漢時未有辦字唯一字而兩用之執玉者則唯舒武舉前曵踵注疏讀舒字為句朱子則以舒武為句儀禮注疏卷三考證
