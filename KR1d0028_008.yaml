body:
  text: 儀禮注疏卷八漢鄭氏注唐陸德明音義賈公彥疏聘禮第八聘禮君與卿圖事注圖謀也謀聘故及可使者謀事者必因朝其位君南面卿西面大夫北面士東面音義朝直遙反疏釋曰自此盡官具論聘人及用幣之事注釋曰云謀聘故及可使者謀聘者為久無事則聘故謂有事故或因聘或特行若記云若有故則卒聘束帛加書將命是因聘者也晉侯使韓穿來言汶陽之田之類是特行者也言及可使者謂於三卿之中選可使者即經云遂命使者是也其總三事皆須謀者也言謀事者必因朝者欲取對衆共詢之意云其位君南面以下知面位然者此儀禮之內見諸侯三朝燕朝燕禮是也又射朝大射是也不見路門外正朝正朝當與二朝面位同案燕禮大射皆云卿西面大夫北面士東面公降階南面揖之是以知正朝面位然也若天子三朝射人見射朝司士見正朝不見燕朝以諸侯正朝與燕朝同明天子燕朝亦與正朝同也遂命使者注遂猶因也既謀其人因命之也聘使卿音義使所吏反下以意求之疏注釋曰云既謀其人因命之也者謂謀其人人亦在謀事之中故云因命即上注可使者是也云聘使卿者以其經云及竟張旜周禮司常云孤卿建旜故知使卿也若然使者自其謀內審知所聘之國逺近何以下記云使者既受行出遂見宰問幾月之資注云古者君臣謀密草創未知所之逺近問行用多少但所謀之時經云出聘不言其國使者不得審知故更問之是以左氏吳公子季札遂聘齊晉衛鄭之等下文云無行則重賄反幣是亦有歷聘之事也使者再拜稽首辭注辭以不敏疏注釋曰云辭以不敏者鄭取孝經曾子曰參不敏之辭為義也君不許乃退注退反位也受命者必進疏注釋曰知受命者必進者以其云退故知進乃有退法是受命前進近君也既圖事戒上介亦如之注既已也戒猶命也已謀事乃命上介難於使者易於介音義易以䜴反疏注釋曰既謀事乃命介在謀後别命之謀使者是難謀後命介是易也宰命司馬戒衆介衆介皆逆命不辭注宰上卿二君事者也諸侯謂司徒為宰衆介者士也士屬司馬周禮司馬之屬司士掌作士適四方使為介逆猶受也疏注釋曰天子有六卿天地四時之官是諸侯兼官而有三卿立地官司徒兼冢宰立夏官司馬兼春官立冬官司空兼秋官是以左氏杜泄云季孫為司徒叔孫為司馬孟孫為司空故禮記內則云后王命冢宰降德于衆兆民鄭云周禮冢宰掌飲食司徒掌十二教今一云冢宰記者據諸侯也諸侯並六卿為三或兼職焉是其諸侯并六卿為三諸侯以司徒為冢宰義與此同宰上卿二君事諸侯謂司徒為宰者也云士屬司馬引周禮者案司士屬司馬而云作士適四方使為介諸侯之司馬亦然故引以證諸侯司馬戒衆介也云不辭者是其副使之賤者故不敢辭宰書幣注書聘所用幣多少也宰又掌制國之用疏注釋曰宰即上命司馬兼官者也云書聘所用幣多少也者謂聘鄰國享君及夫人問卿之等幣周禮司儀云凡諸侯之交各稱其邦而為之幣以其幣為之禮鄭云幣享幣也於大國則豐於小國則殺是也云宰又掌制國之用者案王制云冢宰制國用必於歲之杪是以使之書幣也命宰夫官具注宰夫宰之屬也命之使衆官具幣及所宜齎疏注釋曰所命者冢宰司徒命之以宰夫屬司徒周禮宰夫掌百官府之徴令故命諸官云官具者謂使宰夫命諸官各具所行幣幣在官之府其司非一故言衆官幣謂享幣及問大夫問卿總具之及所宜齎者謂行道所用多少皆是及期夕幣注及猶至也夕幣先行之日夕陳幣而視之重聘也疏釋曰自此盡受書以行論陳幣付使者之事注釋曰云夕幣先行之日夕知者下云厥明釋幣于禰是行日明此夕是先行之日夕也云視之者正謂賓及衆介視之故下云使者朝服帥衆介夕注云視其事是也使者朝服帥衆介夕注視其事也古文帥皆作率管人布幕于寢門外注管猶館也館人謂掌次舍帷幕者也布幕以承幣寢門外朝也古文管作官今文布作敷音義幕音莫疏注釋曰云管人謂掌次舍帷幕者也者案天官有掌舍掌次幕人等掌次云有邦事則張幕設案掌舍職云為帷宫設旌門又幕人云掌帷幕幄帟綬之事鄭云在旁曰帷在上曰幕幕或在地展陳于上即此布幕是也館人即彼掌舍以諸侯兼官故鄭總言之也云布幕以承幣者即下文官陳幣是也云寢門外朝也者謂路門外即正朝之處也下記云宗人授次次以帷則館人與宗人共掌之若賓客則宗人掌之也官陳幣皮北首西上加其奉於左皮上馬則北面奠幣于其前注奉所奉以致命謂束帛及𤣥纁也馬言則者此享主用皮或時用馬馬入則在幕南皮馬皆乘古文奉為卷今文無則音義纁許云反乘繩證反疏釋曰云官陳幣者即上文官具者也館人布幕於地官陳幣於其上注釋曰云奉所奉以致命謂束帛及𤣥纁也者所奉謂後享時奉入以致命故知是以下文享時所致束帛加璧以享君𤣥纁加琮以享夫人鄭不言璧琮者璧琮不陳厥明乃授之也云馬言則者此享主用皮或時用馬者主用皮謂有皮之國國無皮者乃用馬故下云庭實皮則攝之鄭注皮言則者或用馬也記云皮馬相間可也注間猶代也土物有宜也云馬入則在幕南者以經云馬則北面奠幣于其前是馬在幕南故下展幣時云馬則幕南北面奠幣于其前也知皮馬皆乘者案下賓覿時云總乘馬又云禮玉束帛乘皮是皆乘也使者北面衆介立于其左東上注既受行同位也位在幕南疏注釋曰云既受行同位者對未受行已前卿大夫士面位各異是以記云使者既受行日朝同位鄭注云謂前夕幣之間同位者使者北面介立于其左少退别其處臣也是也知在幕南者幣在幕上使者須親幣故在幕南也卿大夫在幕東西面北上注大夫西面辟使者音義辟音避疏注釋曰此謂處者大夫常北面今與卿同西面故云辟使者宰入告具于君君朝服出門左南鄉注入告入路門而告音義鄉許亮反下以意求之疏注釋曰朝在路門外故知入路門至路寢而告君以其在路寢聽政處故也史讀書展幣注展猶校録也史幕東西面讀書賈人坐撫其幣每者日在必西面者欲君與使者俱見之也音義賈音嫁後同掌物價之官疏注釋曰知史幕東西面者以其君南面使者北面故知幕東西面讀之可知是以鄭云欲君與使者俱見之也知賈人撫幣者以其賈人主幣行者故知賈人撫幣受之其幣謂官具之者非直所奉而已若然賈人當在幕西東面撫之亦欲使君與賓俱見之也宰執書告備具于君授使者使者受書授上介注史展幣畢以書還授宰宰既告備以授使者其受授皆北面疏注釋曰云展幣畢以書還授宰者以其宰在幕東西面史居前西面讀書展幣展幣訖明回還授宰宰以書授使者云其受授皆北面者當宰以書授使者之時宰來至使者之東北面授使者使者北面授介三者皆北面向君故也公揖入注揖禮羣臣疏釋曰以展幣授使者訖禮畢故入於寢也官載其幣舍于朝注待旦行也疏注釋曰此云官謂官人從賓行者與前官陳幣者異必知行者以下文入竟又展之又有司展羣幣以告注云有司載幣者自展自告是也云待旦行者下文厥明釋幣遂行是也上介視載者注監其安處之畢乃出音義監古銜反疏注釋曰經直云上介視載者注云監其安處之畢乃出不言餘人出則上文舍於朝不出待旦則行以其須守幣故也所受書以行注為當復展音義為于僞反復扶又反下以意求之疏注釋曰書謂前宰授使者此書將行為當復展故也厥明賓朝服釋幣于禰注告為君使也賓使者謂之賓尊之也天子諸侯將出告羣廟大夫告禰而已凡釋幣設洗盥如祭音義禰乃禮反疏釋曰自此盡亦如之論賓與上介將行告禰之事云朝服者卿大夫朝服祭故還服朝服告也注釋曰云天子諸侯將出告羣廟者案禮記曽子問云孔子曰諸侯適天子必告于祖奠于禰注云皆奠幣以告之是諸侯出告羣廟案彼下文又云孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出是天子與諸侯同告羣廟之事云大夫告禰而已者大夫三廟降天子不得竝告故直告禰而已若父在則告祖知者下記云賜饔唯羮飪筮一尸若昭若穆注云筮尸若昭若穆容父在父在則祭祖父卒則祭禰以此言之明初行時父在釋幣於祖廟可知案昭元年楚公子圍聘於鄭云布几筵於莊共之廟而來服氏云莊謂楚莊王圍之祖共王圍之父是大夫竝告羣廟者彼不告聘直告娶故得竝告古者大夫得因聘而娶故傳云且娶於公孫段氏是也云凡釋幣設洗盥如祭者案曽子問云凡告用牲幣注云牲當為制則告無牲直用幣而已但執幣須潔當有洗而盥手其設洗如祭祀之時亦洗當東榮南北以堂深水在洗東篚在洗西必知無祭事者下文還時云乃至于禰筵几于室薦脯醢觴酒陳鄭云行釋幣反釋奠略出謹入是其差也有司筵几于室中祝先入主人從入主人在右再拜祝告又再拜注更云主人者廟中之稱也祝告告以主人將行也音義稱尺證反疏注釋曰云更云主人者廟中之稱也者上云賓至此更云主人是廟中之稱故特牲少牢皆稱主人對聘稱賓也釋幣制𤣥纁束奠于几下出注祝釋之也凡物十曰束𤣥纁之率𤣥居三纁居二朝貢禮云純四只制丈八尺音義率音律只音紙疏注釋曰知祝釋幣者案曾子問君薨而世子生大祝禆冕執束帛升自西階命無哭告曰某之子生敢告奠幣於殯東則知此亦大祝釋之可知也云凡物十曰束者案昏禮𤣥纁束則每卷二丈自餘行禮云束者每卷一丈八尺為制幣帛錦十卷者皆名束至於脯十脡亦曰束故云凡物十曰束也云𤣥纁之率𤣥居三纁居二者言率皆如是也𤣥三纁二者象天三覆地二載也云朝貢禮云純四只制丈八尺者純謂幅之廣狹制謂舒之長短周禮趙商問只長八寸四八三十二幅廣三尺二寸大廣非其度鄭君答云古積畫誤為四當為三三咫則二尺四寸矣雜記云納幣一束束五兩兩五尋然則每卷二丈若作制幣者每卷丈八尺為制合卷為匹也主人立于户東祝立于牖西注少頃之間示有俟於神疏注釋曰案士虞禮無尸者出戶而聽若食間此無祭事故云有俟於神也又入取幣降卷幣實于笲埋于西階東注又入者祝也埋幣必盛以器若藏之然音義笲音煩器名盛音成又釋幣于行注告將行也行者之先其古人之名未聞天子諸侯有常祀在冬大夫三祀曰門曰行曰厲喪禮有毁宗躐行出于大門則行神之位在廟門外西方不言埋幣可知也今時民春秋祭祀有行神古之遺禮乎音義躐力涉反疏注釋曰云行者之先其古人之名未聞者此謂平治道路之神云古人名未聞者謂古人教人行道路者其人名字未聞云天子諸侯有常祀在冬者月令祀行是也言此者欲見大夫雖三祀有行無常祀因行使始出有告禮而已至於出城又有軷祭祭山川之神喻無險難也大夫三祀曰門曰行曰厲者見祭法文云喪禮有毁宗躐行出于大門者檀弓文案彼文掘中霤而浴毁竈以綴足及葬毁宗躐行出于大門殷道也下文周柩入毁宗雖不云躐行亦有行可知所毁者毁廟門西而云躐行明行神在廟門西矣不云埋幣可知者承上宗廟埋之此亦埋可知云今時民春秋祭神有行神古之遺禮乎者鄭以行神無正文雖約檀弓猶引漢法為况乎者猶疑之矣若然城外祭山川之神有軷壇此祭行神亦當有軷壤是月令冬祭行注云行至廟門外之西為軷壇厚二寸廣五尺輪四尺是也遂受命注賓須介來乃受命也言遂者明自是出不復入疏注釋曰下云上介及衆介俟于使者之門外是其賓須介來乃受命也云自是出不復入者自釋幣於門不復更入若然則待介於門矣上介釋幣亦如之注如其於禰與行上介及衆介俟于使者之門外注俟待也待於門外東面北上疏釋曰自此盡斂旜為使者與介向君朝受命即行之事注釋曰知待於門外東面北上者上云賓釋幣訖不復入明介待賓於大門外賓出則向君也言東面北上者依賓客門外之位使者載旜帥以受命于朝注旜旌旗屬也載之者所以表識其事也周禮曰通帛為旜又曰孤卿建旜至於朝門使者北面東上古文旜皆馬膳音義旜之然反識如字又音志疏注釋曰云載之者所以表識其事也者人見張旜則知是孤卿為使之事是表識其事也云周禮曰者司常文云至于朝門者凡諸侯三門臯應路路門外有常朝位下文君臣皆朝列位乃使卿進使者使者乃入至朝即此朝門者臯門外矣知北面東上者還依展幣之位也君朝服南鄉卿大夫西面北上君使卿進使者注進之者使者謙不敢必君之終使已疏釋曰此還依展幣之位知大夫與卿同西面避賓下文使者還亦同展幣北面東上位使者入及衆介隨入北面東上君揖使者進之上介立于其左接聞命注進之者有命宜相近也接猶續也音義近附近之近賈人西面坐啓櫝取圭垂繅不起而授宰注賈人在官知物賈者繅所以藉圭也其或拜則奠于其上今文繅作璪音義櫝大本反甬也繅音早注璪同疏注釋曰云賈人在官知物賈者謂若王制云庶人之在官府史胥徒之類以知物賈故名賈云其或拜則奠于其上者故覲禮記云奠圭于繅上是也但繅有二種一者以木為中幹以韋衣之天子五采公侯伯三采子男二采采為再行下記及典瑞皆有其文此為繅也下記云絢組尺及曲禮下文執玉其有藉者則裼鄭亦謂之繅若韋版為之者奠玉於上此則無垂繅屈繅之事若絢組為之者所以繫玉於韋版使不失墜此乃有屈垂之法則此經所云者是也案向來所注皆以韋版繅藉解之者鄭意以承玉及繫玉二者所據雖異所用相將又同名為繅是以和合解之故以韋版為之者以解絢組之繅也宰執圭屈繅自公左授使者注屈繅者斂之禮以相變為敬也自公左贊幣之義疏注釋曰云自公左贊幣之義者禮記少儀云詔辭自右贊幣自左取地道尊右之法是贊幣之義故於公左也使者受圭同面垂繅以受命注同面者宰就使者北面竝授之既授之而君出命矣凡授受者授由其右受由其左疏注釋曰知宰就使者北面者以經言同面不見使者進文使者既先北面故知就使者北面竝面授之既授與使者即言受命明知君出命矣云凡授受者授由其右受由其左者據此宰由其右授使者使者受由其左又據鄉飲酒鄉射燕禮獻酢酬皆授由其右受由其左故云凡以廣之若有所因由則有授由左受由右是以使者反命之時宰自公左受玉鄭云亦於使者之東同面竝受不右使者由便也又賓授覿時士受馬適右受鄭云適牽者之右而受由便又鄉飲酒云受酬者自介右鄭云尊介使不失故位如此者皆是變例鄭據平常行事而言也既述命同面授上介注述命者循君之言重失誤疏注釋曰上文授玉訖君出命命辭雖不知何語要知使者既受命使者又重述君命為述命述命者重失誤上介受圭屈繅出授賈人衆介不從注賈人將行者在門外北面疏釋曰云衆介不從者以上介送圭向外與賈人反來故衆介不從以待之注釋曰云賈人將行者知者經言授賈人使受之則是行人主掌此玉故知將行者對上云賈人出玉者是留者也知在門外北面者以其使者在門外時皆北面此賈人不入明依本北面可知受享束帛加璧受夫人之聘璋享𤣥纁束帛加琮皆如初注享獻也既聘又獻所以厚恩惠也帛今之璧色繒也夫人亦有聘享者以其與已同體為國小君也其聘用璋取其半圭也君享用璧夫人用琮天地妃合之象也圭璋特逹瑞也璧琮有加往德也周禮曰瑑圭璋璧琮以眺聘音義璋音章琮才宗反半璧也繒似陵反妃音配本亦作配瑑大轉反疏釋曰此經中三事上經已受聘君圭此經受享君束帛加璧又受聘夫人璋又受享夫人琮案上文夕幣時云官陳幣皮北首西上加其奉於左皮上鄭注云奉所奉以致命謂束帛及𤣥纁也則知所陳直陳束帛及𤣥纁不陳璧琮是以此經受璧而連言束帛𤣥纁者以其享時束帛加璧於其上𤣥纁加琮於其上以相配之物故兼言束帛𤣥纁若然璧琮又受者以其璧琮與圭璋同類尊之故也注釋曰云帛今之璧色繒者周禮大宗伯云孤執皮帛鄭注亦然又案宗伯云以蒼璧禮天下云牲幣各放其器之色幣即幣帛禮天之璧用蒼色則幣帛之色亦蒼色是璧色繒於漢時云璧色繒者亦因周法則此束幣亦與璧色同以其相配但未知圭用何色耳云聘用璋取其半圭知半圭曰璋者案周禮典瑞云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月璋邸射以祀山川以上向下差之以兩圭半四圭圭璧半兩圭璋邸射又半圭璧是半圭曰璋也云圭璋特逹瑞也者聘義云圭璋特逹德也鄭云特逹謂以朝聘也言瑞者大宗伯云以玉作六瑞公執桓圭以下皆是瑞故尚書云班瑞於羣后言特逹者不加束帛也云璧琮有加往德也者謂加於束帛之上言往德者郊特牲云束帛加璧往德也謂之束帛加璧致厚往為主君有德故以玉致之君子於玉比德故言往德也往德義出於此鄭言此者從見朝置享用玉之意也周禮曰玉人文云瑑圭璋璧琮以俯聘者欲見此篇聘賓不用君之所執圭璋以其公則執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧臣出聘圭璋璧琮則瑑之而已無此桓信躬榖蒲之文又所執皆降其君一等故引之為證也遂行舍於郊注於此脫舍衣服乃即道也曲禮曰凡為君使已受命君言不宿於家疏注釋曰言遂行者受命則行不留停故云遂行言於此脫舍衣服乃即道也上文云賓朝服告禰乃遂朝君受命至此衣服未改鄭注云吉時道路深衣則此脫舍朝服服深衣而行故云於此脫舍衣服乃即道也引曲體者見受君命及君言言别有告請之事遂行舍於郊則彼云不宿于家也斂旜注此行道耳未有事也斂藏也疏注釋曰云此行道耳未有事也者案下文云及竟張旜是有事也故此自郊已後未有事斂藏也若過邦至于竟使次介假道束帛將命于朝曰請帥奠幣注至竟而假道諸侯以國為家不敢直徑也將猶奉也帥猶道也請道已道路所當由音義猶道之道音導下請道同疏釋曰自此盡執䇿於其後論過他國竟假道之事注釋曰云諸侯以國為家不敢直徑者案左氏傳僖三十三年秦師襲鄭不假道於晉為晉所敗是其不假道直經過天子之師行過無假道以其天子以天下為家所在如主人故也天子微弱則有之是以周語定王使單襄公聘於宋遂假道於陳以聘楚服氏注云是時天子微弱故與諸侯相聘同是也下大夫取以入告出許遂受幣注言遂者明受其幣非為許故也容其辭讓不得命也音義為于僞反疏注釋曰云言遂者明受其幣非為許故也者幣本為行禮非為求許若因許道受幣當云出許受幣不須言遂今不以許道受幣云遂是以容其辭讓不受此幣不得命遂受之故云遂也餼之以其禮上賓大牢積唯芻禾介皆有餼注凡賜人以牲生曰餼餼猶稟也給也以其禮者尊卑有常差也常差者上賓上介牲用大牢羣介用少牢米皆百筥牲陳于門內之西北面米設于中庭上賓上介致之以束帛羣介則牽羊焉上賓有禾十車芻二十車禾以秣馬音義餼許氣反積子賜反少詩照反秣音末疏注釋曰此謂主國所致禮云凡賜人以牲生曰餼者言凡者總解諸文案此下經云主國使卿歸饔餼五牢云飪一牢腥二牢餼二牢陳于門西鄭注云餼生也牛羊右手牽之豕東之是牲生曰餼上介及士亦皆牲生為餼論語云告朔之餼羊鄭注亦云牲生曰餼春秋傳云餼藏石牛服氏亦云牲生是凡牲生曰餼春秋僖三十三年鄭皇武子云餼牽竭矣服氏以為腥曰餼以其對牽故以餼為腥詩序云雖有牲牢饔餼鄭云腥曰餼以其對生是活故以餼為腥又不為牲生者鄭望文為義故注不同也餼猶稟也給也者於賓為㮚稟者受也於主人為給給賓客也云以其禮者尊卑有常差常差者上賓上介牲用大牢經不言上介知與賓同大牢者若上介與羣介同當為介者皆少牢是以下文大夫餼賓云上賓上介皆大牢米八筐衆介皆少牢米六筐是上介與賓同之義也云米皆百筥以下盡二十車皆約下文君使卿致饔餼禮若然上介與賓同大牢依大夫餼賓禮米不依大夫餼賓與上介米八筐而依君致饔餼者以此經介芻禾大夫餼賓禮無芻禾故還依主國歸饔餼之禮也案下歸饔餼上賓上介米陳于門內衆介米百筥設於門外鄭不言者略而不辨之也云上賓上介致之以束帛羣介則牽羊者案大夫餼賓禮使者牽牛以致之上介亦如之不依此依歸饔餼者以其彼此皆是國君禮唯牽以行道之間不依歸饔餼之法致之帛用束宜與歸饔餼同也云羣介則牽羊焉者致禮於士無用束帛之法但歸餼則用大牢禮盛宰夫朝服牽牛以致之此衆介皆少牢當與大夫餼賓少牢亦牽羊以致之同也無正文故言則也上賓有禾十車芻二十車亦與下歸饔餼同也若然大牢則上介與上賓同芻禾不同者以經上賓云唯芻禾言唯著異明上介無也但下文設飧時大夫之禮禾視死牢而已此餼賓用生牢不用死牢得有禾者此過國致禮異於常禮故生致而有芻禾也以芻薪倍禾故禾十車芻二十車也士帥沒其竟注沒盡誓于其竟賓南面上介西面衆介北面東上史讀書司馬執策立于其後注此使次介假道止而誓也賓南面專威信也史於衆介之前北面讀書以敕告士衆為其犯禮暴掠也禮君行師從卿行旅從司馬主軍法者執䇿示罰音義策音䇿掠音諒從才用反疏注釋曰此誓當在使次介假道之時止而誓言今在士帥沒其竟之後言之者此文因上設彼國禮法訖乃更却本而言之不謂此士帥沒竟後是以鄭云此使次介假道止而誓也言賓南面專威信者此聘禮雖非軍事亦是梱外之事使專威信故南面若君然也知史於衆介之前北面讀書者以經言衆介北面則言史讀書明亦北面與衆介同北面又賓南面復對之故也云君行師從已下定四年召陵之㑹祝他辭引之者此聘使有旅從恐暴掠也未入竟一肄注謂於所聘之國竟也肄習也習聘之威儀重失誤音義肄以二反疏釋曰自此盡私事論雖未至主國預習聘享威儀之事此與下文為目所習之禮事在下文注釋曰謂於所聘之國者鄭解未入境境謂所聘之國境未入也為壝壇畫階帷其北無宮注壝土象壇也帷其北宜有所鄉依也無宫不壝土畫外垣也音義壝以垂反一音以癸反壇大丹反封土日壇畫音獲注同垣音袁疏注釋曰案覲禮與司儀同為壇三成宮方三百步此則無外宮其壇壝土為之無成又無尺數象之而已云帷其北宜有所鄉依者雖不立主人賓介習禮宜有所向故帷其北也云無宫不壝土畫外垣也者壝土為宫是畫為外垣今不壝土為外垣牆是則不畫宫也朝服無主無執也注不立主人主人尊也不執玉不敢䙝也徒習其威儀而已疏注釋曰云不立主人主人尊也者主人則主國君受聘享者不立臣作君故云主人尊也介皆與北面西上注入門左之位也古人與作豫音義與音預疏釋曰此所習之禮不習大門外內及廟門內之禮者以其於外威儀少而易行故略之但習入廟聘享揖讓升降布幣受玉之禮是以直云北面西上之位也注釋曰云入門左之位者案下文云賓入門左介皆入門右北面西上是也習享士執庭實注士士介也庭實必執之者皮則有攝張之節疏注釋曰享時庭實旅百獻國所有非止於皮知所執是皮者以其金龜竹箭之等皆列於地不執之所執者唯有皮而已是以下聘時賓升致命授玉之時執皮者張之以見文是以特言執也是以云皮有攝張之節習夫人之聘享亦如之習公事不習私事注公事致命者也疏釋曰云習夫人之聘享亦如之者以其行聘君訖則行聘夫人行享君訖即行享夫人還君受之一如受君禮故云亦如之也云習公事者謂君聘享夫人聘享及問大夫皆致君命故鄭云公事致命者是以下文行君聘享及大夫聘享訖擯出請賓告事畢鄭注云公事畢又問卿時云卿大夫升堂北面聽命賓東面致命鄭注云致其君之命皆公事致命者也私事者謂私覿於君私面於卿大夫故下文賓覿入門右注云私事自闑右是也又問卿訖賓面如覿幣入門右大夫辭賓遂左注云見私事賓雖敵謙入門右為若降等然是也若然大夫之幣不在朝付之至郊乃付之避君禮不謂非公事及竟張旜誓注及至也張旜明事在此國也張旜謂使人維之疏釋曰自此盡入境斂旜論賓至主國之境謁關入見威儀之事注釋曰云張旜明事在此國者以其行道斂旜及境張旜明所聘之事在此國故張旜以表其事也是以鄭云明事在此國也云張旜使人維之者案禮緯稽命徴云大夫杠五刃齊於較較崇八尺人又長八尺人維得手及之者蓋以物接之乃得維持之案節服氏掌祭祀朝覲六人維王之大常諸侯則四人但大常十二旒人有六則一人維持二旒鄭云維之以縷用線維之大夫無文諸侯四人不依命數大夫或一人或二人維持之乃謁關人注謁告也古者竟上為關以幾異服識異言音義幾音機本亦作譏疏注釋曰古者境上為關者王城十二門則亦通十二辰辰有一門一關諸侯未知幾關魯廢六關半天子則餘諸侯亦或然也云關譏異服識異言者案王制云關譏而不征注亦云譏幾異服異言二注皆無正文案周禮司門云幾出入不物者注云不物衣服視占不與衆同鄭以出入不物幾之則不物中含有此異服異言云衣服視占不與衆同則是異也但周禮司關上士二人中士四人又云每關下士二人但司關為都總主十二關居在國都每關下士二人者各主一關今所謂關人者謂告每關關人來告司關司關為之告王故司關職云凡四方之賓客叩關則為之告是也關人問從者幾人注欲知聘問且為有司當共委積之具音義從才用反幾居豈反委於僞反積子賜反疏注釋曰不問使人而問從者關人卑者不敢輕問尊者故問從者注釋曰云欲知聘問者問得從者即知使者是大聘亦知使者是小聘知者以君行師從一州之民卿行旅從一黨之人若大夫小聘當一族之人百人也且為有司當共委積之具者賓客入竟當於廬宿市設少曰委多曰積是為行道之具也以介對注以所與受命者對謙也聘禮上公之使者七介侯伯之使者五介子男之使者三介以其代君交於列國是以貴之周禮曰凡諸侯之卿其禮各下其君二等疏注釋曰云以所與受命者對謙也者上問從者幾人當為卿行旅從對今不云而以介與受命者對是謙也聘禮上公之使七介至三介皆禮記聘義文而云聘禮者聘義亦得言聘禮也云以其代君交於列國是以貴之貴之者隨國大小節級與之介以副使者是貴之也引周禮者彼見貴之才下其君二等而已也鄭注周禮二等謂介與朝位賓主之閒也君使士請事遂以入竟注請猶問也問所為來之故也遂以入因道之疏釋曰君得關人告即知為聘來使士迎之故聘義云君使士迎于竟是也而云使士請事君子不必人故知而猶問也云遂以入竟者若然向來賓之問猶停關外君使士請訖乃道以入竟入竟斂旜乃展注復校録幣重其事斂旜變於始入疏釋曰自此盡賈人之館論三度展幣之事注釋曰云重其事者亦恐有脫漏失錯故云重其事不可輕也斂旜變於始入者上及竟張旜注云事在此國也此則入境後乃斂斂之者謂若初出至郊斂旜鄭云行道耳未有事也此亦及竟示有事於此國張之始入張之去國逺更是行道未有事故鄭云變於始入始入時示有事於此國今是行道去之故云變於始入也布幕賓朝服立于幕東西面介皆北面東上賈人北面坐拭圭注拭清也側幕而坐乃開櫝音義拭音式清如字劉才姓反疏釋曰賓西面者雖不對君由是臣道異於前誓時示威信也注釋曰知賈人側幕者以其幕所陳皆賈人所主此圭雖不陳亦宜側近於幕以開圭也知賈人坐者下文聘時於廟門外賈人開圭坐授上介故知此亦坐遂執展之注持之而立告在疏注釋曰此經告訖下文乃云上介北面視之則此所告者告賓云在上介乃視之上介北面視之退復位注言退復位則視圭進違位疏注釋曰鄭言此者見經直有退文視圭進也違位之言出於曲禮曲見其進故云則云揖人必違其位鄭云禮以變為敬今此進違位亦是敬也退圭注圭璋尊不陳之疏注釋曰尊不陳對下文拭璧加于左皮上陳之為卑故也上不言璋直言圭下乃言夫人之聘享則璋未拭而并言璋者欲見皆不陳故陳皮北首西上又拭璧展之㑹諸其幣加于左皮上上介視之退注㑹合也諸於也古文曰陳幣北首疏注釋曰璧言合諸幣者享時當合故今亦合而陳之故小行人云合六幣六幣亦是所享之物故也馬則幕南北面奠幣于其前注前當前幕上展夫人之聘享亦如之賈人告于上介上介告于賓注展夫人聘享上介不視貶於君也賈人既拭璋琮南面告於上介上介於是乃東面以告賓亦所謂放而文之類音義放方往反疏注釋曰知面位如此者其賈人北面在幕南上介亦北面明賈人既拭夫人聘璋享琮訖乃回身南面告上介上介於是還東面告賓可知也云所謂放而文之類者所謂禮器文禮器云有放而文也注云謂若天子服日月以至黼黻是天子衣放象日月以下而為文今夫人聘享展訖但上介不視至于賈人南面告上介上介東面告賓放象君禮而為文是其類也有司展羣幣以告注羣幣私覿及大夫者有司載幣者自展自告疏注釋曰云羣幣私覿及大夫者上展君及夫人幣訖此言有司展羣幣故知是私覿及大夫者私覿者行君夫人聘享訖賓以私禮己物見主君云大夫者亦謂賓以已物面主國之卿必知私覿之幣是賓介自將己物者以經記上下唯有君及夫人聘享及問大夫聘之幣付使者之文不見其付賓介私覿之幣又案下文賓將還云遂行舍于郊公使卿贈如覿幣使下大夫贈上介亦如之使士贈衆介如其覿幣還至本國陳幣于朝云上賓之公幣私幣皆陳上介公幣陳他介皆否注云此幣使者及介所得於彼國君卿大夫之贈賜也其禮於君者不陳公幣君之賜也私幣卿大夫之幣也至於賓反命訖君使宰賜使者及介幣以此言之彼國所報私覿之幣還與賓介明知私覿是賓介私齎行可知也夏官校人云凡國之使者皆供其幣馬鄭注使者所用私覿若然彼使者謂天子使卿大夫存俯省問諸侯之事使者得之行私覿私覿之馬校人供之與諸侯禮異也及郊又展如初注郊逺郊也周制天子畿內千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里也近郊各半之疏注釋曰云周制天子畿內千里者周禮大司徒云制其畿方千里據周禮而言其自殷已上亦畿方千里商頌云邦畿千里唯民所止夏亦千里王制云天子縣內方千里鄭據夏時禹貢方千里曰甸服據唐虞畿內是也云逺郊百里者司馬法文王畿方千里城面五百里以百里為逺郊若公五百里中置國城面二百五十里故逺郊五十里自此以下至子男差之可知云近郊各半之者亦約周天子逺郊百里近郊五十里亦無正文尚書君陳序云命君陳分正東郊成周鄭注周之近郊五十里今河南洛陽相去則然鄭以目驗知之若然天子近郊半逺郊則諸侯近郊各半逺郊可知也及館展幣於賈人之館如初注館舍也逺郊之內有候館可以小休止沐浴展幣不于賓館者為主國之人有勞問己者就焉便疾也音義勞力到反疏注釋曰案周禮遺人職云十里有廬三十里有宿五十里有市市有候館畿內道路皆有候館鄭云逺郊之內有候館若此據候館在逺郊之內指而言之不謂於此獨有也以行道之間停息故云小休止沐浴又得展幣也云展幣不于賓館者為主國之人有勞問己者就焉便疾也者若并在賓館則事煩不疾若展幣於賈人之館其賓館受勞問是以就賈人之館展幣便疾也案大行人諸侯朝天子上公三勞侯伯再勞子男一勞孤不問一勞諸侯自相朝無過如朝天子遣臣相聘無過一勞此下文使卿近郊勞此乃逺郊之內得有此勞問己者謂同姓舅甥之國而加恩厚者别有逺郊之內問勞也賓至于近郊張旜君使下大夫請行反君使卿朝服用束帛勞注請行問所之也雖知之謙不必也士請事大夫請行卿勞彌尊賓也其服皆朝服疏釋曰自此盡遂以賓入論主君使大夫及卿行請勞之事入近郊張旜者示將有事以自表也知皆朝服者以卿勞禮重尚朝服明以外士大夫輕者朝服可知也故舉後以明前也上介出請入告賓禮辭迎于舍門之外再拜注出請出門西面請所以來事也入告入北面告賓也每所及至皆有舍其有來者與皆出請入告于此言之者賓彌尊事彌録疏注釋曰云入北面告賓也者此時賓當在賓館阼階西面故上介北面告賓也云每所及至皆有舍其有來者皆出請入告于此言之者夫賓彌尊事彌録者道皆有廬宿市之舍前士請事大請行亦當出請入告於此始言之者先士次大夫後卿以是先卑後尊今復見此言故云賓彌尊事彌録也勞者不答拜注凡為人使不當其禮疏注釋曰言凡者非直此卿為君勞賓不敢當其禮不答拜聘賓亦初入大門主君拜賓辟不答拜也如此之類皆然故云凡以該之至後儐勞者與之答拜為已故也賓揖先入受於舍門內注不受于堂此主於侯伯之臣也公之臣受勞於堂疏注釋曰知公之臣受勞於堂者案司儀云諸公之臣相為國客及大夫郊勞三辭拜辱三讓登聽命是公之臣受勞於堂之事勞者奉幣入東面致命注東面鄉賓疏注釋曰賓在館如主人當入門西面故勞者東面向之也賓北面聽命還少退再拜稽首受幣勞者出注北面聽命若君南面然少退象降拜疏注釋曰云北面聽命若君南面然少退象降拜者下文歸饔餼大夫東面致命賓降階西面再拜稽首是此象之也若然此行尊卑禮訝受法歸饔餼時堂上北面受幣此在庭亦當北面訝受幣勞者南面可知也授老幣注老賓之臣疏注釋曰大夫家臣稱老若趙魏臧氏老之類也出迎勞者注欲儐之疏釋曰司儀注云上於下曰禮敵者曰儐此言儐者欲見賓以禮禮使者故云欲儐之勞者禮辭賓揖先入勞者從之乘皮設注設於門內也物四曰乘皮麋鹿皮也音義乘繩證反後乘馬乘禽乘皮皆同疏注釋曰庭實當三分庭一在南設之今以儐勞者在庭故設於門內也云皮麋鹿皮者鄭於下注云君於臣臣於君麋鹿皮可者以無正文知用麋鹿皮者案郊特牲云虎豹之皮示服猛也彼諸侯朝享天子法用虎豹此臣聘君降於享天子法用麋鹿皮故齊語云齊桓公使諸侯輕其幣用麋鹿皮四張亦一隅也賓用束錦儐勞者注言儐者賓在公館如家之義亦以來者為賓音義儐必刃反疏注釋曰云言儐者賓在公館如家之義亦以來者為賓者凡言儐者謂報於賓今以賓館故賓者主人故云儐勞者即以勞者為賓故也勞者再拜稽首受注稽首尊國賓也疏注釋曰周禮大祝辨九拜一曰稽首首至地臣拜君法二曰頓首頭叩地平敵相拜法三曰空首首至手君答臣下拜法郊特牲云大夫之臣不稽首非尊家臣以辟君也今此勞者與賓同類不頓首而稽首故云尊國賓也下賓亦稽首送者以是為君使故亦稽首以報之也賓再拜稽首送幣注受送拜皆北面象階上疏注釋曰知受送拜皆北面象階上者此經面位無文案歸饔餼賓擯大夫時賓楹間北面受幣大夫西面受此賓亦宜與彼同北面授還北面拜送若然云受送拜皆北面者誤當云授送拜皆北面竝據賓而言也勞者揖皮出乃退賓送再拜注揖皮出東面揖執皮者而出疏注釋曰知東面揖執皮者以其執皮者在門內當門勞者在執皮之西故知東面揖皮可知揖之若親受之又執皮者是賓之使者執皮者得揖從出勞者從人當訝受之是以公食大夫禮云賓三飯公侑食以束帛庭實設乘皮賓受幣賓出揖庭實出鄭云揖執皮者若親受云上介受賓幣從者訝受皮則此從者亦訝受可知也夫人使下大夫勞以二竹簠方𤣥被纁裏有蓋注竹簠方者器名也以竹為之狀如簋而方如今寒具筥筥者圜此方耳音義簠音甫或作簋外圓內方曰簠內圓外方曰簋圜音圓疏釋曰自此盡以賓入論夫人勞賓之事夫人勞使下大夫者降于君故不使卿注釋曰凡簠皆用木而圓受斗二升此則用竹而方故云如簋而方受斗二升則同如今寒具筥者寒具見籩人先鄭云朝事謂清朝末食先進寒具口實之籩實以冬食故謂之寒具筥圓此方者方圓不同為異也案玉人云案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯彼有玉案者謂王后法有玉案并有竹簠以盛棗栗故彼引此為證此諸侯夫人勞卿大夫故無案直有竹簠以盛棗栗其實棗蒸栗擇兼執之以進注兼猶兩也右手執棗左手執栗疏注釋曰云兼猶兩者謂一人執兩事知右手執棗左手執栗者見下文云賓受棗大夫二手授栗則大夫先度右手乃以左手共授栗便也明知右手執棗可知必用右手執棗先度之者鄭注士虞禮云棗美故用右手執棗也賓受棗大夫二手授栗注受授不游手愼之也疏注釋曰初兩手俱用既授棗而不兩手共授栗則是游暇一手不慎也今右手授棗訖即兩手共授栗不游手為謹愼也賓之受如初禮注如卿勞之儀儐之如初下大夫勞者遂以賓入注出以束錦授從者因東面釋辭請導之以入然則賓送不拜疏注釋曰云出以束錦授從者因東面釋辭請導之者儐下大夫知前有束錦則此大夫亦受得束錦經言遂以賓入明知有辭請導之雖無文鄭以意言之大夫在西明出時授束錦與已從者乃得因東面釋請導之辭也云然則賓送不拜者以其云遂以賓入即從之明賓送不拜謂若公食大夫使人戒賓不拜送遂從之其類也案上君使士請遂以賓入鄭云因導之鄭不言賓送不拜者士請事空手無幣賓亦不儐請導賓賓從入無再拜送之理故鄭不言賓送不拜此大夫勞賓與卿同有拜送之理故云賓送不拜也覲禮大夫勞侯氏侯氏即從大夫入拜送大夫天子使尊故雖從亦拜送與此異至于朝主人曰不腆先君之祧既拚以俟矣注賓至外門下大夫入告出釋此辭主人者公也不言公而言主人主人接賓之辭明至欲受之不敢稽賓也腆猶善也遷主所在曰祧周禮天子七廟文武為祧諸侯五廟則祧始祖也是亦廟也言祧者祧尊而廟親待賓客者上尊者音義腆他典反拚方問反謂灑掃疏釋曰自此盡俟間論賓初至主君請行聘禮賓云請俟間之事云至于朝者鄭云賓至外門者外門即諸侯之外朝故下云以柩造朝亦謂大門外為外朝也注釋曰云下大夫入告出釋此辭者此下大夫即夫人勞賓導賓入者也云明至欲受之不敢稽賓者案覲禮云侯氏遂從之天子賜舍鄭云且使即安不即言欲受之者彼天子以諸侯為臣故使且安此鄰國聘賓不臣人之臣故言不敢稽實也云遷主所在曰祧者此總解天子諸侯稱祧也云周禮天子七廟文武為祧者案周禮大宗伯序官守祧職云奄八人鄭注云逺廟曰祧又守祧職云掌守先王先公之廟祧鄭注云廟謂大祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟云奄八人廟有一奄周立七廟通姜嫄廟為八故奄八人祭法鄭注云祧之言超也超上去意也不毁之也云遷主所藏曰祧天子有二祧以藏遷主諸侯無二祧遷主藏于太祖廟故此名太祖廟為祧也云既拚者少儀云掃席前曰拚拚者掃除之名云諸侯五廟王制與祭法文云則祧始祖是亦廟也言祧者祧尊而廟親待賓客者上尊者下文迎賓於大門揖入及廟門受賓聘享皆在廟此云先君之祧明下文廟是太祖廟可知是以於太祖廟受聘享以尊之若饗食則於禰廟燕又在寢彌相親也此鄭義若孔君王肅則以高祖之父及祖為二祧非鄭義也賓曰俟閒注賓之意不欲奄卒主人也且以道路悠逺欲沐浴齊戒俟閒未敢聞命音義閒如字劉音間卒寸忽反齊側皆反疏注釋曰此鄭以意解之上文以意解主君不欲稽留於賓此經解賓意不欲奄卒主人故云俟閒必知有齊戒沐浴者案玉藻云將適公所宿齊戒沐浴彼謂臣見已君入朝必須齊戒沐浴此有齊戒沐浴可知也云未敢聞命者謂不腆先君之祧既拚以俟之命不敢聞之也大夫帥至于館卿致館注致至也賓至此館主人以上卿禮致之所以安之也疏釋曰自此盡送再拜論主君遣卿致館之事注釋曰云賓至此館主人以上卿禮致之者案覲禮云侯氏遂從之天子賜舍辭曰賜伯父舍侯氏再拜稽首受儐之束帛乘馬注云王使人以命致館無禮猶儐之者尊王使也無禮謂無束帛此云以上卿禮明有束帛致亦可知若然有禮則稱致覲禮不稱致無禮故也案司儀云諸公相為賓主君郊勞云三辭拜受拜受謂拜受幣又云致館亦如之鄭云使大夫授之君又以禮親致焉亦是有幣可知又云諸侯諸伯諸子諸男之相為賓也各以其禮相待也如諸公之儀是五等相待致館同有幣矣天子待諸侯無幣則其臣來無幣可知據此文侯伯之卿聘郊勞致館有幣則五等待臣皆同有幣也司儀諸侯之臣相為國客亦皆有幣與此同若諸侯遣大夫小聘曰問下云小聘曰問不享有獻不及夫人不筵几不禮面不升不郊勞注云記貶於大聘所以為小也獻私獻也面猶覿也雖不言不致館略之也亦不致也又諸臣朝覲天子天子無禮以致猶儐尊王使又五等自相朝主國有禮皆有儐故司儀云賓繼主君皆如主國之禮鄭注謂繼主君者儐主君也儐之者主君郊勞致館饔餼還圭贈郊送之時也此等皆主君親致故有儐又云致館亦如之亦如郊勞時有儐矣以此言諸臣致者皆有儐也若諸侯遣卿大夫聘王國有用幣致館無儐也故司儀云諸公之臣相為國客致館如初之儀鄭注云如郊勞也不儐耳是也賓迎再拜卿致命賓再拜稽首卿退賓送再拜注卿不俟設飧之畢以不用束帛致故也不用束帛致之者明為新至非大禮也音義飧音孫注同疏釋曰云賓迎再拜者賓在館如主人故先拜也卿不言答拜答拜可知但文略耳雖不言入言迎則入門可知言卿致命者亦東面致君命也注釋曰云卿不俟設飧之畢以不用束帛致故也者下直云宰夫朝服設飧不言致則此卿致館兼致飧矣致館有束帛致飧空以辭致君命無束帛者案下記云飧不致鄭注云不以束帛致命草次饌飧具輕若然卿以空拜致飧既即退不待宰夫設畢也以不用束帛致故也云非大禮也者對下聘日致饔鄭云急歸大禮也若然此侯伯之卿禮其公之臣亦以幣帛致案司儀云諸公之臣相為國客致館如初之儀鄭注云不言致飧者君於聘大夫不致飧也聘禮曰飧不致賓不拜是也其子男之臣不致可知又案司儀云君親致館至於致飧如致積之禮鄭注云俱使大夫禮同也以此言之致館致飧似别人者但致積在道致飧在館所致别人若致館與致飧同時致館者兼致飧無嫌也言俱使大夫者言積與飧同使大夫决君不親之義何妨致館與致飧一人也其君致飧無幣其五等諸侯致飧則有幣案司儀諸侯相於致飧如致積致積有幣知致飧亦有幣也宰夫朝服設飧注食不備禮曰飧詩云不素飧兮春秋傳曰方食魚飧皆謂是音義飧音孫疏注釋曰云食不備禮曰飧者對饔餼也生與腥飪俱有餘物又多此飧唯有腥飪而無生餘物又少故云不備禮也引詩傳者案詩云彼君子兮不素飧兮毛云熟食曰飧鄭云讀如魚飧之飧則詩飧與𫝊魚飧同是直食魚與飯為飧彼少牢小禮中不備此則兩大牢大禮中不備不備是同故引證一邉不備其實禮有異也春秋傳曰方食魚飧者案宣六年經書晉趙盾衛孫免侵陳公羊傳曰趙盾弒君此其復見何親弒君者趙穿也親弒君者趙穿則曷為加之趙盾不討賊也復國不討賊此非弒君如何趙盾之復國奈何靈公為無道靈公使膳宰以熊膰不熟公殺之盾入諌公見盾再拜盾拜稽首歸公使勇士某者往殺之勇士入門不見人窺其户方食魚飧勇士曰嘻子誠仁人也是子之儉也吾不忍殺子也雖然吾不可復見吾君矣遂刎頸而死是魚飧之事飪一牢在西鼎九羞鼎三腥一牢在東鼎七注中庭之饌也飪熟也熟在西腥在東象春秋也鼎西九東七凡其鼎實與其陳如陳饔餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪音義飪而審反疏注釋曰云中庭之饌也者對下文是堂上及門外之饌也云象春秋也者腥之言生象春物生飪熟也象秋物有成熟故云象春秋也云鼎西九東七者九謂正鼎九牛羊豕魚臘腸胃膚鮮魚鮮臘東七者腥鼎無鮮魚鮮臘故七云凡其鼎實與其陳如陳饔餼者如其死牢故掌客云諸侯之禮饔餼九牢七牢五牢其死牢如飧之陳凡介行人皆有飧饔餼此則如介禮也是飧之死牢與饔餼死牢實與其陳同亦於東階西階也云羞鼎則陪鼎也知是一物者此云羞鼎下饔餼言陪鼎故知一也陪鼎三則下文膷臐膮是也堂上之饌八西夾六注八六者豆數也凡饌以豆為本堂上八豆八簋六鉶兩簠八壺西夾六豆六簋四鉶兩簠六壺其實與其陳亦如饔餼音義鉶音刑疏注釋曰堂上與西夾所陳六八非一知六八是豆者凡設饌皆先設豆乃設餘饌故鄭云凡饌以豆為本無妨六八之內兼有餘饌故鄭言簋鉶之等也凡鄭所云皆約饔餼故云亦如饔餼也鄭必約與陳饔餼同者以其陳鼎饔餼同故知餘亦同也門外米禾皆二十車注禾稿實並刈者也諸侯之禮車米視生牢禾視死牢牢十車大夫之禮皆視死牢而已雖有生牢不取數焉米陳門東禾陳門西音義稿古老反刈魚廢反疏注釋曰諸侯之禮車米視生牢禾視死牢牢皆十車者案掌客云上公之禮飧五牢饔餼九牢其死牢如飧之陳牽四牢車米視生牢牢十車車秉有五藪車禾視死牢牢十車侯伯飧四牢饔餼七牢其死牢如飧之陳牽三牢子男飧三牢饔餼五牢其死牢如飧之陳牽二牢皆米視生牢牢十車禾視死牢牢十車是其義也云大夫之禮皆視死牢而已雖有生牢不取數焉者知然者見下歸饔餼五牢饔三牢餼二牢饔三牢死牢也門外米禾皆三十車與死三牢同不取餼二牢生之數故知義然也云米陳門東禾陳門西者此亦約下歸饔餼知之上皆云陳如饔餼此不云如饔餼者至下經與薪芻并云凡此之陳亦如饔餼是也薪芻倍禾注各四十車凡此之陳亦如饔餼上介飪一牢在西鼎七羞鼎三堂上之饌六門外米禾皆十車薪芻倍禾注西鼎七無鮮魚鮮臘疏注釋曰六者與賓西夾數同但言堂則西夾無矣云西鼎七無鮮魚鮮臘者此亦約饔餼時賓飪鼎數故下文賓腥鼎七無鮮魚鮮臘此亦鼎七故知無鮮魚鮮臘也衆介皆少牢注亦飪在西鼎五羊豕腸胃魚臘新至尚熟堂上之饌四豆四簋兩鉶四壺無簠疏注釋曰知亦飪者依上介知然知鼎五者以賓九上介七衆介當五降殺以兩又約少牢五鼎此亦少牢故知亦五鼎也知鼎實有羊豕魚臘與腸胃者以上介無鮮魚鮮臘此又無牛故從羊豕以下數之得五案少牢有膚此無者生人食與祭異故玉藻朔月少牢五俎亦云羊豕魚臘腸胃不數膚也案上注皆不言新至尚熟於此言之者上文賓與上介皆言飪一牢在西下歸饔餼亦言飪一牢在西此衆介直言少牢不言飪下文歸饔餼亦直言餼一牢無飪恐衆介飧饔前後皆無飪故特言之新至尚熟對後無饔直有餼不尚熟也必知少牢是飪者承上介一牢飪知此亦飪云堂上之饌四豆四簋兩鉶四壺無簠知數如此者以賓與上介降殺以兩故然也知無簠者以賓簠有二曲禮云歲凶大夫不食粱非歲凶大夫食粱粱大夫當食大夫禮多與賓同簠盛稻粱則上介亦二簠與賓同士非直不合食粱差降亦無簠也厥明訝賓于館注此訝下大夫也以君命迎賓謂之訝訝迎也亦皮辨音義訝五嫁反疏釋曰自此盡每曲揖論將行聘禮主君迎賓向廟之事注釋曰云此訝下大夫也者案周禮有掌訝中士八人為之此訝下大夫非彼掌訝也案下記云卿大夫訝大夫士訝士皆有訝又周禮掌訝云凡賓客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝此大聘是卿故使下大夫訝也天子諸侯雖有掌訝之官朝聘之賓不使掌訝為訝直以尊卑節級為訝故云此訝下大夫也言以君命迎者凡舉皆是以承君命故知迎賓待君命也云亦皮辨者下文君及賓皮辨明此大夫亦皮辨服也賓皮辨聘至于朝賓入于次注服皮辨者朝聘主相尊敬也諸侯視朔皮辨服入于次者俟辨也次在大門外之西以帷為之音義辨蒲莧反辨具之辨疏注釋曰云服皮辨者朝聘主相尊敬也者周禮大行人諸侯朝天子各服冕服廟中將幣三享覲禮亦云侯氏裨冕在廟覲天子此諸侯待四方朝聘皆皮辨者入天子廟得申其上服入已廟不可以冕服又不可服常朝之服故服天子之朝服諸侯以為視朔之服在廟視朝聘之賓是相尊敬故也知此皮辨是諸侯視朔服者以其玉藻云諸侯皮辨以聽朔於大廟是也云次在大門外之西以帷為之者下記云宗人授次次以帷少退于君之次以賓位在西故知也乃陳幣注有司入于主國廟門外以布幕陳幣如展幣焉圭璋賈人執櫝而俟疏注釋曰有司入于主國廟門外者案下文行聘時幣在主國廟門外知在此也知有幕者以言陳幣如展幣明亦布幕陳幣也云圭璋賈人執櫝而俟者案下文云賈人東面坐啓櫝取圭鄭注賈人鄉入陳幣東面俟於此言之就有事也是也卿為上擯大夫為承擯士為紹擯擯者出請事注擯謂主國之君所使出接賓者也紹繼也其位相承繼而出也主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人聘義曰介紹而傳命君子於其所尊不敢質敬之至也既知其所為來之事復請之者賓來當與主君為禮為其謙不敢斥尊者啓發以進之於是時賓出次直闑西北面上擯在闑東閾外西面其相去也公之使者七十步侯伯之使者五十步子男之使者三十步此旅擯耳不傳命上介在賓西北東面承擯在上擯東南西面各自次序而下末介末擯旁相去三丈六尺上擯之請事進南面揖賓俱前賓至末介上擯至末擯亦相去三丈六尺止揖而請事還入告于公天子諸侯朝覲乃命介紹傳命耳其儀各鄉本受命反面傳而下及末則卿受之反面傳而上又受命傳而下亦如之此三丈六尺者門容二徹參個旁加各一步也今文無擯音義所為于僞反下為其皆同闑魚列反閾音域而上之上時掌反疏釋曰此擯陳在主國大門外主君之擯與賓之介東西相對南北陳之注釋曰云其位相承繼而出也者從門向南陳為繼而出云主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人者案周禮大行人天子待諸侯云上公之禮擯者五人侯伯之禮擯者四人子男則擯者三人今以諸侯待聘賓用天子待己之賓數者以諸侯自相待無文鄭以意解之但天子尊得分辨諸侯尊卑以待之諸侯卑降天子不敢分辨前人故據己國大小而為擯數且春秋又有大國朝焉小國聘焉又有卿出竝聘之事則小國有朝大國法無大國下朝小國之禮若相聘問大小皆得若然待其臣據此文與待君等天子待諸侯之臣亦宜與君同也又案周禮大宗伯為上擯小行人為承擯覲禮嗇夫為末擯若待子男三人足矣若侯伯少一人待上公少二人一人二人皆以士充數也引聘義者案彼鄭注質謂正自相當故設擯介通情乃相見是敬之至引之者證須擯介之意也云既知其所為來之事者在道己遣士請事大夫問行郊勞致館之等是足知來事矣云復請之者賓來當與主君為禮為其謙不敢斥尊者啓發以進之者亦解所以立擯介通情及進相見之義也云於是時賓出次直闑西北面者案玉藻云君入門介拂闑大夫中棖與闑之間士介拂棖此謂朝君又云賓入不中門此謂聘賓云不中門則此闑西北面者若然聘賓入門還依作介入時同亦拂闑也云上擯在闑東閾外西面者主位在東故賓在闑西上擯在闑東以擯位竝門東西面故上擯亦西面向君也云其相去也公之使者七十步侯伯之使者五十步子男之使者三十步者此依大行人云諸侯之卿其禮各下其君二等鄭注云所下者介與賓主之間是以步數與介數亦降二等也云此旅擯耳者案司儀云三問旅擯鄭云旅陳陳擯位不傳辭故鄭此云不傳命也若然上注下注皆引聘義云介紹而傳命者若交擯傳命則是擯介傳命此旅擯傳命者直是賓來至末介下對上擯傳本君之命也其介相紹繼則交擯旅擯同唯傳命不傳辭其異矣是以司儀云及將幣交擯鄭注亦引聘義介紹而傳命為證以其皆是相連繼於位也云上介在賓西北東面承擯在上擯東南西面此謂賓直闑西北面主君在門內南面列位時云西北東南者據賓西北望上介介仍向正北陳之矣上擯東南望承擯等仍向正南陳之矣不謂介西北邪陳擯東南向邪陳也云各自次序而下者賓之介或七或五或三從南向北次序上次下至末介主人之擯或五或四或三從承擯向南上次下至末擯也東西相去三丈六尺云上擯之請事進南面揖賓俱前者謂上擯入向公前北面受命出門南面遙揖賓使前擯者漸南行賓至末介北東面上擯至末擯南西面東西相去亦三丈六尺云止揖而請事者二人俱立定乃揖而請所為來之事云還入告于公者賓對訖上擯入告公公乃有命納賓也云天子諸侯朝覲乃命介紹傳命耳者此引聘義文自此以下論天子諸侯交擯法云紹者亦謂使介相紹繼以傳命即擯介相傳賓主之命也此交擯謂在大門外初未迎賓時案曲禮注春夏受贄於朝受享於廟秋冬一受之於廟覲禮天子不下堂而見諸侯則秋冬受贄受享皆無迎法無迎法則無此交擯之義若春秋受贄於朝無迎法受享於廟則迎之故大行人云廟中將幣三享鄭注朝先享不言朝者朝正禮不嫌有等也是正朝無迎法若然覲禮無迎法此云朝覲彼言覲者覲雖無迎法饗食則有迎法故齊㒒云朝覲宗遇饗食皆乘金路其法儀各以其等為車送迎之節故連覲也云其儀各鄉本受命反面傳而下者雖言各鄉本受命非一時之事先上擯入受命出傳與承擯承擯傳與末擯此是上擯鄉本受命反面傳而下末介向末擯邉受命傳與次介次介傳與上介上介傳與賓是及其末則卿受之反面傳而上也云又受命傳而下亦如之者此乃發賓傳向主君一如前發主君傳而向下故云亦如之如此三回為交擯三辭此則司儀云諸公相為賓交擯三辭者也諸侯伯子男相為賓如諸公之儀其交擯則同也云此三丈六尺者此則却計前云相去三大六尺云門容二轍參個者冬官匠人云天子五門匠人直計應門直舉應門則皋庫雉亦同云二轍參個者轍廣八尺參個三八二十四門容二丈四云傍加各一步也者此無正文但人之進退周旋不過再舉足一步故門傍各空一步丈二添二丈四尺為三丈六尺公皮辨迎賓于大門內大夫納賓注公不出大門降于待其君也大夫上擯也謂之大夫者上擯可知從大夫總無所别也於是賓主人皆禓音義别彼列反裼西歷反疏注釋曰云降于待其君也者案司儀諸公相為賓公皮辨交擯車迎拜辱出大門此於門內是降以待其君也云從大夫總無所别也者春秋之義卿稱大夫王制云上大夫卿是總無别也云於是賓主人皆裼者案玉藻云不文飾也不裼又云執龜玉襲下文行聘時執玉賓主人皆襲此時未執玉正是文飾之時明賓主人皆裼也賓入門左注內賓位也衆介隨入北面西上少退擯者亦入門而右北面東上上擯進相君音義相息亮反疏注釋曰知衆介隨入北面西上少退者約下文入廟行聘享時衆介入廟隨賓入門左北面西上少退不敢與賓齊也知擯者亦入門而右北面東上者亦約衆介統於賓北面西上明擯者北面東上亦約朝君揖位亦北面東上而知之也知上擯進相君者鄉黨云君召使擯鄭云有賓客使迎之彼據初迎賓時至於入門之後每事皆上擯相君也公再拜注南面拜迎疏注釋曰知君南面者經雖不見君面位主君尊於外國臣猶南面故郊特牲云君之南鄉答陽之義故知君南面也賓辟不答拜注辟位逡遁不敢當其禮音義辟音避劉房益反逡七旬反遁音旬疏注釋曰云不敢當其禮者以卿奉君命使不敢當賓辟相酬亢之禮故不答拜直逡遁而已公揖入每門每曲揖注每門輒揖者以相人偶為敬也凡君與賓入門賓必後君介及擯者隨之竝而鴈行既入則或左或右相去如初玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖賓入不中門不履閾此賓謂聘卿大夫也門中門之正也不敢與君竝由之敬也介與擯者鴈行卑不踰尊者之迹亦敬也賓之介猶主人之擯音義後戶豆反下同行户郎反棖直庚反爾雅謂之楔門兩旁木也疏釋曰諸侯三門臯應路則應門為中門左宗廟右社稷入大門東行即至廟門其間得有每門者諸侯有五廟太祖之廟居中二昭居東二穆居西廟皆别門門外兩邉皆有南北隔牆隔牆中夾通門若然祖廟已西隔牆有三則閣門亦有三東行經三門乃至太祖廟門中則相逼入門則相逺是以每門皆有曲有曲即相揖故每曲揖也是以司儀亦云每門止一相亦據閣門而言也注釋曰云以相人偶者以人意相存偶也云凡君與賓入門賓必後君者以賓主不敵是以玉藻云於異國之君稱外臣某故知聘賓後於主國君也言凡者非直聘享向祖廟若饗食向禰廟燕禮向路寢皆當後於主君故言凡以廣之云介及擯者隨之竝而鴈行者言竝上擯與上介竝次擯與次介竝末擯與末介竝各自鴈行於後也云既入則或左或右者東行賓介於左君擯於右也云相去如初者初謂大門外相去三丈六尺也玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖鄭注云此謂兩君相見也君入必中門上介夾闑大夫介士介鴈行於後示不相沿也君若迎聘客擯者亦然又云賓入不中門不履閾鄭注云辟尊者所從也此經謂聘君鄭君并引朝君欲見卿大夫聘來還與從君為介時入門同故并引之也云君入門介拂闑又云門中門之正又云卑不踰尊者之迹若然聊為一闑言之君最近闑亦拂之而過上介則隨君而行拂闑而過所以與君同行者臣自為一列主君既出迎賓主君與賓竝入主君於東闑之內賓於西闑之內竝行而入上介於西闑之外上擯於東闑之外皆拂闑次介次擯皆大夫中棖與闑之閒末介末擯皆士各自拂棖如是得君入中門之正上擯上介俱得拂闑又得不踰尊者之迹矣又云賓入不中門者此謂聘賓大聘大夫故鄭卿大夫竝言入門之時還依與君為介來入相似賓入還拂闑故上注賓自闑西擬入時拂闑西故也云中門門之正也者謂兩闑之閒云卑不踰尊者之迹者士以大夫為尊大夫以上介為尊上介以君為尊也云賓之介猶主人之擯者欲見擯介鴈行不别也及廟門公揖入立于中庭注公揖先入省內事也既則立於中庭以俟賓不復出如此得君行一臣行二於禮可矣公迎賓大門內卿大夫以下入廟門即位而俟之疏釋曰自此盡公裼降立論行聘之事注釋曰云公揖先入省內事也者曲禮云請入為席彼卿大夫士禮是以鄭注云雖君亦然省內事即請入為席之類也云如此得君行一臣行二於禮可矣者言得君行一臣行二者案下文三揖言之初揖注云將曲揖謂在內霤之閒在主君先立無過近於內霤閒若然去門既近去階又遠也以此不得君行一臣行二下文受玉于東楹之閒彼得為君行一臣行二矣下文又云公升二等賓升君階七等君升二等賓升一等已上仍有五等亦不得為君行一臣行二與此同欲見君行近臣行遠之義皆據大判而言不可細分之矣言於禮可者以其尊者宜逸卑者宜勞故言於禮可也云公迎賓於大門內卿大夫以下入廟門即位而俟之者上初命訝迎賓于館之時卿大夫士固在廟矣乃賓來大門外陳介之時主君之擯亦在大門外之位君在大門內時其卿大夫不以無事亂有事當於廟中在位矣必知義然當見行事之時公授宰玉又云士受皮又云宰夫受公几皆是於外無事在廟始有事更不見此官等命入廟之文明君未入廟時此官已在位而俟公食大夫以其官各具饌物皆有事不預入廟故公迎賓入後乃見卿大夫以下之位與此異也賓立接西孰注接猶近也門側之堂謂之孰立近孰者已與主君交禮將有出命俟之於此介在幣南北面西上上擯亦隨公入門東東上少進於士音義孰音熟近附近之近疏注釋曰云門側之堂謂之孰者爾雅釋宫文云立近孰者已與主君交禮將有出命俟之於此者對在大門外時未與主君交禮直使擯傳命故去門七十步五十步三十步此與君交禮故近門也云介在幣南北面西上者以上文入竟展幣時布幕賓西面介北面東上統於賓今此陳幣賓在門西北面明介北面西上統於賓也云上擯隨公入門東東上少進於士者案下几筵既設擯者出請命更不見上擯别入之文明隨公入可知也知門東有士者案公食云士立於門東北面西上鄭云統於門者非其正位也故知此亦然以擯者是卿又相君故知進於士在士前也几筵既設擯者出請命注有几筵者以其廟受宜依神也賓至廟門司宮乃于依前設之神尊不豫事也席西上上擯待而出請受賓所以來之命重停賓也至此言命事彌至言彌信也周禮諸侯祭祀席蒲筵繢純右雕几音義依前之依於豈反夲又作扆繢戶內反純章允反疏注釋曰云有几筵者以其廟受宜依神也者此對不在廟受不几筵故下文聘遭喪入竟則遂也不郊勞不几筵注云致命不於廟就尸柩於殯宮又不神之下小聘不几筵注云記貶於聘是以記云唯大聘有几筵覲禮不云几筵文不具也又案曲禮注春夏受贄於朝受享於廟秋冬一受之於廟諸侯無此法四時皆在於廟亦無四時朝覲之别名同皆曰朝也云賓至廟門司宮乃于依前設之神尊不豫事也者此對公食宰夫設筵加席几而後迎賓彼食禮與此異也知在扆前者案司几筵云大朝覲大饗射王位依前南鄉設筵几覲禮亦云依前諸侯亦然爾雅釋宮云牖户之閒謂之扆但天子以屛風設於扆諸侯無屏風為異席亦不同也云至此言命事彌至言彌信也者上入竟士請事近郊下大夫請行皆是謙問不敢以必來之己國不正言之至此事益至言益信矣故正問之而言請命是以事至言信矣云周禮至雕几者周禮司几筵文彼諸侯祭祀席三重上更有加莞席紛純不引之者文略可知引之者證此所設者設常祭祀之席也賈人東面坐啓櫝取圭垂繅不起而授上介注賈人嚮入陳幣東面俟於此言之就有事也授圭不起賤不與為禮也不言裼襲者賤不裼也繅有組繫也音義嚮音向下同疏注釋曰賈人嚮入陳幣東面俟於此言之就有事也者上文賓入次乃陳幣在門外不言者彼賈人未有事今此有事故就此言面位以此東面明初亦東面矣故舉此明前東面也云授圭不起賤不與為禮也者以賈人是庶人在官者故云賤不與為禮為禮當起而授也云不言裼襲者賤不裼也者若不賤以垂繅當裼以賤故不裼也云繅有組繫也知有組者下記云所以朝天子圭與繅皆九寸問諸侯朱緑繅八寸皆𤣥纁繫長尺絢組是也上介不襲執圭屈繅授賓注上介北面受圭進西面授賓不襲者以盛禮不在於己也屈繅並持之也曲禮曰執玉其有藉者則裼無藉者則襲疏注釋曰上介裼於賈人處垂繅受得圭而不襲者鄭云以盛禮不在於已故也以賓執圭升堂致命為盛禮在已者也云上介北面受圭進西面授賓者以上介本位北面故北面受圭賓東面故上介西面授賓引曲禮者彼記人據此絢組尺為繅藉不據韋皮衣木板畫以五采之繅藉也云執玉其有藉者則裼據此賈人垂繅以授上介上介不襲受之時也云其無藉者則襲者據此上介屈繅以授賓賓襲受之時也記人直記裼襲之義不論盛禮在己之意故各舉一邉而言也賓襲執圭注執圭盛禮而又盡飾為其相蔽敬也玉藻曰服之襲也充美也是故尸襲執玉龜襲也音義盡津忍反疏注釋曰云執圭盛禮者玉藻云執玉龜襲注重寶瑞也若然云盛禮者以其圭瑞以行禮故為盛禮也云又盡飾為其相蔽敬也者玉藻又云君在則裼盡飾也注云臣於君所今聘賓於主君亦是臣於君所合裼以盡飾今既執圭以瑞為敬君又盡飾而裼則掩執玉之敬故不得裼也云服之襲也充美也者彼注云充猶覆也云是故尸襲者為尸尊故去飾不裼也云執玉龜襲也者彼注云重寶瑞也以龜玉為寶瑞若裼則盡飾為蔽敬故引之證不裼也擯者入告出辭玉注擯者上擯也入告公以賓執圭將致其聘命圭贄之重者辭之亦所以致尊讓也疏注釋曰知擯是上擯者案上相禮者皆上擯故知此亦據上擯云圭贄之重者大宗伯云以玉作六瑞君之所執又云以禽作六贄臣之所執總而言之皆是贄故左氏傳文男贄不過玉帛禽鳥但君之所執為贄之重者也云辭之亦所以致尊讓也致尊讓鄉飲酒義文彼為賔主三辭三讓是致尊讓此辭玉亦是致尊讓之事故引之為證也案文公十二年左氏傳云秦伯使西乞術來聘襄仲辭玉賔對曰不腆敝器不足辭也彼主人無三辭者文不具亦當三辭也納賔賔入門左注公事自闑西疏注釋曰案玉藻文云公事自闑西注云聘享也又云私事自闑東注云覿面也故鄭引之以證此入門左是聘享賔入自闑西入門左也介皆入門左北面西上注隨賔入也介無事止於此今文無門疏注釋曰案司儀云諸公之臣相為國客及將幣每門止一相及廟唯君相入注云唯君相入客臣也相不入矣此介皆入不同者彼云每門止一相鄭云絶行在後耳非是全不入廟又云唯君相入者謂前相君禮須入故言之臣相不前相禮故不言入其實皆入與此同也三揖注君與賔也入門將曲揖既曲北面又揖當碑揖疏注釋曰前云公揖入立于中庭三分庭一在南賔後獨入得云入門將曲揖者謂公先在庭南面賔既入門至將曲揖賔既曲北面賔又向主君揖主君二者皆向賔揖之再揖訖主君亦東面向堂塗北行當碑乃得賔主相向而揖是以得君行一臣行二非謂賔入門時主君更向內霤相近而揖若然何得云君行一臣行二也至于階三讓注讓升公升二等注先賔升二等亦欲君行一臣行二音義先悉薦反疏注釋曰諸侯階有七等公升二等在上仍有五等而得云君行一臣行二者但君行少臣行多大判而言非謂即君行一臣行二此文出齊語晏子辭賔升西楹西東面注與主君相鄉擯者退中庭注鄉公所立處退者以公宜親受賓命不用擯相也疏注釋曰上文公揖入立于中庭今公與賓升堂云擯者退中庭此文與君立中庭同故云鄉公所立處賓致命注致其君之命也公左還北鄉注當拜疏注釋曰言左還北鄉者公升受賓致命時西鄉以左手鄉外回身北面乃拜故云當拜擯者進注進阼階西釋辭於賓相公拜也疏注釋曰知阼階西者以其擯者在中庭公立處直言進則進至阼階西不得更向阼階前亦不可更進西階故知進阼階西釋辭於賓復得相公拜也公當􅎝再拜注拜貺也貺惠賜也􅎝謂之梁音義􅎝亡悲反疏注釋曰拜貺之言文出聘義彼云北面拜貺拜君命之辱是也賓三退負序注三退三逡遁也不言辟者以執圭將進授之疏注釋曰案上文賓入門公再拜賓辟不答拜又下文云賓訝受几於筵前公一拜送賓以几辟皆言辟此不言辟故決之也案司儀云諸公之臣相為國客及將幣客登拜客三辟授幣注云客三辟三辟退負序也彼諸公之臣相聘之禮與矦伯之卿聘於鄰國之禮少異故也公側襲受玉于中堂與東楹之間注側猶獨也言獨見其尊賓也他日公有事必有贊為之者凡襲于隱者公序玷之間可知也中堂南北之中也入堂深尊賓事也東楹之間亦以君行一臣行二音義見賢遍反下以意求之玷丁念反疏注釋曰云他日公有事必有贊為之者案大射云公卒射小臣正贊襲是其贊為之也云凡襲於隱者案士喪禮小斂主人袒於户內襲於序東喪禮遽於事尚襲於序東況吉事乎明知襲於隱者也云公序玷之間可知也者士喪襲于序東謂於堂東地上此則公在堂上堂東南角為玷鄭以意斟酌隱處無過於序東玷北可也無正文故云可也云中堂南北之中也入堂深尊賓事也者凡廟之室堂皆五架棟南北皆有兩架棟北一架下有壁開户棟南一架謂之􅎝則􅎝北有二架􅎝南有一架今於當楣北面拜訖乃更前北侵半架於南北之中乃受玊故云南北之中乃入堂深尊賔事故也云東楹之間亦以君行一臣行二者兩楹之間為賔主處中今乃於東楹之間更侵東半間故云若行一臣行二也擯者退負東孰而立注反其等位無事賓降介逆出注逆出由便賓出注聘事畢公側授宰玉注使藏之授於序端疏注釋曰鄭知授於序端者凡公授受皆於序端是以下文公升側受几於序端故知此亦授于序端也裼降立注裼者免上衣見裼衣凡當盛禮者以充美為敬非盛禮者以見美為敬禮尚相變也玉藻曰裘之裼也見美也又曰麛裘青犴褎絞衣以裼之論語曰素衣麛裘皮辨時或素衣其裘同可知也裘者為溫表之為其褻也寒暑之服冬則裘夏則葛凡䄠裼者左降立俟享也亦於中庭古文裼皆作賜音義麛音迷或作麑同犴五旦反胡地野犬也褎本又作褎詳又反絞户交反為溫為其皆去聲䄠音但疏注釋曰云裼者免上衣見裼衣者案玉藻云君衣狐白裘錦衣以裼之注云君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘褻也詩云衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮辨服與凡裼衣象裘色也若然凡服四時不同假令冬有裘襯身禪衫又有襦袴襦袴之上有裘裘上有裼衣裼衣之上又有上服皮辨祭服之等若夏以絺綌絺綌之上則有中衣中衣之上復有上服皮辨祭服之等若春秋二時則衣祫褶祫褶之上加以中衣中衣之上加以上服也言見裼衣者謂袒襟前上服見裼衣也故玉藻云裘之裼也見美也襲者掩之故玉藻云襲充美是也云凡當盛禮者以充美為敬非盛禮者以見美為敬禮尚相變也者玉藻云執玊龜襲是禮之盛者充美為敬玉藻又云君在則裼盡飾也是非盛禮者以見美為敬據此二者是禮尚相變也引玊藻者證禮不盛者以裼見美也又曰麛裘青犴褎絞衣以裼之引論語素衣麑裘又云皮辨時或素衣其裘同可知也鄭一并引二文者欲見諸矦與其臣視朔與行聘禮皆服麛裘但君則麛裘還用麛褎臣則不敢純如君麛裘則青犴褎裼衣君臣亦有異時若在國視朝君臣同素衣為裼故鄉黨云素衣麛裘彼一篇是孔子行事鄭兼言君臣視朔之服是其君臣同用素裼可知若聘禮亦君臣同用麛裘但主君則用素衣為裼使臣則用絞衣為裼是以鄭總云皮辨時或素衣其裘同可知也言或素衣者在國則君臣同素衣聘時主君亦素衣唯臣用絞衣為裼也案雜記云朝服十五升布皮辨亦天子朝服與諸矦朝服同用十五升布亦同素積以為裳白舄臣用白屨也云裘者為溫表之為其褻者案月令云孟冬天子始裘是裘為溫云表之者則裼衣是也裼衣象裘色復與上服色同也云凡䄠裼者左者吉凶皆袒左是也是以士喪禮主人左袒檀弓云吳季札左袒右還其封大射亦左袒若受刑則袒右故覲禮矦氏袒右受刑是也知降立俟享也者下文賓行享是也擯者出請注不必賓事之有無疏釋曰自此盡以束帛如享禮論享禮之事賔裼奉束帛加璧享擯者入告出許注許受之庭實皮則攝之毛在內內攝之入設也注皮虎豹之皮攝之者右手并執前足左手并執後足毛在內不欲文之豫見也內攝之者兩手相鄉也入設亦參分庭一在南言則者或以馬凡君於臣臣於君麋鹿皮可也音義攝之涉反并必性反或如字疏注釋曰知皮是虎豹皮者經云毛在內不欲文之豫見是有文之皮郊特牲云虎豹之皮示服猛也束帛加璧往德也文無所屬則天子諸侯皆得用之此聘使為君行之故知皮是虎豹之皮也齊語云桓公知諸侯歸已令諸矦輕其幣用麋鹿皮非其正也云攝之者右手并執前足左手并執後足者下云皮右首故云右手執前兩足必以一手執兩足者取兩足相向得掩毛在內俱放又得毛向外故鄭云內攝之者兩手相鄉也知入設參分庭一在南者見昏禮記納徴執皮攝之內文兼執足左首隨入西上參分庭一在南故知此亦然但此右首彼左首者昏禮象生故與此異也云則者或以馬也者以其皮馬相間有皮則用皮無皮則用馬故云則見其不定故也云凡君於臣臣於君麋鹿皮可也者云凡君於臣謂使者歸君使卿贈如覿幣及食饗以侑幣酬幣庭實皆有皮故云凡也臣於君謂私覿庭實設四皮及介用儷皮此皆有糜鹿皮故亦云凡也若然大宗伯云孤執皮帛鄭云天子之孤用虎皮諸侯之孤用豹皮得用虎豹者彼所執以為贄與庭實不同故得用虎豹皮也賓入門左揖讓如初升致命張皮注張者釋外足見文也疏注釋曰案昏禮記賓致命釋外足見文主人受幣士受皮注云賔致命主人受幣庭實所用為節此亦然下受皮以授幣為節也公再拜受幣士受皮者自後右客注自由也從東方來由客後西居其左受皮也執皮者既授亦自前西而出疏注釋曰云執皮者既授亦自前西而出者此約下私覿時牽馬者自前西向出相類故云亦也賓出當之坐攝之注象受于賔疏注釋曰云坐攝之者向張皮見文今攝之者還如入時執前後足內文也公側授宰幣皮如入右首而東注如入左在前皮右首者變于生也疏釋曰云公側授宰幣者上云公側襲側猶獨也此已上側亦獨無人贊之也注釋曰云如入左在前者皮四張三人入門時先者北面在左西頭為上餘取皮向東者亦左在前向東為次第也云皮右首者變于生也者曲禮云執禽者左首士相見贄用雉左頭奉之下大夫執鴈上大夫執羔如執雉皆左首雉雖死以不可生服執之如羔鴈亦從左首象陽今此皮則右首變於生昏禮左首昏禮取象生與此異也聘于夫人用璋享用琮如初禮注如公立于中庭以下若有言則以束帛如享禮注有言有所告請若有所問也記曰有故則束帛加書以將命春秋臧孫辰告糴于齊公子遂如楚乞師晉侯使韓穿來言汶陽之田皆是也無庭實也疏注釋曰云有言有所告請若有所問也者言有所告即告糴之類是也請即乞師之類是也問即言汶陽之田之類是也鄭據傳而言有此三事皆是有言有言即記云有故一也云有言即有書致之故記云有故則束帛加書以將命也云春秋臧孫辰告糴者事在莊公二十八年也云公子遂如楚乞師者事在僖公二十六年也云晉侯使韓穿來言汶陽之田事在成公八年也此三者皆見春秋經引之者證此有言以束帛加書之事也云無庭實也者以經直云束帛如享禮則除束帛之外更無所有故知無庭實也國語云臧孫辰以鬯圭者是告糴之物服注云無庭實也又哀七年左傳云邾茅夷鴻以乘韋束帛自請救于吳求救非法故有乘韋為庭實也擯者出請事賓告事畢注公事畢賓奉束錦以請覿注覿見也鄉將公事是欲交其歡敬也不用羔因使而見非特來疏釋曰自此盡從者訝受馬論賓將私覿主人不許而行禮賓之事注釋曰云鄉將公事者聘享是也云是欲交其歡敬也者聘是公禮非是交歡此行私禮為交歡敬也案郊特牲云為人臣者無外交鄭注私覿是外交也彼謂臣為君介而行私覿是外交若特行聘則得私覿非外交也故彼上經云大夫執圭而使所以申信也注云其君親來其臣不敢私見於主國君也以君命聘則有私見是也云不用羔因使而見非特來者謂因為君聘使而行私見故用束錦非特來若特來則卿用羔也若然案士相見卿初仕見己君及卿皆見以羔見他君得有羔者案尚書有三帛二生二生卿執羔大夫執鴈彼見天子法從朝君而見得有羔若諸侯相朝其臣從君亦得執羔見主君可知其為君聘則不得執羔見主君也故鄭云因使而見非特來案定公八年經書公㑹晉師于瓦左傳云范獻子執羔趙簡子中行文子皆執鴈亦是從君見主君法也擯者入告出辭注客有大禮未有以待之疏注釋曰云大禮者即上行聘享是也云未有以待之者謂主人未有以待之以禮待之即下禮賓是也故止客私覿即下文先行禮賓也請禮賓賓禮辭聽命擯者入告注告賓許也宰夫徹几改筵注宰夫又主酒食者也將禮賓徹神几改神席更布也賓席東上公食大夫禮曰蒲筵常緇布純加萑席尋𤣥帛純此筵上下大夫也周禮曰筵國賓于牖前莞筵紛純加繅席畫純左彤几者則是筵孤也孤彤几卿大夫其漆几與音義萑音完與音餘疏注釋曰云宰夫又主酒食者也者對上宰夫設飱今又主酒食以禮賓也云賓席東上者對前為神而西上也云公食大夫禮曰蒲筵及萑席此筵上下大夫也者以公食蒲筵萑席二者是為上下大夫法又引周禮者鄭欲推出上下大夫用漆几也案司几筵云諸侯酢席莞筵紛純加繅席畫純筵國賓于牖前亦如之左彤几注云國賓諸侯來朝孤卿大夫來聘後言几者使不蒙如也朝者雕几聘者彤几但司几筵是天子之官几筵又是諸侯之法又鄭云國賓諸侯來朝孤卿大夫來聘是諸侯與孤卿大夫朝聘天子法則孤卿大夫是諸侯之臣也以此言之則天子孤卿大夫几筵與諸矦之臣同可知若然公食大夫筵上下大夫禮同用蒲筵莞席與此席不同鄭注此國賔中卿大夫得與孤同者鄭欲廣國賓之義其實此國賓中唯有諸矦與孤無卿大夫也鄭必知卿大夫漆几者司几筵有五几從上向下序之天子玉几諸矦雕几孤彤几卿大夫漆几下有素几喪事所用差次然也無正文故云與以疑之公出迎賓以入揖讓如初注公出迎者已之禮更端也疏注釋曰云公出迎者已之禮更端也者前聘享俱是公禮故不出迎此禮賓私禮改更其端序故公出迎也公升側受几于序端注漆几也今文無升宰夫內拂几三奉兩端以進注內拂几不欲塵坌尊者以進自東箱來授君音義坌蒲悶反疏注釋曰知几自東箱來者案覲禮記云几俟于東箱又此經直云進不言升明不從下來從東廂來可知也公東南鄉外拂几三卒振袂中攝之進西鄉注進就賓也疏釋曰宰夫奉几兩端故公中攝之復擬賓用兩手在公手外取之故也擯者告注告賓以公授几賓進訝受几于筵前東面俟注未設也今文訝為梧音義梧五故反疏注釋曰未設而俟者待公拜送訖乃設之故也公一拜送注公尊也古文一作一疏注釋曰賔再拜稽首公乃一拜當空首故注云公尊也賓以几辟注辟位逡遁北面設几不降階上答再拜稽首注不降以主人禮未成也凡賓左几疏注釋曰云不降以主人禮未成者案鄉飲酒義云啐酒成禮也於席末據此而言則啐酒為成禮此設几主為啐酒今未啐醴故云禮未成也云凡賔左几者對神右几也宰夫實觶以醴加柶于觶面枋注酌以授君也君不自酌尊也宰夫亦洗升實觶以醴自東箱來不面擸不訝受也音義柶音四枋彼命反擸劉音獵一以涉反疏注釋曰宰夫亦洗升實觶者經無宰夫升降之文以理亦之者亦上授几時從下而升東箱取几進以授君今又從下升東箱酌醴進以授君故亦之不言宰夫升降者賤略之也云以醴自東箱來者下記云禮尊于東箱瓦泰一有豐是也云不而擸不訝授也者公西面向賓宰夫自東箱來在公傍側竝授與公是以下文公側受醴不訝受故不面擸也公側受醴注將以飲賓音義飲於鴆反賓不降一拜進筵前受醴復位公拜送醴注賓一拜者醴質以少為貴疏注釋曰禮器云禮有以少為貴者今賓於上下皆再拜稽首獨此一拜故鄭據大古之醴質無𤣥酒配之故一拜以少為貴也宰夫薦籩豆脯醢賓升筵擯者退負東孰注事未畢擯者不退中庭以有宰夫也疏注釋曰云事未畢擯者不退中庭以有宰夫也者案上文擯者退中庭又云擯者進事未畢在中庭可知此下文亦云擯者進相幣事亦未畢而在東孰故决之若然以有宰夫主飲食之事宰夫所主已雖事未畢猶得負東孰以其閒有宰夫相已無事故也若無宰夫在中庭矣賓祭脯醢以柶祭醴三庭實設注庭實乘馬疏注釋曰鄭知乘馬者下文賓執左馬以出故知也降筵北面以柶兼諸觶尚擸坐啐醴注降筵就階上音義啐七內反疏釋曰以左手執觶右手以柶祭醴訖降筵北面以柶兼并於觶兩手奉之尚擸不作上字者尚古今通用也注釋曰云降筵就階上者以鄉飲酒賓主行禮獻酢卒爵皆各於其階此降筵啐醴明亦在西階之上公用束帛注致幣也言用尊于下也亦受之于序端疏注釋曰上文郊勞賓用束錦儐勞者下文歸饔餼於上介云大夫用束帛致之皆亦云用獨於此言用尊於下者儐勞者及歸饔餼皆是賓敬君之使者自尊之可知今君親用束帛禮賓故言用尊于下也云亦受之于序端者上公側受几於序端則知此幣亦受之於序端也建柶北面奠于薦東注糟醴不卒擯者進相幣注贊以辭音義相息亮反賓降辭幣注不敢當公禮也公降一等辭注辭賓降也栗階升聽命注栗階趨君命尚疾不連步疏注釋曰凡栗階者其始升亦連步於上栗階不過二等今云不連步者謂不從下向上皆連步其始升連步則有之也降拜注拜受公辭注不降一等殺也音義殺所界反疏注釋曰案前賓辭幣君降一等今不降故言殺升再拜稽首受幣當東楹北面注亦訝受而北面者禮主於己己臣也疏注釋曰前行聘享時賓東面主君西面訝授受但以奉君命故賓不北面此以主君禮己巳臣也故北面受異於聘享時也若然上受几受醴亦是已之禮以禮未成故不北面也此禮成故北面也退東面俟注俟君拜也不北面者謙若不敢當階然公一拜賓降也公再拜注不俟公再拜者不敢當公之盛也公再拜者事畢成禮也疏注釋曰此賓主俱謙公本欲再拜賔見公一拜止則降不敢當公不止遂再拜也云公再拜者事畢成禮也者前受几及醴公送皆一拜注云公尊也今事畢成禮不可亦自尊亢故送幣亦再拜也賓執左馬以出注受尊者禮宜親之也效馬者并左右靮授之餘三馬主人牽者從出也音義靮丁歷反疏注釋曰案下歸饔餼於賓賓儐大夫庭實設馬乘賔用束錦大夫降執左馬以出覲禮矦氏至郊王使人用璧勞訖矦氏用束帛乘馬儐使者使者受幣降以左驂出二者皆是尊國賓故也唯上文郊勞賔儐勞者執幣揖皮者皮是死物異於馬故也云效馬者并左右靮授之者曲禮云效馬效羊者右牽之效猶呈見故謂牽馬人為效馬者也云餘三馬主人牽者從出也者以是主人庭實出門乃有從者訝受馬明主人牽者從出可知上介受賓幣從者訝受馬注從者士介音義從才用反疏注釋曰鄭云從者士介下記文案公食云上介受賓幣從者訝受皮鄭注從者府史之屬不為士者彼公食是子男之大夫小聘一介其餘皆府史以下故知從者是府史之屬也既夕云賵馬兩士受馬鄭云此士謂胥徒之長有勇力者受馬彼據一廟下士不應更有其屬士故以為胥徒之長言之也昏禮記云士受皮鄭注士謂若中士下士不命者以其主人為官長據上士而言也賓覿奉束錦總乘馬二人贊入門右北面奠幣再拜稽首注不請不辭鄉時已請也覿用束錦辟享幣也總者總八轡牽之贊者居馬閒扣馬也入門而右私事自闑右奠幣再拜以臣禮見也贊者賈人之屬介特覿也音義辟音避扣音口疏釋曰自此盡公降立論行私覿之事注釋曰云不請不辭鄉時已請也者云不請賓不請不辭主君不辭所以不辭者鄉時已請覿主人辭之以禮賓故今不復請亦不辭之也云覿用束錦避享幣也者以上文享主君用束帛享夫人用𤣥纁束帛以今用束錦是辟享幣也云總者至扣馬也者賓總八轡在前牽之二人贊者各居兩馬閒各用左右手手扣一匹故云在馬閒扣馬也云入門而右私事自闑右者玉藻云公事自闑西鄭注云聘享也又云私事自闑東注云覿面也此行覿禮故引之也云奠幣再拜以臣禮見也者謂由闑東介又不從又自牽馬又不升堂入幣皆是以臣禮見也云贊者賈人之屬者既行臣禮不使介從明贊者是賈人之屬從行者云介特覿也者主君辭賓賓入門左則介五人隨入門西北面西上其介五人行覿禮各自特行無介從為特覿也擯者辭注辭其臣賓出注事畢擯者坐取幣出有司二人牽馬以從出門西面于東孰南注將還之也贊者有司受馬乃出凡取幣于庭北面疏注釋曰云贊者有司受馬乃出者賓出之時贊扣馬者未得出待人受馬乃得出所以然者幣可奠之於地其馬不可散放故待人受之乃可以出故云有司受馬乃出也云凡取幣于庭北面者言凡非一此時辭賓更出取幣後門右禮訖又取幣皆北面又衆介奠幣擯者取亦北面故云凡以廣之也擯者請受注請以客禮受之賓禮辭聽命注賓受其幣贊者受馬牽馬右之入設注庭實先設客禮也右之欲人居馬左任右手便也於是牽馬者四人事得申也曲禮曰效馬效羊者右牽之疏注釋曰云庭實先設客禮也者對前入門右時賓奉束錦總乘馬一時入無先後之别是臣禮今此入設下經乃云賓奉幣是先設庭實客禮也云於是牽馬者四人事得申也者知四人者若如前贊者二人則不得云右之既言右之明人牽一匹不須賓牽之事得申人牽一匹賓不總牽是也引曲禮者欲見牽馬在右禮之常彼效馬效羊謂尊者之物使飬之今來呈見此取一邊牽之法義不與彼同也賓奉幣入門左介皆入門左西上注以客禮入可從介疏注釋曰對入門右行臣禮不得從介也公揖讓如初升公北面再拜注公再拜者以其初以臣禮見新之也疏注釋曰臣禮見謂初入門右是以今再拜新之也知此不為拜至者下記云禮不拜至鄭注云以賓不於是始至私覿固非始至而為再拜明為臣禮見新之也賓三退反還負序注反還者不敢與授圭同疏注釋曰云反還者不敢與授圭同者上行聘時三退負序不言反還故决之也振幣進授當東楹北面注不言君受略之也疏注釋曰此决聘享皆言公受此乃私覿故略之不言其公受也士受馬者自前還牽者後適其右受注自由也適牽者之右而受之也此亦並授者不自前左由便也便其已授而去也受馬自前變於受皮音義還戶串反疏注釋曰此庭實之馬四匹在庭北面西上牽馬者亦四人各在馬西以右手執馬而立士受馬從東方來由馬前各適牽馬者之前還繞其後適牽馬者之東馬西而受之牽馬者自前行而出之云此亦並授者不自前左由便也者鄉飲酒之等於西階之上皆授由其右受由其左今乃受馬者不自左而由其右受者使受馬者授訖右回其身於出時為便故鄭注云便其已授而去也云受馬自前變於受皮者上受享庭實之皮受皮者自後右客鄭注云自由也從東方來由客後西居其左受皮也此亦從東而來由馬前者馬是生物恐驚故由前是變於受皮也牽馬者自前西乃出注自由也疏釋曰四馬竝北面牽馬者皆在馬西士既受馬其最西頭者便即出門不須由馬之前其次東三匹者皆由西於馬前而出故云牽馬者自前西乃出據三人而言也賓降階東拜送君辭注拜送幣于階東以君在堂鄉之疏注釋曰此言賓拜送幣者私覿已物故也前享幣不拜送者致君命非已物故也拜也君降一等辭注君乃辭之而賓由拜敬也疏注釋曰經上云拜送而云君辭君辭復云拜也是其君乃辭之賓由拜者敬主國君故也擯者曰寡君從子雖將拜起也注此禮固多有辭矣未有著之者是其志而煥乎未敢明說疏注釋曰云此禮固多有辭矣者謂此儀禮之內賓主之辭固多有辭矣但周公作經未有顯著明言之者直云辭耳此及公食皆著其辭此二者是志記之言煥乎可見云未敢明說者據此二者觸類而長之餘辭亦可以意量作但疑事無質未可造次明說故上注每云其辭未聞也栗階升公西鄉賓階上再拜稽首注成拜公少退注為敬賓降出公側授宰幣馬出注廟中宜清疏注釋曰云公側授宰幣不言出言馬出者以廟中宜清潔出就廄幣不言出與上皮幣同皆以東入藏之故記云賓之幣唯馬出其餘皆東注云馬出當就廄也餘物皆東藏之內府是幣不出之義也公降立擯者出請上介奉束錦士介四人皆奉玉錦束請覿注玉錦錦之文纖縟者也禮有以少文為貴者後言束辭之便也音義縟音辱疏釋曰自此盡舉皮以東論上介衆介行私覿之事注釋曰云玉錦錦之文纖縟者也者案聘義孔子論玉而云縝密以栗知也是玉有密致錦之纖縟似玉之密致者云禮有以少文為貴者禮器直云有以文為貴者有以少為貴者無少文為貴之語但有以少為貴以文為貴明亦有以少文為貴故鄭以義而言之也擯者入告出許上介奉幣儷皮二人贊注儷猶兩也上介用皮變於賓也皮麋鹿皮音義儷音麗疏注釋曰賓用馬今上介用皮故云變於賓也皆入門右東上奠幣皆再拜稽首注皆者皆衆介也贊者奠皮出疏注釋曰鄭知贊者奠皮出者下云有司二人舉皮從其幣出無人授之明贊者奠即出可知擯者辭注亦辭其臣介逆出注亦事畢也擯者執上幣士執衆幣有司二人舉皮從其幣出請受注此請受請于上介也擯者先即西面位請之釋辭之時衆執幣者隨立門中而俟疏注釋曰云此請受請于上介也者對前擯出請上介亦不請衆介也知擯者先即西面位請之者以其上介等先立門西東面故擯西面對之云釋辭之時衆執幣者隨立門中而俟者以其請受之下經云委皮南面執幣者西面故知當請之時立于門中可知言隨者謂相隨從故昏禮記云納徴執皮隨入注云為門中厄狹記云凡庭實隨入左先明此出時亦隨出而立也案匠人云廟門容大扃七個注大扃牛鼎之扃長三尺七個則二丈一尺闑東明不得竝出也委皮南面注擯者既釋辭執衆幣者進即位有司乃得委之南面便其復入也委皮當門音義復扶又反疏注釋曰云擯者既釋辭執衆幣者進即位有司乃得委皮者以前文云舉皮者從其幣出皮在後可知隨立門中之時未得委皮明執幣者進即位乃得委皮也云南面便其復入也委皮當門者此決執幣者西面其皮不西面委之者以皮入右首右先故南面橫委於門中當門北上執皮者北面受之而乃入便故也執幣者西面北上擯者請受注請于上介也上言其次此言其位互約文也疏注釋曰上文擯者執上幣注云請受請于上介也此雖衆介所請亦請上介上介尊故也云上言其次此言其位互約文也者上云擯者執上幣士執衆幣有司二人舉皮從其幣出請受是其次也此言委皮南面執幣者西面北上是其位也言互者此言西面北上則上當有北面東上之文下云士介覿幣時士三人東上坐取幣立是也此宜有壬執衆幣立於南面之文如是者互文也言約者雖互見其文文猶不備若欲備文當上取歸賓幣之文下取歸士介幣之文以理推約之乃備也若然上當言擯者執幣士四人北面東上坐取幣從有司二人坐舉皮從其幣出隨立於門中擯者出門西面于東孰南請受士執幣者進立擯南西面北上執皮者南面委皮於門中北上如是乃為文備也介禮辭聽命皆進訝受其幣注此言皆訝受者嫌擯者一一授之疏注釋曰此言皆訝受者嫌擯者一一授之者案上受享皮及賓私覿之馬並不云皆此獨云皆者嫌擯者獨請上介請先授上介幣故言皆明不一一授同時訝受可知也享幣無門外授先後之法故不言皆上介奉幣皮先入門左奠皮注皮先者介隨執皮者而入也入門左介至揖位而立執皮者奠皮以有不敢授之義古文重入音義重直用反疏注釋曰云介至揖位而立者謂賓覿時幣入門左介皆入門左西上公揖讓如初升賓至此待揖而後進明此介亦至揖位而立云執皮者奠皮以有不敢授之義者案享時庭實使人執之昏禮庭實亦使人執之彼皆不奠於地以其得親授主人有司此奠之不敢授故下二人坐舉皮明不授也公再拜注拜中庭也不受于堂介賤也疏注釋曰知拜中庭者上云公降立不見更有進退之文自受享以來降立皆在中庭故知此公拜亦中庭可知也介振幣自皮西進北面授幣退復位再拜稽首送幣注進者北行參分庭一而東行當君乃復北行也疏注釋曰介初在揖位君在中庭奠皮近西故介發揖位經皮西北出三分一乃東行北向當君乃北行至君所乃授幣故云自皮西進北面授幣也介出宰自公左受幣注不側受介禮輕疏注釋曰案賓覿禮云側授宰幣此不云側授故云介禮輕宰自公左受即是側不云側者當有贊者於公受轉授宰故云介禮輕也有司二人坐舉皮以東擯者又納士介注納者出道入也音義道音導疏釋曰自此盡序從之論士介行私覿之事注釋曰云納者出道入也者謂若燕禮大射小臣納卿大夫出道入之也士介入門右奠幣再拜稽首注終不敢以客禮見疏注釋曰上介奠幣訖辭之終以客禮是士介卑奠幣出私覿即了終不敢以客禮見也擯者辭介逆出擯者執上幣以出禮請受賓固辭注禮請受者一請受而聽之也賓為之辭士介賤不敢以言通於主君固衍字當如面大夫也疏注釋曰知固衍字當如面大夫者案下士介面大夫時擯者執上幣出禮請受賓辭無固字故知此固衍字當如士介面大夫公答再拜擯者出立于門中以相拜注擯者以賓辭入告還立門中閾外西面公乃遙答拜也相者贊告之疏注釋曰鄭知擯立門中閾外西面者以公在內賓在門外之西東面擯者兩處相之明居閾外西面向賓告之也士介皆辟注辟於其東面位逡遁也士三人東上坐取幣立注俟擯者執上幣來也疏注釋曰上文擯者執上幣以出賓辭之士介皆辟之乃云士三人取幣立擯者執上幣始來明士三人立俟之可知也擯者進注就公所也疏注釋曰以公在庭故擯者自門外來進向公左授幣與宰也宰夫受幣于中庭以東注使宰夫受于士士介幣輕也受之于公左賓幣公側授宰上介幣宰受于公左士介幣宰夫受于士敬之差疏注釋曰云使宰夫受于士者以上文士三人取幣明此宰夫所受受於士也知受之於公左者禮記少儀云贊幣自左是以凡受幣皆於公左也云賓幣公側授宰者即上文公側授宰幣于序端是也云上介幣宰受於公左者即上云庭中宰自公左受之是也云士介幣宰夫受于士者即經文是也在公左受之是尊卑不同敬之差也公所受之雖不同及其以東其藏并是宰夫宰夫幣所主故也執幣者序從之注序從者以宰夫當一一受之擯者出請賓告事畢注賓既告事畢衆介逆道賓而出也疏釋曰自此盡不顧論事畢送賓之事注釋曰云衆介逆道賓而出也者介為首賓為尾謂逆道也必知有逆出者上文聘訖云賓降介逆出又聘夫人私覿亦介逆出諸聘禮之等皆逆出故知此亦逆出可知也擯者入告公出送賓注公出衆擯亦逆道紹擯及賓竝行閒亦六步及大門內公問君注鄉以公禮將事無由問也賓至始入門之位北面將揖而出衆介亦在其右少退西上於此可以問君居處何如序殷勤也時承擯紹擯亦於門東北面東上上擯往來傳君命南面蘧伯玉使人於孔子孔子問曰夫子何為此公問君之類也疏注釋曰云衆介亦在其右少退西上者案上賓初入門左鄭注云由賓位也衆介隨入北面西上少退今賓出至入門之位將北面拜君而後出故知其位亦當初入門之位此位前後皆約聘享入廟北面西上之位也云時承擯紹擯亦於門東北面東上上擯往來傳君命者亦約常朝入門門東北面東上之揖位上擯往來相君自是其常引論語者彼雖非聘亦是大夫使人往來法問夫子何為亦是問君之類故云之類也賓對公再拜注拜其無恙公拜賓亦辟音義恙羊亮反疏注釋曰案爾雅釋言恙憂也言亦者亦初迎賓入門主君拜賓辟故云亦也公問大夫賓對公勞賓賓再拜稽首公答拜注勞以道路之勤公勞介介皆再拜稽首公答拜賓出公再拜送賓不顧注公既拜客趨辟君命上擯送賓出反告賓不顧於此君可以反路寢矣論語說孔子之行曰君召使擯色勃如也足躩如也賓退必復命曰賓不顧矣音義行下孟反躩驅若反又俱碧反疏注釋曰云賓不顧據上擯送賔復回謂君云賓不顧矣故引孔子事為證若然此送賓是上擯則卿為上擯孔子為下大夫得為上儐者以孔子有德君命使攝上擯若定十年夾谷之㑹令孔子為相同也賓請有事於大夫注請問問卿也不言問聘聘亦問也嫌近君也上擯送賓出賓東面而請之擯者反命因告之音義近附近之近疏釋曰自此盡亦如之論賓請問大夫訖即館卿大夫勞賓介之事注釋曰云不言問聘聘亦問也嫌近君也者對文大聘曰聘小聘曰問總而言之問聘一也不得云問卿若言問近君矣故云有事于大夫也鄭云擯者反命因告之者但從朝以來行聘享行禮賓之事事已煩矣今日即請未可即行故云反命因告之告之使知而已是以賓至館行勞賓介及受饔餼終日有事明日乃行問卿之禮也賓所請問卿宜云有事于某子故下記云幣之所及皆勞鄭云所以知及不及者賓請有事固曰某子某子是也公禮辭許注禮辭一辭賓即館注少休息也即就也疏注釋曰言休息者據此一日之閒其事多矣明旦行問卿暫時止息故云少休息也卿大夫勞賓賓不見注以已公事未行上介以賓辭辭之疏注釋曰以己公事未行者其聘享公事已行仍有問大夫之等公事未行故不敢見云上介以賓辭辭之者以經云賓不見明上介以賓辭辭之可知是以下言上介受明此上介辭也大夫奠鴈再拜上介受注不言卿卿與大夫同執鴈下見于國君周禮凡諸矦之卿見朝君皆執羔疏注釋曰云周禮者案周禮秋官掌客云凡諸矦之禮上公五積卿皆見以羔矦伯四積卿皆見以羔是主國之卿見朝君皆執羔引之證主國卿見聘客不得執羔與大夫同用鴈不見朝君故也勞上介亦如之君使卿韋辨歸饔餼五牢注變皮辨服韋辨敬也韋辨韎韋之辨兵服也而服之者皮韋同類取相近耳其服蓋韎布以為衣而素裳牲殺曰饔生曰餼今文歸或為饋音義韎音昧又亡拜反疏釋曰自此盡無儐論主君使卿歸饔餼於賓介之事注釋曰云變皮辨服韋辨敬也者案周禮春官司服王之吉服有九祭服之下先云兵事韋辨服後云視朝皮辨服則韋辨尊於皮辨今行聘享之事等皆皮辨至歸饔餼則韋辨故云敬也云韋辨韎韋之辨兵服也者鄭知辨用韎韋者案司服注鄭引春秋傳曰晉郤至衣韎韋之跗注又云今時五伯緹衣古兵服之遺色故知用韎韋也韎即赤色以赤韋為辨也云兵服者司服云凡兵事韋辨服故云兵服也云服之者皮韋同類取相近耳有毛則曰皮去毛熟治則曰韋本是一物有毛無毛為異故云取相近耳云其服蓋韎布以為衣而素裳者此無正文但正服則鄭注司服云韋辨以韎韋為辨又以為衣裳又晉郤至衣韎韋之跗注鄭志解此跗注以跗為幅以注為屬謂制韋如布帛之幅而連屬為衣及裳今此鄭云以韎布為衣而素裳全與兵服異者鄭以意量之此為賓館於大夫士之廟既為入廟之服不可純如兵服故為韎布為衣而素裳鄭志兵服以其與皮辨同白舄故以素裳解之此言素裳又與鄭志同若然唯變其衣耳以無正文故云蓋以疑之也云殺曰饔生曰餼者周禮有內饔外饔皆掌割烹之事詩云有母之尸饔故知殺曰饔生曰餼者以其對饔是腥飪故知餼是生故下云餼二牢皆活陳之也上介請事賓朝服禮辭注朝服示不受也受之當以尊服疏注釋曰鄭知義然者案下云賓皮辨迎大夫是受之用皮辨為尊服明此著朝服朝服卑於皮辨是示不受言示不受終受之也有司入陳注入賓所館之廟陳其積疏注釋曰案上文直云致館及即館不辨廟與正客館之名案下記云卿館於大夫大夫館於士皆是大夫士之廟下文又云揖入及廟鄭據此而言明陳之於廟也曽子問孔子云自卿大夫士之家曰私館即卿大夫士之廟一也孔子又云公館與公所為曰公館鄭注云公館若今縣官宫也彼是正客館彼此兩言之者若朝聘使少則皆於正客館若使多則有在大夫廟多少不定兩言之也案大行人及掌客積與饔餼各别此注以饔餼為陳其積者對文饔餼與積别散文總是委積故云積也饔注謂飪與腥疏注釋曰知者上言總饔餼五牢下陳有三處據此饔下云飪一牢腥二牢下又别云餼二牢故知饔别飪腥二者也若然飪與腥共以饔目之者以其同是死列之以鼎故也飪一牢鼎九設于西階前陪鼎當內廉東面北上上當碑南陳牛羊豕魚臘腸胃同鼎膚鮮魚鮮臘設扃冪膷臐膮蓋陪牛羊豕注陪鼎三牲􅌜膷臐膮陪之庶羞加也當內廉辟堂塗也腸胃次臘以其出牛羊也膚豕肉也唯燖者有膚此饌先陳其位後言其次重大禮詳其事也宫必有碑所以識日景引隂陽也凡碑引物者宗廟則麗牲焉以取毛血其材宫廟以石窆用木音義臘音昔扃古螢反冪亡狄反膷音鄉牛􅌜也臐許云反羊􅌜也膮許堯反豕􅌜也􅌜火各反字林火郭反燖劉音尋一本作爓音潛窆彼驗反疏注釋曰案公食大夫庶羞也以非正饌故在正鼎後而言加也云當內廉辟堂塗也者正鼎九雖大判繼階而言其云于階前則階束稍遠故陪鼎猶當內廉而辟堂塗堂塗之內也云腸胃次臘以其出牛羊也鄭言此者以其膚是豕肉腸胃是腹內之物而在肉前者以其腸胃出於牛羊故在膚前列之也云膚豕肉也唯燖者有膚者君子不食圂膄犬豕曰圂若然牛羊有腸胃而無膚豕則有膚而無腸胃也且豕則有膚豚則無膚故士喪禮豚皆無膚以其皮薄故也縱豕以四解亦無膚故既夕大遣奠少牢無膚以比豚解故也云此饌先陳其位後言其次重大禮詳其事也者先陳其位者南陳已上是也後言其次者牛羊豕已下是也案設飱直云飪一牢在西鼎九羞鼎三腥一牢在東鼎七直言西九東七不言次陳位飧是小禮輕之故也云宫必有碑所以識日景引隂陽也者言宫必有碑者案諸經云三揖者鄭注皆云入門將曲揖既曲北面揖當碑揖若然士昏及此聘禮是大夫士廟內皆有碑矣鄉飲酒鄉射言三揖則庠序之內亦有碑矣祭義云君牽牲麗于碑則諸矦廟內有碑明矣天子廟及庠序有碑可知但生人寢內不見有碑雖無文兩君相朝燕在寢豈不三揖乎明亦當有碑矣言所以識日景者周禮匠人云為規識日出之景與日入之景者自是正東西南北此識日景唯可觀碑景邪正以知日之早晚也又云引陰陽者又觀碑景南北長短十一月日南至景南北最長陰盛也五月日北至景南北最短陽盛也二至之閒景之盈縮陰陽進退可知也云凡碑引物者宗廟則麗牲焉以取毛血者云凡碑引物則識日景引陰陽皆是引物則宗廟之中是引物但廟碑又有麗牲麗繫也案祭義云君牽牲麗于碑以其鸞刀以取血毛毛以告純血以告殺兼為此事也云其材宫廟以石窆用木者此雖無正文以義言之葬碑取縣繩繂暫時之閒往來運載當用木而已其宫廟之碑取其妙好又須久長用石為之理勝於木故云宮廟以石窆用木也是以檀弓云公室視豐碑三家視桓楹時魯與大夫皆僭言視桓楹桓楹宫廟兩楹之柱此是葬用木之驗也腥二牢鼎二七無鮮魚鮮臘設于阼階前西面南陳如飪鼎二列注有腥者所以優賓也疏注釋曰云優賓者案下文士四人皆餼大牢無腥是不優之也堂上八豆設于戶西西陳皆二以竝東上韭菹其南醓醢屈注戶室戶也東上變乎親食賓也醓醢汁也屈猶錯也今文竝皆為併音義韭音九菹莊居反醓他感反疏釋曰云設于戶西西陳皆二以並東上韭菹其南醓醢屈者謂其東上醓醢醓醢西昌本昌本西麋臡麋臡西菁菹菁菹北鹿臡鹿臡東葵菹葵菹東蝸醢蝸醢東韭菹案周禮天官醢人朝事之豆有八韭菹醓醢昌本麋臡菁菹鹿臡茒菹麏臡饋食之豆葵菹螺醢此經直云韭菹醓醢屈知此昌本以下八豆者案公食下大夫六豆韭菹醓醢昌本麋臡菁菹鹿臡又云上大夫八豆鄭注云記公食上大夫異於下大夫之豆數加葵菹蝸醢以充八豆若然案朝事八豆菁菹鹿臡下仍有茒菹麏臡不取而取饋食葵菹蝸醢者案少牢正祭用韭菹醓醢葵菹蝸醢朝事饋食之豆兼用之明此賓上大夫亦兼用朝事饋食之豆以充八豆可知注釋曰云東上變於親食賓也者案公食大夫公親食賓云宰夫自東房薦豆六設于醬東西上此云東上是變於親食賓也云屈猶錯也者猶下經錯黍此經菹醢不自相當皆交錯陳之故云錯也八簋繼之黍其南稷錯注黍在北疏注釋曰云繼者繼八豆以西陳之云八簋者此陳之次第與八豆同故鄭云屈猶錯也八豆言屈八簋言錯者以八豆之實各别直次第屈陳之則得相變故云屈也八簋唯有黍稷二種屈陳之則閒雜故錯陳之使當行黍稷閒錯不得竝陳設亦相變故鄭下注凡饌屈錯要相變是也六鉶繼之牛以西羊豕豕南牛以東羊豕注鉶羹器也疏釋曰此不言䋫屈錯者䋫文自具故不言之也案此文上下䋫屈錯似各别鄭此注屈猶錯士喪禮陳衣於房中南領西上䋫注云䋫猶屈又似不别者云䋫屈二者下手陳之少異屈者句而屈陳之䋫者直屈陳之不為句陳訖則相似故注士喪禮云䋫猶屈言錯者閒雜而陳之與䋫屈同或句屈陳而錯此文是也或䋫陳如錯公食大夫是也故公食大夫云宰夫設黍稷六簋于俎西二以並東北上黍當牛俎其西稷錯以終南陳是其直䋫錯之也兩簠繼之粱在北注簠不次簋者粱稻加也凡饌屈錯要相變疏注釋曰凡豆及簋之數皆耦兩自相對而陳之屈錯不相對者欲使陳設者其要殺各得相變不使相當其六鉶䋫者牛及豕二者相變羊豕相當不相變以其大牢牛羊豕不耦故羊豕不得變也八壺設于西序北上二以竝南陳注壺酒尊也酒蓋稻酒粱酒不錯者酒不以雜錯為味疏注釋曰鄭云蓋稻酒粱酒也者以下夫人歸禮醙黍清各兩壺此中若有黍不得各二壺若三者各二壺則止有六壺與夫人歸禮同又不得各三壺若三者各三壺則九壺不合八數止有稻粱無正文故云蓋以疑之鄭知不直有稻黍而為稻粱者稻粱是加相對之物故為稻粱也此陳饔餼堂上及東西夾簋有二十簠六上文設飱時與此堂上及西夾其對則簋十四簠四案掌客設飱公矦伯子男簋同十二公簠十矦伯簠八子男簠六又皆陳饔餼其死牢如飱之陳如何此中飱之簋數及饔餼之簠數皆多於君者彼是君禮自上下為差此乃臣禮或多或少自是一法不可以彼相竝又此中致饔餼於賓醯醢百罋米百筥周禮上公罋筥百二十矦伯罋筥百子男罋筥八十子男少於此卿大夫禮禮或損之而益此其類也西夾六豆設于西墉下北上韭菹其東醓醢屈六簋繼之黍其東稷錯四鉶繼之牛以南羊羊東豕豕以北牛兩簠繼之粱在西皆二以竝南陳六壺西上二以竝東陳注東陳在北墉下統於豆疏釋曰六豆者先設韭菹其東醓醢又其東昌本南麋臡麋臡西菁菹又西鹿臡此陳還取朝事之豆其六簋四鉶兩簠六壺東陳其次可知義復與前同也饌于東方亦如之注東方東夾室西北上注亦韭菹其東醓醢也疏釋曰云西北上者則於東壁下南陳西北有韭菹東有醓醢次昌本次南麋臡次西有菁菹次北有鹿臡亦屈錯也上西夾饌六豆直言北上不云西北上此東夾獨云西北上者以其西夾言北上其東醓醢是西北上可知此東夾饌若不言西北上恐東夾饌從東壁南陳以東北為上其西有醓醢與西夾相對陳之故云西北上見雖東夾其陳亦與西夾同是以鄭云亦韭菹其東醓醢也壺東上西陳注亦在北墉下統於豆醯醢百罋夾碑十以為列醢在東注夾碑在鼎之中央也醯在東醯榖陽也醢肉陰也音義罋烏弄反疏釋曰案既夕禮云罋三醯醢屑鄭注云甕瓦器其容亦蓋一觳瓬人云簋實一觳又云豆實三而成觳四升曰豆則罋與簋同受斗二升也禮器云五獻之尊門外缶門內壺君尊瓦甒注云壺大一石瓦甒五斗即此壺大一石也注釋曰云夾碑在鼎之中央也者上陳鼎云西階前陪鼎當內廉東面北上上當碑南陳下腥鼎亦如之此言夾碑自然在鼎之中央可知云醯在東醯榖陽也醢肉陰也者醯是釀榖為之酒之類在人消散故云陽醢是釀肉為之在人沉重故云陰也大宗伯云天産作陰德地産作陽德注云天産六牲之屬地産九榖之屬以六牲為陽九榖為陰與此醯是榖物為陽違者物各有所對六牲動物行蟲也故九榖為陰郊特牲云鼎俎奇而籩豆偶陰陽之義也又以籩豆醯醢等為陰鼎俎肉物總為陽者亦各有所對以鼎俎之實以骨為主故為陽籩豆穀物故為陰也有司徹注又以庶羞為陽內羞為陰者亦羞中自相對內羞雖有糝食是肉物其中有糗餌粉餈食物故為陰庶羞肉物故為陽也餼二牢陳于門西北面東上牛以西羊豕豕西牛羊豕注餼生也牛羊右手牽之豕束之寢右亦居其左疏釋曰先言饔後言餼者陳者先以熟為主是以先陳饔饔下即陳熟物繼之故六豆以下相次此餼是生物其下次陳芻薪米禾之等相繼也注釋曰云牛羊右手牽之者曲禮云效馬效羊者右牽之以不噬囓人用右手便也言右手牽之則人居其左也云豕束之寢右亦居其左者豕束縛其足亦北首寢卧其右亦人居其左案特牲云牲在其西北首東足鄭注云東足者尚右也與此不同者彼祭禮法用右胖故寢左上右士虞記云陳牲于廟門外北首西上寢右鄭注寢右者當外左胖也變吉故與此生人同也米百筥筥半斛設于中庭十以為列北上黍粱稻皆二行稷四行注庭實固當庭中言當中庭者南北之中也東西為列列當醯醢南亦相變也此言中庭則設碑近如堂深也音義筥居吕反行戶郎反疏注釋曰云庭實固當庭中言當中庭者南北之中也者上享時直言庭實入設不言中庭則在東西之中其南北三分庭一在南此更言中庭欲明南北之中也上文公立於中庭宰受幣於中庭皆南北之中也知北上東西為列者以經云北上黍粱稻皆兩行稷四行若南北縱陳止得言東西不得言北上何者以黍粱稻及稷每行皆一種無上下故也明橫陳可知黍兩行在北次粱兩行次稻兩行次南稷四行所以不用稻為上者稻粱是加黍稷是正故黍為上端稷為下端以見上下而稻粱居其閒亦相變者亦上䋫屈錯之義云此言中庭則設碑近如堂深也者陳鼎上當其碑南向陳之醯醢夾碑在鼎中央亦南向陳之今米百筥在醯醢之南南北之中則碑近北可知言堂深者猶若設洗南北以堂深相似若然碑東當洗矣門外米三十車車秉有五籔設于門東為三列東陳注大夫之禮米禾皆視死牢秉籔數名也秉有五籔二十四斛也籔讀若不數之數今文籔或為逾音義籔劉色縷反一音速注不數之數同卷末放此逾劉音余後同說文大溝反疏注釋曰云大夫之禮米禾皆視死牢者上文飪一牢腥二牢是三牢死故米禾皆三十車并下禾三十車亦是視死牢也云秉籔數名也秉有五籔二十四斛也者下記云十斗曰斛十六斗曰籔十籔曰秉若然一秉十六斛又有五籔為八斛總二十四斛也云籔讀若不數之數者鄭君時以籔為數名數名有數有不數故云不數之數此從音讀其字仍竹下為之得為十六斗為數故下記注云今江淮之閒量名有為籔者是十六斗量器之名禾三十車車三秅設于門西西陳注秅數名也三秅千二百秉音義秅丁故反四百秉為秅字林疾加反疏注釋曰下記云四秉曰筥十筥曰稯十稯曰秅四百秉為一秅三四十二為千二百秉也薪芻倍禾注倍禾者以其用多也薪從米芻從禾四者之車皆陳北輈凡此所以厚重禮也聘義曰古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則內君臣不相陵而外不相侵故天子制之而諸矦務焉爾音義輈丁留反車轅疏注釋曰云薪從米芻從禾者以其薪可以炊爨故從米陳之芻可以食馬故從禾陳之鄭言此者以經云倍禾恐並從禾陳之故也云四者之車皆陳北輈者以其內向為正故也引聘義者欲見主君享禮聘賓外內皆善故引為證也賓皮辨迎大夫于外門外再拜大夫不答拜注大夫使者卿也疏釋曰云外門外者謂於主人大門外入大門東行即至廟門也云不答拜者亦以為君使不敢當故也注釋曰云大夫使者卿也者即上卿韋辨者也揖入及廟門賓揖入注賓與使者揖而入使者止執幣賓俟之于門內謙也古者天子適諸矦必舍於大祖廟諸矦行舍于諸公廟大夫行舍于大夫廟音義大祖之大音泰疏注釋曰云使者止執幣者下經始云大夫奉束帛入明此賓揖入時使者止執幣可知云賓俟之于門內謙也者聘時主君揖入立于庭尊卑法此賓與使者敵故賓在門內謙也云門內即寧下故下賓問卿云及廟門大夫揖入鄭注入者省內事也既而俟于寧下是也云古者天子適諸矦必舍于大祖廟者案禮運云天子適諸矦必舍其祖廟下記云卿館於大夫大夫館于士士館于工商鄭注云不館於敵者之廟為太尊也以此差之諸矦無正文鄭注舍于諸公廟者諸公大國之孤云大夫行舍于大夫廟者謂卿舍于大夫也若無孤之國諸矦舍於卿廟也大夫奉束帛注執其所以將命入三揖皆行注皆猶竝也使者尊不後主人疏注釋曰云使者尊不後主人者主人則賓所在若主人也然君與使者行當後君也至于階讓大夫先升一等注讓不言三不成三也凡升者主人讓于客三敵者則客三辭主人乃許升亦道賓之義也使者尊主人三讓則許升矣今使者三讓則是主人四讓也公雖尊亦三讓乃許升不可以不下主人也古文曰三讓音義下戶嫁反後下君下朝皆同疏注釋曰云讓不言三不成三也凡升者主人讓于客三敵者則客三辭主人乃許升者是三讓三辭成也今賓三讓大夫即升無三辭則不成三也云使者尊主人三讓則許升矣者即此經主人讓大夫先升是也云今使者三讓則是主人四讓也者經雖言讓大夫先升大夫之讓不明故鄭君兩言之但使尊終先升若主人三讓使人亦三讓主人又一讓則主人四讓使者乃升故鄭復言此也案周禮司儀云諸公之臣相為國客大夫郊勞三讓登聽命又云致饔餼如勞之禮即得行三讓之禮此下古文云三讓與彼合鄭不從者周禮則舉其大率而云三讓此儀禮據屈曲行事觀此經直云讓大夫先升是主人或三讓大夫無三讓故不從古文也云公雖尊亦三讓乃許升不可以不下主人也者此據公為主人亦有三讓故上行聘時云至於階三讓公升二等賓升亦是公先讓先升故成三讓是以聘義云三讓而後升公尊必三讓者必下賓客主人之義故也賓從升堂北面聽命注北面于階上也大夫東面致命賓降階西再拜稽首拜餼亦如之注大夫以束帛同致饔餼也賓殊拜之敬也重君之禮也疏注釋曰大夫以束帛同致饔餼五牢及陳豆壼車米之等今賓拜饔三牢及庭實又别拜餼二牢及門外米禾殊拜之者敬主君以重禮故也大夫辭升成拜注尊賓受幣堂中西北面注趨主君命也堂中西中央之西大夫降出賓降授老幣出迎大夫注老家臣也賓出迎欲儐之大夫禮辭許入揖讓如初賓升一等大夫從升堂注賓先升敵也皆北面疏注釋曰前大夫奉君命歸饔餼故先升一等今賓私儐使者無君命體敵故賓先升在館如主人之儀故也知皆北面者以其體敵又下始云賓奉幣西面大夫東面明此北面可知庭實設馬乘注乘四馬也賓降堂受老束錦大夫止注止不降使之餘尊疏注釋曰凡賓主體敵之法主人降賓亦降今賓降使者不降者使之餘尊雖合降而不降賓奉幣西面大夫東面賓致幣注不言致命非君命也大夫對北面當􅎝再拜稽首注稽首尊君客也致對有辭也疏注釋曰賓主既行敵體之禮當行頓首今大夫稽首於賓為拜君之拜尊君客故也致者賓致幣當有辭對者大夫對亦當有辭所以無辭者文不具故也受幣于楹閒南面退東面俟注賓北面授尊君之使疏注釋曰此賓儐使者體敵之義經云受幣于楹閒南面知賓不南面竝授而云賓北面授者凡敵體授受之義授由其右受由其左今尊君之使是以大夫南面賓北面故知賓北面授幣賓再拜稽首送幣大夫降執左馬以出注出廟門從者亦訝受之疏注釋曰言亦者上賓受禮時受幣馬云賓降執左馬以出上介受賓幣從者訝受馬此亦從者訝受馬故云亦也賓送于外門外再拜明日賓拜于朝拜饔與餼皆再拜稽首注拜謝主君之恩惠於大門外周禮曰凡賓客之治令訝聽之此拜亦皮辨服疏注釋曰知拜謝在大門外者以其直言賓拜於朝無入門之文故知在大門外若然諸矦外朝在大門外明矣引周禮者秋官掌訝職云賓客至于國賓入館次于舍門外待事于客及將幣為前驅至于朝詔其位凡賓客之治令訝治之引之者欲見賓客發館至朝來往皆掌訝前驅為之導知此拜亦皮辨者以其受時皮辨故知此拜亦皮辨也故公食大夫云若不親食使大夫各以其爵朝服以侑幣致之賓朝服以受明日賓朝服以拜賜于朝故朝服受還朝服拜則知此皮辨受亦皮辨拜可知上介饔餼三牢飪一牢在西鼎七羞鼎三注飪鼎七無鮮魚鮮臘也賓介皆異館疏釋曰自此盡兩馬束錦論主君使下大夫歸饔餼於上介之事注釋曰云飪鼎七無鮮魚鮮臘也者對上賓九鼎有鮮魚鮮臘也云賓介皆異館者案下記云卿館於大夫大夫館於士士館於工商彼云卿即此賓一也彼云大夫即此上介也彼云士即此衆介也故知賓介各異館必異館者所陳饔餼後無所容故也腥一牢在東鼎七堂上之饌六注六者賓西夾之數西夾亦如之筥及罋如上賓注凡所不貶者尊介也言如上賓者明此賓容介也疏注釋曰云如上賓者明此賓容介也者案下云賓之公幣私幣皆陳上介公幣陳是上介有不與賓同者前經不言如上賓獨此經言如上賓以其此饔餼大禮西夾筥及罋如上賓以其容此上介如上賓之禮也餼一牢門外米禾視死牢牢十車薪芻倍禾凡其實與陳如上賓注凡凡飪以下下大夫韋辨用束帛致之上介韋辨以受如賓禮注介不皮辨者以其受大禮似賓不敢純如賓也儐之兩馬束錦疏釋曰此下大夫使者受上介之儐禮如卿使者受賓儐禮當庭同不言如上大夫者省文也士介四人皆餼大牢米百筥設于門外注牢米不入門略之也米設當門亦十為列北上牢在其南西上疏釋曰自此至無儐論使宰夫歸餼於衆介之事注釋曰上文賓與上介米陳碑南餼陳門內此不入門陳於門外者鄭云略之也云米設當門亦十為列北上彼亦當門此直云設於門外不云東西明當門北上與賓同云牢在其南西上者以此餼本設於庭在門內由士介賤不得入門且賓與上介門東有米三十車薪六十車門西禾三十車芻六十車皆統門為上此餼本非門外東西之物知不在門外東西宜當門陳之云牢在其南西上知如此設之者以其賓上介餼在未南門西束上明知此牢亦在米南而西上為異耳宰夫朝服牽牛以致之注執紖牽之東面致命朝服無束帛亦略之士介西面拜迎音義紖直軫反疏注釋曰案下記云士館于工商則此致者在工商之館宰夫從外來即為賓客宜在門西東面此就大牢之中取以致餼云朝服無束帛亦略之者決上賓與上介皮辨韋辨有束帛故以為略之也云士介西面拜迎者以其士介為主人故西面每上賓與上介米禾皆視死牢且有芻薪米禾此士直有生餼無死牢則無芻薪米禾矣士介朝服北面再拜稽首受注受於牢東拜自牢後適宰夫右受由前東面授從者疏注釋曰知自牢後適宰夫右受者以其牢東北面拜明在宰夫東南從牢後來適宰夫至宰夫之後受取牢便故也必知在宰夫右受者見前君使士受私覿之馬適其右受知此亦在右受也若然君使士受私覿由前此由牢後與受馬不同者牛畜擾馴與馬有異故得從其後適宰夫右取便也云由前東面授從者於宰夫之後受牛遂由宰夫之前東授從者亦是取便也無儐注既受拜送之矣明日衆介亦各如其受之服從賓拜於朝疏釋曰言無儐者決上賓與上介皆有儐士介賤故略之注釋曰知明日衆介亦各如其受之服從賓拜於朝者案下夫人使下大夫韋辨歸禮賓受如受饔之禮儐之乘馬束錦又歸禮於上介上介受之如賓禮儐之兩馬束錦明日賓拜禮於朝鄭注云於是乃言賓拜明介從拜夫人歸禮介尚從拜則君饔餼介皆從拜可知賓朝服問卿注不皮辨别於主君卿每國三人疏釋曰自此盡無儐論賔齎聘君之幣問主國卿之事注釋曰云不皮辨别於主君者對上文行聘享私覿皆皮辨此朝服降一等故鄭注云别於主君云卿每國三人者每國三卿是其常鄭言此者欲見三卿皆以幣問之其主國下大夫曾使向己國者乃得幣問之與卿異卿受于祖廟注重賓禮也祖王父也疏注釋曰卿受鄰國君所問之禮不辭讓者以其初君送客之時賓請有事於大夫君禮辭許是以卿不敢更辭故下記云大夫不敢辭云祖王父也者大夫三廟有别子者立太祖廟非别子者并立曾祖廟王父即祖廟也今不受於太祖廟及曽祖廟而受於祖廟以其天子受於文王廟諸矦受於太祖廟大夫下君則受於王父廟下大夫擯注無士擯者既接於君所急見之疏注釋曰行聘享於主國君時主君擯者三人以上并有士擯賓又設介今直云大夫擯無士擯者以其設擯介多者不敢質示行事有漸但賓行聘享於主君之時卿已與賓相接故急見之不須士擯擯者出請事大夫朝服迎于外門外再拜賓不答拜揖大夫先入每門每曲揖及廟門大夫揖入注入者省內事也既而俟于寧也音義寧直吕反疏釋曰大夫二門入大門東行即至廟門未及廟門而有每門者大夫三廟每廟兩旁皆南北豎牆牆皆閣門假令王父廟在東則有每門每曲之事注釋曰云入者省內事也者曲禮云請入為席是也云既而俟于寧者寧門屋寧也知俟于寧者下云賓入三揖皆行鄭注云皆猶竝也賓與卿竝行以卿俟于寧故得竝行與卿三揖不俟于庭者下君也案曲禮云客至於寢門則主人請入為席然後出迎客主人肅客而入此卿既入不重出迎客者彼曲禮平常賓客故重出迎客此聘問之賓與平常賓客異上君揖賓不重出此卿亦不重出與彼同但在庭與在寧不同矣擯者請命注亦從入而出請不几筵辟君也疏注釋曰亦者亦君受聘時擯者從君而入几筵既設擯者出請此擯者亦從卿而入省內然後出請庭實設四皮注麋鹿皮也賓奉束帛入三揖皆行至于階讓注皆猶竝也古文曰三讓疏注釋曰不從古文者亦是不成三故賓先升一等大夫從升堂故不從三讓也賓升一等大夫從升堂北面聽命注賓先升使者尊賓東面致命注致其君命大夫降階西再拜稽首賓辭升成拜受幣堂中西北面注於堂中央之西受幣趨聘君之命賓降出大夫降授老幣無儐注不儐賓辟君也疏注釋曰上文賓行聘享訖而君禮賓有束帛乘馬敵者曰儐今卿不儐賓者辟國君也擯者出請事賓面如覿幣注面亦見也其謂之面威儀質也音義見如字疏釋曰自此至授老幣論賓行私面於卿之事賓私面於卿其幣多少與私覿於君同故云如覿幣賓私覿之時用束錦乘馬則此私面於卿亦用束錦乘馬可知也注釋曰云面亦見也其謂之面威儀質也者覿面竝文其面為質若散文面亦為覿故鄭司儀注云私面私覿也又左傳云楚公子棄疾以乘馬八匹私面鄭伯是也賓奉幣庭實從注庭實四馬疏注釋曰以其言如覿幣故知庭實四馬也入門右大夫辭注大夫於賓入自階下辭迎之疏注釋曰知階下辭者以其授老幣時降故也知迎者下文揖讓如初明迎之可知賓遂左注見私事也雖敵賓猶謙入門右為若降等然曲禮曰客若降等則就主人之階主人固辭於客然後客復就西階疏注釋曰云為若降等者主人是大夫客是士降等法士就東階今此賓與卿敵者就門右若士於大夫降等引曲禮者主人辭賓賓遂左就門右西階復正也庭實設揖讓如初注大夫至庭中旋竝行疏注釋曰云大夫至庭中旋竝行者賓初入門右大夫階下辭賓賓遂門左大夫至庭中迎賓大夫回旋與賓揖而竝行北面言如初者大夫不出門唯有庭中一揖至碑又揖再揖而已大夫升一等賓從之注大夫先升道賓大夫西面賓稱面注稱舉也舉相見之辭以相接大夫對北面當􅎝再拜受幣于楹閒南面退西面立注受幣楹閒敵也賓亦振幣進北面授疏注釋曰知賓北面授者以云大夫南面退西面立言退明賓不得南面又見下文賓當􅎝再拜明北面授因拜可知云受幣楹閒敵也者凡授受之義在於兩楹之閒者皆是體敵故昏禮云授于楹閒南面注云授於楹閒明為合好其節同也南面竝授也謂賓主俱至楹閒南面竝而授是以曲禮云鄉與客竝然後受注云於堂上則俱南面禮敵者竝授此是敵者之常禮也雖是敵者於兩楹之閒或有訝受者皆是相尊敬之法則此云大夫南面賓北面授雖是敵禮是尊大夫故訝受又前致饔餼儐使者於楹閒賓北面授幣鄭云賓北面授尊君之使自餘不在楹閒别相尊敬見以前云公受玉于中堂與東楹之閒鄭注云東楹之閒亦以君行一臣行二又云公禮賓賓受幣當東楹北而注云亦訝受又賓覿公云振幣進授當東楹北面如此之類不在兩楹之閒者皆非敵法故就文解之賓當􅎝再拜送幣降出大夫降授老幣擯者出請事上介特面幣如覿介奉幣注特面者異於主君士介不從而入也君尊衆介始覿不自别也上賓則衆介皆從之疏釋曰自此盡再拜送幣論上介私面於鄰國卿之事注釋曰云特面者異於主君者介初覿主君之時不敢自尊别與衆介同執幣而入今私面於鄰國卿不與衆介同而特行禮焉故云特面者異於主君也云士介不從而入者對覿君時衆介從而入故鄭云君尊衆介始覿不自别也云上賓則衆介皆從之者上介言特面則賓問卿與私面介皆從可知皮二人贊注亦儷皮也疏注釋曰案經文幣如覿則上介私面亦與私覿於君幣同故云亦儷皮也入門右奠幣再拜注降等也疏注釋曰言降等者主人是卿上介是大夫故入門右不敢自同賓客大夫辭注於辭上介則出擯者反幣注出還于上介也疏注釋曰不言反皮出還於上介皮出可知但文不具庭實設介奉幣入大夫揖讓如初注大夫亦先升一等今文曰入設疏注釋曰云亦者亦上賓行私面大夫升一等賓乃升此上介私面亦然故云亦也介升大夫再拜受注亦於楹閒南面而受疏注釋曰亦者賓行私面大夫受幣於楹閒南面故云亦得在楹閒為敵法上介是下大夫與卿小異大同明得行敵法在楹閒可知介降拜大夫降辭介升再拜送幣注介既送幣降出也大夫亦授老幣擯者出請衆介面如覿幣入門右奠幣皆再拜大夫辭介逆出擯者執上幣出禮請受賓辭注賓亦為士介辭音義為于僞反疏釋曰自此至拜辱論士介私面於鄰國卿之事注釋曰云賓亦為士介辭者亦者亦士介私覿於主國君時故云亦也大夫答再拜擯者執上幣立于門中以相拜士介皆辟老受擯者幣于中庭士三人坐取羣幣以從之擯者出請事賓出大夫送于外門外再拜賓不顧注不顧言去音義相息亮反擯者退大夫拜辱注拜送也下大夫嘗使至者幣及之注嘗使至己國則以幣問之也君子不忘舊疏釋曰自此盡于卿之禮論主國下大夫嘗使至己國者聘君使上介以幣問之事注釋曰諸矦之國皆有三卿五大夫其三卿不問至己國不至己國皆以幣及之上已論訖其五大夫者或作介或特行至彼國者乃以幣及之略於三卿故也言君子不忘舊者此大夫嘗與彼國君相接即是故舊也今以幣及之故云君子不忘舊也上介朝服三介問下大夫下大夫如卿受幣之禮注上介三介下大夫使之禮也疏注釋曰云上介三介下大夫使之禮也者下經云小聘曰問其禮如為介三介是下大夫小聘之禮據此篇大聘使卿五介小聘使大夫三介若大國之卿七介小聘使大夫五介小國之卿三介小聘使大夫一介也曲禮云擬人必於其倫故問下大夫還使上介是各於其爵易以相尊敬者也其面如賓面于卿之禮大夫若不見注有故也疏釋曰自此盡不拜論主國卿大夫有故不得親受聘君之幣之事注釋曰言有故者或有病疾或有哀慘不得受其問禮君使大夫各以其爵為之受如主人受幣禮不拜注各以其爵主人卿也則使卿大夫也則使大夫不拜代受之耳不當主人禮也疏注釋曰云各以其爵主人卿也則使卿大夫也則使大夫者若然經云君使大夫大夫中有卿大夫總名也云各以其爵亦是易以相尊敬故也云不拜代受之耳不當主人禮也者案周禮宗伯云大賓客則攝而載裸鄭注云宗伯代王為祼拜送則王亦此類拜是致敬之事不可人代之拜故直受之而已不當主人之禮拜之夕夫人使下大夫韋辨歸禮注夕問卿之夕也使下大夫下君也君使之云夫人者以致辭當稱寡小君疏釋曰自此盡賓拜禮於朝論主君夫人歸禮於賓與上介之事注釋曰云夕問卿之夕也者案下記云聘日致饔明日問大夫夕夫人歸禮是其問卿之夕也云使下大夫下君也者歸饔餼使卿此夫人使下大夫故云下君也云君使之云夫人者以致辭當稱寡小君者案隱二年傳九月紀裂繻來逆女何以不稱使婚禮不稱主人又云紀有母乎曰有有則何以不稱母母不通也何休注云禮婦人無外事明知此使下大夫歸禮者是君使之可知而稱夫人使者以其致辭於賓客時當稱寡小君故稱夫人使下大夫其實君使之也堂上籩豆六設于戶東西上二以竝東陳注籩豆六者下君禮也設于戶東又辟饌位也其設脯其南醢屈六籩六豆疏注釋曰言籩豆六東陳者其饌自戶東為首二以竝東陳先於北設脯即於脯南設醢又於醢東設脯以次屈而陳之皆如上也云籩豆六者下君禮也者君歸饔餼八豆此六豆故云下君也設於戶東又辟君饌位故也云其設脯其南醢屈六籩六豆者此約君禮設豆法云韭菹其南醓醢屈故知此醢在南屈陳之又知籩豆各六者下文上介四豆四籩降殺以兩明夫人多二六豆六籩可知壺設于東序北上二以竝南陳醙黍清皆兩壺注醙白酒也凡酒稻為上黍次之粱次之皆有清白以黍閒清白者互相備明三酒六壺也先言醙白酒尊先設之音義醙所九反閒閒厠之閒疏釋曰其設壺於東序自北向南而陳稻黍粱皆二壺竝之而陳也故言醙黍清皆兩壺也注釋曰云以黍閒清白者互相備者醙白也上言白明黍粱皆有白下言清明稻黍亦有清故也於清白中言黍明醙即是稻清即是粱也故言互相備也三酒既有清白二色故言六壺必先言醙者以白酒尊重故先設之也大夫以束帛致之注致夫人命也此禮無牢下朝君也疏注釋曰案周禮掌客云上公之禮夫人致禮八籩膳大牢致饗大牢矦伯以下亦皆有牢是朝君來時有牢此卿來聘無牢故云下朝君也賓如受饔之禮儐之乘馬束錦上介四豆四籩四壺受之如賓禮注四壺無稻酒也不致牢下於君也疏注釋曰知者案上致於賓六壺稻黍粱皆有清白今上介四壺明從上去之無稻米之酒清白俱去之故四壺也儐之兩馬束錦明日賓拜禮於朝注於是乃言賓拜明介從拜也今文禮為醴音義從才用反又如字疏注釋曰鄭解若於上文賓下言之則介從拜之事不明故於上介之下乃云明日賓拜禮於朝則介從賓拜可知大夫餼賓大牢米八筐注其陳於門外黍粱各二筐稷四筐二以竝南陳無稻牲陳於後東上不饌於堂庭辟君也疏釋曰自此至牽羊以致之論主國大夫餼賓及上介之事注釋曰云陳於門外知者經無牢米入門之文故明是門外可知與君餼士介同云黍粱各二筐稷四筐二以竝南陳無稻者案上使卿歸饔餼之時米百筥設於中庭十以為列北上稻粱黍各二行稷四行此云八筐黍粱稷亦宜法其行數故知黍粱各二筐稷四筐知二以竝南陳者以其君筥米北上故知此亦北上南陳知二以竝者以其陳筥米粱黍稻不雜陳則知此筐米亦不雜陳二以竝可知云無稻者見記云凡餼大夫黍粱稷筐五斛是也云牲陳於後東上者此與君餼士介略同餼士介時不言門東西鄭注云當門則知此門外亦當門君餼賓米在庭牲在門西雖不正當米南亦得牲在其南故知此牲陳亦在米南可知知東上者君餼賓時陳於門西東上也云不饌於堂庭辟君也者案上君致饔餼籩豆在堂牲牢米等在庭此在門外故云辟君也若然案掌客鄰國之君來朝卿皆見以羔膳太牢矦伯子男膳特牛彼又無筐米此矦伯之臣得用太牢有筐米者彼為君禮此是臣禮各自為差降不得以彼難此賓迎再拜老牽牛以致之賓再拜稽首受老退賓再拜送注老室老大夫之貴臣疏注釋曰案喪服公士大夫之衆臣為其君布帶繩屨傳曰室老士貴臣其餘皆衆臣也鄭注云室老家相也士邑宰也即此室老貴臣者家相邑宰之屬故為貴臣也上介亦如之衆介皆少牢米六筐皆士牽羊以致之注米六筐者又無粱也士亦大夫之貴臣疏注釋曰言又無粱也者上文八筐無稻從上去之明知此亦從上去之無粱其稻粱是加故去之云士亦大夫之貴臣者即是大夫邑宰也以其大夫使之故知大夫之貴臣也公於賓一食再饗注饗謂亨大牢以飲賓也公食大夫禮曰設洗如饗則饗與食互相先後也古文一皆為一今文饗皆為鄉音義食音嗣注及下同亨普庚反飲於鴆反疏注釋曰此篇雖據矦伯之卿聘使五等諸矦其臣聘使牢禮皆同無大國次國之别是以掌客五等諸矦相朝其下皆云羣介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數又云凡諸矦之卿大夫士為國客則如其介之禮以待之鄭注云尊其君以及其臣也以其爵等為之牢禮之陳數爵卿也則飱二牢饔餼五牢大夫也則飱太牢饔餼三牢士也則飱少牢饔餼太牢也此降小禮豐大禮也以命數則參差難等略於臣用爵而已以此言之公矦伯子男大聘使卿主君一食再饗小聘使大夫則主君一食一饗若然案掌客子男一食一饗子男之卿再饗多於君者以其君臣各自相差不得以君決臣也云饗謂亨大牢以飲賓也者以其饗禮與食禮同食禮既亨太牢明饗禮亨太牢可知但以食禮無酒饗禮有酒故以飲賓言之引公食饗與食互相先後者此經先言食後言饗則食在饗前公食言設洗如饗禮則饗在食前饗先後出於主君之意故先後不定也燕與羞俶獻無常數注羞謂禽羞鴈鶩之屬成熟煎和也俶始也始獻四時新物聘義所謂時賜無常數由恩意也古文俶作淑音義俶昌叔反始也鶩音木疏釋曰案周禮掌客上公三燕矦伯再燕子男一燕皆有常數此臣無常數者亦是君臣各為一不得相決注釋曰知羞謂禽羞鴈鶩之屬者案下記云禽羞俶獻故知是禽知成熟煎和者以其言羞鼎臐之類故知成熟煎和者也知禽是鴈鶩之屬者案下記云宰夫歸乘禽日如饔餼之數鄭注乘禽乘行之禽也亦云鴈鶩之屬以無正文故以意解之賓介皆明日拜于朝上介一食一饗注饗食賓介為介從饗獻矣復特饗之客之也疏注釋曰不言從食者公食介雖從入不從食賓食畢介逆出是不得從食矣知從饗者下記云大夫來使無罪饗之過則餼之其介為介注云饗賓有介者賓尊行敵禮也故知介從饗案襄二十七年宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也叔向為趙孟介而得從饗是其義也云復特饗之即此經是也若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐注君不親食謂有疾及他故也必致之不廢其禮也致之必使同班敵者易以相親敬也致禮於卿使卿致禮於大夫使大夫非必命數也無儐以己本宜往古文侑皆作宥音義侑音又疏釋曰案上文云君使卿歸饔餼於賓館賓儐之今君有故不親食使卿生致其牢禮亦於賓館但無儐為異注釋曰云謂有疾及他故也者他故之中兼及有哀慘云非必命數也者依典命公矦伯之卿三命大夫再命子男之卿再命大夫一命經云各以其爵故知不依命數云無儐以己本宜往者饔餼之等不宜召賓故君使人致禮賓則儐使者此饗食之禮主君無故合速賓之來就主君入廟賓無儐禮今主君有故生致於賓亦無儐故云本宜往此篇據矦伯之卿來聘使是卿致禮鄭兼云於大夫使大夫者小聘使大夫來使大夫致禮也若然經直言使大夫者大夫中兼有上大夫兼卿也致饗以酬幣亦如之注酬幣饗禮酬賓勸酒之幣也所用未聞也禮幣束帛乘馬亦不是過也禮器曰琥璜爵蓋天子酬諸矦音義琥音虎疏注釋曰云禮幣束帛乘馬亦不是過也者鄭以饗之酬幣無文故約上主君禮賓之時用束帛乘馬此饗賓酬幣亦不過是故云亦不是過引禮器者案彼經云有以少為貴者圭璋特琥璜爵鄭注云圭璋特朝聘以為瑞無幣帛也琥璜爵者天子酬諸矦諸矦相酬以此玉將幣也彼經不云天子諸矦相酬之幣故此注云蓋言酬諸矦者公矦伯用琥於子男用璜引之者證與此酬卿大夫不同之義大夫於賓一饗一食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣注作使也大夫有故君必使其同爵者為之致之列國之賓來榮辱之事君臣同之疏釋曰此一經論主國卿大夫饗食聘賓及上介之事此直言饗食不言燕亦有燕是以鄭詩雞鳴云知子之來之雜佩以贈之鄭注云與異國賓客燕時雖無此物猶言之以致其厚意其若有之固將行之士大夫以君命出使主君之臣必以燕禮樂之助君之歡是也又昭二年左傳云韓宣子來聘宴于季氏傳無譏文明鄰國大夫有相燕之法又此大夫相禮饗食有常數雖有燕亦無常數亦無酬幣矣君使卿皮辨還玉于館注玉圭也君子於玉比德焉以之聘重禮也還之者德不可取於人相切厲之義也皮辨者始以此服受之不敢不終也疏釋曰自此盡賓送不拜論主君使卿詣館還玉及報享之事注釋曰云玉圭也者舉聘君之圭云君子於玉比德焉以之聘重禮也并相切厲之義竝聘義文案聘義云天子制諸矦比年小聘三年大聘相厲以禮人云已聘而還圭璋此輕財而重禮之義又云夫昔者君子比德於玉焉是其義也云還之者德不可取於人相切厲之義也者既以玉比德德在於身不取於人彼既將玉來似將德於己巳不可取彼之德故還之不取德也既不得取而將玉往來者相切磋相磨厲以德而尊天子故用之也云皮辨者始以此服受之不敢不終也者始謂受聘享在廟時今還以皮辨還玉是終之也賓皮辨襲迎于外門外不拜帥大夫以入注迎之不拜示將去不純為主也帥道也今文曰迎于門外古文帥為率疏釋曰云帥大夫以入者大夫即卿卿亦大夫也注釋曰云不純為主也者客在館如主人卿往如賓今不拜迎是不純為主也決上君使卿歸饔餼時賓拜迎是純為主人故也大夫升自西階鉤楹注鉤楹由楹內將南面致命致命不東面以賓在下也必言鉤楹者賓在下嫌楹外也疏注釋曰云不東面以賓在下也者決歸饔餼時大夫東面致命行聘時賓亦東面致命也云必言鉤楹者賓在下嫌楹外也若然不在楹外近之者以初行聘時在堂上楹內故今還在楹內也賓自碑內聽命升自西階自左南面受圭退負右房而立注聽命於下敬也自左南面右大夫且竝受也必竝受者若鄉君前耳退為大夫降逡遁今文或曰由自西階無南面音義鄉許亮反疏注釋曰云聽命於下敬也者此決賓受禮時公用束帛賓西階上聽命歸饔餼時賓阼階上聽命此特於下聽命故云敬也云自左南面右大夫且竝受也者以鄉飲酒獻酢之時授者在右受者在左故右大夫也且竝受者欲取如向君前然也云若向君前耳者謂於本國君前受圭璋時北面竝受今還南面竝受面位不同竝受一邊不異故云若向君前耳云退為大夫降逡遁者以大夫降為之逡遁而退因即負右房南面而立大夫士直有東房西室天子諸矦左右房今不在大夫廟於正客館故有右房也大夫降中庭賓降自碑內東面授上介于阼階東注大夫降出言中庭者為賓降節也授於阼階東者欲親見賈人藏之也賓還阼階下西面立疏注釋曰云大夫降出言中庭者為賓降節也者以其大夫授賓圭訖降自西階將出門至中庭不止今云大夫降出中庭者大夫至中庭賓乃降故鄭云為賓降節也云授於阼階東者欲親見賈人藏之也者賈人上啓櫝者是掌玉之人此時無事在堂東待此玉故賓向阼階東得見之云賓還阼階下西面立者以其賓在館如主人在階下西面立是其常處立者以待授璋也上介出請賓迎大夫還璋如初入注出請請事於外以入告也賓雖將去出入猶東唯升堂由西階凡介之位未有改也疏注釋曰案上文云賓自碑內聽命升自西階是其升堂山西階也云凡介之位未有改也者以其賓唯升自西階明介猶在東方故上文授上介于阼階東也故言未有改賓裼迎大夫賄用束紡注賄豫人財之言也紡紡絲為之今之也所以遺聘君可以為衣服相厚之至也音義賄呼罪反紡敷罔反劉音須一本作縳息絹反案說文云白鮮色也居掾反聲類以為今正絹字疏注釋曰此則未知何用之財若是報享之物不應在禮玉之上今言此束紡者以其上圭璋是彼國之物下云禮玉束帛報聘君之享物彼君厚禮於此此亦當厚禮於彼故特加此束紡是以鄭云相厚之至也云賄豫人財之言也者案下記云賄在聘于賄又云無行則重賄反幣鄭注周禮云布帛曰賄是賄為財物是與人財物謂之賄也云紡紡絲為之者因名此物為紡云今之繻也者鄭注周禮內司服亦云素紗者今之白縳也則此束紡者素紗也故據漢法况之禮玉束帛乘皮皆如還玉禮注禮禮聘君也所以報享也亦言玉璧可知也今文禮皆作醴疏注釋曰云禮禮聘君也者此謂報享之物以其彼特享物來禮此主君亦以物禮彼君故云禮禮聘君也云所以報享也者彼以物享此君此君亦以物享彼君曲禮云往而不來非禮也來而不往亦非禮也今以來而往是相享之法故云報享也云亦言玉璧可知也者上文聘賓行享之時束帛加璧束錦加琮今報享物亦有璧琮致之故云亦言玉璧可知此玉則琮也以其經言玉故以玉言之若然經言束帛兼有束錦矣案下記云賄在聘于賄又云無行則重賄反幣則此禮也大夫出賓送不拜公館賓注為賓將去親存送之厚殷勤且謝聘君之意也公朝服疏釋曰自此盡賓退論明日賓將發主君就館拜謝聘君使臣來禮己國之事注釋曰云公朝服者以其行聘享在廟之時相尊敬重故著皮辨此拜謝之禮輕故知著朝服賓辟注不敢受國君見己於此館也此亦不見言辟者君在廟門敬也凡君有事於諸臣之家車造廟門乃下音義造七到反疏注釋曰云此亦不見言辟者君在廟門敬也者此言亦者亦勞賓時故上文賓即館卿大夫勞賓賓不見以其不見故遣上介聽命故知此賓亦不見凡言辟者將見而不見則謂之辟此本不見而言辟者以其君在廟門外雖不見而言辟故鄭云敬也云凡君有事於諸臣之家車造廟門乃下者以其卿館于大夫之廟此館則是諸臣之家案公食記云賓之乘車在大門外又曲禮云客車不入大門以此言之君車入大門矣大夫士有兩門入門東行則是廟門矣既至廟門須與賓行禮故鄭云造廟門乃下也上介聽命注聽命於廟門中西面如相拜然也擯者每贊君辭則曰敢不承命告于寡君之老疏注釋曰云聽命於廟門中西面如相拜然也者案前受士介幣之時賓固辭公答再拜擯者出立于門中以相拜注云立門中閾外西面此中賓不見使介聽命明如相拜然取其視外便也必知在門中西面者以其君來如賓禮東面介西面向公可知云擯者每贊君辭則曰敢不承命告于寡君之老者以其君尊不自出辭以是故君之擯者每事贊君出辭則曰敢不承命者謂上介答君之辭知告賓云告于寡君之老者案玉藻云擯者曰寡君之老注云擯者之辭主於見他國君今上介當擯者之處故知告于賓稱告于寡君之老聘享夫人之聘享問大夫送賓公皆再拜注拜此四事公東面拜擯者北面疏釋曰云聘享者謂賓聘君以圭享君以壁夫人聘享者謂賓聘夫人以璋享夫人以琮問大夫者問三卿及常聘彼國之下大夫送賓以登路注釋曰云拜此四事者君禮一夫人禮二大夫禮三送賓禮四四事皆再拜云公東面者公如賓禮門西東面擯者向公向介故知北面為相而言也公退賓從請命于朝注賓從者實為拜主君之館己也言請命者以己不見不敢斥尊者之意音義為于僞反疏注釋曰云言請命者以己不見不敢斥尊者之意者案司儀云君館客客辟介受命遂送客從拜辱于朝此經不言拜辱而言請命凡言請者得不由君君聽則拜此下經直云公辭賓退不見拜文是君不受其謝故云請命者以己不敢斥尊者之意故不言辱而言請公辭賓退注辭其拜也退還館裝駕為旦將發也周禮曰賓從拜辱于朝明日客拜禮賜遂行疏注釋曰云退還館裝駕者以明旦將發故裝束駕乘引周禮者證明日客拜禮賜遂行之事鄭彼注云禮賜者謂乘禽即此下文賓拜乘禽是也賓三拜乘禽於朝訝聽之注發去乃拜乘禽明己受賜大小無不識疏釋曰自此盡送至于竟論賓介發行主國贈送之事注釋曰云明己受賜大小無不識者以其乘禽是禮之細小尚記識而拜之况饔餼食禮之大者記識可知故云大小無不識遂行舍于郊注始發且宿近郊自展軨音義軨力丁反疏注釋曰曲禮云已駕僕展軨鄭注云具視也彼是君車故使僕展之此卿大夫故鄭云自展軨恐不得所故也公使卿贈如覿幣注贈送也所以好送之也言如覿幣見為反報也今文公為君音義好呼報反見賢遍反疏注釋曰所以好送之者來而不往非禮以禮來往皆是和好之事故云好送之也云言如覿幣見為反報也者以其贈之多少一如覿幣故鄭云見為反報也受于舍門外如受勞禮無儐注不入無儐明去而宜有己也如受勞禮以贈勞同節音義勞力到反疏注釋曰言不入無儐對歸饔餼入設而有儐此則不入無儐明賓去禮宜有己云如受勞禮以贈勞同節者賓來勞之去有贈之皆在近郊禮又不别故言同節也使下大夫贈上介亦如之使士贈衆介如其覿幣大夫親贈如其面幣無儐贈上介亦如之使人贈衆介如其面幣士送至于竟使者歸及郊請反命注郊近郊也告郊人使言反命於君也必請之者以已久在外嫌有罪惡不可以入春秋時鄭伯惡其大夫髙克使之將兵逐而不納此蓋請而不得入音義惡烏路反疏釋曰自此盡拜其辱論使者反命之事注釋曰知郊是近郊者以下文云朝服載旜鄭云行時稅舍於此郊今還至此正其故行服以俟君命敬也初行云舍於郊斂旜今至此載旜而入故知近郊也云告郊人使請反命於君者以其使者至所聘之國謁關人明此至郊告郊人使請可知引春秋者案閔二年公羊傳云鄭伯惡髙克使之將兵逐而不納棄師之道也何休云使將師救衛隨後逐之彼無大夫文言大夫者鄭君加之也朝服載旜注行時稅舍于此郊今還至此正其故行服以俟君命敬也古文旜作膳禳乃入注禳祭名也為行道纍歷不祥禳之以除災凶音義禳如羊反疏注釋曰案春官小祝云掌矦禳禱祠之祝號鄭注云禳禳卻凶咎故鄭此云禳是祭名也乃入陳幣于朝西上上賓之公幣私幣皆陳上介公幣陳他介皆否注皆否者公幣私幣皆不陳此幣使者及介所得於彼國君卿大夫之贈賜也其或陳或不陳詳尊而略卑也其陳之及卿大夫處者待之如夕幣其禮於君者不陳上賓使者公幣君之賜也私幣卿大夫之幣也他介士介也言他容衆從者音義從才用反疏注釋曰云此幣使者及介所得於彼國君卿大夫之贈賜也者於君所得為公幣於卿大夫所得為私幣賓之公幣有八郊勞幣一也禮賓幣二也致饔餼三也夫人歸禮幣四也侑食幣五也再饗幣六也夕幣七也贈賄幣八也此八者皆主君禮賜使者皆用束錦故曰公幣賓之私幣略有十九主國三卿五大夫皆一食有侑幣饗有酬幣皆用束錦則是十六有三卿郊贈則十九也其上介公幣則有五致饔餼一也夫人致禮幣二也侑食幣三也饗酬幣四也郊贈幣五也降於賓者以其上介無郊贈幣又無禮賓幣又闕一饗幣故賓八上介五也上介私幣有十一主國三卿五大夫或饗或食不備要有其一則其幣八也又三卿皆有郊贈如其面幣通前則十一也主國下大夫嘗使己國者聘亦有幣及之則亦有報幣之事其數不定士介四人直有郊贈報私幣主國卿大夫報士介私面士介私幣數不甚明云禮於君者不陳者謂賄用束紡禮用束帛乘皮不陳之者以經云公幣又云上介公幣他介皆否若禮於君者一統於賓不得云介之幣故知禮於君者不陳必禮於君不陳禮於已始陳者以其禮於君者是其正故不陳之禮於己者以其榮故陳之是以下注云不加於其皮上榮其多是其義也若然聘君以幣問卿而其卿不見報聘君之幣者以其尊卑不敵若報之嫌其敵體故也束帛各加其庭實皮左注不加於其皮上榮其多也疏注釋曰此決初夕幣時束帛皆加于左皮上今不言加於皮上者若加於皮上相掩蔽故不加於皮上榮其多也公南鄉注亦宰告于君君乃朝服出門左南鄉疏注釋曰此陳幣當如初夕幣之時管人布幕于寢門外使者北面衆介立于其左東上卿大夫在幕東西面北上宰告於君君朝服出門左南鄉是以鄭此注亦依夕幣而言之卿進使者使者執圭垂繅北面上介執璋屈繅立于其左注此主於反命士介亦隨入竝立東上疏釋曰案上行聘禮之時上介屈繅授賓賓襲受之今此賓執圭垂繅賓則裼變於彼國致命時也上介執璋屈繅者變於賓故也必變之者反命致敬少於鄰國致命時故賓於君前得裼見美為敬也注釋曰云士介亦隨入竝立東上者此言亦者亦初行受于朝時君使卿進使者入衆介隨入北面東上此中雖不云士介入明亦隨入可知反命曰以君命聘于某君某君受幣于某宫某君再拜以享某君某君再拜注君亦揖使者進之乃進反命也某君某國名也某宫若言桓宫僖宫也某君再拜謂再拜受也必言此者明彼君敬己君不辱命疏注釋曰云君亦揖使者進之乃進反命也者亦謂亦受命於朝位立定時君揖使者乃進受命明反命亦然云某君某國名者若云鄭國君齊國君云某宫若言恆宫僖宫者左傳有桓宫之楹宫是廟名其受聘享於廟故以宫言之但受聘享於太祖廟不在親廟而云桓宫僖宫者略舉廟名而言也宰自公左受玉注亦於使者之東同面竝受也不右使者由便也疏注釋曰此言亦者亦於出使初受玉時宰自公左授使者圭同面注云北面竝授之凡竝授者授由其右受由其左此中受由其右者因東藏之便故鄭云不右使者由便也受上介璋致命亦如之注變反言致者若云非君命也致命曰以君命聘於某君夫人某君再拜以享於某君夫人某君再拜不言受幣于某宫可知略之疏注釋曰云變反言致者若云非君命也者君與夫人聘於鄰國君與夫人各有所當聘鄰國君受命於君今使者還反命於君聘於鄰國夫人當受命於夫人使者還反命於夫人但婦人無外事雖聘夫人亦君命之今使還反命不云反命於君變反言致命者若本非君命猶夫人之命然故變反言致也若然夫人既無外事而承君命聘鄰國夫人者以其夫婦一體共事社稷故下記云君以社稷故在寡小君拜是賓主相對之辭也云致命曰己下聘夫人反命無文此鄭君依記上文反命於君之辭而言之云不言受幣於某宫可知略之者以其夫人受聘享皆因君聘享同時同宫故略之也執賄幣以告曰某君使某子賄授宰注某子若言髙子國子凡使者所當以告君者上介取以授之賄幣在外也疏注釋曰此賄幣者即上文賄用束紡是也云某子若言髙子國子者案閔公二年冬經書齊髙子來盟僖三十三年經書齊國歸父來聘左傳曰國子為政齊猶有禮者是也云凡使者所當以告君者上介取以授之者以上受上介璋是上介授賓明其餘皆上介取以授之云賄幣在外者以其上文云禮於君者不陳此賄幣即是禮於君者明在外也禮玉亦如之注亦執束帛加璧也告曰某君使某子禮宰受之士隨自後左士介受乘皮如初上介出取玉束帛士介後取皮也疏注釋曰此即上云禮玉束帛乘皮鄭注云禮禮聘君也所以報享也云亦執束帛加璧也者言亦亦上文行享時束帛加璧者也云宰受之士隨自後左士介受乘皮者此約初行享之時公側授宰幣士受皮者自後右客今報享皮幣玉宰受之可知言宰授之士隨自後者謂自士介後其在東上者不須云自後其餘三人皆後乃得左之必左士介者取向東藏之便故也云上介出取玉束帛士介後取皮也者此亦初享之時賓奉束帛加璧是上介取以授賓明士介後取皮可知執禮幣以盡言賜禮注禮幣主國君初禮賓之幣也以盡言賜禮謂自此至於贈音義盡津忍反疏注釋曰云禮幣主國君初禮賓之幣也者謂從郊勞已後至於贈賄八度禮賓皆有幣是自郊勞為初也云以盡言賜禮謂自此至於贈者此則郊勞也公曰然而不善乎注善其能使於四方而猶女也音義女音汝授上介幣再拜稽首公答再拜注授上介幣當拜公言也不授宰者當復陳之音義復扶又反疏注釋曰云不授宰者當復陳之者此幣皆先陳之今賓執以告君賓釋辭君曰勤勞使於四方故授上介幣當拜答君言此幣不授與宰者當復陳之於本處此幣入於己者故不授宰也上賄幣禮君者反命訖皆授宰故以此決之私幣不告注亦略卑也君勞之再拜稽首君答再拜注勞之以道路勤苦若有獻則曰某君之賜也注言此物某君之所賜豫為惠者也其所獻雖珍異不言某為彼君服御物謙也其大夫出反必獻忠孝也疏注釋曰此獻物謂入賓者故下記云既覿賓若私獻奉獻將命注云時有珍異之物或賓奉之猶以君命致之則是賓亦有私獻於彼君則彼君亦有私獻報賓則此獻者也云大夫出反必獻忠孝也者案下曲禮云大夫私行出疆必請反必有獻彼私行出疆反必有獻此以公聘出疆反亦有獻故云大夫出反必獻此以入己之物獻於君者忠孝也事君言忠事父言孝此獻君忠也而兼言孝者忠臣出孝子之門故連言孝也君其以賜乎注不必其當君也獻不拜者為君之答己也疏釋曰言君其以賜乎者大夫所獻之物謙不必當君所須此物君其以賜臣下乎言乎者或當君意或不當君意故言乎以疑之注釋曰云獻不拜者為君之答己也者士拜國君國君不拜士賤故也大夫拜國君國君即答拜大夫尊故也故云不拜者為君之答己拜若然自反命以來盡於賜禮之等或拜或不拜無答己之嫌獨此不拜為君之答己者自此以前皆是彼國報君之物賓直告事而已君受之而無言故賓不拜君有言及己者乃拜之拜君言也此獻是彼國君賜與己理須拜送是以玉藻云凡獻於君大夫使宰士親皆再拜稽首送之又郊特牲云大夫有獻弗親不面拜為君之答己亦此類故鄭云獻不拜者為君之答己若然玉藻不親此親者此因反命故親獻也上介徒以公賜告如上賓之禮注徒謂空手不執其幣君勞之再拜稽首君答拜勞士介亦如之注士介四人旅答一拜又賤也疏注釋曰鄭云旅答士介共一拜者君勞上介上介再拜稽首君答拜不言再拜則君答上介一拜矣勞士亦如之不言皆則總答一拜矣勞賓君答再拜勞上介君答一拜對賓再拜己是賤矣今此士介四人共答一拜故云又賤也此一拜答臣下則周禮大祝辨九拜七曰奇拜是也是以彼注云一拜答臣下也案曲禮云君於士不答拜此君答拜士者以其新行反命君勞苦之故答拜異於常也君使宰賜使者幣使者再拜稽首注以所陳幣賜之也禮臣子人賜之而必獻之君父不敢自私服也君父因以豫之則拜受之如更受賜也既拜宰以上幣授之疏注釋曰云禮臣子人賜之而必獻之君父不敢自私服也君父因以豫之則拜受之如更受賜也者案內則云婦或賜之衣服則受而獻諸舅姑舅姑受之則喜若反賜之則辭不得命如更受賜臣子於君父亦然言此者證此經君使宰以所獻之物反賜使者使者辭不得命再拜稽首受之如更受賜云既拜宰即以上幣授之者以其上文云執禮幣授上介者是執上幣不執下幣明知宰所執授之者是上幣可知賜介介皆再拜稽首注士介之幣皆載以造朝不陳之耳與上介同受賜命俱拜既拜宰亦以上幣授上介乃退注君揖入皆出去疏注釋曰知君揖入皆出去者初賓將行君前受命訖君揖入揖賓介出故知此君退者亦反命訖賓介出可知介皆送至于使者之門注將行俟于門反又送于門與尊長出入之禮也音義長丁丈反疏注釋曰云將行俟於門是出之禮初行之時介皆至賓門俟賓同行今行反又送至于門是入之禮故云與尊長出入之禮乃退揖注揖别也使者拜其辱注隨謝之也再拜上介三拜士介疏注釋曰上介是大夫與己同類故知再拜士卑與己異類各一拜故言三拜士介釋幣于門注門大門也主于闑布席于闑西閾外東面設洗于門外東方其餘如初于禰時出于行入于門不兩告告所先見也疏釋曰自此盡亦如之論賓上介使還禮門神及奠於禰之事注釋曰知門是大門者以其從外來先至大門即禮門神故知門是大門也案特牲筮時云席於門中闑西閾外故知此亦席于闑西閾外知東面者神居東面為正故也云設洗于門外東方者以其廟學設洗皆云洗當東榮故在門外亦在東方也云其餘如初于禰時者初出亦釋幣於行云如之者以其初出於廟禮文具釋于行其文略故此云如禰時也言如者謂釋幣於禰祝先入已下埋于西階東是也云出于行入于門不兩告告所先見也者出時自廟出先見行即告行入時先見門故告門出入皆告一故云不兩告也乃至于禰筵几于室薦脯醢注告反也薦進也疏注釋曰云筵几于室者還似特牲少牢司宫設席于奧東面右几但無牲牢進脯醢而已以告祭非常故也觴酒陳注主人酌進奠一獻也言陳者將復有次也先薦後酌祭禮也行釋幣反釋奠略出謹入也疏注釋曰云言陳者將復有次也者但云主人一獻當言奠今不言奠而言陳者以其下仍有室老及士獻以備三獻故言陳陳有次第之言以其三獻次第皆列于阼者也云先薦後酌祭禮也者以其特牲少牢皆先薦饌乃後獻奠于鉶南此與彼同故云先薦後酌祭禮也云行釋幣反釋奠略出謹入也者必略出謹入者出時以禱祈入時以祠報故不同也席于阼注為酢主人也酢主人者祝取爵酌不酢於室異於祭疏注釋曰鄭知祝取爵酌者案特牲少牢尸酢主人視取爵以酢主人但此無尸為異也不酢於室異於祭者此決特牲少牢皆於室內尸東西面受酢此乃於外行來告反故在阼不在室知與正祭異也又於正祭時有尸尸飲卒爵以尸爵酢主人此告祭無尸爵皆奠故别取爵以酢主人亦異也薦脯醢注成酢禮也疏注釋曰此薦謂若特牲少牢主人受酢時皆席于戶內有薦俎此雖無俎亦薦脯醢于主人之前以成酢禮也三獻注室老亞獻士三獻也每獻奠輒取爵酌主人自酢也疏注釋曰鄭注喪服云室老家相士邑宰知無主婦而取士者以其自外來主於告反即釋奠於禰廟故知主婦不與而取士備三獻必知有室老與士者以其前大夫致饔餼於賓時使老牽牛以致之鄭注云皆大夫之貴臣故知此亦貴臣為獻也云每獻奠輒取爵酌者此通三獻皆獻奠訖别取爵自酢故云輒取爵酌也云主人自酢者對正祭有尸三獻皆獻尸訖尸酢主人主婦賓長今此無尸皆自酢獨云主人者主人為首正故舉前以包後一人舉爵注三獻禮成更起酒也主人奠之未舉也疏注釋曰云三獻禮成者大夫士家祭三獻特牲少牢禮是也云更起酒者此欲獻酬從者不得酌神之尊是以特牲行酬時設尊兩壺於阼階東西方亦如之鄭注云謂酬賓及兄弟則此亦當然故知别取酒也云主人奠之未舉者以其下文云獻從者乃云行酬似鄉飲酒鄉射一人舉觶未舉待獻介衆賓後乃行酬亦然也獻從者注從者家臣從行者也主人獻之勞之也皆升飲酒於西階上不使人獻之辟國君也音義從才用反注同辟音避疏注釋曰知升飲於上者案特牲禮獻衆賓及兄弟之等皆升飲於西階上故此獻從者亦於階上可知云不使人獻之避國君者若正祭雖國君亦自獻故祭統云尸飲五君洗玉爵獻卿尸飲七君洗瑶爵獻大夫之等若然則告祭非常君獻從者從燕法案燕禮使宰夫為獻主是國君不親獻此大夫親獻故云避國君也行酬乃出注主人舉奠酬從者下辨室老亦與焉也音義辨音遍疏注釋曰知者案燕禮使者勞者在者亦與故知此室老亦與不言士者文不具亦與可知上介至亦如之聘遭喪入竟則遂也注遭喪主國君薨也入竟則遂國君以國為體士既請事已入竟矣關人未告則反疏釋曰自此盡卒殯乃歸上陳告行聘之事此以下論或遭主國君喪或聘君薨於後或使者與介身卒安不忘危故見此非常之事從此盡練冠以受論主國君或夫人薨或世子死行變禮之事注釋曰云以國為體者謂公羊傳宋人執鄭祭仲使之逐忽而立突仲以逐忽則國存不逐則國滅故逐忽而立突是以國為體但聘君主以聘國故君雖薨而遂入關人未告則反者聘使至關乃謁關人入告君君知乃使士請事已入關自然入矣若關人未告君君不知使者又未入聞主國君死理當反矣不郊勞注子未君也疏注釋曰案文公八年天王崩九年毛伯來求金公羊傳曰何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子若然云子未君公羊傳文但彼據踰年即位後此據新遭父喪引之者以其同是子未君故也不筵几注致命不於廟就尸柩於殯宫又不神之疏注釋曰不筵几致命不於廟決正聘設几筵也就尸柩於殯宮者國君雖以國為體主聘其國但聘則為兩君相好今君薨當就尸柩故不就祖廟也云又不神之者以其鬼神所在曰廟則殯宫亦得為廟則設几筵亦可矣但始死不忍異於生不神之故於殯傍無几筵也曾子問云君薨世子生告殯殯東有几筵者鄭云明繼體也然則尋常則殯東不設几筵當在室內矣不禮賓注喪降事也疏釋曰云不禮者謂既行聘享訖不以醴酒禮賓也主人畢歸禮注賓所飲食不可廢也禮謂饔餼饗食音義食音嗣疏注釋曰知歸禮中兼有饗食者主人有故雖饗食亦有生致法故主人亦歸之且下文云賓唯饔餼之受明本並饗食亦歸賓乃就中受饔餼若本不歸饗食空歸饔餼何須云饔餼之受明其時並致饗食也賓唯饔餼之受注受正不受加也疏注釋曰饔餼大禮是其正自饗食之等是其加也不賄不禮玉不贈注喪殺禮為之不備音義殺色界反疏注釋曰云不賄者皆據上文謂不以束紡不禮玉者謂不以束帛乘皮以報享不贈者賓出至郊不以物贈之也遭夫人世子之喪君不受使大夫受于廟其他如遭君喪注夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降疏注釋曰云夫人世子死君為喪主者案禮記服問云君所主夫人妻大子適婦鄭注云言妻見大夫以下亦為此三人為喪主也故云君為喪主既為喪主是以使大夫受聘禮不以凶接吉也云其他謂禮所降者謂不禮以下不贈以上皆闕之遭喪將命于大夫主人長衣練冠以受注遭喪謂主國君薨夫人世子死也此三者皆大夫攝主人長衣素純布衣也去衰易冠不以純凶接純吉也吉時在裏為中衣中衣長衣繼皆掩尺表之曰深衣純𬒮寸半耳君喪不言使大夫受子未君無使臣義也音義純諸允反又之閏反去起呂反衰七回反疏注釋曰此經總說上三人死主君不得受命故使將命於大夫主人即大夫故鄭云此三者皆大夫攝主人也云長衣素純布衣也者此長衣則與深衣同布但袖長素純為異故云長衣素純布衣也此長衣之緣以素為之故云素純也去衰易冠者謂脫去斬衰之服而著長衣脫去六升九升之冠而著練冠故云去衰易冠也云不以純凶接純吉也者聘禮是純吉禮為君三升衰裳六升冠為夫人世子六升衰裳九升冠是純凶禮麻絰與屨不易直去衰易冠而已故云不以純凶接純吉云吉時在裏為中衣中衣長衣繼皆掩尺表之曰深衣純𬒮寸半耳鄭言此者欲廣解長衣中衣深衣三者之義此三者之衣皆用朝服十五升布六幅分為十二幅而連衣裳袖與純緣則異故云吉時左裏為中衣中衣與長衣繼皆掩尺者案玉藻云長中繼掩尺鄭注云其為長衣中衣則繼袂掩一尺此鄭云吉時之服純袂寸半者純為衣裳之側袂袖為口緣皆寸半表裏共三寸案深衣目録云深衣連衣裳而純以綵純素曰長衣有表則謂之中衣以此言之則長衣中衣皆用素純云君喪不使大夫受子未君無使臣義也者其疏見於上若然臣為君斬為夫人世子期輕重不同今受鄰國之聘禮同用長衣練冠者但接鄰國者禮不可以純凶故權制此服略為一節耳向來所釋皆是君主始薨假令君薨踰年嗣子即位鄰國朝聘以吉禮受之於廟故成十七年經書邾子貜且卒十八年邾宣公來朝傳云即位而來見踰年可以朝他國他國來朝亦得以吉禮受之於廟矣雖踰年而未葬則不得朝人人來朝己亦使人受之於廟於夫人世子亦然以其本為死者來故也聘君若薨于後入竟則遂注既接於主國君也疏釋曰自此盡唯稍受之論聘者遭己君之喪行非常之禮事注釋曰云接於主國君者謂謁關人告君君使士請事是接於主君矣故入竟則遂也赴者未至則哭于巷衰于館注未至謂赴告主國君者也哭于巷者哭于巷門未可為位也衰于館未可以凶服出見人其聘享之事自若吉也今文赴作訃疏注釋曰未至謂赴告主國君者也以其本國遭喪赴者有兩使一使告聘者一使告主國云未可為位者以其赴主國之使未至是以未可為位受人弔禮云衰于館未可以凶服出見人者對下經赴者至則衰而出云其聘享之事自若吉者下云受饔餼之禮故知先行聘享乃後受禮以其主國未得赴告故自若吉也受禮注受饔餼也疏注釋曰上文遭主國之喪賓唯饔餼之受此受禮亦饔餼之禮不受饗食注亦不受加疏注釋曰上文遭主國之喪云唯饔餼之受注云受正不受加也加即此饗食也故此云亦不受加也赴者至則衰而出注禮為鄰國闕於是可以凶服將事也疏注釋曰云禮為鄰國闕者案襄二十三年春秋左氏傳云杞孝公卒晉悼夫人喪之平公不徹樂非禮也禮為鄰國闕服注云鄰國尚為之闕樂况舅甥之親乎若然赴者至主國君使者衰而出則主國可以闕樂云於是可以凶服將事者謂主人所歸禮則賓可以凶服受之其正行聘享則著吉服矣故雜記云執玉不麻是也唯稍受之注稍稟食也疏注釋曰禮君行師從卿行旅從從者既多不可闕於稍食案周禮每云稍事皆謂米稟以其稍稍給之故謂米稟為稍歸執圭復命于殯升自西階不升堂注復命于殯者臣子之於君父存亡同疏釋曰自此盡即位踊論使者喪還執圭還國復命之事注釋曰云臣子之於君父存亡同者案禮記奔父母之喪升自西階此復命於殯亦升自西階法生時出必告反必面故云臣子於君父存亡同也子即位不哭注將有告請之事宜清靜也不言世子者君薨也諸臣待之亦皆如朝夕哭位疏注釋曰云不言世子者君薨也者案公羊傳君存稱世子君薨稱子某既葬稱子踰年稱君案上文稱世子此文單稱子是知其君薨故君不稱某而與此既葬同號者以其既不得稱世子略云子而已故不言某其實正法稱子某是以雜記在殯待鄰國之使皆稱某云諸臣待之亦皆如朝夕哭位者但臣子一例上下文唯言子不言羣臣與子同知如朝夕哭位者案奔喪云奔父之喪在家者待之皆如朝夕哭位故知此亦然辨復命如聘注自陳幣至于上介以公賜告無勞疏注釋曰言辨復命如聘者上文君存時使者復命自陳公幣以下至賜告之等今復命於殯所亦盡陳之故言辨知無勞者勞主君出命今君薨不可代君出命故知無勞也子臣皆哭注使者既復命子與羣臣皆哭疏注釋曰此據子在位哭亦兼羣臣故鄭云子與羣臣皆哭與介入北鄉哭注北鄉哭新至别於朝夕音義别彼列反疏釋曰使者升階復命訖不見出文而言與介入者以其復命之時介在幣南北面去殯逺復命訖除去幣賓更與介前入近殯北鄉哭鄉內為入故云與介入北鄉哭也注釋曰云北鄉哭新至别於朝夕者朝夕哭位在阼階下西面今於殯前北鄉故云别於朝夕也出袒括髮注悲哀變於外臣也音義括古活反疏注釋曰案奔喪云至於家入門左升自西階東面哭括髮袒於殯東是於內者子故也此使者出門袒括髮變於外者臣故也入門右即位踊注從臣位自哭至踊如奔喪禮疏注釋曰案奔喪云袒括髮於西階東即位踊襲絰於序東此門外袒括髮入門右即位踊亦當襲絰於序東故鄭云自哭至踊如奔喪禮也若有私喪則哭于館衰而居不饗食注私喪謂其父母哭于館衰而居不敢以私喪自聞于主國凶服于君之吉使春秋傳曰大夫以君命出聞喪徐行而不反疏釋曰自此盡從之論使者有父母之喪行變禮之事注釋曰云不敢以私喪自聞于主國者解哭于館又云凶服于君之吉使者亦取不敢解之言衰而居謂服衰居館行聘享即皮辨吉服故不敢凶服于君之吉使也引春秋傳者案宣八年經書夏六月公子遂如齊至黃乃復公羊傳云其言至黃乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞喪徐行而不反何氏注聞大喪而不反重君命也徐行者為君當使人追代之以喪喻疾者喪猶不還而况疾乎是也以此言之使雖未出國境聞父母之喪遂行不敢以私廢王事君使人代之可也以此言之明至彼所使之國雖聞父母之喪不反可知是以哭于館衰而居歸使衆介先衰而從之注已有齊斬之服不忍顯然趨於往來其在道路使介居前歸又請反命己猶徐行隨之君納之乃朝服既反命出公門釋服哭而歸其他如奔喪之禮吉時道路深衣疏注釋曰云己有齊斬之服者以其私喪之內有為父斬為母齊衰故齊斬竝言之也云不忍顯然趨於往來者解經歸使衆介先衰而從之意經云歸據反國時兼云往者鄭意去時聞父母之喪不敢即反亦使衆介先衰而從之故往來竝言云在道路使介居前者謂去向彼國時云歸又請反命己猶徐行隨之者此謂還國至近郊使人請反命君許入猶使介居前徐行於後隨介至國也云君納之乃朝服者以其行聘之時猶不以凶服于君之吉使而服吉服知此反命時亦不以凶服于君之吉使而服朝服如吉時反命矣云出公門釋服哭而歸者案雜記云大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸亦云其它如奔喪之禮明此亦出公門釋朝服而歸但彼祭服不可著出故門內釋服此朝服可以著出門乃釋服為異也云其他如奔喪之禮者案奔喪云至于家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賓成踊送賓反位有賓後至者則拜之成踊送賓皆如初衆主人兄弟皆出門出門哭止闔門相者告就次於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服拜賓送賓皆如初云吉時道路深衣者以其朝服之下唯有深衣庶人之常服既以朝服反命出門去朝服還服吉時深衣三日成服乃去之賓入竟而死遂也主人為之具而殯注具謂始死至殯所當用音義為于僞反又如字下為之棺同疏釋曰自此盡卒殯乃歸賓介死之事云賓入境而死遂也者若未入竟即反來云主人為之具而殯者謂從始死至殯所當用者主人皆供之注釋曰鄭云具謂始死至殯所當用直云至殯所當用明不殯於館取其至殯為節主人供喪具以其大斂訖即殯故連言殯故下文歸介復命之時柩止門外明斂於棺而已介攝其命注為致聘享之禮也初時上介接聞命音義為于僞反疏注釋曰云初時上介接聞命者鄭解介得代賓致命之意以其命出於君初賓受命於君之時賓介同北面上介接聞君命矣以是今死得攝其命君弔介為主人注雖有臣子親姻猶不為主人以介與賓竝命於君尊也疏注釋曰古者賓聘家臣適子皆從行是以延陵季子聘於齊其子死葬於嬴博之間故鄭云雖有臣子親姻不為主人以其介尊故也主人歸禮幣必以用注當中奠贈諸喪具之用不必如賓禮疏注釋曰賓既死主人所歸禮與幣必以當喪者之用云當中奠贈諸喪具之用者具謂襲與小斂大斂解經幣云不必如賓禮者不必如致飱饔之禮束紡皮帛之類不堪喪者之用故也介受賓禮無辭也注介受主國賓已之禮無所辭也以其當陳之以反命也有賓喪嫌其辭之疏注釋曰云介受主國賓已之禮者謂公幣私幣之屬故鄭云當陳之以反命也言無辭者雖無三辭以其賓受饔餼之時禮辭受食三辭明介亦有禮辭云無所辭也者以其賓喪嫌介有三辭故云介受賓禮無辭也不饗食疏釋曰案上遭君喪受饔餼不受饗食鄭云受正不受加此云不饗食介不就君受饗食明受饔餼正禮也歸介復命柩止于門外注門外大門外也必以柩造朝逹其忠心疏注釋曰知門外是大門外者國君有三門皋應路又有三朝內朝在路寢庭正朝在路門外應門外無朝外朝應在皋門外經直云止於門外無入門之言明知止於大門外外朝之上是以上賓拜賜皆云於門外亦在外朝矣故鄭云必以柩造朝逹其忠心也介卒復命出奉柩送之君弔卒殯注卒殯成節乃去疏注釋曰當介復命之時賓之尸柩在外朝上介卒復命謂復命訖出君大門奉賓之柩送至賓之家尸柩入殯於兩楹之間君往就弔卒殯者謂殯訖殯是喪之大節故云卒殯成節乃去謂君與大夫盡去若大夫介卒亦如之注不言上介者小聘上介士也疏注釋曰云不言上介者小聘上介士也者案經大夫介卒據大聘上介是大夫而言今鄭以經不言上介則大夫介卒中兼有聘使大夫其卒亦如之故鄭云不言上介小聘上介士也欲兼見小聘之法也若小聘上介末介皆士則入下文士介死中以其下文更不見小聘賓介死法故此兼言之也士介死為之棺斂之注不具他衣服也自以時服也疏注釋曰以其士介卑其禮降於賓與上介非直具棺他衣物亦具之此士介直具棺不具他衣物也其士介從者自用時服斂之君不弔焉注主國君使人弔不親往疏注釋曰云主國君使人弔不親往者對上經賓死君弔介為主人此士云不弔者明不親弔使人弔之可知也若賓死未將命則既斂于棺造于朝介將命注未將命謂俟閒之後也以柩造朝以已至朝志在逹君命疏注釋曰前云賓入境而死謂在路死未至國此經更說賓至朝俟閒之後使大夫致館未行聘享而賓在館死之事故鄭云俟閒之後是以鄭云以柩造朝以其既至朝志在逹君命則知上介國外死不以柩造朝可知若介死歸復命唯上介造于朝若介死雖士介賓既復命往卒殯乃歸注往謂送柩小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞注記貶於聘所以為小也獻私獻也面猶覿也音義享本又作饗疏釋曰自此盡三介論侯伯行小聘之事云不享者謂不以束帛加璧獻國所有云不禮者聘訖不以齊酒禮賓面不升者謂私覿庭中受之不升堂此對大聘時升堂受若然不言私覿而言面者對大聘言覿故辟之而言面也其禮如為介三介注如為介如為大聘上介疏釋曰云其禮如為介者謂特問使大夫得主國之禮多少如大聘卿此大夫為上介之時即上文介之禮飱饔餼及食燕之等三介者大夫降於卿二等故也舉此侯伯之小聘則公之臣子男之臣小聘禮數其義可知也記久無事則聘焉注事謂盟㑹之屬音義聘匹正反訪也疏釋曰此云久無事則聘焉者則周禮殷聘也是以周禮大行人云凡諸矦之邦交嵗相問也殷相聘也世相朝也注云小聘曰問殷中也久無事又於殷朝者及而相聘也注釋曰云事謂盟㑹之屬者案春秋有事而㑹不協而盟是以春秋有㑹而不盟盟必因㑹若有盟㑹相見故云久無事則聘焉若有故則卒聘束帛加書將命百名以上書於䇿不及百名書於方注故謂災患及時事相告請也將猶致也名書文也今謂之字䇿簡也方板也疏注釋曰云故謂災患及時事相告請者此即上經云若有言一也言災患上注引春秋臧孫辰告糴于齊公子遂如楚乞師此云及時事者即上注引春秋晉矦使韓穿來言汶陽之田是也云名書文今謂之字者鄭注論語亦云古者曰名今世曰字許氏說文亦然言此者欲見經云名名者即今之文字也云䇿簡方板也者簡謂據一片而言䇿是編連之稱是以左傳云南史執簡以往是簡者未編之稱此經云百名以上書之於䇿是其衆簡相連之名鄭作論語序云易詩書禮樂春秋䇿皆尺二寸孝經謙半之論語八寸䇿者三分居一又謙焉是其策之長短鄭注尚書三十字一簡之文服䖍注左氏云古文篆書一簡八字是一簡容字多少者云方板者以其百名以下書之於方若今之祝板不假連編之策一板書盡故言方板也主人使人與客讀諸門外注受其意既聘享賓出而讀之不於內者人稠處嚴不得審悉主人主國君也人內史也書必璽之音義稠直由反處昌慮反璽音徙疏注釋曰云既聘享賓出而讀之者上經云若有言則以束帛如享禮文承聘享之後故知此讀諸門外故云既聘享也鄭知人是內史者案內史職云凡四方之事書內史讀之此云使人與客讀諸門外者亦是四方事書故知人是內史也知書必璽之者案襄二十九年左傳云公如楚還及方城季武子取卞使公冶問璽書追而與之故知此書亦璽之也客將歸使大夫以其束帛反命於館注為書報也疏注釋曰為此書報上有故之事彼以束帛加書將命此亦以束帛加書反命于館明日君館之注既報館之書問尚疾也疏注釋曰昨日為書報之今日君始就館送客者書問之道尚疾故也必須尚疾者以其所報告請多是密事是以鄭云既報館之書問尚疾也既受行出遂見宰問幾月之資注資行用也古者君臣謀密草創未知所之逺近問行用當知多少而已古文資作齎音義幾居豈仄齎子兮反疏注釋曰使者受命於君但知出聘不知逺近故云古者君臣謀密草創未知所之逺近故問宰行糧多少即知逺近也故知須問之使者既受行日朝同位注謂前夕幣之閒同位者使者北面介立于左少退别於其處臣也疏注釋曰云既受行日者謂己受命日夕幣之前使者及介朝君之時皆同位北面東上在朝處臣東方西面北上故鄭云同位者使者北面介立于左少退以别處臣也出祖釋軷祭酒脯乃飲酒于其側注祖始也既受聘享之禮行出國門止陳車騎釋酒脯之奠於軷為行始也詩傳曰軷道祭也謂祭道路之神春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委土為山伏牲其上使者為軷祭酒脯祈告也卿大夫處者於是餞之飲酒於其側禮畢乘車轢之而遂行舍於近郊矣其牲犬羊可也古文軷作祓音義軷蒲末反騎其義反難乃旦反餞在淺反轢力狄反祓芳弗反疏注釋曰云既受聘享之禮行出國門止陳車騎釋酒脯之奠於軷者凡道路之神有二在國內釋幣於行者謂平適道路之神出國門釋奠於軷者謂山行道路之神是以委土為山象國中不得軷名國外即得軷稱引詩傳曰者證軷祭道路之神也引春秋傳曰者案襄二十八年左氏傳于太叔云軷涉山川蒙犯霜露引之者證軷是山行之名涉者水行之稱故鄘詩云大夫軷涉我心則憂毛傳云草行曰軷水行曰涉云是以委土為山者案月令冬祀行鄭注云行在廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上國外祀山行之神為軷壤大小與之同鄭注夏官大馭云封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也云或伏牲其上者案周禮犬人云掌犬牲凡祭祀供犬牲命牷物伏瘞亦如之鄭注云伏謂伏犬以王車轢之故知有伏牲其上云使者為軷祭酒脯祈告也者案周禮大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡彼天子禮使馭祭此大夫禮故使者自祭祀軷而去云卿大夫處者於是餞之也者案詩云飲餞于禰是處者送行人而飲酒名曰餞也云遂行舍于郊也者即上經云舍于近郊是也云其牲犬羊可者犬人職云伏瘞亦如之是用犬也詩云取羝以軷是用羊也是犬羊各用其一未必竝用之言可者人君有牲大夫無牲直用酒脯若然此見出行時祭軷案韓奕詩云韓矦出祖出宿于屠顯父餞之清酒百壺是韓矦入覲天子出京城為祖道又左氏傳鄭忽逆婦媯于陳先配而後祖陳針子曰是不為夫婦誣其祖矣鄭志以祖為祭道神是亦將還而後祖道此聘使還亦宜有祖但文不具所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼注圭所執以為瑞節也剡上象天圓地方也雜采曰繅以韋衣木板飾以三色再就所以薦玉重愼也九寸三公之圭也古文繅或作藻今文作璪音義繅音早注藻璪皆同剡以冉反字林才冉反衣於既反疏注釋曰云圭所執以為瑞節者案周禮大宗伯云以玉作六瑞以等邦國又云王執鎮圭公執桓圭矦執信圭伯執躬圭子執穀璧男執蒲璧是其以圭為瑞又案周禮掌節有玉節之節即是節與瑞别矣今此云瑞節但連言節者案節不得言瑞瑞亦皆節信故連言節也云剡上象天圓地方也者下不剡象地方上剡象天圜案雜記贊大行曰博三寸厚半寸剡上左右各寸半此經直剡上寸半不言左右文不具也凡圭天子鎮圭公桓圭矦信圭皆博三寸厚半寸剡上左右各寸半唯長短依命數不同云雜采曰繅者凡言繅者皆蒙水草之文天子五采公矦伯三采子男二采皆是雜采也云以韋衣木板飾以三色再就者依漢禮器制度而知也但木板大小一如玉制然後以韋衣包之大小一如其板經云三采六等注云三色再就者就即等也是一采為再就三采即六等也是以鄭注典瑞云一匝為一就典瑞云矦伯三采三就者以一采雖有再匝併為一就覲禮注云朱白蒼為六色者亦是一采一匝為二色三采故六色三采據公矦伯子男則二采故典瑞云子男皆二采再就是也所以薦玉重愼者玉者寶而脆今以繅藉薦之是其重愼也問諸矦朱緑繅八寸注二采再就降於天子也於天子曰朝於諸矦曰問記之於聘文互相備疏釋曰此諸矦使臣聘繅藉之等注釋曰云二采再就者上云三采六等此二采不云四就者此臣禮與君禮異此二采雖與子男同但一采為一匝二采為再匝為四等今臣一采為一就二采共為再就是二采當君一采之處是以典瑞云瑑圭璋璧琮繅皆二采一就以俯聘亦是臣二采共當君一采一匝之處云降於天子者案典瑞王執鎮圭繅藉五采五就言五就者據一采為一等若據一采一匝而言即五采十等此二采二等是降於天子也此亦降於諸矦而言降於天子者此鄭若指上文朝天子而言故言聘諸矦降於朝天子也云於天子曰朝者據上文所以朝天子是也則諸侯自相朝亦同圭與繅九寸矦伯以下亦依命數云於諸侯曰問者諸矦遣臣自相問若遣臣問天子圭與繅亦八寸是以云記之於聘文互相備案玉人云瑑圭璋八寸璧琮八寸以俯聘無所依據則於天子諸矦同言八寸者據上公之臣矦伯之臣則六寸子男之臣則四寸各降其君二等若然經言八寸者據上公之臣也皆𤣥纁繫長尺絢組注采成文曰絢繫無事則以繫玉因以為飾皆用五采組上以𤣥下以絳為地今文絢作約音義繫音計劉胡帝反長直亮反又如字絢呼縣反李胥倫反一音巡組音祖約音巡疏釋曰上文繅藉尊卑不同此之組繫尊卑一等注釋曰云采成文曰絢鄭注論語云成章曰絢與此語異義同云繫無事則以繫玉因以為飾者無事謂在櫝之時亦以繫玉因以為飾此組繫亦名繅藉即上文反命之時使者執圭垂繅上介執璋屈繅乂曲禮下云執玉其有藉者則裼無藉者則襲鄭注亦云藉繅也裼襲皆據有繅無繅之時是其因以為飾云皆用五采組者以其言絢絢是文章之名經又言皆復無尊卑之别故知皆用五采組也云上以𤣥下以絳為地者以其皆用五采而經直云𤣥纁為地上加五采上下皆據垂之為上下必知上𤣥下絳者上𤣥以法天下絳以法地故也經云纁注云絳者爾雅三入赤汁為纁絳則赤也故舉絳以解纁問大夫之幣俟于郊為肆又齎皮馬注肆猶陳列也齎猶付也使者既受命宰夫載問大夫之禮待於郊陳之為行列至則以付之也使者初行舍于近郊幣云肆馬云齎因其宜亦互文也不於朝付之者辟君禮也必陳列之者不夕也古文肆為肄音義齎子兮反注同行戶郎反肄以二反疏注釋曰知載大夫幣是宰夫者以其初宰夫官具幣故知載幣於郊付使者亦是宰夫可知云幣云肆馬云齎因其宜亦互文也者以其幣是財賄易可陳列故言肆不言齎亦付使者矣馬是難陳之物故直言齎亦付使者亦陳之是因其宜互文也辭無常孫而說注孫順也大夫使受命不受辭辭必順且說音義孫音遜說音悅疏注釋曰受命謂受君命聘於鄰國不受賓主對答之辭必不受辭者以其口及則言辭無定準以辭無常故不受之也辭多則史少則不逹注史謂策祝疏注釋曰案周禮大史內史皆掌策書尚書金縢云史乃策祝是䇿書祝辭故辭多為文史辭苟足以逹義之至也注至極也今文至為砥音義砥之氐反辭曰非禮也敢對曰非禮也敢注辭辭不受也對答問也二者皆卒曰敢言不敢疏注釋曰辭謂賓辭主人答謂賓答主人介則在旁曰非禮也敢辭故易旅卦初六云瑣瑣斯其所取災鄭云瑣瑣猶小小爻互體艮艮小石小小之象三為聘客初與二其介也介當以篤實之人為之而用小人瑣瑣然客主人為言不能辭曰非禮不能對曰非禮每者不能以禮行之則其所以得罪是其義也卿館於大夫大夫館於士士館於工商注館者必於廟不館於敵者之廟為大尊也自官師以上有廟有寢工商則寢而已疏注釋曰云館者必於廟案上歸饔餼云於廟明其禮皆在廟可知云不館於敵者之廟為大尊也者以其在廟尊則尊矣故就降等而已若又在敵者之廟以上是其大尊云自官師以上有廟有寢者案祭法云適士二廟官師一廟鄭云官師謂中士下士是其官師有廟知廟有寢案周禮隸㒒云掌五寢之掃除鄭注云五寢五廟之寢天子七廟唯祧無寢詩云寢廟奕奕相連之貌故左傳云大叔之廟在道南其寢在道北是其前曰廟後曰寢工商則寢而已者案爾雅釋宮云室有東西廂曰廟注云夾室前堂又云無東西廂有室曰寢注曰但有大室是其自士以上有廟者必有寢庶人在官者工商之等有寢者則無廟故祭法云庶士庶人無廟祭於寢是也管人為客三日具沐五日具浴注管人掌客館者也客謂使者下及士介也飧不致注不以束帛致命草次饌飧具輕疏注釋曰君不以束帛致命者對饔餼以束帛致之此不以束帛致草次飱具輕者以其客始至則致之故言草次也對聘日致饔餼生死俱有禮物又多為重故以此物為輕而不致賓不拜注以不致命疏注釋曰云不拜者宰夫朝服設飧賓無拜受之文以其不以束帛致故也沐浴而食之注自潔清尊主國君賜也記此重者沐浴可知疏注釋曰云記此重者沐浴可知者以其飧禮輕尚沐浴而食饔餼禮重者沐浴而食可知卿大夫訝大夫士訝士皆有訝注卿使者大夫上介也士衆介也訝主國君所使迎待賓者如今使者護客音義訝五嫁反疏釋曰云卿大夫訝者謂大聘使卿主人使大夫迎士訝者小聘使大夫主人使士迎言皆有訝者自介已下皆迎之注釋曰云卿使者大夫上介士衆介也者據此篇是矦伯之卿大聘而言其實小聘使大夫亦使士迎之所迎者謂初行聘及饗食皆迎之故鄭君無所指定賓即館訝將公命注使己迎待之命疏釋曰案秋官掌訝職云賓入館次于舍門外待事於客注云次如今官府門外更衣處待事于客通其所求索彼謂天子有掌訝之官共承客禮此諸矦使無掌訝是以還遣所使大夫士訝將公命有事通傳于君又見之以其摰注又復也復以私禮見者訝將舍於賓館之外宜相親也大夫訝者執鴈士訝者執雉疏注釋曰云復以私禮見者訝將舍於賓館之外宜相親也者禮掌訝舍於賓之館門外此大夫士君使為訝雖非掌訝之官亦為次舍于賓之館外宜相親故執贄以相見大夫訝者執鴈士訝者執雉案士相見及大宗伯文也賓既將公事復見訝以其摯注既已也公事聘享問大夫復報也使者及上介執鴈羣介執雉各以見其訝疏注釋曰云公事聘享問大夫者此竝行君聘享主國君及問大夫故云公事也云復報也者向訝者以贄私見己今還以贄私報之知使者及上介同執鴈不執羔者見上文主國卿大夫勞賓同執鴈則知此使者及上介同執鴈可知各以見其訝者謂使者見大夫之訝者上介見士之訝者士介亦見士訝者凡四器者唯其所寶以聘可也注言國獨以此為寶也四器謂圭璋璧琮疏注釋曰案周禮大宗伯云以玉作六瑞王執鎮圭公執桓圭以下人執之曰瑞又云以玉作六器以禮天地四方謂禮神曰器此四者人所執不言瑞而言器者對文執之曰瑞禮神曰器散文則通雖執之亦曰器是以尚書云五器卒乃復與此文皆稱器云言國獨以此為寶者案周禮天府職凡邦國之玉鎮大寶器藏焉注云玉鎮大寶器玉瑞玉器之美者是以玉稱寶云四器謂圭璋璧琮者是據上經圭璋以行聘璧琮以行享而言此據公矦伯之使者用圭璋璧琮若子男使者聘用璧琮享用琥璜宗人授次次以帷少退于君之次注主國之門外諸矦及卿大夫之所使者次位皆有常處疏注釋曰主國門外以其行朝聘陳賓介皆在大門外故次亦在大門外可知云諸矦及卿大夫之所使者次位皆有常處者以其上公九十步矦伯七十步子男五十步使其臣聘使大聘小聘又各降二等其次皆依其步數就西方而置之未行禮之時止於次中至將行禮賓乃出次凡為次君次在前臣次在後故云少退於君之次故云皆有常處上介執圭如重授賓注愼之也曲禮曰凡執主器執輕如不克疏注釋曰此謂當時將聘於主君廟門外上介屈繅以授賓賓襲受之節引曲禮者彼器即此玉欲證執玉如重之義也賓入門皇升堂讓將授志趨注皇自莊盛也讓謂舉手平衡也志猶念也念趨謂審行步也孔子之執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循古文皇皆作王音義勝音升上示掌反蹜所六反疏釋曰賓入門皇謂未至堂時升堂讓謂升堂東面向主君之時將授志趨謂賓執玉向楹將授玉之時念鄉入門在庭時執玉徐趨今當亦然若降堂後趨進翼如則疾趨也注釋曰云讓謂舉手平衡也者謂若曲禮云凡奉者當心下又云執天子之器則上衡注云謂高於心國君則平衡注云謂與心平則此亦執國君器也故引之為證孔子之執圭者鄉黨論孔子為君聘使法彼足蹜蹜如有循謂徐趨據入彼國廟門執玉行步之時以足容重退之在降堂之下與此趨同故為證也授如爭承下如送君還而后退注爭爭鬭之爭重失隊也而后猶然後也音義隊直類反疏釋曰授謂就東楹授玉於主君時如與人爭接取物恐失墜云下如送君還而后退者以上文次言之此下如送者止謂聘享每訖君實不送而賓之敬如君送然故云下如送也君回還賓則退出廟門更行後事非謂賓出大門也下階發氣怡焉再三舉足又趨注發氣舍息也再三舉足自安定乃復趨也至此云舉足則志趨卷豚而行也孔子之升堂鞠躬如也屛氣似不息者出降一等逞顔色怡怡如也沒階趨進翼如也音義卷去阮反豚他門反疏注釋曰云下階發氣怡焉者即論語云出降一等逞顔色怡怡如也云再三舉足自安定乃復趨也者謂降時再三舉足故又趨進翼如也云發氣舍息者以將授玉屛氣似不息今既授玉降階縱舍其氣怡然和悅也云至此舉足則志趨卷豚而行也者是釋志趨為徐趨此舉足為疾趨也及門正焉注容色復故此皆心變見於威儀疏注釋曰此謂聘畢將更有享而出門時云心變見於威儀者以其貌從心起觀威儀省禍福覩貌可以知心故也執圭入門鞠躬焉如恐失之注記異說也疏釋曰亦謂方聘執圭入廟門時云鞠躬焉則鞠躬如也如恐失之者即執輕如不克也注釋曰云記異說者以上文已記執圭此又記執圭之儀以同記事而言有差異人記事說有不同也及享發氣焉盈容注發氣舍氣也孔子之於享禮有容色疏注釋曰云及享發氣焉盈容者即孔子行享禮有容色一也故注引為證也此發氣即上注云舍息一也衆介北面蹌焉注容貌舒揚音義蹌七羊反疏注釋曰此謂賓行聘衆介從入門左北面曲禮云大夫濟濟士蹌蹌鄭云皆行容止之貌故此注亦云容貌舒揚也但彼大夫云濟濟諸矦云皇皇上文賓入門皇得與諸矦同者以其執君圭璋志在重玉故行容得與君同若尋常行則大夫濟濟也私覿愈愈焉注容貌和敬音義愈羊朱反疏注釋曰上文享時盈容對聘時儀貌戰色顔舒緩此私覿對享時又愈愈和敬舒於盈容也出如舒鴈注威儀自然而有行列舒鴈鵝也疏注釋曰此出廟門之外行步如鵝又舒緩於愈愈也云舒鴈鵝者爾雅釋鳥文皇且行入門主敬升堂主愼注復記執玉異說疏注釋曰上已二度記執玉行步之法今又云皇且行是别有人更記此執玉行法故云復記執玉異說也凡庭實隨入左先皮馬相閒可也注隨入不竝行也閒猶代也土物有宜君子不以所無為禮畜獸同類可以相代古文閒作干音義閒閒厠之閒疏注釋曰云左先者以皮馬以四為禮北面以西頭為上故左先入陳也云君子不以所無為禮者案禮器云天不生地不飬君子不以為禮言當國有馬而無虎豹皮則用馬或有虎豹皮並有馬則以皮為主而用皮也云畜獸同類可以相代者畜謂馬獸謂虎豹爾雅釋云在家曰畜在野曰獸云同類者爾雅又云二足而羽謂之禽四足而毛謂之獸若然則馬畜亦是四足之類故云同類可以相代也賓之幣唯馬出其餘皆東注馬出當從廏也餘物皆東藏之內府疏注釋曰云馬出當從廏也者若有皮之國用皮則不出亦從餘物東藏也知東藏之內府者案天官內府職云凡四方之幣獻之金玉齒革兵器凡良貨賄入焉注云諸矦朝聘所獻國珍彼天子禮諸矦亦當有內府諸矦自朝聘其貨獻珍異亦入內府故注依之也多貨則傷于德注貨天地所化生謂玉也君子於玉比德焉朝聘之禮以為瑞節重禮也多之則是主於貨傷敗其為德疏釋曰此經主論聘享所用圭璋璧琮不得過多之事也注釋曰云貨天地所化生謂玉也者鄭注周禮九職亦云金玉曰貨布帛曰賄故此注云貨天地所化生謂玉下注云幣人所造成幣則布帛曰賄對金玉是自然之物也云君子於玉比德焉者聘義文云重禮也亦聘義文云多之則是主於貨傷敗其為德者以玉比德故朝聘用之相厲以德不取重寶珍美之意若多之則是主於貨物不取相厲以德是傷敗其為德是以圭璧聘享主國君璋琮聘享主國夫人各用一而已也幣美則沒禮注幣人所造成以自覆幣謂束帛也愛之斯欲衣食之君子之情也是以享用幣所以副忠信美之則是主於幣而禮之本意不見也音義衣於既反食音嗣疏釋曰此主論享時用束帛故享君用束帛享夫人用束錦皆不得過美注釋曰云幣人所造成以自覆幣謂束帛也者案禮記檀弓伯高之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯高鄭注云禮所以副忠信也忠信而無禮可傳乎是知自覆者覆忠信而已若更美則主意於財美而禮不見故沒禮也云愛之斯欲衣食之君子之情也者禮記檀弓云愛之斯録之矣彼據愛父母而作重此亦微改文但此云愛之斯欲衣食之兼言食謂以幣侑之君子之情則忠信賄在聘于賄注賄財也于讀曰為言主國禮賓當視賓之聘禮而為之財也賓客者主人所欲豐也若苟豐之是又傷財也周禮曰凡諸矦之交各稱其邦而為之幣以其幣為之禮古文賄皆作悔音義于注讀作為稱尺證反疏注釋曰鄭轉于作為者欲就司儀之文為解故也云言主國禮賓者釋經賄是主國禮賓也云當視賓之聘禮者釋經在聘謂在賓聘財多少云而為之財也者釋經于賄也謂主人視賓多少為財賄報賓云若苟豐之是又傷財也者凡行禮用財者取不豐不儉取於折中若苟且豐多則傷於貪財引周禮者秋官司儀職文案彼注云幣謂享幣也於大國則豐於小國則殺解經各稱其邦而為之幣彼又注云主國禮之如其豐殺之禮解經以其幣為之禮謂賄用束紡禮用玉帛乘皮及贈之屬是也凡執玉無藉者襲注藉謂繅也繅所以緼藉玉疏注釋曰凡繅藉有二種若以木為中幹施五采三采者此繅常有不得云無藉今此云無藉者襲據尺絢組繅藉而言若廟門外賈人啓櫝取玉垂繅以授上介上介裼受上介屈繅以受賓賓即襲受即此執玉無藉者是也此文與曲禮同故曲禮凡執玉其有藉者則裼無藉者則襲是也禮不拜至注以賓不於是始至今文禮為醴疏注釋曰此文承執玉帛之下聘臣事據鄉飲酒賓主升堂主人有拜至之禮此賓昨日初至之時主人請賓行禮賓言俟閒此時賓已至矣故聘時不拜至是以鄭云以賓不於是始至醴尊于東廂瓦大一有豐注瓦大瓦尊豐承尊器如豆而卑音義大音泰薦脯五膱祭半膱橫之注膱脯如版然者或謂之脡皆取直貌焉音義膱音職脡大頂反疏注釋曰此脯禮賓時所用薦脯是也案鄉飲酒禮云薦脯五脡故云或謂之脡皆取直貌祭醴再扱始扱一祭卒再祭注卒謂後扱音義扱初洽反主人之庭實則主人遂以出賓之士訝受之注此謂餘三馬也左馬賓執以出矣士士介從者疏注釋曰此主人之庭實者謂主人禮賓時設乘馬也經云賓執左馬以出三馬在後主人從者牽之遂從賓以出於門外賓之士介迎受之故鄭云此謂餘三馬也知士是士介從者以其經云從者訝受馬此既云士故知士介從者也既覿賓若私獻奉獻將命注時有珍異之物或賓奉之所以自序尊敬也猶以君命致之疏注釋曰云猶以君命致之者以經云將命是以知雖是私獻己物與君物同皆云君命致之臣統於君故也擯者入告出禮辭注辭其獻也賓東面坐奠獻再拜稽首注送獻不入者奉物禮輕疏注釋曰云奉物禮輕者謂以奉私獻入則是主於貨傷敗於享覿故不入擯者東面坐取獻舉以入告出禮請受注東面坐取獻者以宜竝受也其取之由賓南而自後右客也疏釋曰擯者東面坐取獻舉以入告者謂擯者從門東適南方西行於賓北坐舉幣入告於君又出以請於賓而受之故云出禮請受注釋曰云東面坐取獻者以宜竝受也者獻物在門外擯者出受之擯者與賓敵故云宜竝受也云其取之由賓南而自後右客也者案上受享之時受皮者自後右客鄭注云自由也從東方來由客後西居其左受皮也此賓門西東面奠獻擯者從東由賓南自客後居賓左取獻物故亦自後右客也賓固辭公答再拜注拜受於賓也固亦衍字疏注釋曰知固是衍字者以其上擯者禮請受不云固明知賓不固辭故云固衍字云亦者亦士介私覿時賓固辭鄭注云固衍字當如面大夫也擯者立于閾外以相拜賓辟注相贊也古文閾為蹙擯者授宰夫于中庭注東藏之既乃介覿若兄弟之國則問夫人注兄弟謂同姓若婚姻甥舅有親者問猶遺也謂獻也不言獻者變於君也非兄弟獻不及夫人音義遺唯季反疏注釋曰云兄弟謂同姓者若魯於晉鄭之等同姓也云若婚姻甥舅有親者若魯取齊女以為舅齊則以魯為甥是有親者也云非兄弟獻不及夫人者以其經云兄弟之國則問夫人則非兄弟問不及夫人可知若君不見注君有疾若他故不見使者疏注釋曰云他故者病之外或新有哀慘也使大夫受注受聘享也大夫上卿也疏注釋曰知受聘享者以其在後雖有覿獻之法聘享在前是以據在先者而言云大夫上卿也者以其卿上大夫故以卿為大夫必知使卿不使下大夫者以其君無故君親受今既有故明使上卿代君受之自下聽命自西階升受負右房而立賓降亦降注此儀如還圭然而賓大夫易處耳今文無而疏注釋曰案上使大夫還玉於館大夫升自西階鉤楹賓自碑內聽命升自西階自左南面受圭退負右房而立大夫降中庭賓降自碑內東面授上介于阼階東此中與彼還玉皆升自西階此非易處也但還玉時賓自大夫左受之此中大夫於賓左受之其賓主之位皆易處於還玉時故云易處也不禮注辟正主也疏注釋曰案上聘享及私覿訖主君禮賓此大夫代君不禮故云辟正主也幣之所及皆勞不釋服注以與賓接於君所賓又請有事于己不可以不速也所不及者下大夫未嘗使者也不勞者以先是賓請有事於己同類既聞彼為禮所及則己往有嫌也所以知及不及者賓請有事固曰某子某子疏注釋曰云不可以不速也者釋經不釋服即往云所不及者下大夫未嘗使者以其經云下大夫嘗使至者幣及之故知所不及者是下大夫未嘗使者也云不勞者以先是賓請有事於己同類既聞彼為禮所及則己往有嫌也者此勞賓在後賓請有事於大夫在聘日云先是賓請有事於己同類同類謂幣所及者故鄭云既聞彼為禮所及云則己往有嫌者彼國幣及己是以禮加於己今勞賓者是以禮報之若幣不及己若往勞賓則是己有禮於賓是譏賓無禮於己之嫌是以不往勞之故云己往有嫌也云所以知及不及者賓請有事固曰某子某子者當賓請事於大夫之時顯此張子李子之等使受禮者預知爾時不道己姓則知己乃幣所不及賜饔唯羹飪筮一尸若昭若穆注羹飪謂飪一牢也肉謂之羹唯是祭其先大禮之盛者也筮尸若昭若穆容父在父在則祭祖父卒則祭禰腥餼不祭則士介不祭也士之初行不釋幣于禰不祭可也古文羹為羔飪作腍音義腍而善反劉音審疏釋曰古者天子諸矦行載廟木主大夫雖無木主亦以幣帛主其神是以受主國饔餼故筮尸祭然後食之尊神以求福故也昭穆言若者以其昭穆不定故云若也注釋曰云腥餼不祭則士介不祭也者上致饔餼之時云上介饔餼三牢則飪腥餼三者皆有後云士介四人皆餼大牢無飪可祭故知士介不祭也㒒為祝祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子注㒒為祝者大夫之臣攝官也音義祝祝上之六反下之又反疏釋曰經竝云孝孫孝子皇祖皇考以其不定故兩言謂上經若昭若穆亦兩言之注釋曰云㒒為祝者大夫之臣攝官也者若然諸侯不攝官使祝祝䇿矣案定四年祝他云嘉好之事君行師從卿行旅從則臣無事若然君到主國祭饔之時得不攝官乎諸侯亦使人攝是以覲禮云矦氏禆冕釋幣于禰注云釋幣于禰之禮既則祝藏其幣歸乃埋之於祧西階之東大夫使㒒攝祝則是本無祝官與諸矦異矣其諸矦禮大小祝不行知不使小祝行者以其掌客云羣介行人宰史是諸矦從官不言祝明大小祝俱不行矣如饋食之禮注如少牢饋食之禮不言少牢今以大牢也今文無之疏注釋曰云如少牢饋食之禮者案少牢禮有尊俎籩豆鼎敦之數陳設之儀隂厭陽厭之禮九飯三獻之法上大夫又有正祭於室儐尸於堂此等皆宜有之至於致爵加爵及獻兄弟弟子等固當略之矣假器於大夫注不敢以君之器為祭器疏注釋曰案曲禮云大夫士去國大夫寓祭器於大夫士寓祭器於士注云與得用者言寄覬已後還若然卑者不得用尊者之器是以此大夫聘使不得將己之祭器而行致饔餼雖是祭器人臣不敢以君之器為祭器是以聘使是大夫還於主國大夫假祭器而行之朌肉及廋車注朌猶賦也廋廋人也車巾車也二人掌視車馬之官也賦及之明辨也古文朌作紛音義朌音班廋所求反疏注釋曰此謂祭訖歸胙在下云廋廋人也車巾車也者案周禮天子夏官有廋人職掌養馬春官有巾車職諸矦雖兼官亦當有廋人巾車是故引周禮為證聘日致饔明日問大夫注不以殘日問人崇敬也古文日問大夫也夕夫人歸禮注與君異日下之也今文歸作饋既致饔旬而稍宰夫始歸乘禽日如其饔餼之數注稍稟食也乘謂乘行之禽也謂鴈鶩之屬其歸之以雙為數其賓與上介也古文既為餼音義稍所教反疏釋曰云既致饔旬而稍者以其賓客之道十日為正行聘禮既訖合歸一旬之後或逢凶變或主人留之不得時反即有稍禮故下文云既將公事賓請歸注云謂已問大夫事畢請歸不敢自專謙也主國留之饗食燕饗無日數盡殷勤也是主人留之是以周禮漿人亦共賓客之稍禮注云稍禮非飧饔之禮留閒王稍所給賓客者漿人所給亦六飲而已諸侯相待亦如之是其留閒致稍者也注釋曰云乘禽乘行之禽也者别言此者欲見此乘非物四曰乘言如其饔餼之數者一牢當一雙故聘義云乘禽日伍雙是此饔餼五牢者也云鴈鶩之屬者案爾雅二足而羽若然上介三牢則三雙也士介一牢則一雙也羽謂之禽故以禽為鴈鶩之屬云其賓與上介也者以其下文别有士介故也士中日則二雙注中猶閒也不一日一雙大寡不敬也凡獻執一雙委其餘于面注執一雙以將命也面前也其受之則上介受以入告之士舉其餘從之賓不辭拜受于庭上介執之以相拜于門中乃入授人上介受亦如之士介拜受于門外疏注釋曰云上介受以入告之士舉其餘從之者此乘禽而云凡獻宜約私獻私獻擯者取獻以入士舉其餘此亦上介受入明其餘士舉從入可知云不辭拜受于庭者以其經無辭文又饔餼云禮辭明此禽禮輕無辭受於庭可知上介執之以相拜于門中乃入授人者此亦約私獻私獻之時擯者取獻以入又云擯者立于閾外以相拜賓辟擯者授宰夫是其約也云上介受亦如之者以其受饔餼之時上介受己如賓禮故知受乘禽亦如賓也云士介拜受於門外者以其受餼在門外此受乘禽在門外可知禽羞俶獻比注比放也其致之禮如乘禽也禽羞謂成熟有齊和者俶獻四時珍美新物也俶始也言其始可獻也聘義謂之時賜音義放甫往反齊才訃反和户卧反疏注釋曰云禽羞謂成熟有齊和者以其稱羞謂若庶羞內羞之等故稱禽則以鴈鶩等為之故以成熟解之聘義謂之時賜者案聘義云燕與時賜無數時賜謂四時珍異以賜諸賓客與此俶獻是一物故引以為證歸大禮之日既受饔餼請觀注聘於是國欲見其宗廟之好百官之富若尤尊大之焉音義觀古亂反訝帥之自下門入注帥猶道也從下門外入游觀非正也音義道音導各以其爵朝服注此句宜在凡致禮下疏注釋曰云宜在凡致禮下者以其各以其爵朝服為致禮而言故知義然士無饔無饔者無儐注謂歸餼也疏釋曰案上經直云宰夫朝服以致之是其無饔宰夫退去士介不儐之是也大夫不敢辭君初為之辭矣注此句宜在明日問大夫之下音義為于僞反疏釋曰此謂賓問卿之時卿不敢辭者以賓聘享訖出大門請有事於大夫君禮辭許是君初為之辭故卿不辭也凡致禮皆用其饗之加籩豆注凡致禮謂君不親饗賓及上介以酬幣致其禮也其其賓與上介也加籩豆謂其實也亦實於罋筐饗禮今亡疏注釋曰云其其賓與上介也者案上經賓一食一饗上介若食若饗唯士介不言饗故知其中唯有賓與上介耳云加籩豆謂其實也亦實于罋筐者案致饔餼醯醢是豆實實于罋明此之豆實亦實于罋可知也案昭六年夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也苟免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也此中致饗有加籩豆者饗使者無加籩豆之正禮此云加籩豆者殷勤之義也云饗禮今亡者以其食禮在知其豆數饗禮亡無文以知之無饔者無饗禮注士介無饗禮疏注釋曰無饔者無饗禮文承饗下故鄭以無饗禮解之以其賓與上介饔餼俱有故有饗士介唯有餼而已無饔故無饗禮也凡餼大夫黍粱稷筐五斛注謂大夫餼賓上介也器寡而大略疏釋曰案上經云大夫餼賓大牢米八筐衆介米八筐不辨大小故此記人辨之云筐五斛注釋曰云器寡而大略者以其君歸饔餼于賓與大夫介筥米小而多者是尊者所致以多器為榮今大夫致禮於賓介器寡而大是略之於卑者也既將公事賓請歸注謂己問大夫事畢請歸不敢自專謙也主國留之饗食燕獻無日數盡殷勤也疏注釋曰云己問大夫者請問三卿與下大夫嘗使於彼國幣所及皆是君命及以君物行禮者皆是公事事訖故請歸也云主國留之饗食燕獻無日數盡殷勤也者亦謂至旬賓乃將歸主君乃留賓有此饗食燕獻之等故燕禮注云今燕又宜獻焉是也云無日數者謂行此饗食之等相去希數無常日數盡主人殷勤也凡賓拜于朝訝聽之注拜拜賜也唯稍不拜疏注釋曰案上經云賓三拜乘禽於朝訝聽之遂行舍于郊又案司儀云明日客拜禮賜遂行是臨行大小禮皆拜賜則知唯米稟芻薪不拜也燕則上介為賓賓為苟敬注饗食君親為主尊賓也燕私樂之禮崇恩殺敬也賓不欲主君復舉禮事禮己于是辭為賓君聽之從諸公之席命為苟敬苟敬者主人所以小敬也更降迎其介以為賓介大夫也雖為賓猶卑於君君則不與亢禮也主人所以致敬者自敵以上音義樂音洛殺所介反復扶又反疏注釋曰云饗食君親為主尊賓也者以其饗食在廟為賓故君親為主至後燕禮在寢又以醉為度崇於恩殺於敬故賓辭而使介為賓也以苟敬為小敬者以阼階西近主為位諸公坐位故云小敬對户牖南面為大敬云更降迎其介以為賓者介在廟門內西北面降至庭迎之云不與亢禮也者略取燕義文解君不親為獻主而使宰夫之意也云主人所以致敬者自敵以上者謂兩君相見兩大夫兩士以上則主人親獻也宰夫獻注為主人代公獻無行則重賄反幣注無行謂獨來復無所之也必重其賄與反幣者使者歸以得禮多為榮所以盈聘君之意也反幣謂禮玉束帛乘皮所以報聘君之享禮也昔秦康公使西乞術聘于魯辭孫而說襄仲曰不有君子其能國乎厚賄之此謂重賄反幣者也今文曰賄反幣疏注釋曰云重其賄即上賄在聘于賄是也反幣謂上禮玉束帛乘皮是也云秦康公者案文公十二年左氏傳云秦伯使西乞術來聘云云是也此特來非歷聘歷聘則吳公子札聘於上國聘齊聘魯是也曰子以君命在寡君寡君拜君命之辱注此贊君拜聘享辭也在存也疏釋曰此及下三經即上經云公館賓賓辟上介聼命聘享夫人之聘享問大夫送賓公皆再拜注云拜此四事彼見其拜此見其贊辭也君以社稷故在寡小君拜注此贊拜夫人聘享辭也言君以社稷故者夫人與君體敵不敢當其惠也其卒亦曰寡君拜命之辱疏注釋曰云言君以社稷故者夫人與君體敵不敢當其惠也者釋經云社稷故以其禮記哀公問孔子云取夫人為社稷主婦人無外事天地並社稷后夫人雖不與以夫婦一體故夫人亦得云社稷主是其云社稷故者見夫人與君體敵今夫人使致禮來主人不敢當下文云君貺寡君延及二三老是與君不敵敢當之也又拜送注拜送賓也其辭蓋云子將有行寡君敢拜送此宜承上君館之下疏注釋曰此即上經君即館拜送賓故鄭云此宜承上君館之下君貺寡君延及二三老拜注此贊拜問大夫之辭貺賜也大夫曰老賓於館堂楹閒釋四皮束帛賓不致主人不拜注賓將遂去是館留禮以禮主人所以謝之不致不拜不以將别崇新敬也疏注釋曰若賓敬主宜致主人敬賓宜拜皆是崇敬若致與拜即是崇新敬故不為若鄉飲酒送賓賓不答禮有終相類也大夫來使無罪饗之注樂與嘉賓為禮疏注釋曰案鹿鳴序燕羣臣嘉賓此無罪享之亦是樂賓為禮者也過則餼之注餼之腥致其牢禮也其致之辭不云君之有故耳聘義曰使者聘而誤主君不親饗食所以愧厲之也不言罪者罪將執之疏注釋曰云過則餼之謂禮有失誤故引聘義使者聘而誤主君不親饗食所以愧厲之也云不言罪將執之者春秋之義聘賓有罪皆執之若然上經云無罪饗之有罪非但不饗又執之此過則餼之雖不饗猶生致過輕故也若然上言罪下云過互見其義也其介為介注饗賓有介者賓尊行敵禮也疏注釋曰謂饗賓於廟之時還以聘之上介為介若然上經上介主人别行饗則是從賓為介之外復别饗也云賓尊行敵禮也者若鄉飲酒賓主行敵禮而有介然也有大客後至則先客不饗食致之注卑不與尊齊禮疏注釋曰此據聘禮而言而無君朝之事若然則前有小國之卿大夫來聘將行饗食有大國卿大夫來聘則廢小國饗食之禮以其卑不與尊齊禮竝行之唯大聘有几筵注謂受聘享時也小聘輕雖受于廟不為神位疏注釋曰案上經云几筵既設擯者出請命至行聘享禮畢乃云宰夫徹几改筵是行聘享為神位今小聘不為神位屈也十斗曰斛十六斗曰籔十籔曰秉注秉十六斛今江淮之閒量名有為籔者今文籔為逾音義量音亮二百四十斗注謂一車之米秉有五籔四秉曰筥注此秉謂刈禾盈手之秉也筥穧名也若今萊陽之閒刈稻聚把有名為筥者詩云彼有遺秉又云此有不斂穧音義穧才計反疏注釋曰云此秉為刈禾盈手之秉也者對上文秉為量名也引詩者證此秉為盈手穧即此筥一也即今人謂之一鋪兩鋪也十筥曰稯十稯曰秅四百秉為一秅注一車之禾三秅為千二百秉三百筥三十稯也古文稯作緵音義稯宰孔反字林子工反緵音總疏注釋曰云一車之禾三秅即經致饔餼時云禾三十車車三秅也儀禮注疏卷八儀禮注疏卷八考證宰命司馬戒衆介注諸侯謂司徒為宰張渟云釋文大宰音泰下倣此竊疑謂司徒為宰句及下命宰夫官具注宰夫宰之屬也句皆合稱大宰又燕禮注宰夫大宰之屬大射注宰夫冢宰之屬公食注甸人冢宰之屬司宮大宰之屬彼不兼大則兼冢則此不應獨稱宰明矣又釋幣于行疏行至廟門外之西為軷壇軷壇月令注作軷壤受享束帛加璧疏聘賓不用君之所執圭璋臣紱按据此則聘賓所執之圭降其君之命圭一等非命圭也朱子論語集注偶未檢耳遂行舍于郊注於此脫舍衣服乃即道也臣紱按舍於郊謂止宿於郊也非脫舍衣服之謂下聘畢將歸遂行舍於郊注云始發且宿近郊又朝服載旜注云行時稅舍於此郊皆不作脫舍衣服解當從彼注為正餼之以其禮注禾以秣馬敖繼公云注末恐有脫文司馬執策立于其後策石經及敖本作䇿今從釋文上介出請入告注其有來者與皆出請入告張淳云者與巾箱杭本俱作者者釋文作者與朱子云注與字陸氏音餘此非疑詞不當音餘他本復出者字亦無義理疑本介字也夫人使下大夫勞以二竹簠方簠字敖本作簋蓋從釋文其實棗蒸栗擇蒸敖本作蒸今從石經門外米禾皆二十車二監本訛作一今依朱子本敖本改正又石經二十字皆作草後竝同賓皮辨聘注入于次者俟辨也臣紱按周官儀禮鄭注凡辦具之辦皆用辨蓋漢字未有辦字只一字兩用之說己見士相見禮張淳云監杭本作辦誤也賓辟不答拜賓監本訛作客今依石經及朱子本楊本敖本改正公揖入每門每曲揖疏謂兩闑之間臣紱按棖闑之間棖則有兩闑一而已然上文有東闑西闑之云則賈氏固以為兩闑與几筵既設注諸侯祭祀席蒲筵繢純敖繼公云注似脫加莞席紛純五字介皆入門左疏臣相不前相禮故不言入其實皆入朱子云疏說與此不通當闕臣學健按司儀職及庿門惟君相入與此介皆入者自是不同疏家欲強通之故說多支鑿公升二等疏君行一臣行二此文出齊語晏子辭朱子云齊語無此辭今見曲禮雜記臣人龍按晏子語韓詩外傳亦有之不在齊語公側授宰幣皮如入右首而東敖繼公云右當作左臣紱按士昏禮皮左首彼嘉禮此賓禮從同可也注以皮右首謂變于生似非其義敖說良是宰夫徹几改筵疏是諸侯與孤卿大夫朝聘天子法監本脫孤卿大夫四字今尋繹上下文義補之建柶北面奠于薦東注糟醴不卒卒監本訛作啐臣紱按上言啐醴則非不啐明矣不卒爵故建柶而奠之他篇疏文引此者亦誤今竝訂正之擯者執上幣疏闑東明不得竝出也朱子云闑東下當有脫字飪一牢注所以識日景引隂陽也朱子云引疑當作别臣紱按别字固直截或以繩著碑引之而定方位則引宇亦可解敖氏集說改别兩簠繼之粱在北疏羊豕相當不相變朱子云未詳何謂臣紱按羊豕當作羊鉶以羊鉶相當對牛豕不相當則明矣門外米三十車三十石經作卅下同受幣于楹間南面受敖本誤作授無儐儐石經及楊本敖本作擯楊復李心傳皆云當作儐今從監本下授老幣無儐無饔者無儐竝同大夫對北面當􅎝再拜􅎝石經作楣誤夕夫人使下大夫韋辨歸禮此下監本有小注云今文歸作饋下及記同九字既不出鄭氏又不出釋文唯通解有此未審所云今文是何本也今删賓介皆明日拜于朝敖繼公云上惟見賓禮乃言介拜似非其次蓋此文宜在下句之下大夫于賓一饗一食疏是以鄭詩雞鳴云雞鳴監本訛作羔裘据所引詩訂正之乃入陳幣于朝疏夕幣七也臣紱按主國禮賜無夕幣朱子疑夕字是饗字之誤而其序當在再饗之前集說則云饗酬幣也再饗酬幣也此與下文介闕一饗相合則以意改之而非賈氏之舊今仍之君使宰賜使者幣注不敢自私服也敖繼公云注服字恐誤集說改不敢自私之也釋幣于門疏釋于行釋于行監本訛設于見今以經訂正之子即位不哭注宜清靜也臣宗楷按鄭氏三禮注凡潔淨之淨皆作清漢時未有淨字說見第二卷則下字當作靜使者既受行日朝同位石經脫既字疏以受行日為句敖氏以日朝二字連讀繅三采六等朱白蒼蒼石經及敖本作倉又雜記孔疏引聘禮記云朝天子圭與繅皆九寸繅三采六等朱白倉朱白倉朱子云按上記只有朱白倉而疏記所引乃重引之不知何時傳寫之誤而失此三字也臣紱按据此則朱白倉三字原文蓋叠為六字又齎皮馬齎石經及釋文皆作賫朱子本敖本作齎從之辭曰非禮也敢對曰非禮也敢朱子云按諸本經末有辭字注無復出辭字永嘉本張淳識誤云以注疏考之經下羡一辭字注上合更有一辭字蓋傳寫者誤以注文為經文也當減經以還注張氏說是今從之臣紱按石經敢下有辭字固仍繆本今疏中猶有敢辭之文豈又後人所增與賓既將公事復見訝訝石經及敖本皆作之宗人授次朱子云周禮幕人掌朝㑹共帷幕掌次掌張幕此宗人字恐誤授如爭承敖氏讀爭字句今從疏讀爭承句自下聽命自西階升受階石經作門誤聘日致饔日石經作自誤各以其爵朝服監本注末有今依注移入五字係通解語後人攙入者去之又拜送石經此三字在延及二三老拜之下臣紱按禮文次第石經為順但諸刻本無與同者今仍舊儀禮注疏卷八考證
