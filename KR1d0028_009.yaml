body:
  text: 儀禮注疏卷九漢鄭氏注唐陸德明音義賈公彥疏公食大夫禮第九公食大夫之禮使大夫戒各以其爵注戒猶告也告之必使同班敵者易以相親敬音義食音嗣易以豉反疏釋曰自此盡如聘論主君使大夫就館戒聘客使來行食禮之事云各以其爵者此篇雖據子男天夫為正兼見五等諸侯大聘使卿之事故云各以其爵也上介出請入告注問所以為來事音義為于僞反下為既為從為公為賓同疏注釋曰據大夫就賓館之門外賓使上介出請大夫所為來之事三辭注為既先受賜不敢當音義三息暫反又如字疏注釋曰既先受賜者謂聘日致饔受賜大禮故今辭食不敢當之但受饔之時禮辭而已至於饗食皆當三辭賓出拜辱注拜使者屈辱來迎己大夫不答拜將命注不答拜為人使也將猶致也賓再拜稽首注受命大夫還注復於君賓不拜送遂從之注不拜送者為從之不終事疏注釋曰案鄉飲酒主人拜送賓不答拜云禮有終此賓不拜送為從之不終事故賓不拜送也若然鄉飲酒鄉射戒賓遂從之而云拜辱拜送者以其主人先反不相隨故得拜辱拜送覲禮使者勞賓侯氏送於門外再拜遂從之使者既不先反猶拜送者尊天子使故也賓朝服即位于大門外如聘注於是朝服則初時𤣥端如聘亦入于次俟疏釋曰云大門外如聘者則賓主設擯介以相待如聘時注釋曰云於是朝服則初時𤣥端者初時謂賓發館時服𤣥端若鄉射主人朝服乃速賓鄭注云射賓輕也戒時𤣥端以此言之前賓在館拜所戒大夫即𤣥端賓遂從大夫至君大門外入次乃去𤣥端著朝服出次即位也云如聘亦入於次俟者案聘禮賓皮辨聘至於朝賓入于次注云入於次者俟辨則此入次亦俟主人辨也若然聘禮重賓發館即皮辨此食禮輕及大門乃朝服即位具注主人也擯者俟君於大門外卿大夫士序及宰夫具其饌物皆於廟門之外疏注釋曰云擯者俟君於大門外者解即位之事云卿大夫士序及宰夫具其饌物皆於廟門之外者以其君迎賓入始言卿大夫以下廟內之位則知此具饌物時皆在廟門外也故鄭下文注云自卿大夫至此不先即位從君而入者明助君饗食賓自無事故不在大門內是其義也羹定注肉謂之羹定猶熟也著之者下以為節音義定多佞反疏注釋曰云肉謂之羹者爾雅文云著之者下以為節者羹定與下文陳鼎之節為目也甸人陳鼎七當門南面西上設扃冪冪若束若編注七鼎一大牢也甸人冢宰之屬兼亨人者南面西上以其為賓統於外也扃鼎扛所以舉之者也凡鼎冪蓋以茅為之長則束本短則編其中央今文扃作鉉古文冪皆作密音義編必綿反亨普庚反疏注釋曰云七鼎一大牢也者案聘禮致飧與饔餼皆九鼎此亦一大牢而七鼎者此食禮輕無鮮魚鮮臘與聘禮腥一牢鼎七同也云甸人冢宰之屬兼亨人者案天官有甸師氏兼有亨人皆屬冢宰彼天子禮諸侯比天子為兼官故甸人兼亨人也必使甸人陳鼎兼亨人者案亨人職云掌共鼎鑊乂案甸師職云掌帥其徒以薪蒸役外內饔之事故使甸人兼亨人陳鼎若然案少牢羹定饔人陳鼎者以其無甸人官故饔人陳鼎也既夕士禮云甸人抗重又云甸人築坅坎以士無臣使屬吏攝甸人之事非謂置此官也云几鼎冪蓋以茅為之者諸文多言鼎冪皆不言所用之物此經雖言若束若編亦不指所用之體故鄭云蓋以疑之然必知用茅者詩曰白毛包之尚書孔傳云苴以白茅茅是潔白之物故疑用茅也設洗如饗注必如饗者先饗後食如其近者也饗禮亡燕禮則設洗於阼階東南古文饗或作鄉疏注釋曰云必如饗者先饗後食如其近者也者鄭據此文行食禮而云如饗明先饗設洗訖乃饗故食禮如之是如其近者也案聘禮云公於賓一食再饗則食在饗前矣不言如燕禮者饗食在廟燕在寢則是饗食重先行之故二者自相先後是以不得用燕禮決之也引燕禮者欲見設洗之法燕與饗食同故無饗禮引燕禮而言也小臣具槃匜在東堂下注為公盥也公尊不就洗小臣於小賓客饗食掌正君服位音義匜以支反疏注釋曰知此為公盥者案特牲尸尊不就洗盥用槃匜故知此所設槃匜亦為公盥不就洗也云小臣於小賔客饗食掌正君位者按夏官小臣職云小祭祀賓客饗食如大㒒之法此諸侯之聘客饗食故亦小臣掌之也宰夫設筵加席几注設筵於户西南面而左几公不賓至授几者親設湇醬可以略此音義湇劉羌立反下同疏注釋曰云設筵於户西南面而左几者以其賓在户牖之間南面又生人左几異於神右几故也云公不賓至授几者親設湇醬可以略此者決聘禮禮賓時公親授几者以無設湇醬之事故也故下記云不授几鄭云異於醴也無尊注主於食不獻酬飲酒漿飲俟于東房注飲酒清酒也漿飲酨漿也其俟奠於豐上也飲酒先言飲明非獻酬之酒也漿飲先言漿别於六飲也音義酨昨再反疏注釋曰云飲酒清酒也者按周禮酒正注先鄭云清酒祭祀之酒後鄭從之則此賓客用之者優賓故也云漿飲酨漿也者酨之言載以其汁滓相載故云酨漢法有此名故也云其俟奠於豐上也者下云飲酒實於觶加于豐是也此云奠即彼加也云飲酒先言飲明非獻酬之酒也者以其鄉飲酒燕禮等獻酬之酒皆不言飲飲之可知此擬酳口故言飲是異於獻酬酒故也是以酒人云共賓客之禮酒飲酒鄭注云禮酒饗燕之酒不言飲食之酒云飲亦是其義也云漿飲先言漿别於六飲也者按漿人云共王六飲水漿醴涼醫酏彼先云六飲後云水漿與此先云漿不同故云先云漿别於六飲必别於六飲者彼六飲為渴而飲此漿為酳口不為渴故異之凡宰夫之具饌于東房注凡非一也飲食之具宰夫所掌也酒漿不在凡中者雖無尊猶嫌在堂疏注釋曰云酒漿不在凡中者雖無尊猶嫌在堂者以其酒漿常在堂若不特言之則凡中亦含之嫌謂酒漿仍在堂故上特言之公如賓服迎賓于大門內注不出大門降於國君疏釋曰自此盡階上北面再拜稽首論主君迎賓入拜至之事注釋曰云不出大門降於國君者按周禮司儀云將幣交擯三辭車逆拜辱賓車進答拜乂云致饔餼饗食皆如將幣之儀是國君來則出迎也大夫納賓注大夫謂上擯也納賓以公命賓入門左公再拜賓辟再拜稽首注左西方賓位也辟逡遁不敢當君拜也音義辟婢亦反又音避逡七旬反遁音旬公揖入賓從注揖入道之及廟門公揖入注廟禰廟也疏注釋曰儀禮之內單言廟者皆據禰廟是以昏禮納采云至于廟記云凡行事必用昏昕受諸禰廟以此而言則言廟皆禰廟也若非禰廟則言廟祧若聘禮云不腆先君之祧問卿云受于祖廟之類是也但受聘在祖廟食饗在禰燕輕於食饗又在寢是其差次也賓入三揖注每曲揖及當碑揖相人偶至于階三讓注讓先升疏釋曰按曲禮云客若降等則就主人之階主人固辭然後客復就西階此亦降等初即就西階者此君與客食禮禮之正彼謂大夫士以小小燕食之禮故與此不同也公升二等賓升注逺下人君疏注釋曰言逺下人君者亦取君行一臣行二之義也大夫立于東夾南西面北上注東夾南東西節也取節於夾明東於堂疏注釋曰此謂主國卿大夫立位云取節於夾明東於堂者序已西為正堂序東有夾室今大夫立于夾室之南是東于堂也士立于門東北面西上注統於門者非其正位辟賓在此疏注釋曰按燕禮大射士在西方東面北上不統於門又在門東北面宜東統於君今在門東西上統於門者以賓在門西辟賓在此非正位故也小臣東堂下南面西上宰東夾北西面南上注宰宰夫之屬也古文無南上疏釋曰云宰東夾北西面南上者謂在北堂之東與夾室相當故云夾北也注釋曰云宰宰夫之屬也者以經云南上則非止一人但宰官之內有宰夫之等是以下有宰夫之官皆於此立可知故云之屬也若然宰尊官在小臣之下者以其小臣位在北堂南故先見之非謂尊卑先後為次也內官之士在宰東北西面南上注夫人之官內宰之屬也自卿大夫至此不先即位從君而入者明助君饗食賓自無事疏注釋曰云夫人之官內宰之屬也者經云內官按周禮天官內宰下大夫掌王后已下彼天子內官諸侯未必有內宰以其言內官之士以士為之明當天子內宰故舉內宰况之也云自卿大夫至此不先即位從君而入者明助君饗食賓自無事者按前聘時君迎客于大門內時卿大夫已下入廟即位者受聘事重非饗食之事故先入廟即位此已下雖有宰及宰夫者皆有事及大夫匕牲士庶羞之等皆助君食賓非己之事故後入也介門西北面西上注西上自統於賓也然則承擯以下立於士西少進東上疏注釋曰云然則承擯以下立於士西少進東上者以其介統於賓而西上則擯統於君而東上可知承擯以下既是有事之人承擯是大夫又尊於士故知少進東上不言上擯者上擯有事其位不定故不言公當􅎝北鄉至再拜賓降也公再拜注􅎝謂之梁至再拜者興禮俟賔嘉其來也公再拜賓降矣疏釋曰自此盡稽首論公拜至賓答拜之事注釋曰云公再拜賓降矣者釋經賓降在至再拜下公再拜上以其至再拜者公已一拜賓即降下公再拜者賓降後又一拜雖一拜本當再拜故皆以再拜言之猶下侑幣之時公一拜賓降公再拜注云賓不敢俟成拜也若然鄭云公再拜賓降矣者解經至再拜則賓降也賓西階東北面答拜注西階東少就主君敬也疏釋曰自此盡稽首論賓降答拜之事此云答拜下云拜也竝據公未降之前賓為一拜以其賓始一拜之間公降一等故閒在一辭之中是以鄭云賓降再拜釋經北面答拜及拜也擯者辭注辭拜於下拜也公降一等辭曰寡君從子雖將拜興也注賓降再拜公降擯者釋辭矣賓猶降終其再拜稽首興起也疏注釋曰云公降擯者釋辭矣者解經辭曰寡君從子雖將拜興也鄭注云賓猶降終其再拜稽首者按下文賓栗階升不拜升既不拜拜於下雖辭賓猶終降再拜稽首也若然擯者辭拜於下之時其位在下故下記云鄉擯由下注云不升堂是也按下文云擯者退負東孰而立注云無事又云擯者進相幣然則擯者有事則進無事則退故負東孰也賓栗階升不拜注自以已拜也栗實栗也不拾級連步趨主國君之命不拾級而下曰辵音義拾音涉辵敕略反疏注釋曰云自以已拜也者於堂下終為再拜稽首故於堂上不拜也云栗實栗也者謂疾之意也云不拾級連步者曲禮云拾級聚足連步以上鄭注云拾當為涉聲之誤也級等也涉等聚足謂前足躡一等後足從之併此涉級也連步鄭云重蹉跌也連步謂足相隨不相過也其連步據足而言涉級據階而說其實一也此等尋常升法此栗階據趨君命而上按燕禮記云凡君所辭皆栗階注云栗蹙也謂越等急趨君命也又曰凡栗階不過二等注云其始升猶聚足連步越二等左右足各一發而升堂是栗階之法也云不拾級而下曰辵者凡升階有四種云辵者君臣急諫諍則越三等為辵階越一等為歷階又有連步又有栗階為四等也義已具於燕禮記疏也命之成拜階上北面再拜稽首注賓降拜主君辭之賓雖終拜於主君之意猶為不成疏注釋曰按論語孔子云拜下禮也今拜乎上泰也是以上文主君雖辭賓猶終拜於下盡臣之禮為成拜主君之意猶以為不成故命之升成拜賓遂主君之意故升更拜也士舉鼎去冪於外次入陳鼎于碑南南面西上右人抽扃坐奠于鼎西南順出自鼎西左人待載注入由東出由西明為賓也今文奠為委古文待為持疏釋曰自此盡逆退復位論鼎入匕載之事云去冪於外次入者次入為序入也故少牢云序入去冪於外者以其入當載於俎故去之也士喪士虞皆入乃去冪者喪禮變于吉故也雍人以俎入陳于鼎南旅人南面加匕于鼎退注旅人雍人之屬旅食者也雍人言入旅人言退文互相備也出入之由亦如舉鼎者匕俎每器一人諸侯官多也疏注釋曰云旅人雍人之屬者即燕禮云尊士旅食于門西兩圜壺鄭云士旅食者所謂庶人在官者也引王制解之者是也云雍人言入旅人言退文互相備也者雍人言入亦退旅人言退亦入皆入而退去故云文互相備也云每器一人諸侯官多也者按少牢云鼎序入雍正執一匕以從雍府執四匕以從司士合執二俎以從司士贊者二人皆合執二俎以相從入是大夫官少故每人兼執也若然特牲云贊者執俎及匕從鼎入士虞亦云匕俎從士昏禮亦云匕俎從設彼注云執匕者執俎者從鼎而入設之不言并合者士官彌少并合可知不言者文不具或可士禮乂異於大夫執鼎人兼執匕俎故士喪禮小斂大斂奠舉鼎者兼執俎也若依前釋則士喪禮略威儀故也大夫長盥洗東南西面北上序進盥退者與進者交于前卒盥序進南面匕注長以長幼也序猶更也前洗南疏注釋曰云進盥退者與進者交于前鄭云前謂洗南但言前不云北鄉飲酒鄉射賓盥北面則此大夫亦皆北面可知云長以長幼也者若燕禮云命長之類皆據長幼為長不謂衆中之長者也載者西面注載者左人也亦序自鼎東西面於其前大夫匕則載之疏注釋曰前云左人待載其時鼎東南面今大夫鼎北面南匕之左人當載故序自鼎東西面於其前矣俎正當鼎南則載者在鼎南稍東也魚臘飪注飪熟也食禮宜熟饗有腥者疏釋曰上文直云羹定肉謂之羹恐魚臘不在羹定之中故此特著魚臘飪也以食禮尚熟故皆飪也注釋曰樂記云大饗而俎腥魚鄭注云以腥魚為俎實不臑熟之是饗禮有腥也又宣公十六年冬晉侯使士㑹平王室定王享之原襄公相禮殽蒸武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也又國語云禘郊之事則有全蒸王公立飫則有房蒸親戚宴饗則有殽蒸以此觀之明饗有腥以饗禮用體薦則腥矣故禮記云腥其俎謂豚解而腥之豚解者皆腥也載體進奏注體謂牲與臘也奏謂皮膚之理也進其理本在前下大夫體七個音義奏千豆反注同疏注釋曰三牲與臘皆載體直言體不辨體形及數以下魚腸胃倫膚皆言七則此亦七體故鄭云下大夫體七個若然七個此不言體形按士虞記云升左肩臂臑肫骼脊脅七體彼喪禮用左又按鄉飲酒鄉射記皆云右胖進腠則此亦用右胖肩臂臑肫骼脊脅可知既用右胖則左胖為庶羞其庶羞者此下大夫十六豆上大夫二十豆是也若致飧及歸饔餼腥鼎皆無庶羞鄉飲酒鄉射燕禮大射雖同用狗一牲以其亨亨亦皆有庶羞也云奏謂皮膚之理進其理本在前者此謂生人食法故進本本謂近上者若祭祀則進末故少牢云進下鄭云變於食生是也魚七縮俎寢右注右首也寢右進鬐也乾魚近腴多骨鯁音義鬐巨之反疏注釋曰云縮俎者於人為橫縮縱也魚在俎為縱於人亦橫云寢右鄭云右首也寢右進鬐也賓在户牖之間南面俎則東西陳之魚在俎首在右腹腴鄉南鬐脊也進脊在北鄉賓必以脊鄉賓者鄭云乾魚近腴多骨鯁故不欲以腴鄉賓取脊少骨鯁者鄉賓優賔故也若祭祀則進腴以鬼神尚氣腴者氣之所聚故少牢進腴是也腸胃七同俎注以其同類也不異其牛羊腴賤也此俎實凡二十八疏注釋曰云以其同類也者釋經同俎以其牛羊同是畜類也云不異其牛羊腴賤也者以牲體則異俎及此腸胃即同俎以其腹腴賤故略之同俎也云此俎實二十八者牛羊各有腸胃腸胃各七四七二十八也但此腸胃與牲或同鼎同俎或别鼎别俎何者據此下文七鼎腸胃與牲别鼎别俎是其正法取其鼎俎竒也少牢五俎腸胃與牲同鼎者以其有鮮獸若腸胃别鼎則六不得竒故並腸胃與牲同鼎有司徹亦然此腸胃七者以其與牲體别鼎故取數於牲亦七少牢并腸胃於牲鼎故云腸三胃三取數於脊脅各三也賓尸禮殺於正祭故腸胃各七既夕盛陳奠故腸胃五也倫膚七注倫理也謂精理滑脆者今文倫或作論音義脆七歲反疏釋曰倫膚謂豕之皮革為之但此公食大夫為賓用為美故膚與腸胃皆别鼎俎特牲惟有三鼎魚臘不同鼎故膚從牲同鼎有司徹雖同少牢亦止三鼎而已牛豕魚皆一鼎故膚還從於牲鼎也又此膚與牲體之數亦七而少牢膚九者此食禮故膚從體數少牢大夫之祭膚出下牲故取數於牲之體而九也腸胃膚皆橫諸俎垂之注順其在牲之性也腸胃垂及俎拒疏注釋曰腸胃得在牲而垂膚亦言順牲之性者從多而言云垂及俎拒者少牢云腸三胃三垂及俎拒是也大夫既匕匕奠于鼎逆退復位注事畢宜由便也士匕載者又待設俎疏注釋曰士匕載者又待設俎者以上文云士舉鼎又云左人待載下文云士設俎于豆南是載者又待設俎可知也公降盥注將設醬疏釋曰自此盡各卻于其西論公與宰夫為賓設正饌之事注釋曰云將設醬者下云公設之是以盥手也賓降公辭注辭其從已卒盥公一揖一讓公升賓升注揖讓皆一殺於初古文一皆作一音義殺所界反宰夫自東房授醯醬注授授公也醯醬以醯和醬疏釋曰按記云蒲筵常長丈六尺於堂上户牖之間南面設之乃設正饌於中席已東自中席已西設庶羞也注釋曰云醯醬以醯和醬者按歸饔餼醯醢别知此醯醬不别而以醯和醬者此經所陳物異者皆别器此醯醬下但言醬不别言醯明以醯和醬可知祭祀無此法以生人尚褻味故有之公設之注以其為饌本賓辭北面坐遷而東遷所注東遷所奠之東側其故處也疏注釋曰云東遷所者謂以西為上君設當席中故東遷之辟君設處側近也近其故處公立于序內西鄉注不立阼階上示親饌疏注釋曰云不立阼階上示親饌者以其君之行事皆在阼階上今近阼北者以其設饌在户西近北今君亦近北是示親監饌故也賓立于階西疑立注不立階上以主君離阼也疑正立也自定之貌今文曰西階音義疑魚乞反又魚力反注同宰夫自東房薦豆六設于醬東西上韭菹以東醓醢昌本昌本南麇臡以西菁菹鹿臡注醓醢醢有醓昌本昌蒲本菹也醢有骨謂之臡菁蓂菁菹也今文臡皆作麇音義醓他感反臡奴兮反醢有骨者也字林作腝人兮反菁子丁反劉音精蓂亡丁反疏注釋曰云醓醢醢有醓者按周禮醢人云朝事之豆韭菹醓醢已下依此為次彼注云醓肉汁也則此醓醢是肉之汁昌本者彼注云昌蒲根又按彼注齏菹之稱菜肉通又云細切為齏全物若䐑為菹又按彼經為菹者經言菹不言齏菹者即是齏也彼言昌本亦即齏也此注云菹者齏菹粗細為異通而言之齏亦得為菹故云菹也云醢有骨謂之臡者案爾雅釋器云肉謂之醢有骨者謂之臡又鄭司農云有骨為臡無骨為醢也云菁蓂菁菹也者即今之蔓菁也士設俎于豆南西上牛羊豕魚在牛南臘腸胃亞之注亞次也不言䋫錯俎尊也音義䋫側耕反疏注釋曰云不言䋫錯俎尊者上設豆䋫陳之下設黍稷錯陳之此設俎不䋫不錯者俎尊故也膚以為特注直豕與腸胃東也特膚者出下牲賤疏注釋曰云出下牲賤者以豕在牛羊之下賤膚豕之所出故云出下牲賤特之於俎東也旅人取匕甸人舉鼎順出奠于其所注以其空也其所謂當門疏釋曰前旅人以匕入加於鼎退出今還使之取匕前士舉鼎入今不使士舉鼎出者以其士載訖遂設俎於賓前事未畢故甸人舉鼎而出也宰夫設黍稷六簋于俎西二以竝東北上黍當牛俎其西稷錯以終南陳注竝併也今文曰併古文簋皆作軌大羹湇不和實于鐙宰右執鐙左執蓋由門入升自阼階盡階不升堂授公以蓋降出入反位注大羹湇煮肉汁也大古之羹不和無鹽菜瓦豆謂之鐙宰謂大宰宰夫之長也有蓋者饌自外入為風塵今文湇為汁又曰入門自阼階無升音義和户卧反鐙音登大古音泰疏釋曰云以蓋降出入反位者宰位在東夾北西面南上今以蓋降出送於門外乃更入門反於東夾北位也注釋曰云大羹湇煮肉汁也大古之羹者謂是大古五帝之羹云不和無鹽菜者大古質故不和以鹽菜對鉶羹調之以鹽菜者也云瓦豆謂之鐙詩云于豆于登毛亦云木曰豆瓦曰登云宰謂大宰宰夫之長者以單言宰諸侯三卿無大宰以司徒兼大宰大宰之下有宰夫故云宰夫之長也公設之于醬西賓辭坐遷之注亦東遷所疏注釋曰言亦者亦前醬東遷所以醬既東遷所今於醬西遷之明亦東遷所移之故醬處也宰夫設鉶四于豆西東上牛以西羊羊南豕豕以東牛注鉶菜和羹之器疏注釋曰云鉶菜和羹之器者下記云牛藿羊苦豕薇是菜和羹以鉶盛此羹故云之器也據羹在鉶言之謂之鉶羹據器言之謂之鉶鼎正鼎之後設之謂之陪鼎據入庶羞言之謂之羞鼎其實一也飲酒實于觶加于豐注豐所以承觶者也如豆而卑宰夫右執觶左執豐進設于豆東注食有酒者優賔也設于豆東不舉也燕禮記曰凡奠者於左疏注釋曰云食有酒者優賓也者按下文宰夫執漿飲賓興受惟用漿酳口不用酒今主人猶設之是優賓也引燕禮者彼據酒主人奠於薦右賓不飲取奠於薦左此酒不用故亦奠於豆東酒義雖異不舉是同故引為證也按燕禮無此文鄉飲酒鄉射記皆云凡奠者於左舉者於右不引之而引燕禮記者此必傳寫者之誤鄭本引鄉飲酒鄉射之等也宰夫東面坐啓簋㑹各卻于其西注㑹簋蓋也亦一一合卻之各當其簋之西疏注釋曰云亦一一合卻之者卻者仰也簋蓋有六兩兩皆相重而仰之謂之卻合故云一一卻合之各當其簋之西為兩處亦者亦少牢故少牢云佐食啓㑹蓋二以重設于敦南也贊者負東房南面告具于公注負東房負房户而立也南面者欲得鄉公與賓也疏釋曰自此盡醬湇不祭論賓所祭饌之事注釋曰經直云負東房鄭知負房户而立者以公在東序內賓在户西雖告具于公且欲使賓聞之故知於房近西是以鄭云得鄉公與賓也公再拜揖食注再拜拜賓饌具賓降拜注答公拜公辭賓升再拜稽首注不言成拜降未拜賓升席坐取韭菹以辨擩于醢上豆之閒祭注擩猶染也今文無于音義擩人悅反劉而懸反又而誰反贊者東面坐取黍實于左手辨又取稷辨反于右手興以授賓賓祭之注取授以右手便也賓亦興受坐祭之於豆祭也獨云贊興優賓也少儀曰受立授立不坐疏注釋曰此所授者皆謂逺賓者故菹醢及鉶皆不授以其近賓取之易故不言按曲禮云殽之序辨祭之故知雖不授亦祭可知也經直云祭知祭之於豆祭者按少牢云尸取韭菹辨㨎于三豆祭于豆間故知于豆祭也云獨云贊興優賓者欲見賓坐而不興是優賔其實俱興也引少儀者欲見贊興賓亦興之義以其賓坐贊亦坐故也三牲之肺不離贊者辨取之一以授賓注肺不離者刌之也不言刌刌則祭肺也此舉肺不離而刌之便賓祭也祭離肺者絶肺祭也一猶稍也古文一作一音義刌寸本反疏注釋曰云肺不離者刌之也者按少儀云牛羊之肺離而不提心鄭云提猶絶也刲離之不絶中央少者此即為食而舉肺也少牢云舉肺一長終肺祭肺三皆切之是祭肺切舉肺不切也云不言刌刌則祭肺也者是與祭肺同其實舉肺云祭離肺者絶肺祭也者此鄭解舉肺將祭之時絶末而祭之與祭肺異也凡舉肺有二名一名離肺一名舉肺祭肺亦名刌肺也賓興受坐祭注於是云賓興受坐祭重牲也賓亦每肺興受祭於豆祭挩手扱上鉶以柶辨擩之上鉶之閒祭注扱以柶扱其鉶菜也挩拭也拭以巾音義挩始鋭反疏釋曰此云上鉶之閒祭者著其異於餘者餘祭於上豆之閒此鉶别自祭鉶閒注釋曰云挩拭也拭以巾者按內則左佩紛帨帨即佩巾而云挩拭拭手以巾似帨不名巾者本名帨者以拭手為名其實名巾故鄭舉其實稱也此有四鉶而云扱上鉶辨擩則唯有一柶優賓故用一柶而已少牢二鉶祭神故宜各有柶也祭飲酒於上豆之閒魚臘醬湇不祭注不祭者非食物之盛者疏注釋曰此不祭者以在正饌之內以其有三牲之體魚臘湇醬非盛者故不祭也若入庶羞則祭之故下文云士羞庶羞皆有大又云辨取庶羞之大興一以授賓賓受兼一祭之少儀云祭膴膴詁為大魚肉之臠是亦祭之也宰夫授公飯粱公設之于湇西賓北面辭坐遷之注既告具矣而又設此殷勤之加也遷之遷而西之以其東上也疏釋曰自此盡降出論設加饌粱與庶羞之事注釋曰云遷之遷而西之以其東上也知粱東上者下文宰夫膳稻于粱西是以粱在東為上也公與賓皆復初位注位序內階西疏注釋曰按上公設醬時立于序內賓立於階西此云公與賓復初位故知公還在序內賓還在階西也宰夫膳稻于粱西注膳猶進也進稻粱者以簠疏注釋曰知進稻以簠者下記云簠有蓋冪鄭注云稻粱將食乃設去㑹於房蓋以冪上文設黍稷訖云卻㑹此稻粱不云卻㑹者先於房去之故也士羞庶羞皆有大蓋執豆如宰注羞進也庶衆也進衆珍味可進者也大以肥美者特為臠所以祭也魚或謂之膴膴大也唯醢醬無大如宰如其進大羹湇右執豆左執蓋音義臠力轉反膴火奴反疏釋曰云皆有大者中有二物三物之肉兼有魚也注釋曰云魚或謂之膴膴大也者有司徹云尸俎五魚侑主人皆一魚皆加膴祭于其上是也少儀云膴祭也云唯醢醬無大者鄭注周禮醢人作醢之法先膞乾其肉乃後莝之雜以粱麴及鹽漬以美酒塗置甀中百日則成矣何大臠之有也醬則醢也亦無大臠也先者反之由門入升自西階注庶羞多羞人不足則相授於階上復出取也疏釋曰反之者以其庶羞十六豆羞人不足故先至者反取之下文云先者一人升設于稻南其人不反則此云先者反之謂第二已下為先者也先者一人升設于稻南簋西閒容人注簋西黍稷西也必言稻南者明庶羞加不與正豆併也閒容人者賓當從閒往來也疏注釋曰簋西黍稷西也必言稻南者以其黍稷西之北有稻故庶羞設黍稷西南南陳之是稻與庶羞俱是加故南北相繼俱在黍稷正饌之西是不與正豆併也云閒容人者賓當從閒往來也者下文賓左擁簠粱右執湇以降公辭升反奠于其所是賓往來也旁四列西北上注不統於正饌者雖加自是一禮是所謂羹胾中别疏注釋曰云所謂羹胾中别者按曲禮云左殽右胾彼云殽骨體也此肉謂之羹亦一也殽為正饌胾為切肉則庶羞彼云左殽右胾與此正饌在東庶羞在西間客人同故謂所謂羹胾中别也膷以東臐膮牛炙注膷臐膮今時􅌜也牛曰膷羊曰臐豕曰膮皆香美之名也古文膷作香臐作薰音義膷音香臐許云反膮呼堯反炙章夜反􅌜火各反又火沃反炙南醢以西牛胾醢牛鮨注先設醢䋫之以次也內則謂鮨為膾然則膾用鮨今文鮨作鰭音義鮨巨之反注鰭音同疏注釋曰此云先設醢䋫之以次而特牲注云以有醢不得䋫也與此先設醢䋫之以次違者大凡醢配胾是其正而醢卑于胾今牛羊豕胾皆在醢下者直是䋫之次非尊卑之列特牲以有一醢若䋫之當醢在胾上不成錯故不得䋫少牢四豆羊胾醢故得䋫而錯與此同也鮨南羊炙以東羊胾醢豕炙炙南醢以西豕胾芥醬魚膾注芥醬芥實醬也內則曰膾春用蔥秋用芥衆人騰羞者盡階不升堂授以蓋降出注騰當作媵媵送也授授先者一人音義媵以證反又繩證反贊者負東房告備于公注復告庶羞具者以其異饌疏釋曰自此盡兼一祭之論贊告饌具賓祭之事贊升賓注以公命命賓升席疏釋曰前設饌訖贊者告具于公公再拜揖食此使贊升賓者以其禮殺故也是以上文正饌公先拜賓答拜此賓先拜公公答拜為異也賓坐席末取粱即稻祭于醬湇閒注即就也祭稻粱不於豆祭祭加宜於加疏注釋曰云祭稻粱不於豆祭祭加宜於加者按下文云賓三飯以湇醬注云每飯啜湇以肴擩醬食正饌也三飯而止又云不以湇醬注云不復用正饌也則此湇醬是正饌而云加者但湇醬與粱皆是加故公親設之下文為正饌而此云加者為湇醬雖是加以在正饌之上得與正饌為本故名正饌其實是正饌之加故公親設之也贊者北面坐辨取庶羞之大興一以授賓賓受兼一祭之注一一受之而兼一祭之庶羞輕也自祭之於膷臐之閒以異饌也疏注釋曰一一受之而兼一祭之庶羞輕也者決上三牲之肺祭之今此祭庶羞並之故云輕也云自祭之於膷臐之閒以異饌也者不云於豆祭而云於膷臐之閒以祭宜於加故也賓降拜注拜庶羞疏釋曰自此盡魚臘不與論賓正食受侑幣至於食終之事公辭賓升再拜稽首公答再拜賓北面自閒坐左擁簠粱右執湇以降注自閒坐由兩饌之閒也擁抱也必取粱者公所設也以之降者堂尊處欲食於階下然也公辭賓西面坐奠于階西東面對西面坐取之栗階升北面反奠于其所降辭公注奠而後對成其意也降辭公敬也必辭公者為其尊而親臨已食侍食贊者之事疏注釋曰云成其意者謂成其食降階下之意故奠乃對此決下文大夫相食賓執粱與湇之西序端主人辭賓反之而不奠也公許賓升公揖退于箱注箱東夾之前俟事之處疏注釋曰按爾雅有東西廂曰廟其夾皆在序外故也知是俟事之處者正以此文公揖退于廂而俟賓食即待事之處也擯者退負東孰而立注無事賓坐遂卷加席公不辭注贊者以告公公聽之重來優賓疏注釋曰知贊者以告公公聽之者公既在序外賓食在户西若不告公公何以知之明知贊者告公也云重來優賔者若公來則勞賓不來則賓不勞故難重來而不來則優饒賓也賓三飯以湇醬注每飯啜湇以殽擩醬食正饌也三飯而止君子食不求飽不言其殽優賓疏注釋曰每飯啜湇以殽擩醬者按曲禮三飯主人延客食胾然後辨殽鄭注云先食胾後食殽殽尊此先食殽者彼鄭云大夫士與客燕食之法其禮食宜放公食大夫禮云若然此為禮食故先食殽彼大夫士與客燕食則先食胾故不同又按昏禮同牢云贊爾黍授肺脊皆食以湇醬皆祭舉食舉也注云皆食食黍也以用也用者謂啜湇咂醬而不食殽此公食賓禮解體折節明食殽可知彼豚解者皆不食故彼不食殽也是以彼又云三飯卒食注同牢示親不主為食起三飯而成禮也故不食殽也但湇言啜淡故也醬言擩鹹故也云三飯而止君子食不求飽者解三飯而止故下宰夫進醬是不求飽故引論語學者食不求飽為證也云不言其殽優賓者按特牲少牢尸食時舉殽皆言次第此不言者任賓取之是優賓也宰夫執觶漿飲與其豐以進注此進漱也非為卒食為將有事緣賓意欲自潔清音義漱所又反賓挩手興受注受觶宰夫設其豐于稻西注酒在東漿在西是所謂左酒右漿疏注釋曰云酒在東者案上飲酒實于觶宰夫設于豆東是酒在東也云漿在西者即此經設于稻西是也云是所謂左酒右漿者按曲禮云酒漿處右鄭云此言若酒若漿耳兩有之則左酒右漿云兩有者據此公食而言左酒右漿也庭實設注乘皮賓坐祭遂飲奠於豐上注飲漱公受宰夫束帛以侑西鄉立注束帛十端帛也侑猶勸也主國君以為食賓殷勤之意未至復發幣以勸之欲用深安賓也西鄉立序內位也受束帛于序端疏注釋曰云西鄉立序內位也者按上文公設醬公立于序內西鄉此經亦云西鄉立故知亦在序內位也云受束帛于序端者按聘禮公受几于序端故每云公之所受者皆約之受於序端賓降筵北面注以君將有命也北面於西階上疏注釋曰云以君將有命者謂有束帛侑食之命故賓降筵北面於西階上以待主君之命擯者進相幣注為君釋幣辭於賓音義相息亮反賓降辭幣升聽命注降辭幣主國君又命之升聽命釋許辭疏注釋曰云主國君又命之升知者約聘禮禮賓賓降辭幣公降一等辭栗階升聽命是也降拜注當拜受幣公辭賓升再拜稽首受幣當東楹北面注主國君南面授之當東楹者欲得君行一臣行二也退西楹西東面立注俟主國君送幣也退不負序以將降疏注釋曰按聘禮賓三退負序注云三退三逡巡也不言辟者以執圭將進授之彼皆當􅎝再拜故賔退負序此亦為公拜送幣但在楹西耳故賓在階西不負序以將降故也公一拜賓降也公再拜注賓不敢俟成拜介逆出注以賓事畢賓北面揖執庭實以出注揖執者示親受公降立注俟賓反上介受賓幣從者訝受皮注從者府史之屬訝迎也今文曰梧受音義梧五故反疏注釋曰云從者府史之屬知非士介者此子男小聘使大夫士介一人而已介已受賓幣故知訝受者非士介是府史之屬也賓入門左沒霤北面再拜稽首注便退則食禮未卒不退則嫌更入行拜若欲從此退疏注釋曰云便退則食禮未卒不退則嫌者此鄭探解賔意食禮自有常法三飯之後當受侑幣更入以終食禮故送庭實而後入是以鄭云便退則食禮未卒解經賓入之意云不退則嫌者謂有貪食之嫌解再拜稽首將辭之意是以更入行拜若欲從此退者待公設辭留賓之意也公辭注止其拜使之卒食揖讓如初升注如初入也賓再拜稽首公答再拜注賓拜拜主國君之厚意賓揖介入復位疏注釋曰上文云介逆出下更云介逆出明知中間介復入可知但復入之節當此賓入之時也賓降辭公如初注將復食賓升公揖退于箱賓卒食㑹飯三飲注卒已也已食㑹飯三漱漿也㑹飯謂黍稷也此食黍稷則初時食稻粱疏注釋曰知㑹飯是黍稷者見上文云宰夫東面坐啓簋㑹各卻于其西此云食㑹飯故知㑹飯者是黍稷也前賓三飯不云㑹以其簠盛稻粱以其稻粱無㑹故鄭云此食黍稷則初時食稻粱矣不以醬湇注不復用正饌也初時食加飯用正饌此食正飯用庶羞互相成也後言湇或時後用疏注釋曰云初時食加飯用正饌此食正飯用庶羞互相成也者按上文賓三飯以湇醬注云每飯啜湇以殽擩醬是正饌稻粱是其加此云卒食㑹飯三飲不以醬湇鄭意以黍稷是其正庶羞是其加互相成而已言相成者既非互文直取饌食互相成而已云後言湇或時後用者前文賓三飯以湇醬先言湇後言醬是先用湇此後言湇或客前三飯後用湇故作文有先後也挩手興北面坐取粱與醬以降西面坐奠于階西注示親徹也不以出者非所當得又以已得侑幣疏注釋曰云不以出者決士昏禮賓取脯出以授從者彼是已所當得此非直已得侑幣下文有司卷三牲之俎歸于賓館亦是已所當得鄭不言三牲而言侑幣者據已得者而言之東面再拜稽首注卒食拜也不北面者異於辭疏注釋曰云卒食拜也不北面者按上文賓受侑幣出更入門左沒霤北面再拜稽首其時辭欲退公留之卒食故决之以其待公留故北面此卒食禮終故東面為意有異故面位不同是以鄭云不北面者異於辭也公降再拜注答之也不辭之使升堂明禮有終介逆出賓出公送于大門內再拜賓不顧注初來揖讓而退不顧退禮略也示難進易退之義擯者以賓不顧告公公乃還也疏注釋曰云擯者以賓不顧告公公乃還也者知擯者告公者按經公送于大門內公不見賓矣而云賓不顧明知擯者告公公還入宴寢也此擯者告賓不顧即論語云賓退必復命曰賓不顧矣伹彼據聘享訖此據食禮訖事雖不同復命云賓不顧矣即不異有司卷三牲之俎歸于賓館注卷猶收也無遺之辭也三牲之俎正饌尤尊盡以歸賓尊之至也歸俎者實于篚它時有所釋故音義它土多反本又作他疏注釋曰云歸俎者實于篚者此食禮無肵俎而言卷三牲之俎不言用俎惟云實于篚按士虞禮亦無肵俎尸舉牲體皆盛於篚吉凶雖不同無肵俎是一故知同用篚也云他時有所釋故者解三牲之俎言卷案特牲及士虞尸卒食取俎歸於尸釋三個是有所釋此無所釋故稱卷也彼注云釋猶遺也遺者君子不盡人之歡不竭人之忠也魚臘不與注以三牲之俎無所釋故也禮之有餘為施惠不言腸胃膚者在魚臘下不與可知也古文與作豫音義與音預明日賓朝服拜賜于朝拜食與侑幣皆再拜稽首注朝謂大門外音義食音嗣疏釋曰自此盡訝聽之論賓拜謝主君之事注釋曰云朝謂大門外者以其經云拜賜于朝無賓入之文又聘禮以柩造朝亦無喪入之文皆言朝故云朝謂大門外也若然案閔二年左氏傳云季友將生使卜楚丘之父卜之曰男也其名曰友在公之右間于兩社為公室輔注兩社周社亳社之間朝廷執政所在但諸侯左宗廟右社稷在大門之內而諸侯外朝在大門外者但外朝在大門外兩社之間遙繫外朝而言執政所在耳又此食禮拜侑幣聘禮歸饔餼直言拜饔與餼不拜束帛者彼使人致之故不拜此食禮君親賜故拜之訝聽之注受其言入告出報也此下大夫有士訝疏注釋曰云此下大夫有士訝者此篇是子男使下大夫小聘又案周禮掌訝大夫有士訝故云此下大夫有士訝也上大夫八豆八簋六鉶九俎魚臘皆二俎注記公食上大夫異於下大夫之數豆加葵菹蝸醢四四為列俎加鮮魚鮮臘三三為列無特音義蝸力禾反疏注釋曰云豆加葵菹蝸醢者案周禮醢人朝事之豆云韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡案上文下大夫六豆用鹿臡以上仍有茆菹麇臡在今上大夫八豆不取茆菹麇臡而取饋食之豆葵菹蝸醢者鄭以特牲少牢參之彼二篇俱以饋食為始皆用周禮饋食之豆特牲兩豆用饋食葵菹蝸醢少牢四豆二豆與特牲同兩豆用朝事之豆韭菹醓醢注云韭菹醓醢朝事之豆也而饋食用之豐大夫禮以此觀之故此公食大夫兼用饋食之豆亦是豐大夫禮也云俎加鮮魚鮮臘者上文下大夫七俎牛羊豕魚臘腸胃與膚此云九俎明加鮮魚鮮臘云無特者陳饌要方上七俎者車西兩行為六俎一俎在特于俎東此九俎為三行故無特雖無特膚亦為下魚腸胃倫膚若九若十有一下大夫則若七若九注此以命數為差也九謂再命者也十一謂三命者也七謂一命者也九或上或下者再命謂小國之卿次國之大夫也卿則曰上大夫則曰下大國之孤視子男疏注釋曰云此以命數為差也者案周禮典命公侯伯之卿三命大夫再命士一命子男之卿再命大夫一命士不命則諸侯之臣分為三等三命再命一命不命與一命同此經魚腸胃倫膚亦分為三等有十一有九有七則十一當三命九當再命七當一命若然惟有上下二文者以公侯伯之大夫與子男之卿同再命卿爵尊為上大夫爵卑為下則上言若九者子男之卿也下言若九者公侯伯大夫也故鄭云卿則曰上大夫則曰下云大國之孤視子男者欲見此經唯見三命以下案周禮典命大國之孤四命又大行人云大國之孤執皮帛以繼子男又云其他皆視小國之君若然孤與子男同十三侯伯十五上公十七差次可知庶羞西東毋過四列注謂上下大夫也古文毋為無疏釋曰上文云庶羞旁四列此上大夫饌內言庶羞西東毋過四列則東西橫行上下大夫皆四以為行下大夫四四十六東西四行南北亦四行上大夫東西四行南北五行矣上大夫庶羞二十加於下大夫以雉兔鶉鴽注鴽無母音義鶉音淳鴽音如無音牟疏注釋曰云鴽無母者按爾雅釋鳥云鴽鴾母郭氏曰䳺也青州人呼曰鴾母莊子曰田鼠化為鶉淮南子云蝦䗫所化也月令曰田鼠化為鴽然則鴽鶉一物也若不親食注謂主國君有疾病若他故疏釋曰自此盡聽命論主君不親食使大夫致禮於賓館之事注釋曰疾病之外别云他故者君有死喪之事故聘禮云主人畢歸禮賓唯饔餼之受謂畢致饗食但賓不受之使大夫各以其爵朝服以侑幣致之注執幣以將命豆實實于罋陳于楹外二以竝北陳簋實實于筐陳于楹內兩楹間二以竝南陳注陳罋筐於楹間者象授受於堂中也南北相當以食饌同列耳罋北陳者變於食罋數如豆醢芥醬從焉筐米四今文竝作併音義罋烏送反疏注釋曰云南北相當以食饌同列耳者案上文正食之時黍稷亦南陳今於楹間陳筐米亦南陳是正食及此饌陳是同列也云罋北陳者變於食者上文正食之時宰夫自東房薦豆六設于醬東西上陳之今於楹間二以併北陳故云變於食也云罋數如豆者以菹醢各異物不可同罋故罋數如豆上大夫八豆則八罋下大夫六豆則六罋云醢芥醬從馬者以其三牲不殺生列于門內醢經百日乃成不由不殺故有醢庶羞之醢同是醬類故使之相從但庶羞之醢更無别種宜同一罋芥醬宜亦一罋知有芥醬者以其有生魚故知有也云筐米四者上文上大夫八簋今乃生致之黍稷宜各一筐稻粱又二筐故云筐米四庶羞陳于碑內注生魚也魚臘從焉上大夫加鮮魚鮮臘雉兔鶉鴽不陳于堂辟正饌疏注釋曰云生魚者上文魚膾是魚之中膾者皆是生魚也案鄭注周禮云燕人膾魚方寸切其腴以啖所貴是也此則全生不膾何者本膾在豆與胾炙俱設今胾炙在牲未殺膾全不破可知若然庶羞之內衆羞俱有鄭獨云生魚者以其胾炙在牲不殺於此無矣雖有乾臘雉兔之等以生魚為主故云生魚也云魚臘從焉者雖無三牲之肉有乾魚臘可知云上大夫加鮮魚鮮臘雉兔鶉鴽者以其下大夫七鼎無鮮魚鮮臘上大夫九鼎加鮮魚鮮臘可知雉兔鶉鴽亦生致之矣云不陳于堂辟正饌者以其庶羞本在堂上正饌之西今在碑內故云辟正饌也若然不陳於碑南者以其本合在堂今宜在堂故在碑北庭實陳于碑外注執乘皮者也不參分庭一在南者以言歸宜近內疏注釋曰執乘皮者不參分庭一在南者以言歸宜近內者庭實正法皆參分庭一在南而陳之故昏禮記云納徴執皮者參分庭一在南今云碑外繼碑而言近北矣彼參分庭一在南陳之者謂在主人之庭參分庭一陳之擬與賓向外故近南此陳於客館擬與賓入內故鄭云以言歸故在內也牛羊豕陳于門內西方東上注為其踐汙館庭使近外疏釋曰案上庶羞與庭實在碑之內近內陳之此牛羊豕陳於門內繼門言之注釋曰云為其踐汙館庭使近外也若然致饔餼牛羊豕亦在此此云使近外者以饔餼有腥有熟故略其生者近門是其常此既不殺牛羊豕宜近內故決之也賓朝服以受如受饔禮注朝服食禮輕也疏注釋曰云朝服食禮輕者以其歸饗餼時卿韋辨賓皮辨受此食禮賓朝服受不皮辨故云食禮輕無儐注以已本宜往疏注釋曰云以已本宜往者明主君無故速賓在廟行食禮而有侑幣賓無儐法主君有故致食禮并有侑幣亦不合有儐故云以已本宜往明日賓朝服以拜賜于朝訝聽命注賜亦謂食侑幣疏注釋曰云亦者亦上君親食賓拜食與侑幣今亦然故云亦大夫相食親戒速注記異於君者也速召也先就告之歸具既具復自召之疏釋曰自此盡大夫之禮論主國大夫食賓之禮别於主君之事注釋曰云記異於君者案下文其他皆如公食大夫之禮故知自此已下皆記異於君法是以此經大夫親戒速決君不親戒速此則異於君也以其下諸文皆異故云記異於君者也云先就告之歸具既具復自召之者以其戒具兩有皆親為之故為此解與鄉飲酒鄉射同故彼二文皆云戒賔既歸布筵設尊乃親速賓是也迎賓于門外拜至皆如饗拜注饗大夫相饗之禮也今亡古文饗或作鄉降盥受醬湇侑幣束錦也皆自阼階降堂受授者升一等注皆者謂受醬受湇受幣也侑用束錦大夫文也降堂謂止階上今文無束賓止也注主人三降賓不從疏注釋曰云主人三降者案上文鄭注皆者謂受醬受湇受幣皆自阼階降此鄭云主人三降即上三者不數主人降盥者案鄉飲酒所言降盥者皆為洗爵故賓從降此降盥不為洗爵故鄭不數之按聘禮致饔餼賓降堂受老束錦大夫止注云止不降使之餘尊此賓不降者雖賓主敵以主人降堂不至地故賓止不降也賓執粱與湇之西序端注不敢食於尊處疏注釋曰此兩大夫敵故之西序端上公食大夫降階下臣卑故也主人辭賓反之卷加席主人辭賓反之辭幣降一等主人從注從辭賓降受侑幣再拜稽首主人送幣亦然注敵也疏注釋曰案郊特牲云大夫之臣不稽首非尊家臣以辟君也又案左氏傳哀十七年公㑹齊侯盟于䝉孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首若然臣於君乃稽首平敵相施當頓首今言敵而稽首者以食禮相尊敬雖敵亦稽首與臣拜君同故也辭於主人降一等主人從注辭謂辭其臨已食卒食徹于西序端注亦親徹東面再拜降出注拜亦拜卒食其他皆如公食大夫之禮疏釋曰云其他謂豆數俎體陳設皆不異上陳但禮異者謂親戒速君則不親迎賓公不出此大夫出大門公受醬湇幣不降此大夫則降也公食大夫大夫降食於階下此言西序端上公食卷加席公不辭此則辭之皆是異也若不親食則公作大夫朝服以侑幣致之注作使也大夫有故君必使其同爵者為之致禮列國之賓來榮辱之事君臣同賓受于堂無儐注與受君禮同疏注釋曰云與受君醴同者聘禮賓受致饔幣云堂中西北面注趨主君之命也堂中西中央之西此雖無儐受幣亦與之同也記不宿戒注食禮輕也此所以不宿戒者謂前期三日之戒申戒為宿謂前期一日疏注釋曰祭祀散齊七日為戒致齊三日為宿此則與祭祀異此不宿戒者謂不為三日之戒又不為一日之宿故鄭云此所以不宿戒者謂前期三日之戒申戒為宿謂前期一日也若然必知三日之戒一日之宿者大射前期三日宰夫戒宰及司馬又少牢辟人君有前期一日之宿此雖人君禮以食禮輕故知無三日之戒一日之宿既無前日之事宜與鄉飲酒鄉射禮同當日為之故皆不言日數故下注云食賓之朝夙興戒之賓則從戒而來不復召是也戒不速注食賓之朝夙興戒之賓則從戒者而來不復召不授几注異於醴也疏注釋曰決聘禮禮賓時公親授几也無阼席注公不坐亨于門外東方注必於門外者大夫之事也東方者主陽疏注釋曰案上經甸人亨人之等亨人是士官不得言大夫之事言大夫之事者解亨在門外之禮也燕禮注云亨於門外臣所掌也言臣亦是大夫事少牢廩爨饔爨皆在門外亦大夫事特牲云主婦視饎爨于西堂下者以其無廩人主之故在內若然鄉飲酒雖是大夫之事以其取祖陽氣之始故亦於門內司宮具几與蒲筵常緇布純加萑席尋𤣥帛純皆卷自末注司宮大宰之屬掌宮廟者也丈六尺曰常半常曰尋純緣也萑細葦也末經所終有以識之必長筵者以有左右饌也今文萑皆為莞音義純諸閏反又諸允反萑音丸緣以絹反莞音官或音丸疏注釋曰云司宫太宰之屬掌宮廟者按燕禮云司宫尊于東楹之西注司宫天子曰小宰聽酒人之成要者也注雖不同其義一也但燕禮司宫云設尊故以小宰解之此司宫設几席故以太宰之屬解之案大宰之下有宫人掌宫中除汙檅之事即此司宫彼不言設几席者以天子具官别有司几筵又有小宰諸侯兼官故司宫兼司几筵及小宰也云丈六尺曰常半常曰尋者此皆無正文按周禮考工記云車有六等之數云軫崇四尺謂之一等又云戈長六尺六寸既建而迆之崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇于人四尺謂之四等車㦸常崇于殳四尺謂之五等酋矛常有四尺崇于㦸四尺謂之六等自軫至矛皆以四尺為差以是約之即知常是丈六尺尋是八尺也云萑細葦者以類言之其實全别是以詩云葭菼注云葭蘆菼薍則葦一名蘆一名薍一名萑一名菼此萑又與莞席之莞不同彼莞謂蒲也云有以識之者席無異物為記但織之自有首尾可為記識耳云必以長筵者以有左右饌者賓在户牖之間南面上陳饌之時正饌在左庶羞在右陳饌雖不在席上皆陳於席前當席左右其間客人故謂長筵也宰夫筵出自東房注筵本在房宰夫敷之也天子諸侯左右房疏注釋曰上云司宫具几筵具之在房宰夫敷之而已天子諸侯左右房以其言東房對西房若大夫士直有東房而已故直云在房也賓之乘車在大門外西方北面立注賓車不入門廣敬也凡賓即朝中道而往將至下行而後車還立于西方賓及位而止北面卿大夫之位當車前凡朝位賓主之間各以命數為逺近之節也疏注釋曰云賓車不入門廣敬也者曲禮云客車不入大門與此同覲禮云偏駕不入王門偏駕謂同姓金輅之等乘墨車以朝墨車亦云不入大門與此亦同云凡賓即朝中道而往者內則云男子由右女子由左車從中央故賓乘車中道云而後車還立于西方者案少儀云㒒於君子始乘則式君子下行然後還立注云還車而立以俟其去是還立于西方鄉外云賓及位而止北面者案玉藻云賓立不當門彼亦謂聘使也云卿大夫之位當車前者案大行人云上公立當軹侯伯立當前疾子男立當衡義云大國之孤朝位當車前者則卿大夫立亦與孤同一節兼云大夫者小聘曰問使下大夫立與孤卿同當車前故連言也云凡朝位賓主之間各以命數為逺近之節者案大行人云上公朝位賓主之間九十步侯伯七十步子男五十步注云朝位謂大門外賓下車及王車出迎所立處又云凡諸侯之卿其禮各下其君二等以下及大夫士皆如之若然如諸侯則依命數臣下其君二等則不得依命數矣而云依命數者依命數據君而言其臣依君命數而降之故鄭總以命數言之也鉶芼牛藿羊苦豕薇皆有滑注藿豆葉也苦苦荼也滑堇荁之屬今文苦為芐音義芼亡報反荁音丸芐音户爾雅云地黃也劉一音遐嫁反疏注釋曰云滑堇荁之屬者案士虞記云鉶芼用苦若薇有滑夏用葵冬用荁鄭注云荁堇類也乾則滑夏秋用生葵冬春用乾荁此經云皆有滑不言所用之物故取士虞記解之云之屬者其中兼有葵也贊者盥從俎升注俎其所有事疏注釋曰直言此者豆亦從下升不言從豆升者贊者不佐祭豆直佐祭俎故云俎其所有事是以上經云三牲之肺不離贊者辨取之一以授賔若然黍稷亦贊祭不從黍稷升者黍稷設之在後故也黍稷雖後升先祭者以其先食黍稷後食肉故也簠有蓋冪注稻粱將食乃設去㑹於房蓋以冪冪巾也今文或作幕音義作幕音莫疏注釋曰簠簋相將簋既有㑹明簠亦有㑹可知但黍稷先設故卻㑹於敦南簠盛稻粱將食乃設故鄭云去㑹于房蓋以冪冪巾也至於陳設冪亦去之經云有蓋冪者據出房未設而言凡炙無醬注已有鹹和也疏釋曰云凡者欲解儀禮一部之內牛羊豕炙皆無醬配之注釋曰云已有鹹和者若今人食炙然上大夫蒲筵加萑席其純皆如下大夫純注謂三命大夫也孤為賓則莞筵紛純加繅席畫純也疏注釋曰經云上大夫不辨命數則子男之卿再命其席亦同下大夫鄭言謂三命大夫者欲見公侯伯之卿三命亦與子男下大夫同公之孤四命其席則異鄭據三命而言云孤為賓則莞筵紛純加繅席畫純者案周禮司几筵云筵國賓于牖前莞筵紛純加繅席畫純左彤几與此記三命已下席不同故知彼國賓謂筵孤也無正文故云則也卿擯由下注不升堂也疏注釋曰此謂上擯擯詔賓主升降周還之事故云不升堂上贊下大夫也注上謂堂上擯贊者事相近以佐上下為名疏釋曰按上經云贊者告具於公而贊賓食故云上贊使下大夫為之上大夫庶羞酒飲漿飲庶羞可也注於食庶羞宰夫又設酒漿以之食庶羞可也以優賓疏注釋曰按上經云上大夫庶羞二十豆此記人復記之者欲見上大夫食加飯之時得兼食庶羞又食㑹飯及庶羞之時宰夫更設酒飲漿飲故鄭云於食庶羞宰夫又設酒漿以之食庶羞可也所以然者優賓故也拜食與侑幣皆再拜稽首注嫌上大夫不稽首儀禮注疏卷九儀禮注疏卷九考證賓不拜送遂從之疏覲禮使者勞賓矦氏送於門外再拜遂從之監本矦氏二字錯在門外下又脫送字又從字訛作送今據覲禮原文改正設洗如饗疏設洗訖乃饗故食禮如之是如其近者也監本饗作後食食禮作鄉前如其近者作先饗後食臣學健按此釋注中如其近者之意舊刻訛繆難通細玩經注應如此又疏聘禮云公于賓一食再饗則食在饗前矣臣紱按此下疑有闕文蓋難而未解似當云而此云先饗者饗與食互相先後也即用聘禮注補之意方完足小臣東堂下南面西上宰東夾北西面南上注宰宰夫之屬也臣紱按下大羹湇節注宰謂大宰宰夫之長也聘禮注則云宰夫宰之屬也此乃以宰為宰夫之屬似覺相違古文無南上則一人而已此宰其內宰與拜也公降一等疏解經辭曰云云一假監本誤刋于上賓西階東北面答拜節之下臣龍官按以經注次之應移此賓栗階升不拜石經無賓字士舉鼎去冪于外冪石經作冪敖繼公云冪當作冪陳鼎于碑南南面石經少一南字敖繼公云碑下脫一南字此已經後人增補者仍之南順出自鼎西敖繼公云南字衍文臣紱按此順出與下甸人舉鼎順出同敖說是也宰夫右執觶疏主人奠于薦右賓不飲取奠于薦左監本左右互訛今据鄉飲鄉射經文改之宰夫膳稻于粱西敖繼公云膳當作設字之誤也膳設二字以聲相近而誤先者反之由門入升自西階監本析經文為二節以疏誤作注列於先者反之之下今依朱子本正之而合經為一節左擁簠粱簠字監本訛作簋今依石經及朱子本改正賓降辭幣升聽命敖繼公云經似有脫文蓋賓降辭幣則公當辭其降且不許其辭然後賓升而聽命也揖讓如初升監本升字在下節之首臣紱按升字義當與上揖讓如初句相屬無儐石經擯作擯李如圭云擯當作儐則監本作儐是也下兩無儐同其他皆如公食大夫之禮疏釋曰云其他謂豆數俎體陳設云云一段監本誤刻大字作注今改正記不宿戒疏故知無三日之戒一日之宿無字監本訛作有臣龍官按注意及上下文宜作無鉶芼牛藿石經牛字作半儀禮注疏卷九考證
